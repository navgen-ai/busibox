# =============================================================================
# Busibox Local Development Environment - Base Infrastructure
# =============================================================================
#
# Base compose file with infrastructure and Python API services.
# Next.js apps (busibox-portal, busibox-agents) are defined in overlay files.
#
# MODES:
#   DEV MODE (default) - For active development:
#     docker compose -f docker-compose.yml -f docker-compose.local-dev.yml up
#     - Core apps (busibox-portal + busibox-agents) in single container
#     - Volume-mounted source for live editing
#     - busibox-app npm-linked for live editing
#     - Turbopack hot-reload
#
#   GITHUB MODE - For testing production behavior:
#     docker compose -f docker-compose.yml -f docker-compose.github.yml up
#     - Core apps cloned from GitHub at build time
#     - Uses published @jazzmind/busibox-app from npm
#     - Production builds
#
# Services in this file:
#   - PostgreSQL, MinIO, Milvus, Redis (infrastructure)
#   - AuthZ, Data, Search, Agent, Docs APIs (Python services)
#   - LiteLLM (LLM gateway)
#   - Nginx (reverse proxy)
#
# HOT-RELOAD SUPPORT:
#   Python API services support hot-reload. Code changes auto-restart.
#   Note: Rebuild needed if you change requirements.txt or Dockerfile.
#
# Usage:
#   # Development mode (default)
#   make docker-up
#
#   # Production mode (test prod behavior locally)
#   make docker-up-prod
#
#   # View logs
#   make docker-logs
#
#   # Stop all services
#   make docker-down
#
# Configuration:
#   Copy env.local.example to .env.local and configure your settings.
#
# =============================================================================

services:
  # ===========================================================================
  # INFRASTRUCTURE SERVICES
  # ===========================================================================

  # PostgreSQL - Shared Database
  postgres:
    image: postgres:16-alpine
    container_name: ${CONTAINER_PREFIX:-dev}-postgres
    hostname: postgres
    labels:
      - "config_version=${GIT_COMMIT:-unknown}"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set}
      POSTGRES_DB: busibox
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./config/init-databases.sql:/docker-entrypoint-initdb.d/01-init-databases.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d litellm"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      busibox-net:
        aliases:
          - postgres
          - pg

  # Redis - Job Queue and Caching
  redis:
    image: redis:7-alpine
    container_name: ${CONTAINER_PREFIX:-dev}-redis
    hostname: redis
    labels:
      - "config_version=${GIT_COMMIT:-unknown}"
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      busibox-net:
        aliases:
          - redis

  # MinIO - Object Storage (S3-compatible)
  minio:
    image: minio/minio:latest
    container_name: ${CONTAINER_PREFIX:-dev}-minio
    hostname: minio
    labels:
      - "config_version=${GIT_COMMIT:-unknown}"
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:?MINIO_ROOT_USER must be set}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:?MINIO_ROOT_PASSWORD must be set}
    ports:
      - "9000:9000"   # API
      - "9001:9001"   # Console
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      busibox-net:
        aliases:
          - minio
          - files

  # MinIO bucket initialization
  minio-init:
    image: minio/mc
    container_name: ${CONTAINER_PREFIX:-dev}-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set myminio http://minio:9000 ${MINIO_ROOT_USER:?MINIO_ROOT_USER must be set} ${MINIO_ROOT_PASSWORD:?MINIO_ROOT_PASSWORD must be set};
      mc mb myminio/documents --ignore-existing;
      mc mb myminio/exports --ignore-existing;
      mc mb myminio/milvus --ignore-existing;
      mc anonymous set download myminio/exports;
      echo 'Buckets created successfully';
      "
    networks:
      - busibox-net

  # Milvus - Vector Database (standalone mode with etcd, uses main MinIO)
  etcd:
    image: quay.io/coreos/etcd:v3.5.5
    container_name: ${CONTAINER_PREFIX:-dev}-milvus-etcd
    hostname: etcd
    environment:
      - ETCD_AUTO_COMPACTION_MODE=revision
      - ETCD_AUTO_COMPACTION_RETENTION=1000
      - ETCD_QUOTA_BACKEND_BYTES=4294967296
      - ETCD_SNAPSHOT_COUNT=50000
    volumes:
      - etcd_data:/etcd
    command: etcd -advertise-client-urls=http://127.0.0.1:2379 -listen-client-urls http://0.0.0.0:2379 --data-dir /etcd
    healthcheck:
      test: ["CMD", "etcdctl", "endpoint", "health"]
      interval: 30s
      timeout: 20s
      retries: 3
    restart: unless-stopped
    networks:
      - busibox-net

  milvus:
    image: milvusdb/milvus:v2.6.5
    container_name: ${CONTAINER_PREFIX:-dev}-milvus
    hostname: milvus
    labels:
      - "config_version=${GIT_COMMIT:-unknown}"
    command: ["milvus", "run", "standalone"]
    security_opt:
      - seccomp:unconfined
    environment:
      ETCD_ENDPOINTS: etcd:2379
      MINIO_ADDRESS: minio:9000
      MINIO_ACCESS_KEY_ID: ${MINIO_ROOT_USER:?MINIO_ROOT_USER must be set}
      MINIO_SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD:?MINIO_ROOT_PASSWORD must be set}
      MINIO_BUCKET_NAME: milvus
      MINIO_ROOT_PATH: data
    volumes:
      - milvus_data:/var/lib/milvus
    ports:
      - "19530:19530"
      - "9091:9091"
    depends_on:
      etcd:
        condition: service_healthy
      minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9091/healthz"]
      interval: 30s
      start_period: 90s
      timeout: 20s
      retries: 3
    restart: unless-stopped
    networks:
      busibox-net:
        aliases:
          - milvus

  # Neo4j - Graph Database (Knowledge Graph)
  neo4j:
    image: neo4j:5-community
    container_name: ${CONTAINER_PREFIX:-dev}-neo4j
    hostname: neo4j
    labels:
      - "config_version=${GIT_COMMIT:-unknown}"
    environment:
      NEO4J_AUTH: ${NEO4J_USER:-neo4j}/${NEO4J_PASSWORD:?NEO4J_PASSWORD must be set}
      NEO4J_PLUGINS: '["apoc"]'
      NEO4J_server_memory_heap_initial__size: 256m
      NEO4J_server_memory_heap_max__size: 512m
    # NOTE: Ports are NOT exposed to the host for security.
    # Neo4j is only accessible from within the Docker network (busibox-net).
    # For local dev access to the Neo4j browser, use:
    #   docker compose -f docker-compose.yml -f docker-compose.local-dev.yml up
    # which re-exposes ports 7474 and 7687.
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:7474 || exit 1"]
      interval: 10s
      timeout: 5s
      start_period: 30s
      retries: 5
    restart: unless-stopped
    networks:
      busibox-net:
        aliases:
          - neo4j

  # Milvus Schema Initialization
  # Creates the 'documents' collection with hybrid search support
  milvus-init:
    image: ghcr.io/jazzmind/busibox/milvus-init:latest
    build:
      context: ./provision/docker
      dockerfile: milvus-init.Dockerfile
    container_name: ${CONTAINER_PREFIX:-dev}-milvus-init
    volumes:
      - ./provision/ansible/roles/milvus/files/hybrid_schema.py:/app/hybrid_schema.py:ro
    environment:
      MILVUS_HOST: milvus
      EMBEDDING_DIMENSION: ${EMBEDDING_DIMENSION:-256}
    command: ["python", "/app/hybrid_schema.py"]
    depends_on:
      milvus:
        condition: service_healthy
    networks:
      - busibox-net
    restart: "no"

  # Test Database Bootstrap (on-demand, run via: make test-db-init)
  # Initializes test databases (test_authz, test_files, test_agent) with
  # schema and bootstrap data for running integration tests
  # This container is NOT started automatically - use the test menu to run it
  test-db-init:
    image: python:3.11-slim
    container_name: ${CONTAINER_PREFIX:-dev}-test-db-init
    profiles: ["test"]  # Only start with --profile test
    volumes:
      - ./scripts/docker/bootstrap-test-databases.py:/app/bootstrap.py:ro
    environment:
      POSTGRES_HOST: postgres
      TEST_DB_USER: busibox_test_user
      TEST_DB_PASSWORD: testpassword
    command: ["sh", "-c", "pip install -q asyncpg cryptography && python /app/bootstrap.py"]
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - busibox-net
    restart: "no"

  # ===========================================================================
  # LLM GATEWAY
  # ===========================================================================

  # LiteLLM - Unified LLM Gateway
  litellm:
    build:
      context: ./provision/docker
      dockerfile: litellm.Dockerfile
    container_name: ${CONTAINER_PREFIX:-dev}-litellm
    hostname: litellm
    labels:
      - "config_version=${GIT_COMMIT:-unknown}"
    environment:
      PYTHONPATH: /app
      LITELLM_MASTER_KEY: ${LITELLM_MASTER_KEY:?LITELLM_MASTER_KEY must be set}
      # Salt key is the SOLE encryption key for LiteLLM DB data (model configs,
      # credentials, env vars). Must remain stable across restarts/deploys.
      # Falls back to master key for backward compat with pre-salt deployments.
      LITELLM_SALT_KEY: ${LITELLM_SALT_KEY:-${LITELLM_MASTER_KEY:?LITELLM_MASTER_KEY must be set}}
      # MLX auto-start hook context
      LLM_BACKEND: ${LLM_BACKEND:-}
      DEPLOY_API_URL: http://deploy-api:8011
      # Use the same key for deploy-api authenticated ensure calls.
      LITELLM_API_KEY: ${LITELLM_MASTER_KEY:?LITELLM_MASTER_KEY must be set}
      # PostgreSQL database for caching, usage tracking, and team management
      DATABASE_URL: postgresql://${POSTGRES_USER:-busibox_user}:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set}@postgres:5432/litellm
      # Enable runtime model/config management via API (requires DATABASE_URL)
      STORE_MODEL_IN_DB: "True"
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      # AWS Bedrock - support either token-style key or native AWS keypair env vars
      AWS_BEARER_TOKEN_BEDROCK: ${BEDROCK_API_KEY:-${AWS_BEARER_TOKEN_BEDROCK:-}}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-}
      AWS_REGION_NAME: ${AWS_REGION_NAME:-${AWS_REGION:-us-east-1}}
    ports:
      - "4000:4000"
    volumes:
      - ./config/litellm-config.yaml:/app/config.yaml:ro
      - ./config/litellm-hooks:/app/litellm_hooks:ro
    command: --config /app/config.yaml --port 4000 --detailed_debug
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:4000/health/liveliness')"]
      interval: 30s
      timeout: 10s
      start_period: 30s
      retries: 3
    restart: unless-stopped
    networks:
      busibox-net:
        aliases:
          - litellm

  # ===========================================================================
  # EMBEDDING SERVICE (Infrastructure Tier - stays running during dev restarts)
  # ===========================================================================

  # Embedding API - Dedicated embedding service
  # Loads FastEmbed model once at startup and provides HTTP API for all consumers.
  # This service should NOT be restarted frequently - it's in the infrastructure tier.
  # 
  # Model Caching:
  #   - On macOS with `make install`, the model is pre-downloaded to ~/.cache/fastembed
  #   - This host directory is bind-mounted into the container for instant startup
  #   - If not pre-cached, the model will be downloaded on first container start (~1.3GB)
  embedding-api:
    image: ghcr.io/jazzmind/busibox/embedding-api:latest
    build:
      context: ./srv/embedding
      labels:
        - "version=${GIT_COMMIT:-unknown}"
    container_name: ${CONTAINER_PREFIX:-dev}-embedding-api
    hostname: embedding-api
    labels:
      - "version=${GIT_COMMIT:-unknown}"
    volumes:
      # Mount host's fastembed cache for pre-downloaded models (from make install)
      # Falls back to Docker volume if FASTEMBED_HOST_CACHE is not set
      - ${FASTEMBED_HOST_CACHE:-fastembed_cache}:/root/.cache/fastembed
      # General model cache for huggingface, etc.
      - ${HF_HOST_CACHE:-model_cache}:/root/.cache/huggingface
    environment:
      # nomic-embed-text-v1.5: Matryoshka model (768-d native, truncatable to 256/512)
      # ~520MB model, MTEB 61.04 at 256-d (beats bge-small-384d at ~51.7)
      FASTEMBED_MODEL: ${FASTEMBED_MODEL:-nomic-ai/nomic-embed-text-v1.5}
      EMBEDDING_DIMENSION: ${EMBEDDING_DIMENSION:-256}
      EMBEDDING_BATCH_SIZE: ${EMBEDDING_BATCH_SIZE:-32}
      # Cache directory inside container - matches mounted volume
      FASTEMBED_CACHE_DIR: /root/.cache/fastembed
    ports:
      - "8005:8005"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8005/health"]
      interval: 30s
      timeout: 10s
      start_period: 120s  # Allow time for model download + warmup on first run
      retries: 3
    restart: unless-stopped
    networks:
      - busibox-net

  # ===========================================================================
  # PYTHON API SERVICES
  # ===========================================================================

  # AuthZ API - Authentication & Authorization Service
  authz-api:
    image: ghcr.io/jazzmind/busibox/authz-api:latest
    build:
      context: ./srv
      dockerfile: authz/Dockerfile
      labels:
        - "version=${GIT_COMMIT:-unknown}"
    container_name: ${CONTAINER_PREFIX:-dev}-authz-api
    hostname: authz-api
    labels:
      - "version=${GIT_COMMIT:-unknown}"
    # Hot-reload: mount source code and use --reload flag
    volumes:
      - ./srv/authz/src:/app/src:ro
    command: ["python", "-m", "uvicorn", "main:app", "--host", "0.0.0.0", "--port", "8010", "--reload", "--reload-dir", "/app/src"]
    environment:
      # PostgreSQL - uses dedicated authz database
      POSTGRES_HOST: postgres
      POSTGRES_DB: authz
      POSTGRES_USER: ${POSTGRES_USER:-busibox_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set}
      # Test Mode Configuration (routes X-Test-Mode: true requests to test database)
      AUTHZ_TEST_MODE_ENABLED: "true"
      TEST_DB_NAME: test_authz
      TEST_DB_USER: busibox_test_user
      TEST_DB_PASSWORD: testpassword
      # AuthZ Configuration
      AUTHZ_ISSUER: busibox-authz
      AUTHZ_ACCESS_TOKEN_TTL: ${AUTHZ_ACCESS_TOKEN_TTL:-900}
      AUTHZ_SIGNING_ALG: RS256
      AUTHZ_RSA_KEY_SIZE: 2048
      AUTHZ_MASTER_KEY: ${AUTHZ_MASTER_KEY:?AUTHZ_MASTER_KEY must be set}
      # Bootstrap client (busibox-portal)
      AUTHZ_BOOTSTRAP_ALLOWED_AUDIENCES: data-api,search-api,agent-api,authz-api,config-api
      AUTHZ_BOOTSTRAP_ALLOWED_SCOPES: read,write,search.read,data.write,data.read,agent.execute
      # Admin users to bootstrap on startup (comma-separated)
      ADMIN_EMAILS: ${ADMIN_EMAILS:-${ADMIN_EMAIL:-}}
      # Email / Bridge integration
      # Authz calls bridge-api directly to send magic-link emails so that
      # tokens never leave the backend.
      APP_URL: "${APP_URL:-https://localhost/portal}"
      BRIDGE_API_URL: "http://bridge-api:8081"
      DEV_MODE: "true"
    ports:
      - "8010:8010"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8010/health/live')"]
      interval: 10s
      timeout: 5s
      start_period: 60s
      retries: 12
    restart: unless-stopped
    networks:
      busibox-net:
        aliases:
          - authz-api
          - authz

  # Data API - Document Processing Service
  data-api:
    image: ghcr.io/jazzmind/busibox/data-api:latest
    build:
      context: ./srv
      dockerfile: data/Dockerfile
      labels:
        - "version=${GIT_COMMIT:-unknown}"
    container_name: ${CONTAINER_PREFIX:-dev}-data-api
    hostname: data-api
    labels:
      - "version=${GIT_COMMIT:-unknown}"
    # Hot-reload: mount source code and use --reload flag
    volumes:
      - ./srv/data/src:/app/src:ro
      - ./srv/data/migrations:/app/migrations:ro
      - ./srv/shared:/app/shared:ro
      - ../busibox-testdocs:/testdocs:ro  # Mount test documents for PDF tests
      - data_temp:/tmp/data
      # Model cache - persists downloaded models across container rebuilds
      - ${MODEL_HOST_CACHE:-model_cache}:/root/.cache
    command: ["python", "-m", "uvicorn", "api.main:app", "--host", "0.0.0.0", "--port", "8002", "--reload", "--reload-dir", "/app/src"]
    environment:
      # PostgreSQL - uses dedicated data database
      POSTGRES_HOST: postgres
      POSTGRES_DB: data
      POSTGRES_USER: ${POSTGRES_USER:-busibox_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set}
      # Test Mode Configuration (routes X-Test-Mode: true requests to test database)
      DATA_TEST_MODE_ENABLED: "true"
      TEST_DB_NAME: test_data
      TEST_DB_USER: busibox_test_user
      TEST_DB_PASSWORD: testpassword
      # Test documents
      TEST_DOC_REPO_PATH: /testdocs
      # Redis
      REDIS_HOST: redis
      # MinIO
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER:?MINIO_ROOT_USER must be set}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD:?MINIO_ROOT_PASSWORD must be set}
      MINIO_SECURE: "false"
      MINIO_BUCKET: documents
      MINIO_EXTERNAL_BASE_URL: /files
      # Milvus
      MILVUS_HOST: milvus
      MILVUS_COLLECTION: documents
      # Busibox Portal (for library resolution and migration)
      # Note: In Docker dev, portal typically runs on host, use host.docker.internal
      # Include /portal base path if portal is configured with basePath
      BUSIBOX_PORTAL_URL: ${BUSIBOX_PORTAL_URL:-http://host.docker.internal:3000/portal}
      # Busibox Portal database (for automatic library migration from portal to data-api)
      # If not set, migration is skipped (libraries created on-demand instead)
      BUSIBOX_PORTAL_DB_HOST: ${BUSIBOX_PORTAL_DB_HOST:-postgres}
      BUSIBOX_PORTAL_DB_PORT: ${BUSIBOX_PORTAL_DB_PORT:-5432}
      BUSIBOX_PORTAL_DB_NAME: ${BUSIBOX_PORTAL_DB_NAME:-ai_portal}
      BUSIBOX_PORTAL_DB_USER: ${BUSIBOX_PORTAL_DB_USER:-busibox_user}
      BUSIBOX_PORTAL_DB_PASSWORD: ${BUSIBOX_PORTAL_DB_PASSWORD:-${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set}}
      # LiteLLM
      LITELLM_BASE_URL: http://litellm:4000
      LITELLM_API_KEY: ${LITELLM_API_KEY:?LITELLM_API_KEY must be set}
      # AuthZ
      AUTHZ_BASE_URL: http://authz-api:8010
      AUTHZ_JWKS_URL: http://authz-api:8010/.well-known/jwks.json
      AUTHZ_ISSUER: busibox-authz
      AUTHZ_AUDIENCE: data-api
      AUTHZ_TOKEN_URL: http://authz-api:8010/oauth/token
      # Processing defaults (overridden per-job by Busibox Portal data settings)
      MARKER_ENABLED: ${MARKER_ENABLED:-false}
      MARKER_USE_GPU: ${MARKER_USE_GPU:-false}
      COLPALI_ENABLED: ${COLPALI_ENABLED:-false}
      LLM_CLEANUP_ENABLED: ${LLM_CLEANUP_ENABLED:-false}
      # Embedding API - dedicated embedding service (no local model loading)
      EMBEDDING_API_URL: http://embedding-api:8005
      EMBEDDING_DIMENSION: ${EMBEDDING_DIMENSION:-256}
      # Neo4j (optional graph database)
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: ${NEO4J_USER:-neo4j}
      NEO4J_PASSWORD: ${NEO4J_PASSWORD:?NEO4J_PASSWORD must be set}
    ports:
      - "8002:8002"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
      milvus:
        condition: service_healthy
      authz-api:
        condition: service_healthy
      embedding-api:
        condition: service_healthy
      neo4j:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8002/')"]
      interval: 10s
      timeout: 5s
      start_period: 30s  # Fast startup - no local model loading needed
      retries: 5
    restart: unless-stopped
    networks:
      - busibox-net

  # Data Worker - Background Job Processor
  # Consumes jobs from Redis stream and processes uploaded documents
  data-worker:
    image: ghcr.io/jazzmind/busibox/data-api:latest
    build:
      context: ./srv
      dockerfile: data/Dockerfile
    container_name: ${CONTAINER_PREFIX:-dev}-data-worker
    hostname: data-worker
    # Hot-reload: mount source code for development
    volumes:
      - ./srv/data/src:/app/src:ro
      - ./srv/shared:/app/shared:ro
      - ../busibox-testdocs:/testdocs:ro  # Mount test documents for PDF tests
      - data_temp:/tmp/data
      # Model cache - persists downloaded models across container rebuilds
      - ${MODEL_HOST_CACHE:-model_cache}:/root/.cache
    # Run the worker process instead of the API
    command: ["python", "src/worker.py"]
    environment:
      # PostgreSQL - uses dedicated data database
      POSTGRES_HOST: postgres
      POSTGRES_DB: data
      POSTGRES_USER: ${POSTGRES_USER:-busibox_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set}
      # Redis
      REDIS_HOST: redis
      REDIS_STREAM: jobs:data
      REDIS_CONSUMER_GROUP: workers
      # MinIO
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER:?MINIO_ROOT_USER must be set}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD:?MINIO_ROOT_PASSWORD must be set}
      MINIO_SECURE: "false"
      MINIO_BUCKET: documents
      MINIO_EXTERNAL_BASE_URL: /files
      # Milvus
      MILVUS_HOST: milvus
      MILVUS_COLLECTION: documents
      # LiteLLM
      LITELLM_BASE_URL: http://litellm:4000
      LITELLM_API_KEY: ${LITELLM_API_KEY:?LITELLM_API_KEY must be set}
      # Processing defaults (overridden per-job by Busibox Portal data settings)
      MARKER_ENABLED: ${MARKER_ENABLED:-false}
      MARKER_USE_GPU: ${MARKER_USE_GPU:-false}
      COLPALI_ENABLED: ${COLPALI_ENABLED:-false}
      LLM_CLEANUP_ENABLED: ${LLM_CLEANUP_ENABLED:-false}
      # Test documents
      TEST_DOC_REPO_PATH: /testdocs
      # Embedding API - dedicated embedding service (no local model loading)
      EMBEDDING_API_URL: http://embedding-api:8005
      EMBEDDING_DIMENSION: ${EMBEDDING_DIMENSION:-256}
      # AuthZ (for encryption/decryption during processing)
      AUTHZ_BASE_URL: http://authz-api:8010
      AUTHZ_JWKS_URL: http://authz-api:8010/.well-known/jwks.json
      AUTHZ_ISSUER: busibox-authz
      AUTHZ_AUDIENCE: data-api
      AUTHZ_TOKEN_URL: http://authz-api:8010/oauth/token
      # Neo4j (optional graph database)
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: ${NEO4J_USER:-neo4j}
      NEO4J_PASSWORD: ${NEO4J_PASSWORD:?NEO4J_PASSWORD must be set}
      # Agent API (for library triggers - fires agent when document processing completes)
      AGENT_API_HOST: agent-api
      AGENT_API_PORT: "8000"
      # Worker ID (for debugging)
      WORKER_ID: local-worker-1
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
      milvus:
        condition: service_healthy
      milvus-init:
        condition: service_completed_successfully
      data-api:
        condition: service_healthy
      embedding-api:
        condition: service_healthy
      authz-api:
        condition: service_healthy
    # Worker healthcheck - verify the Python worker process is running (PID 1)
    # Uses /proc/1/cmdline since pgrep isn't available in slim image
    healthcheck:
      test: ["CMD-SHELL", "grep -q 'worker.py' /proc/1/cmdline"]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3
    restart: unless-stopped
    networks:
      - busibox-net

  # Bridge API - Multi-channel Communication Service (Email, Signal)
  bridge-api:
    image: ghcr.io/jazzmind/busibox/bridge-api:latest
    build:
      context: ./srv/bridge
      dockerfile: Dockerfile
      labels:
        - "version=${GIT_COMMIT:-unknown}"
    container_name: ${CONTAINER_PREFIX:-dev}-bridge-api
    hostname: bridge-api
    labels:
      - "version=${GIT_COMMIT:-unknown}"
    volumes:
      - ./srv/bridge/app:/app/app:ro
    environment:
      ENVIRONMENT: ${BUSIBOX_ENV:-development}
      LOG_LEVEL: INFO
      BRIDGE_API_PORT: "8081"
      # Signal channel (disabled by default in dev)
      SIGNAL_ENABLED: "false"
      SIGNAL_CLI_URL: http://localhost:8080
      SIGNAL_PHONE_NUMBER: ""
      # Telegram channel (disabled by default)
      TELEGRAM_ENABLED: "${BRIDGE_TELEGRAM_ENABLED:-false}"
      TELEGRAM_BOT_TOKEN: "${BRIDGE_TELEGRAM_BOT_TOKEN:-}"
      TELEGRAM_POLL_INTERVAL: "${BRIDGE_TELEGRAM_POLL_INTERVAL:-1.0}"
      TELEGRAM_POLL_TIMEOUT: "${BRIDGE_TELEGRAM_POLL_TIMEOUT:-25}"
      TELEGRAM_ALLOWED_CHAT_IDS: "${BRIDGE_TELEGRAM_ALLOWED_CHAT_IDS:-}"
      # Discord channel (disabled by default)
      DISCORD_ENABLED: "${BRIDGE_DISCORD_ENABLED:-false}"
      DISCORD_BOT_TOKEN: "${BRIDGE_DISCORD_BOT_TOKEN:-}"
      DISCORD_POLL_INTERVAL: "${BRIDGE_DISCORD_POLL_INTERVAL:-2.0}"
      DISCORD_CHANNEL_IDS: "${BRIDGE_DISCORD_CHANNEL_IDS:-}"
      # WhatsApp Cloud API webhook mode (disabled by default)
      WHATSAPP_ENABLED: "${BRIDGE_WHATSAPP_ENABLED:-false}"
      WHATSAPP_VERIFY_TOKEN: "${BRIDGE_WHATSAPP_VERIFY_TOKEN:-}"
      WHATSAPP_ACCESS_TOKEN: "${BRIDGE_WHATSAPP_ACCESS_TOKEN:-}"
      WHATSAPP_PHONE_NUMBER_ID: "${BRIDGE_WHATSAPP_PHONE_NUMBER_ID:-}"
      WHATSAPP_API_VERSION: "${BRIDGE_WHATSAPP_API_VERSION:-v22.0}"
      WHATSAPP_ALLOWED_PHONE_NUMBERS: "${BRIDGE_WHATSAPP_ALLOWED_PHONE_NUMBERS:-}"
      # Cross-channel sender bindings for conversation continuity
      CHANNEL_USER_BINDINGS: "${BRIDGE_CHANNEL_USER_BINDINGS:-}"
      # Agent API
      AGENT_API_URL: http://agent-api:8000
      DEFAULT_AGENT_ID: "${BRIDGE_DEFAULT_AGENT_ID:-}"
      AUTHZ_BASE_URL: http://authz-api:8010
      AUTH_TOKEN_URL: http://authz-api:8010/oauth/token
      DELEGATION_TOKEN: ""
      # Config API (email settings read on demand)
      CONFIG_API_URL: http://config-api:8012
      # Email channel (env var fallback, overridden by config-api settings)
      EMAIL_ENABLED: "${BRIDGE_EMAIL_ENABLED:-false}"
      SMTP_HOST: "${BRIDGE_SMTP_HOST:-}"
      SMTP_PORT: "${BRIDGE_SMTP_PORT:-}"
      SMTP_USER: "${BRIDGE_SMTP_USER:-}"
      SMTP_PASSWORD: "${BRIDGE_SMTP_PASSWORD:-}"
      SMTP_SECURE: "${BRIDGE_SMTP_SECURE:-false}"
      EMAIL_FROM: "${BRIDGE_EMAIL_FROM:-}"
      RESEND_API_KEY: "${BRIDGE_RESEND_API_KEY:-}"
      # Inbound email (IMAP polling, optional)
      EMAIL_INBOUND_ENABLED: "${BRIDGE_EMAIL_INBOUND_ENABLED:-false}"
      IMAP_HOST: "${BRIDGE_IMAP_HOST:-}"
      IMAP_PORT: "${BRIDGE_IMAP_PORT:-993}"
      IMAP_USER: "${BRIDGE_IMAP_USER:-}"
      IMAP_PASSWORD: "${BRIDGE_IMAP_PASSWORD:-}"
      IMAP_USE_SSL: "${BRIDGE_IMAP_USE_SSL:-true}"
      IMAP_FOLDER: "${BRIDGE_IMAP_FOLDER:-INBOX}"
      EMAIL_INBOUND_POLL_INTERVAL: "${BRIDGE_EMAIL_INBOUND_POLL_INTERVAL:-30}"
      EMAIL_ALLOWED_SENDERS: "${BRIDGE_EMAIL_ALLOWED_SENDERS:-}"
    ports:
      - "8081:8081"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8081/health"]
      interval: 30s
      timeout: 10s
      start_period: 5s
      retries: 3
    restart: unless-stopped
    networks:
      - busibox-net

  # Search API - Semantic Search Service
  search-api:
    image: ghcr.io/jazzmind/busibox/search-api:latest
    build:
      context: ./srv
      dockerfile: search/Dockerfile
      labels:
        - "version=${GIT_COMMIT:-unknown}"
    container_name: ${CONTAINER_PREFIX:-dev}-search-api
    hostname: search-api
    labels:
      - "version=${GIT_COMMIT:-unknown}"
    # Hot-reload: mount source code and use --reload flag
    volumes:
      - ./srv/search/src:/app/src:ro
      - ./srv/shared:/app/shared:ro
      # Model cache - persists downloaded models across container rebuilds
      - ${MODEL_HOST_CACHE:-model_cache}:/root/.cache
    command: ["python", "-m", "uvicorn", "api.main:app", "--host", "0.0.0.0", "--port", "8003", "--reload", "--reload-dir", "/app/src"]
    environment:
      LOG_LEVEL: INFO
      # PostgreSQL - uses dedicated data database
      POSTGRES_HOST: postgres
      POSTGRES_DB: data
      POSTGRES_USER: ${POSTGRES_USER:-busibox_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set}
      # Test Mode Configuration (routes X-Test-Mode: true requests to test database)
      SEARCH_TEST_MODE_ENABLED: "true"
      TEST_DB_NAME: test_data
      TEST_DB_USER: busibox_test_user
      TEST_DB_PASSWORD: testpassword
      # Milvus
      MILVUS_HOST: milvus
      MILVUS_COLLECTION: documents
      # Redis (caching)
      REDIS_HOST: redis
      ENABLE_CACHING: "true"
      # Embedding API - dedicated embedding service (direct call, no token exchange needed)
      EMBEDDING_API_URL: http://embedding-api:8005
      EMBEDDING_DIMENSION: ${EMBEDDING_DIMENSION:-256}
      # LiteLLM
      LITELLM_BASE_URL: http://litellm:4000
      LITELLM_API_KEY: ${LITELLM_API_KEY:?LITELLM_API_KEY must be set}
      # AuthZ
      AUTHZ_JWKS_URL: http://authz-api:8010/.well-known/jwks.json
      AUTHZ_ISSUER: busibox-authz
      AUTHZ_AUDIENCE: search-api
      AUTHZ_TOKEN_URL: http://authz-api:8010/oauth/token
      # Reranking mode: "none" (skip), "vllm" (GPU), "local" (CPU, slow startup)
      # Default to "none" in local Docker to avoid 2GB model download and vLLM dependency
      RERANKING_MODE: ${RERANKING_MODE:-none}
      # Legacy bool (superseded by RERANKING_MODE)
      ENABLE_RERANKING: ${ENABLE_RERANKING:-false}
      # Neo4j (optional graph database for graph-enhanced search)
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: ${NEO4J_USER:-neo4j}
      NEO4J_PASSWORD: ${NEO4J_PASSWORD:?NEO4J_PASSWORD must be set}
    ports:
      - "8003:8003"
    depends_on:
      postgres:
        condition: service_healthy
      milvus:
        condition: service_healthy
      authz-api:
        condition: service_healthy
      embedding-api:
        condition: service_healthy
      neo4j:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8003/')"]
      interval: 10s
      timeout: 5s
      start_period: 30s  # Fast startup - embedding service handles model loading
      retries: 5
    restart: unless-stopped
    networks:
      - busibox-net

  # Agent API - AI Agent Service
  agent-api:
    image: ghcr.io/jazzmind/busibox/agent-api:latest
    build:
      context: ./srv
      dockerfile: agent/Dockerfile
      labels:
        - "version=${GIT_COMMIT:-unknown}"
    container_name: ${CONTAINER_PREFIX:-dev}-agent-api
    hostname: agent-api
    labels:
      - "version=${GIT_COMMIT:-unknown}"
    # Hot-reload: mount source code and use --reload flag
    # Note: migrations still run on startup, but code changes hot-reload
    volumes:
      - ./srv/agent/app:/app/app:ro
      - ./srv/agent/alembic:/app/alembic:ro
      - ./srv/agent/tests:/app/tests:ro
      - ./srv/shared:/app/shared:ro
      - builder_projects:/srv/projects
      - ./config/litellm-config.yaml:/app/litellm-config.yaml:ro
    command: ["sh", "-c", "echo 'Migration files:' && ls -la /app/alembic/versions/ && echo 'Current alembic head:' && python -m alembic heads && echo 'Current DB version:' && python -m alembic current && echo 'Running migrations...' && python -m alembic upgrade head && echo 'Migrations complete' && python -m uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload --reload-dir /app/app"]
    environment:
      # Service
      ENVIRONMENT: development
      DEBUG: "true"
      LOG_LEVEL: INFO
      # Database
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-busibox_user}:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set}@postgres:5432/agent
      # Test Mode Configuration (routes X-Test-Mode: true requests to test database)
      TEST_MODE_ENABLED: "true"
      TEST_DATABASE_URL: postgresql+asyncpg://busibox_test_user:testpassword@postgres:5432/test_agent
      # Redis
      REDIS_URL: redis://redis:6379/0
      # Busibox services
      SEARCH_API_URL: http://search-api:8003
      DATA_API_URL: http://data-api:8002
      RAG_API_URL: http://search-api:8003
      # Milvus
      MILVUS_HOST: milvus
      MILVUS_PORT: 19530
      # Embedding API - dedicated embedding service (no auth required, used for insights)
      EMBEDDING_API_URL: http://embedding-api:8005
      EMBEDDING_DIMENSION: ${EMBEDDING_DIMENSION:-256}
      # LiteLLM
      LITELLM_BASE_URL: http://litellm:4000/v1
      LITELLM_API_KEY: ${LITELLM_API_KEY:?LITELLM_API_KEY must be set}
      DEFAULT_MODEL: agent
      # Claude Agent SDK routes through LiteLLM Anthropic-compatible endpoint
      ANTHROPIC_BASE_URL: http://litellm:4000
      ANTHROPIC_API_KEY: ${LITELLM_MASTER_KEY:?LITELLM_MASTER_KEY must be set}
      # LiteLLM database for spend tracking (admin stats)
      LITELLM_DATABASE_URL: postgresql://${POSTGRES_USER:-busibox_user}:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set}@postgres:5432/litellm
      # Cloud provider API keys (for direct model listing from providers)
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      # AuthZ
      AUTH_JWKS_URL: http://authz-api:8010/.well-known/jwks.json
      AUTH_ISSUER: busibox-authz
      AUTH_AUDIENCE: agent-api
      AUTH_TOKEN_URL: http://authz-api:8010/oauth/token
      # Deploy API (for MLX auto-start)
      DEPLOY_API_URL: http://deploy-api:8011
      # Config API (persistent encrypted config storage for cloud provider keys)
      CONFIG_API_URL: http://config-api:8012
      LLM_BACKEND: ${LLM_BACKEND:-${DETECTED_LLM_BACKEND:-}}
      # Email notifications - uses Bridge API (preferred) or direct SMTP as fallback
      BRIDGE_API_URL: "http://bridge-api:8081"
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USERNAME: ${SMTP_USERNAME:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      EMAIL_FROM: ${SMTP_FROM:-noreply@busibox.local}
      # Portal URL for notification links
      PORTAL_BASE_URL: ${PORTAL_BASE_URL:-https://localhost}
      # SKILL.md loader (AgentSkills-compatible)
      SKILLS_ENABLED: "${SKILLS_ENABLED:-false}"
      SKILLS_DIRS: "${SKILLS_DIRS:-/srv/skills,~/.openclaw/skills,/skills}"
      SKILLS_CACHE_TTL_SECONDS: "${SKILLS_CACHE_TTL_SECONDS:-60}"
      SKILLS_ALLOWED_ROLES: "${SKILLS_ALLOWED_ROLES:-}"
      SKILLS_CLAWHUB_ENABLED: "${SKILLS_CLAWHUB_ENABLED:-false}"
      # Calendar integration (optional)
      GOOGLE_CALENDAR_ACCESS_TOKEN: "${GOOGLE_CALENDAR_ACCESS_TOKEN:-}"
      GOOGLE_CALENDAR_ID: "${GOOGLE_CALENDAR_ID:-primary}"
      # Neo4j (optional graph database for graph tools)
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: ${NEO4J_USER:-neo4j}
      NEO4J_PASSWORD: ${NEO4J_PASSWORD:?NEO4J_PASSWORD must be set}
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      milvus:
        condition: service_healthy
      authz-api:
        condition: service_healthy
      embedding-api:
        condition: service_healthy
      neo4j:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 10s
      timeout: 5s
      start_period: 30s
      retries: 3
    restart: unless-stopped
    networks:
      - busibox-net

  # Docs API - Documentation Service
  # Lightweight service for serving markdown docs and OpenAPI specs
  docs-api:
    image: ghcr.io/jazzmind/busibox/docs-api:latest
    build:
      context: ./srv/docs
      labels:
        - "version=${GIT_COMMIT:-unknown}"
    container_name: ${CONTAINER_PREFIX:-dev}-docs-api
    hostname: docs-api
    labels:
      - "version=${GIT_COMMIT:-unknown}"
    # Hot-reload: mount source code and use --reload flag
    volumes:
      - ./srv/docs/src:/app/src:ro
      - ./docs:/app/docs:ro
      - ./openapi:/app/openapi:ro
      # App-contributed docs - shared volume written by deploy-api, read by docs-api
      - app_docs:/app/docs/apps:ro
    command: ["python", "-m", "uvicorn", "api.main:app", "--host", "0.0.0.0", "--port", "8004", "--reload", "--reload-dir", "/app/src"]
    environment:
      DOCS_PATH: /app/docs
      OPENAPI_PATH: /app/openapi
    ports:
      - "8004:8004"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8004/health/live')"]
      interval: 10s
      timeout: 5s
      start_period: 10s
      retries: 3
    restart: unless-stopped
    networks:
      - busibox-net

  # Deploy API - App Deployment Service
  # Handles external app deployment, database provisioning, and nginx configuration
  # Runs alongside authz-api and validates tokens via authz
  deploy-api:
    image: ghcr.io/jazzmind/busibox/deploy-api:latest
    build:
      context: ./srv
      dockerfile: deploy/Dockerfile
      labels:
        - "version=${GIT_COMMIT:-unknown}"
    container_name: ${CONTAINER_PREFIX:-dev}-deploy-api
    hostname: deploy-api
    labels:
      - "version=${GIT_COMMIT:-unknown}"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    # Hot-reload: mount source code and use --reload flag
    volumes:
      - ./srv/deploy/src:/app/src:ro
      - ./provision/ansible:/ansible:ro
      - ${HOST_SSH_DIR:-~/.ssh}:/root/.ssh:ro  # SSH keys for remote operations
      - /var/run/docker.sock:/var/run/docker.sock  # Docker socket for docker exec
      # DEV_APPS_DIR should point to a directory containing your app source folders
      # e.g., /Users/you/Code which contains busibox-projects, busibox-analysis/, etc.
      # This is mounted directly - no symlinks needed
      - ${DEV_APPS_DIR:-./dev-apps}:/srv/dev-apps:ro
      # Mount busibox root at its HOST path so docker compose paths work for both builds and volumes
      # BUSIBOX_HOST_PATH must be set to the actual host path (e.g., /Users/you/Code/busibox)
      - ${BUSIBOX_HOST_PATH:-.}:${BUSIBOX_HOST_PATH:-/busibox}:rw
      # App-contributed docs - deploy-api writes app docs here, docs-api reads them
      - app_docs:/app/app-docs:rw
    command: ["python", "-m", "uvicorn", "src.main:app", "--host", "0.0.0.0", "--port", "8011", "--reload", "--reload-dir", "/app/src"]
    environment:
      # Service
      DEPLOY_PORT: 8011
      DEBUG: "true"
      # Container prefix (for docker exec commands)
      CONTAINER_PREFIX: ${CONTAINER_PREFIX:-dev}
      # Authz (for token validation)
      AUTHZ_URL: http://authz-api:8010
      # Ansible
      ANSIBLE_DIR: /ansible
      # PostgreSQL (for database provisioning)
      # Uses busibox_user which has CREATEDB permission (see init-databases.sql)
      POSTGRES_HOST: postgres
      POSTGRES_ADMIN_USER: ${POSTGRES_USER:-busibox_user}
      POSTGRES_ADMIN_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set}
      # POSTGRES_PASSWORD passed through so docker compose can use it for spawned services
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set}
      POSTGRES_USER: ${POSTGRES_USER:-busibox_user}
      # MinIO credentials passed through so docker compose can use them for spawned services
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER:?MINIO_ROOT_USER must be set}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD:?MINIO_ROOT_PASSWORD must be set}
      # Container IPs (use Docker service names in local dev)
      APPS_CONTAINER_IP: ${APPS_CONTAINER_IP:-host.docker.internal}
      APPS_CONTAINER_IP_STAGING: ${APPS_CONTAINER_IP_STAGING:-host.docker.internal}
      # SSH (for remote operations in production)
      SSH_KEY_PATH: /root/.ssh/id_rsa
      # Docker Compose configuration
      COMPOSE_PROJECT_NAME: ${CONTAINER_PREFIX:-dev}-busibox
      COMPOSE_FILES: "-f docker-compose.yml -f docker-compose.local-dev.yml"
      # Host path to busibox directory (for volume mounts in spawned containers)
      # When set by the Makefile (BUSIBOX_HOST_PATH=$(PWD)), the repo is mounted at
      # the same path on host and in container so docker compose volume paths work.
      # When not set, the repo is mounted at /busibox (see volumes above).
      BUSIBOX_HOST_PATH: ${BUSIBOX_HOST_PATH:-/busibox}
      # State file path - must match the mounted busibox path inside container
      BUSIBOX_STATE_FILE: ${BUSIBOX_HOST_PATH:-/busibox}/.busibox-state-dev
      # Nginx
      NGINX_HOST: nginx
      NGINX_CONFIG_DIR: /etc/nginx/sites-available/apps
      NGINX_ENABLED_DIR: /etc/nginx/sites-enabled
      # Rate limiting (10 seconds for testing)
      RATE_LIMIT_SECONDS: 10
      # Dev apps directory - host path for display in UI
      DEV_APPS_DIR_HOST: ${DEV_APPS_DIR:-./dev-apps}
      # Secrets passed through so deploy-api can relay them to docker compose
      # when starting other services (compose v5 validates all service defs)
      AUTHZ_MASTER_KEY: ${AUTHZ_MASTER_KEY:?AUTHZ_MASTER_KEY must be set}
      SSO_JWT_SECRET: ${SSO_JWT_SECRET:?SSO_JWT_SECRET must be set}
      CONFIG_ENCRYPTION_KEY: ${CONFIG_ENCRYPTION_KEY:?CONFIG_ENCRYPTION_KEY must be set}
      NEO4J_PASSWORD: ${NEO4J_PASSWORD:?NEO4J_PASSWORD must be set}
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:?MINIO_ROOT_USER must be set}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:?MINIO_ROOT_PASSWORD must be set}
      GITHUB_AUTH_TOKEN: ${GITHUB_AUTH_TOKEN:-}
      # Host Agent (for MLX control on Apple Silicon)
      # The host-agent runs on the host machine and is accessible via host.docker.internal
      HOST_AGENT_URL: http://host.docker.internal:8089
      HOST_AGENT_TOKEN: ${HOST_AGENT_TOKEN:-}
      # LLM Backend - set during install to tell deploy-api what hardware is available on host
      # Values: mlx (Apple Silicon), vllm (NVIDIA GPU), cloud (no local AI)
      LLM_BACKEND: ${LLM_BACKEND:-${DETECTED_LLM_BACKEND:-}}
      # LLM Services (for LLM chain validation)
      LITELLM_URL: http://litellm:4000
      LITELLM_MASTER_KEY: ${LITELLM_MASTER_KEY:?LITELLM_MASTER_KEY must be set}
      LITELLM_SALT_KEY: ${LITELLM_SALT_KEY:-${LITELLM_MASTER_KEY:?LITELLM_MASTER_KEY must be set}}
      # Pass through the same effective key used by LiteLLM so deploy-api
      # starts agent-api with the correct token on first install.
      LITELLM_API_KEY: ${LITELLM_MASTER_KEY:?LITELLM_MASTER_KEY must be set}
      AGENT_API_URL: http://agent-api:8000
      # MLX server runs on host (not in docker) on port 8080
      MLX_SERVER_URL: http://host.docker.internal:8080
    ports:
      - "8011:8011"
    depends_on:
      authz-api:
        condition: service_healthy
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8011/health/live')"]
      interval: 10s
      timeout: 5s
      start_period: 10s
      retries: 3
    restart: unless-stopped
    networks:
      - busibox-net

  # Config API - Centralised Configuration Service
  # Provides tiered config access: public (branding), authenticated (app registry),
  # app-scoped (secrets), and admin (full CRUD). Replaces config in deploy-api and data-api.
  config-api:
    build:
      context: ./srv
      dockerfile: config/Dockerfile
      labels:
        - "version=${GIT_COMMIT:-unknown}"
    container_name: ${CONTAINER_PREFIX:-dev}-config-api
    hostname: config-api
    labels:
      - "version=${GIT_COMMIT:-unknown}"
    volumes:
      - ./srv/config/src:/app/src:ro
    command: ["python", "-m", "uvicorn", "main:app", "--host", "0.0.0.0", "--port", "8012", "--reload", "--reload-dir", "/app/src"]
    environment:
      CONFIG_PORT: 8012
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: config
      POSTGRES_USER: ${POSTGRES_USER:-busibox_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set}
      AUTHZ_BASE_URL: http://authz-api:8010
      CONFIG_ENCRYPTION_KEY: ${CONFIG_ENCRYPTION_KEY:?CONFIG_ENCRYPTION_KEY must be set}
    ports:
      - "8012:8012"
    depends_on:
      authz-api:
        condition: service_healthy
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8012/health/live')"]
      interval: 10s
      timeout: 5s
      start_period: 10s
      retries: 3
    restart: unless-stopped
    networks:
      busibox-net:
        aliases:
          - config-api
          - config

# ===========================================================================
  # USER APPS CONTAINER
  # ===========================================================================
  # Container for deploying external/user applications via deploy-api.
  # This is separate from core apps (busibox-portal, busibox-agents) for isolation.
  # Apps are deployed via git clone + npm install + systemd.
  #
  # For local development:
  #   - Place app source in dev-apps/{app-id}/ directory
  #   - Deploy-api will detect and use dev-apps path instead of git clone
  # ===========================================================================

  user-apps:
    # =========================================================================
    # USER APPS CONTAINER (Sandboxed)
    # =========================================================================
    # This container runs UNTRUSTED user-deployed applications.
    # Security isolation is critical - all app code executes inside this container.
    #
    # Security measures:
    # - Resource limits (CPU, memory)
    # - Read-only root filesystem where possible
    # - No privileged access
    # - Dropped capabilities
    # - Isolated network (only reaches internal services)
    # =========================================================================
    build:
      context: ./provision/docker
      dockerfile: user-apps.Dockerfile
    container_name: ${CONTAINER_PREFIX:-dev}-user-apps
    hostname: user-apps
    labels:
      - "version=${GIT_COMMIT:-unknown}"
    volumes:
      - user_apps_data:/srv/apps  # Deployed apps (git cloned by deploy-api)
      # Dev apps mount - uses DEV_APPS_DIR from .busibox-state via Makefile
      # Falls back to local ./dev-apps directory if not set
      - ${DEV_APPS_DIR:-./dev-apps}:/srv/dev-apps
      # Logs directory for user apps
      - user_apps_logs:/var/log/user-apps
    environment:
      NODE_ENV: production
    # Keep this container stopped when the stack is intentionally stopped.
    # User apps are started explicitly by make/install flows and deploy-api.
    restart: "no"
    networks:
      - busibox-net
    # Resource limits to prevent runaway apps from affecting host
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 2G
        reservations:
          cpus: '0.5'
          memory: 512M
    # Security: drop unnecessary capabilities
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETUID
      - SETGID
      - NET_BIND_SERVICE
    # Security: prevent privilege escalation
    security_opt:
      - no-new-privileges:true

  # =========================================================================
  # BUILDER SANDBOX CONTAINER
  # =========================================================================
  # Dedicated environment for app-builder development workflows.
  # Hosts per-project source trees and dev servers managed by supervisord.
  # Keep this separate from user-apps to isolate development from runtime apps.
  # =========================================================================
  builder-sandbox:
    build:
      context: ./provision/docker
      dockerfile: builder-sandbox.Dockerfile
    container_name: ${CONTAINER_PREFIX:-dev}-builder-sandbox
    hostname: builder-sandbox
    labels:
      - "version=${GIT_COMMIT:-unknown}"
    volumes:
      - builder_projects:/srv/projects
      - builder_logs:/var/log/builder
    environment:
      NODE_ENV: development
    restart: unless-stopped
    networks:
      - busibox-net
    deploy:
      resources:
        limits:
          cpus: '4.0'
          memory: 8G
        reservations:
          cpus: '0.5'
          memory: 512M

# ===========================================================================
  # NEXT.JS APPLICATIONS (Core Apps)
  # ===========================================================================
  # Core Next.js apps (busibox-portal + busibox-agents) run in a single container
  # defined in overlay files:
  #   - docker-compose.local-dev.yml - Development mode with volume mounts
  #   - docker-compose.github.yml    - GitHub mode built from source
  #
  # Use: docker compose -f docker-compose.yml -f docker-compose.local-dev.yml up
  # Or:  make docker-up (uses local-dev mode by default)
  # ===========================================================================

# ===========================================================================
  # PROXY CONTAINER (Nginx Reverse Proxy)
  # ===========================================================================
  #
  # Docker now matches Proxmox/K8s architecture: nginx runs in a dedicated
  # proxy container and core-apps only runs Next.js applications.
  #
  proxy:
    image: nginx:alpine
    container_name: ${CONTAINER_PREFIX:-dev}-proxy
    hostname: proxy
    entrypoint: ["/bin/sh", "/usr/local/bin/proxy-entrypoint.sh"]
    labels:
      - "config_version=${GIT_COMMIT:-unknown}"
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./config/nginx-local.conf:/etc/nginx/nginx.conf:ro
      - ./config/nginx-sites:/etc/nginx/conf.d:ro
      - ./config/nginx-sites/apps:/etc/nginx/conf.d/apps:rw  # Dynamic app configs (writable)
      - ./config/nginx-errors/50x.html:/usr/share/nginx/html/50x.html:ro
      - ./ssl:/etc/nginx/ssl:rw
      - ./provision/docker/proxy-entrypoint.sh:/usr/local/bin/proxy-entrypoint.sh:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"  # Access host's localhost from container
    # Nginx can start with just authz-api for bootstrap
    # Other APIs will be routed once they come online
    depends_on:
      authz-api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:80/health"]
      interval: 10s
      timeout: 5s
      start_period: 30s
      retries: 6
    restart: unless-stopped
    networks:
      busibox-net:
        aliases:
          - proxy
          - nginx

# ===========================================================================
  # LOCAL LLM INFERENCE (vLLM on NVIDIA GPU)
  # ===========================================================================

  # vLLM - Local LLM Inference (x86/Linux with NVIDIA GPU)
  # Activated by Ansible when LLM_BACKEND=vllm via --profile vllm
  # For Apple Silicon, use start-mlx-server.sh instead (runs natively on host)
  #
  # Configuration is driven by environment variables set by the installer
  # (generate-model-config.sh -> model_config.yml -> Ansible role).
  vllm:
    profiles: ["vllm"]
    image: vllm/vllm-openai:latest
    container_name: ${CONTAINER_PREFIX:-dev}-vllm
    hostname: vllm
    environment:
      VLLM_MODEL: ${VLLM_MODEL:-Qwen/Qwen3.5-0.8B}
      VLLM_SERVED_MODEL_NAME: ${VLLM_SERVED_MODEL_NAME:-}
      VLLM_MAX_MODEL_LEN: ${VLLM_MAX_MODEL_LEN:-8192}
      VLLM_GPU_MEMORY_UTILIZATION: ${VLLM_GPU_MEMORY_UTILIZATION:-0.9}
      VLLM_TENSOR_PARALLEL_SIZE: ${VLLM_TENSOR_PARALLEL_SIZE:-1}
      VLLM_QUANTIZATION: ${VLLM_QUANTIZATION:-}
      VLLM_TOOL_CALL_PARSER: ${VLLM_TOOL_CALL_PARSER:-}
      VLLM_TOOL_CHAT_TEMPLATE: ${VLLM_TOOL_CHAT_TEMPLATE:-}
      VLLM_MAX_NUM_SEQS: ${VLLM_MAX_NUM_SEQS:-32}
      VLLM_CPU_OFFLOAD_GB: ${VLLM_CPU_OFFLOAD_GB:-0}
      VLLM_PORT: ${VLLM_PORT:-8000}
      VLLM_EXTRA_ARGS: ${VLLM_EXTRA_ARGS:-}
      CUDA_VISIBLE_DEVICES: ${VLLM_CUDA_VISIBLE_DEVICES:-}
      HF_HOME: /root/.cache/huggingface
    volumes:
      - ${HF_HOST_CACHE:-vllm_cache}:/root/.cache/huggingface
      - ./provision/docker/vllm-entrypoint.sh:/entrypoint.sh:ro
    entrypoint: ["/bin/bash", "/entrypoint.sh"]
    ports:
      - "${VLLM_HOST_PORT:-8080}:${VLLM_PORT:-8000}"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:${VLLM_PORT:-8000}/health"]
      interval: 10s
      timeout: 5s
      start_period: 180s
      retries: 10
    restart: unless-stopped
    networks:
      - busibox-net

# ===========================================================================
  # MANAGER CONTAINER (Ephemeral)
  # ===========================================================================
  # Runs make install, make manage, and other orchestration commands inside
  # a container with guaranteed dependencies (Ansible, Docker CLI, vault tools).
  # Invoked via: docker compose run --rm manager <command>
  # Never starts with `docker compose up` -- uses a profile.
  manager:
    profiles: ["manager"]
    build:
      context: ./provision/docker
      dockerfile: manager.Dockerfile
    image: busibox-manager:latest
    container_name: ${CONTAINER_PREFIX:-dev}-manager
    working_dir: /busibox
    stdin_open: true
    tty: true
    volumes:
      # Docker socket -- same model as deploy-api
      - /var/run/docker.sock:/var/run/docker.sock
      # Busibox repo -- read-only except state/profile directories
      - .:/busibox:ro
      # State and profile files -- read-write
      - ./.busibox:/busibox/.busibox:rw
      # SSH keys for Proxmox backend
      - ~/.ssh:/root/.ssh:ro
    environment:
      # Host path so docker compose volume mounts resolve correctly
      BUSIBOX_HOST_PATH: ${BUSIBOX_HOST_PATH:-.}
      CONTAINER_PREFIX: ${CONTAINER_PREFIX:-dev}
      COMPOSE_PROJECT_NAME: ${COMPOSE_PROJECT_NAME:-dev-busibox}
      BUSIBOX_ENV: ${BUSIBOX_ENV:-development}
      # Pass through HOME so vault password file paths resolve
      HOST_HOME: ${HOME}
      # Pass through any explicit env overrides
      GITHUB_AUTH_TOKEN: ${GITHUB_AUTH_TOKEN:-}
      CORE_APPS_MODE: ${CORE_APPS_MODE:-prod}
      CORE_APPS_SOURCE: ${CORE_APPS_SOURCE:-legacy}
      TERM: ${TERM:-xterm-256color}
    networks:
      - busibox-net

# ===========================================================================
# VOLUMES
# ===========================================================================

volumes:
  postgres_data:
  redis_data:
  minio_data:
  etcd_data:
  milvus_data:
  neo4j_data:
  neo4j_logs:
  data_temp:
  # Model cache - shared across data-api, data-worker, and search-api
  # Caches all downloaded models (FastEmbed, Marker, sentence-transformers, etc.)
  # Includes: .cache/huggingface, .cache/datalab, .cache/torch, etc.
  # Persists across container rebuilds and survives docker-compose down
  model_cache:
  # FastEmbed cache - fallback volume when FASTEMBED_HOST_CACHE is not set
  # On macOS with `make install`, FASTEMBED_HOST_CACHE points to ~/.cache/fastembed
  # which contains pre-downloaded models for instant startup
  fastembed_cache:
  # vLLM cache - HuggingFace model cache for vLLM on x86/Linux with NVIDIA GPU
  # When HF_HOST_CACHE is set (e.g. to ~/.cache/huggingface), this volume is unused
  vllm_cache:
  # User apps - persistent storage for deployed external applications
  user_apps_data:
  # User apps logs - separate volume for app logs
  user_apps_logs:
  # Builder projects workspace for app-builder development
  builder_projects:
  # Builder sandbox logs
  builder_logs:
  # App-contributed docs - shared between deploy-api (writer) and docs-api (reader)
  # Contains per-app documentation synced during deployment (apps/<app-id>/*.md)
  app_docs:

# ===========================================================================
# NETWORKS
# ===========================================================================

networks:
  busibox-net:
    driver: bridge
    name: ${CONTAINER_PREFIX:-dev}-busibox-net
