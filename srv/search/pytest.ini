[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = 
    -v
    --tb=short
    --strict-markers
    --disable-warnings
markers =
    unit: Unit tests
    integration: Integration tests
    slow: Slow running tests (model loading, large data)
    gpu: Tests that require GPU (CUDA/ROCm)
    requires_milvus: Tests that require Milvus running
    requires_services: Tests that require all services running
    pvt: Post-deployment validation tests (fast smoke tests)

