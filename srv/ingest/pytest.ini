[pytest]
testpaths = tests
pythonpath = src
asyncio_mode = auto
asyncio_default_fixture_loop_scope = session
asyncio_default_test_loop_scope = session

# Markers
markers =
    integration: marks tests as integration tests (requires real services)
    unit: marks tests as unit tests (uses mocks)
    pvt: Post-deployment validation tests (fast smoke tests)
    slow: Slow running tests (model loading, large data processing)
    gpu: Tests that require GPU (CUDA/ROCm)
    pipeline: Pipeline tests requiring worker (use WORKER=1 for local testing)

