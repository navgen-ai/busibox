[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
asyncio_mode = auto
asyncio_default_fixture_loop_scope = function

markers =
    pvt: Post-deployment validation tests (fast smoke tests)
    integration: Integration tests
    slow: Slow running tests (model loading, large data)
    gpu: Tests that require GPU (CUDA/ROCm)
    unit: Unit tests









