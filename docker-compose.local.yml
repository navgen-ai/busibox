# =============================================================================
# Busibox Local Development Environment - Base Infrastructure
# =============================================================================
#
# Base compose file with infrastructure and Python API services.
# Next.js apps (ai-portal, agent-manager) are defined in overlay files.
#
# MODES:
#   DEV MODE (default) - For active development:
#     docker compose -f docker-compose.local.yml -f docker-compose.dev.yml up
#     - Next.js apps volume-mounted from local filesystem
#     - busibox-app npm-linked for live editing
#     - Turbopack hot-reload
#
#   PROD MODE - For testing production behavior:
#     docker compose -f docker-compose.local.yml -f docker-compose.prod.yml up
#     - Next.js apps cloned from GitHub at build time
#     - Uses published @jazzmind/busibox-app from npm
#     - Production builds
#
# Services in this file:
#   - PostgreSQL, MinIO, Milvus, Redis (infrastructure)
#   - AuthZ, Ingest, Search, Agent, Docs APIs (Python services)
#   - LiteLLM (LLM gateway)
#   - Nginx (reverse proxy)
#
# HOT-RELOAD SUPPORT:
#   Python API services support hot-reload. Code changes auto-restart.
#   Note: Rebuild needed if you change requirements.txt or Dockerfile.
#
# Usage:
#   # Development mode (default)
#   make docker-up
#
#   # Production mode (test prod behavior locally)
#   make docker-up-prod
#
#   # View logs
#   make docker-logs
#
#   # Stop all services
#   make docker-down
#
# Configuration:
#   Copy env.local.example to .env.local and configure your settings.
#
# =============================================================================

services:
  # ===========================================================================
  # INFRASTRUCTURE SERVICES
  # ===========================================================================

  # PostgreSQL - Shared Database
  postgres:
    image: postgres:16-alpine
    container_name: local-postgres
    hostname: postgres
    labels:
      - "config_version=${GIT_COMMIT:-unknown}"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-devpassword}
      POSTGRES_DB: busibox
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./config/init-databases.sql:/docker-entrypoint-initdb.d/01-init-databases.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - busibox-net

  # Redis - Job Queue and Caching
  redis:
    image: redis:7-alpine
    container_name: local-redis
    hostname: redis
    labels:
      - "config_version=${GIT_COMMIT:-unknown}"
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - busibox-net

  # MinIO - Object Storage (S3-compatible)
  minio:
    image: minio/minio:latest
    container_name: local-minio
    hostname: minio
    labels:
      - "config_version=${GIT_COMMIT:-unknown}"
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-minioadmin}
    ports:
      - "9000:9000"   # API
      - "9001:9001"   # Console
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - busibox-net

  # MinIO bucket initialization
  minio-init:
    image: minio/mc
    container_name: local-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set myminio http://minio:9000 ${MINIO_ACCESS_KEY:-minioadmin} ${MINIO_SECRET_KEY:-minioadmin};
      mc mb myminio/documents --ignore-existing;
      mc mb myminio/exports --ignore-existing;
      mc anonymous set download myminio/exports;
      echo 'Buckets created successfully';
      "
    networks:
      - busibox-net

  # Milvus - Vector Database (standalone mode with etcd + minio)
  etcd:
    image: quay.io/coreos/etcd:v3.5.5
    container_name: local-milvus-etcd
    hostname: etcd
    environment:
      - ETCD_AUTO_COMPACTION_MODE=revision
      - ETCD_AUTO_COMPACTION_RETENTION=1000
      - ETCD_QUOTA_BACKEND_BYTES=4294967296
      - ETCD_SNAPSHOT_COUNT=50000
    volumes:
      - etcd_data:/etcd
    command: etcd -advertise-client-urls=http://127.0.0.1:2379 -listen-client-urls http://0.0.0.0:2379 --data-dir /etcd
    healthcheck:
      test: ["CMD", "etcdctl", "endpoint", "health"]
      interval: 30s
      timeout: 20s
      retries: 3
    networks:
      - busibox-net

  milvus-minio:
    image: minio/minio:RELEASE.2023-03-20T20-16-18Z
    container_name: local-milvus-minio
    hostname: milvus-minio
    environment:
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
    ports:
      - "9002:9000"   # Separate from main MinIO
    volumes:
      - milvus_minio_data:/minio_data
    command: minio server /minio_data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3
    networks:
      - busibox-net

  milvus:
    image: milvusdb/milvus:v2.6.5
    container_name: local-milvus
    hostname: milvus
    labels:
      - "config_version=${GIT_COMMIT:-unknown}"
    command: ["milvus", "run", "standalone"]
    security_opt:
      - seccomp:unconfined
    environment:
      ETCD_ENDPOINTS: etcd:2379
      MINIO_ADDRESS: milvus-minio:9000
    volumes:
      - milvus_data:/var/lib/milvus
    ports:
      - "19530:19530"
      - "9091:9091"
    depends_on:
      etcd:
        condition: service_healthy
      milvus-minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9091/healthz"]
      interval: 30s
      start_period: 90s
      timeout: 20s
      retries: 3
    networks:
      - busibox-net

  # Milvus Schema Initialization
  # Creates the 'documents' collection with hybrid search support
  milvus-init:
    build:
      context: .
      dockerfile: provision/docker/milvus-init.Dockerfile
    container_name: local-milvus-init
    volumes:
      - ./provision/ansible/roles/milvus/files/hybrid_schema.py:/app/hybrid_schema.py:ro
    environment:
      MILVUS_HOST: milvus
      MILVUS_PORT: 19530
    command: ["python", "/app/hybrid_schema.py"]
    depends_on:
      milvus:
        condition: service_healthy
    networks:
      - busibox-net
    restart: "no"

  # Test Database Bootstrap (on-demand, run via: make test-db-init)
  # Initializes test databases (test_authz, test_files, test_agent_server) with
  # schema and bootstrap data for running integration tests
  # This container is NOT started automatically - use the test menu to run it
  test-db-init:
    image: python:3.11-slim
    container_name: local-test-db-init
    profiles: ["test"]  # Only start with --profile test
    volumes:
      - ./scripts/docker/bootstrap-test-databases.py:/app/bootstrap.py:ro
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      TEST_DB_USER: busibox_test_user
      TEST_DB_PASSWORD: testpassword
      AUTHZ_BOOTSTRAP_CLIENT_ID: ${AUTHZ_BOOTSTRAP_CLIENT_ID:-ai-portal}
      AUTHZ_BOOTSTRAP_CLIENT_SECRET: ${AUTHZ_BOOTSTRAP_CLIENT_SECRET:-ai-portal-secret}
      AUTHZ_ADMIN_TOKEN: ${AUTHZ_ADMIN_TOKEN:-local-admin-token}
    command: ["sh", "-c", "pip install -q asyncpg cryptography && python /app/bootstrap.py"]
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - busibox-net
    restart: "no"

  # ===========================================================================
  # LLM GATEWAY
  # ===========================================================================

  # LiteLLM - Unified LLM Gateway
  litellm:
    image: ghcr.io/berriai/litellm:main-latest
    container_name: local-litellm
    hostname: litellm
    labels:
      - "config_version=${GIT_COMMIT:-unknown}"
    environment:
      LITELLM_MASTER_KEY: ${LITELLM_MASTER_KEY:-sk-local-dev-key}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      # AWS Bedrock - pass BEDROCK_API_KEY directly as bearer token
      AWS_BEARER_TOKEN_BEDROCK: ${BEDROCK_API_KEY:-}
      AWS_REGION_NAME: ${AWS_REGION_NAME:-us-east-1}
    ports:
      - "4000:4000"
    volumes:
      - ./config/litellm-config.yaml:/app/config.yaml:ro
    command: --config /app/config.yaml --port 4000 --detailed_debug
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:4000/health/liveliness')"]
      interval: 30s
      timeout: 10s
      start_period: 30s
      retries: 3
    networks:
      - busibox-net

  # ===========================================================================
  # EMBEDDING SERVICE (Infrastructure Tier - stays running during dev restarts)
  # ===========================================================================

  # Embedding API - Dedicated embedding service
  # Loads FastEmbed model once at startup and provides HTTP API for all consumers.
  # This service should NOT be restarted frequently - it's in the infrastructure tier.
  embedding-api:
    build:
      context: ./srv/embedding
      labels:
        - "version=${GIT_COMMIT:-unknown}"
    container_name: local-embedding-api
    hostname: embedding-api
    labels:
      - "version=${GIT_COMMIT:-unknown}"
    volumes:
      # Model cache - persists downloaded models across container rebuilds
      - model_cache:/root/.cache
    environment:
      # FastEmbed model - use bge-large for consistency with production
      # Override with FASTEMBED_MODEL=BAAI/bge-small-en-v1.5 for faster dev (384-d, ~134MB vs 1024-d, ~1.3GB)
      FASTEMBED_MODEL: ${FASTEMBED_MODEL:-BAAI/bge-large-en-v1.5}
      EMBEDDING_BATCH_SIZE: ${EMBEDDING_BATCH_SIZE:-32}
    ports:
      - "8005:8005"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8005/health"]
      interval: 30s
      timeout: 10s
      start_period: 120s  # Allow time for model download + warmup on first run
      retries: 3
    restart: unless-stopped
    networks:
      - busibox-net

  # ===========================================================================
  # PYTHON API SERVICES
  # ===========================================================================

  # AuthZ API - Authentication & Authorization Service
  authz-api:
    build:
      context: ./srv
      dockerfile: authz/Dockerfile
      labels:
        - "version=${GIT_COMMIT:-unknown}"
    container_name: local-authz-api
    hostname: authz-api
    labels:
      - "version=${GIT_COMMIT:-unknown}"
    # Hot-reload: mount source code and use --reload flag
    volumes:
      - ./srv/authz/src:/app/src:ro
    command: ["python", "-m", "uvicorn", "main:app", "--host", "0.0.0.0", "--port", "8010", "--reload", "--reload-dir", "/app/src"]
    environment:
      # PostgreSQL - uses dedicated authz database
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: authz
      POSTGRES_USER: ${POSTGRES_USER:-busibox_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-devpassword}
      # Test Mode Configuration (routes X-Test-Mode: true requests to test database)
      AUTHZ_TEST_MODE_ENABLED: "true"
      TEST_DB_NAME: test_authz
      TEST_DB_USER: busibox_test_user
      TEST_DB_PASSWORD: testpassword
      # AuthZ Configuration
      AUTHZ_ISSUER: busibox-authz
      AUTHZ_ACCESS_TOKEN_TTL: ${AUTHZ_ACCESS_TOKEN_TTL:-900}
      AUTHZ_SIGNING_ALG: RS256
      AUTHZ_RSA_KEY_SIZE: 2048
      AUTHZ_ADMIN_TOKEN: ${AUTHZ_ADMIN_TOKEN:-local-admin-token}
      AUTHZ_MASTER_KEY: ${AUTHZ_MASTER_KEY:-local-master-key-change-in-production}
      # Bootstrap client (ai-portal)
      AUTHZ_BOOTSTRAP_CLIENT_ID: ${AUTHZ_BOOTSTRAP_CLIENT_ID:-ai-portal}
      AUTHZ_BOOTSTRAP_CLIENT_SECRET: ${AUTHZ_BOOTSTRAP_CLIENT_SECRET:-ai-portal-secret}
      AUTHZ_BOOTSTRAP_ALLOWED_AUDIENCES: ingest-api,search-api,agent-api
      AUTHZ_BOOTSTRAP_ALLOWED_SCOPES: read,write,search.read,ingest.write,ingest.read,agent.execute
    ports:
      - "8010:8010"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8010/health/live')"]
      interval: 10s
      timeout: 5s
      start_period: 10s
      retries: 3
    networks:
      - busibox-net

  # Ingest API - Document Processing Service
  ingest-api:
    build:
      context: ./srv
      dockerfile: ingest/Dockerfile
      labels:
        - "version=${GIT_COMMIT:-unknown}"
    container_name: local-ingest-api
    hostname: ingest-api
    labels:
      - "version=${GIT_COMMIT:-unknown}"
    # Hot-reload: mount source code and use --reload flag
    volumes:
      - ./srv/ingest/src:/app/src:ro
      - ./srv/ingest/migrations:/app/migrations:ro
      - ./srv/shared:/app/shared:ro
      - ../busibox-testdocs:/testdocs:ro  # Mount test documents for PDF tests
      - ingest_temp:/tmp/ingest
      # Model cache - persists downloaded models across container rebuilds
      - model_cache:/root/.cache
    command: ["python", "-m", "uvicorn", "api.main:app", "--host", "0.0.0.0", "--port", "8002", "--reload", "--reload-dir", "/app/src"]
    environment:
      # Service
      SERVICE_PORT: 8002
      # PostgreSQL - uses dedicated files database
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: files
      POSTGRES_USER: ${POSTGRES_USER:-busibox_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-devpassword}
      # Test Mode Configuration (routes X-Test-Mode: true requests to test database)
      INGEST_TEST_MODE_ENABLED: "true"
      TEST_DB_NAME: test_files
      TEST_DB_USER: busibox_test_user
      TEST_DB_PASSWORD: testpassword
      # Test documents
      TEST_DOC_REPO_PATH: /testdocs
      # Redis
      REDIS_HOST: redis
      REDIS_PORT: 6379
      # MinIO
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-minioadmin}
      MINIO_SECURE: "false"
      MINIO_BUCKET: documents
      # Milvus
      MILVUS_HOST: milvus
      MILVUS_PORT: 19530
      MILVUS_COLLECTION: documents
      # AI Portal (for library resolution and migration)
      # Note: In Docker dev, AI Portal typically runs on host, use host.docker.internal
      # Include /portal base path if AI Portal is configured with basePath
      AI_PORTAL_URL: ${AI_PORTAL_URL:-http://host.docker.internal:3000/portal}
      # AI Portal database (for automatic library migration from AI Portal to ingest-api)
      # If not set, migration is skipped (libraries created on-demand instead)
      AI_PORTAL_DB_HOST: ${AI_PORTAL_DB_HOST:-postgres}
      AI_PORTAL_DB_PORT: ${AI_PORTAL_DB_PORT:-5432}
      AI_PORTAL_DB_NAME: ${AI_PORTAL_DB_NAME:-ai_portal}
      AI_PORTAL_DB_USER: ${AI_PORTAL_DB_USER:-busibox_user}
      AI_PORTAL_DB_PASSWORD: ${AI_PORTAL_DB_PASSWORD:-${POSTGRES_PASSWORD:-devpassword}}
      # LiteLLM
      LITELLM_BASE_URL: http://litellm:4000
      LITELLM_API_KEY: ${LITELLM_API_KEY:-sk-local-dev-key}
      # AuthZ
      AUTHZ_JWKS_URL: http://authz-api:8010/.well-known/jwks.json
      AUTHZ_ISSUER: busibox-authz
      AUTHZ_AUDIENCE: ingest-api
      # Processing
      MARKER_ENABLED: ${MARKER_ENABLED:-true}
      MARKER_USE_GPU: ${MARKER_USE_GPU:-false}
      COLPALI_ENABLED: ${COLPALI_ENABLED:-false}
      LLM_CLEANUP_ENABLED: ${LLM_CLEANUP_ENABLED:-true}
      # Embedding API - dedicated embedding service (no local model loading)
      EMBEDDING_API_URL: http://embedding-api:8005
      EMBEDDING_DIMENSION: ${EMBEDDING_DIMENSION:-1024}
    ports:
      - "8002:8002"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
      milvus:
        condition: service_healthy
      authz-api:
        condition: service_healthy
      embedding-api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8002/')"]
      interval: 10s
      timeout: 5s
      start_period: 30s  # Fast startup - no local model loading needed
      retries: 5
    networks:
      - busibox-net

  # Ingest Worker - Background Job Processor
  # Consumes jobs from Redis stream and processes uploaded documents
  ingest-worker:
    build:
      context: ./srv
      dockerfile: ingest/Dockerfile
    container_name: local-ingest-worker
    hostname: ingest-worker
    # Hot-reload: mount source code for development
    volumes:
      - ./srv/ingest/src:/app/src:ro
      - ./srv/shared:/app/shared:ro
      - ../busibox-testdocs:/testdocs:ro  # Mount test documents for PDF tests
      - ingest_temp:/tmp/ingest
      # Model cache - persists downloaded models across container rebuilds
      - model_cache:/root/.cache
    # Run the worker process instead of the API
    command: ["python", "src/worker.py"]
    environment:
      # PostgreSQL - uses dedicated files database
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: files
      POSTGRES_USER: ${POSTGRES_USER:-busibox_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-devpassword}
      # Redis
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_STREAM: jobs:ingestion
      REDIS_CONSUMER_GROUP: workers
      # MinIO
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-minioadmin}
      MINIO_SECURE: "false"
      MINIO_BUCKET: documents
      # Milvus
      MILVUS_HOST: milvus
      MILVUS_PORT: 19530
      MILVUS_COLLECTION: documents
      # LiteLLM
      LITELLM_BASE_URL: http://litellm:4000
      LITELLM_API_KEY: ${LITELLM_API_KEY:-sk-local-dev-key}
      # Processing Configuration
      MARKER_ENABLED: ${MARKER_ENABLED:-true}
      MARKER_USE_GPU: ${MARKER_USE_GPU:-false}
      COLPALI_ENABLED: ${COLPALI_ENABLED:-false}
      LLM_CLEANUP_ENABLED: ${LLM_CLEANUP_ENABLED:-true}
      # Test documents
      TEST_DOC_REPO_PATH: /testdocs
      # Embedding API - dedicated embedding service (no local model loading)
      EMBEDDING_API_URL: http://embedding-api:8005
      EMBEDDING_DIMENSION: ${EMBEDDING_DIMENSION:-1024}
      # Worker ID (for debugging)
      WORKER_ID: local-worker-1
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
      milvus:
        condition: service_healthy
      milvus-init:
        condition: service_completed_successfully
      ingest-api:
        condition: service_healthy
      embedding-api:
        condition: service_healthy
    # Worker healthcheck - verify the Python worker process is running (PID 1)
    # Uses /proc/1/cmdline since pgrep isn't available in slim image
    healthcheck:
      test: ["CMD-SHELL", "grep -q 'worker.py' /proc/1/cmdline"]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3
    restart: unless-stopped
    networks:
      - busibox-net

  # Search API - Semantic Search Service
  search-api:
    build:
      context: ./srv
      dockerfile: search/Dockerfile
      labels:
        - "version=${GIT_COMMIT:-unknown}"
    container_name: local-search-api
    hostname: search-api
    labels:
      - "version=${GIT_COMMIT:-unknown}"
    # Hot-reload: mount source code and use --reload flag
    volumes:
      - ./srv/search/src:/app/src:ro
      - ./srv/shared:/app/shared:ro
      # Model cache - persists downloaded models across container rebuilds
      - model_cache:/root/.cache
    command: ["python", "-m", "uvicorn", "api.main:app", "--host", "0.0.0.0", "--port", "8003", "--reload", "--reload-dir", "/app/src"]
    environment:
      # Service
      SERVICE_PORT: 8003
      LOG_LEVEL: INFO
      # PostgreSQL - uses dedicated files database
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: files
      POSTGRES_USER: ${POSTGRES_USER:-busibox_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-devpassword}
      # Test Mode Configuration (routes X-Test-Mode: true requests to test database)
      SEARCH_TEST_MODE_ENABLED: "true"
      TEST_DB_NAME: test_files
      TEST_DB_USER: busibox_test_user
      TEST_DB_PASSWORD: testpassword
      # Milvus
      MILVUS_HOST: milvus
      MILVUS_PORT: 19530
      MILVUS_COLLECTION: documents
      # Redis (caching)
      REDIS_HOST: redis
      REDIS_PORT: 6379
      ENABLE_CACHING: "true"
      # Embedding API - dedicated embedding service (direct call, no token exchange needed)
      EMBEDDING_API_URL: http://embedding-api:8005
      # LiteLLM
      LITELLM_BASE_URL: http://litellm:4000
      LITELLM_API_KEY: ${LITELLM_API_KEY:-sk-local-dev-key}
      # AuthZ
      AUTHZ_JWKS_URL: http://authz-api:8010/.well-known/jwks.json
      AUTHZ_ISSUER: busibox-authz
      AUTHZ_AUDIENCE: search-api
      AUTHZ_TOKEN_URL: http://authz-api:8010/oauth/token
      # API Service client for calling other services (e.g., ingest-api for embeddings)
      API_SERVICE_CLIENT_ID: ${AUTHZ_BOOTSTRAP_CLIENT_ID:-ai-portal}
      API_SERVICE_CLIENT_SECRET: ${AUTHZ_BOOTSTRAP_CLIENT_SECRET:-ai-portal-secret}
      # Reranking mode: "none" (skip), "vllm" (GPU), "local" (CPU, slow startup)
      # Default to "none" in local Docker to avoid 2GB model download and vLLM dependency
      RERANKING_MODE: ${RERANKING_MODE:-none}
      # Legacy bool (superseded by RERANKING_MODE)
      ENABLE_RERANKING: ${ENABLE_RERANKING:-false}
    ports:
      - "8003:8003"
    depends_on:
      postgres:
        condition: service_healthy
      milvus:
        condition: service_healthy
      authz-api:
        condition: service_healthy
      embedding-api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8003/')"]
      interval: 10s
      timeout: 5s
      start_period: 30s  # Fast startup - embedding service handles model loading
      retries: 5
    networks:
      - busibox-net

  # Agent API - AI Agent Service
  agent-api:
    build:
      context: ./srv
      dockerfile: agent/Dockerfile
      labels:
        - "version=${GIT_COMMIT:-unknown}"
    container_name: local-agent-api
    hostname: agent-api
    labels:
      - "version=${GIT_COMMIT:-unknown}"
    # Hot-reload: mount source code and use --reload flag
    # Note: migrations still run on startup, but code changes hot-reload
    volumes:
      - ./srv/agent/app:/app/app:ro
      - ./srv/agent/alembic:/app/alembic:ro
      - ./srv/agent/tests:/app/tests:ro
      - ./srv/shared:/app/shared:ro
    command: ["sh", "-c", "echo 'Migration files:' && ls -la /app/alembic/versions/ && echo 'Current alembic head:' && python -m alembic heads && echo 'Current DB version:' && python -m alembic current && echo 'Running migrations...' && python -m alembic upgrade head && echo 'Migrations complete' && python -m uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload --reload-dir /app/app"]
    environment:
      # Service
      ENVIRONMENT: development
      DEBUG: "true"
      LOG_LEVEL: INFO
      # Database
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-busibox_user}:${POSTGRES_PASSWORD:-devpassword}@postgres:5432/agent_server
      # Test Mode Configuration (routes X-Test-Mode: true requests to test database)
      TEST_MODE_ENABLED: "true"
      TEST_DATABASE_URL: postgresql+asyncpg://busibox_test_user:testpassword@postgres:5432/test_agent_server
      # Redis
      REDIS_URL: redis://redis:6379/0
      # Busibox services
      SEARCH_API_URL: http://search-api:8003
      INGEST_API_URL: http://ingest-api:8002
      RAG_API_URL: http://search-api:8003
      # Milvus
      MILVUS_HOST: milvus
      MILVUS_PORT: 19530
      # Embedding API - dedicated embedding service (no auth required, used for insights)
      EMBEDDING_API_URL: http://embedding-api:8005
      # LiteLLM
      LITELLM_BASE_URL: http://litellm:4000/v1
      LITELLM_API_KEY: ${LITELLM_API_KEY:-sk-local-dev-key}
      DEFAULT_MODEL: agent
      # AuthZ
      AUTH_JWKS_URL: http://authz-api:8010/.well-known/jwks.json
      AUTH_ISSUER: busibox-authz
      AUTH_AUDIENCE: agent-api
      AUTH_TOKEN_URL: http://authz-api:8010/oauth/token
      # Use the same bootstrap client as ai-portal for token exchange
      # This allows agent-api to exchange tokens for downstream services (search-api, ingest-api)
      AUTH_CLIENT_ID: ${AUTHZ_BOOTSTRAP_CLIENT_ID:-ai-portal}
      AUTH_CLIENT_SECRET: ${AUTHZ_BOOTSTRAP_CLIENT_SECRET:-ai-portal-secret}
      # SMTP configuration for email notifications
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USERNAME: ${SMTP_USERNAME:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      EMAIL_FROM: ${SMTP_FROM:-noreply@busibox.local}
      # Portal URL for notification links
      PORTAL_BASE_URL: ${PORTAL_BASE_URL:-https://localhost}
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      milvus:
        condition: service_healthy
      authz-api:
        condition: service_healthy
      embedding-api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 10s
      timeout: 5s
      start_period: 30s
      retries: 3
    networks:
      - busibox-net

  # Docs API - Documentation Service
  # Lightweight service for serving markdown docs and OpenAPI specs
  docs-api:
    build:
      context: ./srv
      dockerfile: docs/Dockerfile
      labels:
        - "version=${GIT_COMMIT:-unknown}"
    container_name: local-docs-api
    hostname: docs-api
    labels:
      - "version=${GIT_COMMIT:-unknown}"
    # Hot-reload: mount source code and use --reload flag
    volumes:
      - ./srv/docs/src:/app/src:ro
      - ./docs:/app/docs:ro
      - ./openapi:/app/openapi:ro
    command: ["python", "-m", "uvicorn", "api.main:app", "--host", "0.0.0.0", "--port", "8004", "--reload", "--reload-dir", "/app/src"]
    environment:
      # Service
      SERVICE_PORT: 8004
      DOCS_PATH: /app/docs
      OPENAPI_PATH: /app/openapi
    ports:
      - "8004:8004"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8004/health/live')"]
      interval: 10s
      timeout: 5s
      start_period: 10s
      retries: 3
    networks:
      - busibox-net

  # Deploy API - App Deployment Service
  # Handles external app deployment, database provisioning, and nginx configuration
  # Runs alongside authz-api and validates tokens via authz
  deploy-api:
    build:
      context: ./srv/deploy
      dockerfile: Dockerfile
      labels:
        - "version=${GIT_COMMIT:-unknown}"
    container_name: local-deploy-api
    hostname: deploy-api
    labels:
      - "version=${GIT_COMMIT:-unknown}"
    # Hot-reload: mount source code and use --reload flag
    volumes:
      - ./srv/deploy/src:/app/src:ro
      - ./provision/ansible:/ansible:ro
      - ~/.ssh:/root/.ssh:ro  # SSH keys for remote operations
    command: ["python", "-m", "uvicorn", "src.main:app", "--host", "0.0.0.0", "--port", "8011", "--reload", "--reload-dir", "/app/src"]
    environment:
      # Service
      DEPLOY_PORT: 8011
      DEBUG: "true"
      # Authz (for token validation)
      AUTHZ_URL: http://authz-api:8010
      # Ansible
      ANSIBLE_DIR: /ansible
      # PostgreSQL (for database provisioning)
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_ADMIN_USER: postgres
      POSTGRES_ADMIN_PASSWORD: ${POSTGRES_PASSWORD:-devpassword}
      # Container IPs (use Docker service names in local dev)
      APPS_CONTAINER_IP: ${APPS_CONTAINER_IP:-host.docker.internal}
      APPS_CONTAINER_IP_STAGING: ${APPS_CONTAINER_IP_STAGING:-host.docker.internal}
      # SSH (for remote operations in production)
      SSH_KEY_PATH: /root/.ssh/id_rsa
      # Nginx
      NGINX_HOST: nginx
      NGINX_CONFIG_DIR: /etc/nginx/sites-available/apps
      NGINX_ENABLED_DIR: /etc/nginx/sites-enabled
      # Rate limiting
      RATE_LIMIT_MINUTES: 5
    ports:
      - "8011:8011"
    depends_on:
      authz-api:
        condition: service_healthy
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8011/health/live')"]
      interval: 10s
      timeout: 5s
      start_period: 10s
      retries: 3
    networks:
      - busibox-net

# ===========================================================================
  # NEXT.JS APPLICATIONS
  # ===========================================================================
  # Next.js apps (ai-portal, agent-manager) are defined in overlay files:
  #   - docker-compose.dev.yml  - Development mode with volume mounts
  #   - docker-compose.prod.yml - Production mode built from GitHub
  #
  # Use: docker compose -f docker-compose.local.yml -f docker-compose.dev.yml up
  # Or:  make docker-up (uses dev mode by default)
  # ===========================================================================

# ===========================================================================
  # NGINX REVERSE PROXY
  # ===========================================================================

  # Nginx - Reverse Proxy (routes traffic to all services)
  # In hybrid mode (default), proxies to locally-running Next.js apps on host ports
  nginx:
    image: nginx:alpine
    container_name: local-nginx
    hostname: nginx
    labels:
      - "config_version=${GIT_COMMIT:-unknown}"
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./config/nginx-local.conf:/etc/nginx/nginx.conf:ro
      - ./config/nginx-sites:/etc/nginx/conf.d:ro
      - ./ssl:/etc/nginx/ssl:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"  # Access host's localhost from container
    depends_on:
      authz-api:
        condition: service_healthy
      ingest-api:
        condition: service_healthy
      search-api:
        condition: service_healthy
      agent-api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:80/health"]
      interval: 30s
      timeout: 10s
      start_period: 10s
      retries: 3
    networks:
      - busibox-net

# ===========================================================================
  # LOCAL LLM INFERENCE (Demo Mode)
  # ===========================================================================

  # vLLM - Local LLM Inference (x86/Linux with NVIDIA GPU)
  # Only starts with: docker compose --profile demo-vllm up
  # For Apple Silicon, use start-mlx-server.sh instead (runs natively on host)
  vllm:
    profiles: ["demo-vllm"]
    image: vllm/vllm-openai:latest
    container_name: local-vllm
    hostname: vllm
    command: >
      --model Qwen/Qwen2.5-7B-Instruct-AWQ
      --quantization awq
      --max-model-len 8192
      --host 0.0.0.0
      --port 8000
    ports:
      - "8080:8000"
    volumes:
      - vllm_cache:/root/.cache/huggingface
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      start_period: 120s
      retries: 5
    networks:
      - busibox-net

# ===========================================================================
# VOLUMES
# ===========================================================================

volumes:
  postgres_data:
  redis_data:
  minio_data:
  etcd_data:
  milvus_minio_data:
  milvus_data:
  ingest_temp:
  # Model cache - shared across ingest-api, ingest-worker, and search-api
  # Caches all downloaded models (FastEmbed, Marker, sentence-transformers, etc.)
  # Includes: .cache/huggingface, .cache/datalab, .cache/torch, etc.
  # Persists across container rebuilds and survives docker-compose down
  model_cache:
  # vLLM cache - for demo mode on x86/Linux with NVIDIA GPU
  vllm_cache:

# ===========================================================================
# NETWORKS
# ===========================================================================

networks:
  busibox-net:
    driver: bridge
    name: busibox-local
