# LiteLLM Configuration - Auto-generated for MLX (development)
# Source: provision/ansible/group_vars/all/model_registry.yml
model_list:
  # Test model - smallest/fastest for validation tests (cached by make warmup)
  - model_name: test
    litellm_params:
      model: openai/mlx-community/Qwen3-0.6B-4bit
      api_base: http://host.docker.internal:8080/v1
      api_key: local
    model_info:
      description: "Tiny model for quick validation tests"
  - model_name: fast
    litellm_params:
      model: openai/mlx-community/Qwen2.5-3B-Instruct-4bit
      api_base: http://host.docker.internal:8080/v1
      api_key: local
  - model_name: agent
    litellm_params:
      model: openai/mlx-community/Qwen2.5-7B-Instruct-4bit
      api_base: http://host.docker.internal:8080/v1
      api_key: local
  - model_name: chat
    litellm_params:
      model: openai/mlx-community/Qwen2.5-7B-Instruct-4bit
      api_base: http://host.docker.internal:8080/v1
      api_key: local
  - model_name: frontier
    litellm_params:
      model: openai/mlx-community/Qwen2.5-14B-Instruct-4bit
      api_base: http://host.docker.internal:8080/v1
      api_key: local

general_settings:
  debug: true
  master_key: os.environ/LITELLM_MASTER_KEY

router_settings:
  enable_cache: true
  timeout: 120

litellm_settings:
  drop_params: true
  request_timeout: 120
