# Busibox Demo Model Registry
# Models are selected based on available system RAM
# Each tier defines models for: fast (quick tasks), agent (reasoning), frontier (best quality)

tiers:
  # 16GB - MacBook Air, base MacBook Pro
  # ~6GB reserved for system + Docker, ~10GB for models
  minimal:
    min_ram_gb: 16
    max_ram_gb: 23
    description: "Lightweight models for basic demos"
    mlx:
      fast: "mlx-community/Qwen2.5-1.5B-Instruct-4bit"      # ~1GB
      agent: "mlx-community/Qwen2.5-3B-Instruct-4bit"       # ~2GB
      frontier: "mlx-community/Qwen2.5-7B-Instruct-4bit"    # ~4GB
    vllm:
      fast: "Qwen/Qwen2.5-1.5B-Instruct-AWQ"
      agent: "Qwen/Qwen2.5-3B-Instruct-AWQ"
      frontier: "Qwen/Qwen2.5-7B-Instruct-AWQ"

  # 24GB - MacBook Pro 14"
  # ~8GB reserved, ~16GB for models
  standard:
    min_ram_gb: 24
    max_ram_gb: 47
    description: "Balanced performance for most demos"
    mlx:
      fast: "mlx-community/Qwen2.5-3B-Instruct-4bit"        # ~2GB
      agent: "mlx-community/Qwen2.5-7B-Instruct-4bit"       # ~4GB
      frontier: "mlx-community/Qwen2.5-14B-Instruct-4bit"   # ~8GB
    vllm:
      fast: "Qwen/Qwen2.5-3B-Instruct-AWQ"
      agent: "Qwen/Qwen2.5-7B-Instruct-AWQ"
      frontier: "Qwen/Qwen2.5-14B-Instruct-AWQ"

  # 48GB - MacBook Pro 16", Mac Mini Pro
  # ~10GB reserved, ~38GB for models
  enhanced:
    min_ram_gb: 48
    max_ram_gb: 95
    description: "High-quality models for impressive demos"
    mlx:
      fast: "mlx-community/Qwen2.5-7B-Instruct-4bit"        # ~4GB
      agent: "mlx-community/Qwen2.5-14B-Instruct-4bit"      # ~8GB
      frontier: "mlx-community/Qwen2.5-32B-Instruct-4bit"   # ~18GB
    vllm:
      fast: "Qwen/Qwen2.5-7B-Instruct-AWQ"
      agent: "Qwen/Qwen2.5-14B-Instruct-AWQ"
      frontier: "Qwen/Qwen2.5-32B-Instruct-AWQ"

  # 96GB - Mac Studio M2 Max
  # ~12GB reserved, ~84GB for models
  professional:
    min_ram_gb: 96
    max_ram_gb: 127
    description: "Professional-grade inference"
    mlx:
      fast: "mlx-community/Qwen2.5-14B-Instruct-4bit"       # ~8GB
      agent: "mlx-community/Qwen2.5-32B-Instruct-4bit"      # ~18GB
      frontier: "mlx-community/Qwen2.5-72B-Instruct-4bit"   # ~40GB
    vllm:
      fast: "Qwen/Qwen2.5-14B-Instruct-AWQ"
      agent: "Qwen/Qwen2.5-32B-Instruct-AWQ"
      frontier: "Qwen/Qwen2.5-72B-Instruct-AWQ"

  # 128GB+ - Mac Studio M2 Ultra, Mac Pro
  # ~16GB reserved, ~112GB+ for models
  enterprise:
    min_ram_gb: 128
    max_ram_gb: 255
    description: "Enterprise-scale with largest models"
    mlx:
      fast: "mlx-community/Qwen2.5-32B-Instruct-4bit"       # ~18GB
      agent: "mlx-community/Qwen2.5-72B-Instruct-4bit"      # ~40GB
      frontier: "mlx-community/Qwen3-235B-A22B-Instruct-4bit" # ~65GB (MoE)
    vllm:
      fast: "Qwen/Qwen2.5-32B-Instruct-AWQ"
      agent: "Qwen/Qwen2.5-72B-Instruct-AWQ"
      frontier: "Qwen/Qwen3-235B-A22B-Instruct-AWQ"

  # 256GB+ - Mac Studio Ultra maxed, Mac Pro
  ultra:
    min_ram_gb: 256
    max_ram_gb: 9999
    description: "Maximum capability - run anything"
    mlx:
      fast: "mlx-community/Qwen2.5-72B-Instruct-4bit"       # ~40GB
      agent: "mlx-community/Qwen3-235B-A22B-Instruct-4bit"  # ~65GB
      frontier: "mlx-community/Llama-3.3-70B-Instruct-4bit" # ~40GB (parallel)
    vllm:
      fast: "Qwen/Qwen2.5-72B-Instruct-AWQ"
      agent: "Qwen/Qwen3-235B-A22B-Instruct-AWQ"
      frontier: "meta-llama/Llama-3.3-70B-Instruct"

# Model aliases - map semantic names to tier-specific models
aliases:
  chat: agent      # Chat uses agent model
  embedding: null  # FastEmbed handles embeddings, not LLM
