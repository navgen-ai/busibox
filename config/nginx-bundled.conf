# =============================================================================
# Nginx Configuration for Busibox Core-Apps Container (Bundled Mode)
# =============================================================================
#
# This configuration is for when nginx runs INSIDE the core-apps container
# alongside Busibox Portal and Agent Manager. Frontend apps use localhost,
# backend APIs use Docker DNS.
#
# - /portal -> localhost:3000 (Busibox Portal in same container)
# - /agents -> localhost:3001 (Agent Manager in same container)
# - /api/authz -> authz-api:8010 (Docker DNS)
# - /api/data -> data-api:8002 (Docker DNS)
# - /api/search -> search-api:8003 (Docker DNS)
# - /api/agent -> agent-api:8000 (Docker DNS)
# - /api/llm -> litellm:4000 (Docker DNS)
# - /builder -> localhost:3004 (Busibox App Builder in same container)
#
# =============================================================================

# Run as root in Alpine container (nginx user may not exist)
user root;
worker_processes auto;
pid /run/nginx.pid;

events {
    worker_connections 1024;
    multi_accept on;
}

http {
    # Basic settings
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    server_tokens off;
    
    # Client settings
    client_max_body_size 100M;
    client_body_timeout 60;
    client_header_timeout 60;
    send_timeout 60;
    
    # Proxy timeouts
    proxy_connect_timeout 120;
    proxy_send_timeout 120;
    proxy_read_timeout 120;

    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # Logging
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for" '
                    'rt=$request_time uri="$request_uri" host="$host"';
    
    access_log /var/log/nginx/access.log main;
    access_log /dev/stdout main;  # Also log to stdout for docker logs
    error_log /var/log/nginx/error.log warn;
    error_log stderr warn;  # Also log errors to stderr for docker logs

    # Gzip
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml text/javascript 
               application/json application/javascript application/xml+rss;

    # WebSocket upgrade mapping (used by agent-api and other WS proxies)
    map $http_upgrade $connection_upgrade {
        default upgrade;
        '' close;
    }

    # ==========================================================================
    # DNS RESOLUTION
    # ==========================================================================
    
    # Use Docker's internal DNS resolver for backend services
    # Frontend apps use localhost (same container)
    resolver 127.0.0.11 valid=10s ipv6=off;
    resolver_timeout 5s;

    # ==========================================================================
    # HTTP Server (Health checks + Redirect)
    # ==========================================================================
    server {
        listen 80 default_server;
        listen [::]:80 default_server;
        server_name localhost _;

        # Health check endpoint (must be on HTTP for Docker health checks)
        location /health {
            access_log off;
            return 200 "healthy\n";
            add_header Content-Type text/plain;
        }

        # Redirect all other traffic to HTTPS
        location / {
            return 301 https://$host$request_uri;
        }
    }

    # ==========================================================================
    # HTTPS Server
    # ==========================================================================
    server {
        listen 443 ssl default_server;
        listen [::]:443 ssl default_server;
        server_name localhost _;

        # SSL Configuration
        # Expects localhost.crt/localhost.key - generated by:
        #   - Host: make ssl-check (scripts/setup/generate-local-ssl.sh)
        #   - Container: generate_ssl_cert() in entrypoint scripts
        ssl_certificate /etc/nginx/ssl/localhost.crt;
        ssl_certificate_key /etc/nginx/ssl/localhost.key;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
        ssl_prefer_server_ciphers off;

        # Security headers
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;

        # ======================================================================
        # BACKEND API ROUTES (Docker DNS)
        # ======================================================================

        # AuthZ API
        # NOTE: When using a variable in proxy_pass, nginx does NOT strip the
        # location prefix from the URI. We must use rewrite...break to do it.
        location /api/authz/ {
            set $authz_api http://authz-api:8010;
            rewrite ^/api/authz/(.*) /$1 break;
            proxy_pass $authz_api;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # AuthZ JWKS and OAuth endpoints
        # These are at the root level (/.well-known/, /oauth/) so the location
        # prefix matches what the backend expects — no rewrite needed.
        location /.well-known/ {
            set $authz_api http://authz-api:8010;
            rewrite ^/(.*)$ /$1 break;
            proxy_pass $authz_api;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /oauth/ {
            set $authz_api http://authz-api:8010;
            rewrite ^/(.*)$ /$1 break;
            proxy_pass $authz_api;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Data API
        location /api/data/ {
            set $data_api http://data-api:8002;
            rewrite ^/api/data/(.*) /$1 break;
            proxy_pass $data_api;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_connect_timeout 300;
            proxy_send_timeout 300;
            proxy_read_timeout 300;
            client_max_body_size 500M;
            proxy_buffering off;
            proxy_cache off;
        }

        # Search API
        location /api/search/ {
            set $search_api http://search-api:8003;
            rewrite ^/api/search/(.*) /$1 break;
            proxy_pass $search_api;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Agent API
        location /api/agent/ {
            set $agent_api http://agent-api:8000;
            rewrite ^/api/agent/(.*) /$1 break;
            proxy_pass $agent_api;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_buffering off;
            proxy_cache off;
            chunked_transfer_encoding on;
            proxy_read_timeout 86400;
        }

        # LiteLLM API
        location /api/llm/ {
            set $litellm_api http://litellm:4000;
            rewrite ^/api/llm/(.*) /$1 break;
            proxy_pass $litellm_api;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_buffering off;
            proxy_cache off;
        }

        # Docs API
        location /api/docs/ {
            set $docs_api http://docs-api:8004;
            rewrite ^/api/docs/(.*) /$1 break;
            proxy_pass $docs_api;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Bridge API - Email & Multi-channel Communication
        location /api/bridge/ {
            set $bridge_api http://bridge-api:8081;
            rewrite ^/api/bridge/(.*) /$1 break;
            proxy_pass $bridge_api;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # ======================================================================
        # FRONTEND APPLICATIONS (localhost - same container)
        # ======================================================================

        # Next.js font files - served at root level by next/font
        # next/font/google doesn't always prepend basePath to font URLs,
        # so requests come in as /__nextjs_font/* at the root level.
        # Proxy to Busibox Portal (primary app) to serve these files.
        location /__nextjs_font {
            proxy_pass http://127.0.0.1:3000;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_cache_valid 200 1y;
        }

        # Busibox Portal static assets - pass through with /portal prefix
        # Next.js with basePath serves assets at /portal/_next
        location /portal/_next {
            proxy_pass http://127.0.0.1:3000;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_cache_valid 200 1y;
        }

        # Busibox Portal - /portal path
        # Uses localhost because it runs in the same container
        # Pass full path including /portal - Next.js needs basePath in URL
        location /portal {
            proxy_pass http://127.0.0.1:3000;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_read_timeout 86400;
        }

        # Agent Manager static assets - pass through with /agents prefix
        # Next.js with basePath serves assets at /agents/_next
        location /agents/_next {
            proxy_pass http://127.0.0.1:3001;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_cache_valid 200 1y;
        }

        # Agent Manager - /agents path
        # Uses localhost because it runs in the same container
        # Pass full path including /agents - Next.js needs basePath in URL
        location /agents {
            proxy_pass http://127.0.0.1:3001;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_read_timeout 86400;
        }

        # Admin static assets - pass through with /admin prefix
        location /admin/_next {
            proxy_pass http://127.0.0.1:3002;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_cache_valid 200 1y;
        }

        # Admin App - /admin path
        location /admin {
            proxy_pass http://127.0.0.1:3002;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_read_timeout 86400;
        }

        # Chat static assets - pass through with /chat prefix
        location /chat/_next {
            proxy_pass http://127.0.0.1:3003;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_cache_valid 200 1y;
        }

        # Chat App - /chat path
        location /chat {
            proxy_pass http://127.0.0.1:3003;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_read_timeout 86400;
        }

        # App Builder static assets - pass through with /builder prefix
        # Next.js with basePath serves assets at /builder/_next
        location /builder/_next {
            proxy_pass http://127.0.0.1:3004;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_cache_valid 200 1y;
        }

        # Busibox App Builder - /builder path
        # Uses localhost because it runs in the same container
        # Pass full path including /builder - Next.js needs basePath in URL
        location /builder {
            proxy_pass http://127.0.0.1:3004;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_read_timeout 86400;
        }

        # Media static assets - pass through with /media prefix
        location /media/_next {
            proxy_pass http://127.0.0.1:3005;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_cache_valid 200 1y;
        }

        # Media App - /media path
        location /media {
            proxy_pass http://127.0.0.1:3005;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_read_timeout 86400;
        }

        # Documents static assets - pass through with /documents prefix
        location /documents/_next {
            proxy_pass http://127.0.0.1:3006;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_cache_valid 200 1y;
        }

        # Documents App - /documents path
        location /documents {
            proxy_pass http://127.0.0.1:3006;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_read_timeout 86400;
        }

        # ======================================================================
        # USER APPS - Dynamic configs managed by deploy-api
        # ======================================================================
        # Include user app nginx configs from /etc/nginx/conf.d/apps/
        # These are generated by Deploy API when user apps are deployed.
        # Each file defines location blocks for a specific user app.
        # Example: /etc/nginx/conf.d/apps/my-app.conf
        include /etc/nginx/conf.d/apps/*.conf;

        # ======================================================================
        # ERROR PAGES - Friendly maintenance page with auto-refresh
        # ======================================================================
        error_page 502 503 504 /50x.html;
        location = /50x.html {
            root /usr/share/nginx/html;
            internal;
        }

        # ======================================================================
        # DEFAULT - Redirect to Busibox Portal
        # ======================================================================
        location / {
            return 302 /portal/;
        }
    }
}
