# =============================================================================
# Busibox Local Development - Main Site Configuration with SSL
# =============================================================================
#
# All services proxied through https://localhost:
# - /portal/* -> AI Portal
# - /agents/* -> Agent Manager  
# - /api/authz/* -> AuthZ API
# - /api/ingest/* -> Ingest API
# - /api/search/* -> Search API
# - /api/agent/* -> Agent API
# - /api/llm/* -> LiteLLM
#
# =============================================================================

# Redirect HTTP to HTTPS
server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name localhost;

    # Health check endpoint (must be on HTTP for Docker health checks)
    location /health {
        access_log off;
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }

    # Redirect all other traffic to HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS Server
server {
    listen 443 ssl default_server;
    listen [::]:443 ssl default_server;
    server_name localhost;

    # SSL Configuration (self-signed certs for local dev)
    ssl_certificate /etc/nginx/ssl/localhost.crt;
    ssl_certificate_key /etc/nginx/ssl/localhost.key;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;

    # ==========================================================================
    # API ROUTES - All APIs under /api/<service>/
    # ==========================================================================

    # AuthZ API - Authentication & Authorization
    location /api/authz/ {
        proxy_pass http://authz_api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # AuthZ JWKS and OAuth endpoints (direct access for compatibility)
    location /.well-known/ {
        proxy_pass http://authz_api/.well-known/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /oauth/ {
        proxy_pass http://authz_api/oauth/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Ingest API - Document Processing
    location /api/ingest/ {
        proxy_pass http://ingest_api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Larger timeouts for file uploads
        proxy_connect_timeout 300;
        proxy_send_timeout 300;
        proxy_read_timeout 300;
        client_max_body_size 500M;
        
        # SSE support
        proxy_buffering off;
        proxy_cache off;
    }

    # Search API - Semantic Search
    location /api/search/ {
        proxy_pass http://search_api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Agent API - AI Agents
    location /api/agent/ {
        proxy_pass http://agent_api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection '';
        
        # SSE support for streaming
        proxy_buffering off;
        proxy_cache off;
        chunked_transfer_encoding on;
    }

    # LiteLLM API (OpenAI-compatible)
    location /api/llm/ {
        proxy_pass http://litellm/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # SSE support for streaming
        proxy_buffering off;
        proxy_cache off;
    }

    # ==========================================================================
    # FRONTEND APPLICATIONS
    # ==========================================================================

    # AI Portal - /portal path (runs on host machine, use host.docker.internal)
    # Next.js is configured with basePath=/portal, so we preserve the full path
    location /portal {
        set $ai_portal http://host.docker.internal:3000;
        proxy_pass $ai_portal;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        
        # WebSocket support for Next.js HMR
        proxy_read_timeout 86400;
    }

    # Agent Manager - /agents path (runs on host machine, use host.docker.internal)
    # Next.js is configured with basePath=/agents, so we preserve the full path
    location /agents {
        set $agent_manager http://host.docker.internal:3001;
        proxy_pass $agent_manager;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        
        # WebSocket support for Next.js HMR
        proxy_read_timeout 86400;
    }

    # ==========================================================================
    # DEFAULT / ROOT
    # ==========================================================================

    # Root redirect to portal
    location = / {
        return 302 https://$host/portal/;
    }

    # Fallback - API status page
    location / {
        default_type text/html;
        return 200 '<!DOCTYPE html>
<html><head><title>Busibox Local API Gateway</title>
<style>body{font-family:system-ui,-apple-system,sans-serif;padding:40px;max-width:800px;margin:0 auto}
h1{color:#333}h2{color:#666;margin-top:30px}ul{list-style:none;padding:0}
li{padding:8px 0}a{color:#0066cc;text-decoration:none}a:hover{text-decoration:underline}
.status{display:inline-block;width:10px;height:10px;border-radius:50%;margin-right:8px}
.online{background:#22c55e}.offline{background:#ef4444}</style></head>
<body>
<h1>Busibox Local API Gateway</h1>
<h2>Frontend Applications:</h2>
<ul>
<li><a href="/portal/">AI Portal</a> - Main application</li>
<li><a href="/agents/">Agent Manager</a> - Agent management</li>
</ul>
<h2>API Endpoints:</h2>
<ul>
<li><a href="/api/authz/">/api/authz/</a> - Authentication & Authorization</li>
<li><a href="/api/ingest/">/api/ingest/</a> - Document Ingestion</li>
<li><a href="/api/search/">/api/search/</a> - Semantic Search</li>
<li><a href="/api/agent/">/api/agent/</a> - AI Agents</li>
<li><a href="/api/llm/">/api/llm/</a> - LLM Gateway</li>
</ul>
<h2>Direct Service Access:</h2>
<ul>
<li>AI Portal: <a href="http://localhost:3000">http://localhost:3000</a></li>
<li>Agent Manager: <a href="http://localhost:3001">http://localhost:3001</a></li>
<li>AuthZ API: <a href="http://localhost:8010">http://localhost:8010</a></li>
<li>Ingest API: <a href="http://localhost:8002">http://localhost:8002</a></li>
<li>Search API: <a href="http://localhost:8003">http://localhost:8003</a></li>
<li>Agent API: <a href="http://localhost:8000">http://localhost:8000</a></li>
<li>LiteLLM: <a href="http://localhost:4000">http://localhost:4000</a></li>
</ul>
</body></html>';
    }
}
