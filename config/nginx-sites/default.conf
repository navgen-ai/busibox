# =============================================================================
# Busibox Local Development - Main Site Configuration with SSL
# =============================================================================
#
# All services proxied through https://localhost:
# - /portal/* -> Busibox Portal
# - /agents/* -> Agent Manager
# - /builder/* -> Busibox App Builder
# - /api/authz/* -> AuthZ API
# - /api/data/* -> Data API
# - /api/search/* -> Search API
# - /api/agent/* -> Agent API
# - /api/llm/* -> LiteLLM
# - /api/bridge/* -> Bridge API (Email & Messaging)
#
# =============================================================================

# Redirect HTTP to HTTPS
server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name localhost;

    # Health check endpoint (must be on HTTP for Docker health checks)
    location /health {
        access_log off;
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }

    # Redirect all other traffic to HTTPS
    location / {
        return 301 https://$http_host$request_uri;
    }
}

# HTTPS Server
server {
    listen 443 ssl default_server;
    listen [::]:443 ssl default_server;
    server_name localhost;

    # SSL Configuration (self-signed certs for local dev)
    ssl_certificate /etc/nginx/ssl/localhost.crt;
    ssl_certificate_key /etc/nginx/ssl/localhost.key;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;

    # Health check endpoint (for deploy-api and monitoring)
    location /health {
        access_log off;
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }

    # ==========================================================================
    # API ROUTES - All APIs under /api/<service>/
    # ==========================================================================

    # AuthZ API - Authentication & Authorization
    # NOTE: When using a variable in proxy_pass, nginx does NOT strip the
    # location prefix from the URI. We must use rewrite...break to do it.
    location /api/authz/ {
        set $authz_api http://authz-api:8010;
        rewrite ^/api/authz/(.*) /$1 break;
        proxy_pass $authz_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # AuthZ JWKS and OAuth endpoints (direct access for compatibility)
    # These are at the root level so the location prefix matches the backend path.
    location /.well-known/ {
        set $authz_api http://authz-api:8010;
        rewrite ^/(.*)$ /$1 break;
        proxy_pass $authz_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /oauth/ {
        set $authz_api http://authz-api:8010;
        rewrite ^/(.*)$ /$1 break;
        proxy_pass $authz_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Data API - Document Processing
    location /api/data/ {
        set $data_api http://data-api:8002;
        rewrite ^/api/data/(.*) /$1 break;
        proxy_pass $data_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Larger timeouts for file uploads
        proxy_connect_timeout 300;
        proxy_send_timeout 300;
        proxy_read_timeout 300;
        client_max_body_size 500M;
        
        # SSE support
        proxy_buffering off;
        proxy_cache off;
    }

    # Search API - Semantic Search
    location /api/search/ {
        set $search_api http://search-api:8003;
        rewrite ^/api/search/(.*) /$1 break;
        proxy_pass $search_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Agent API - AI Agents
    location /api/agent/ {
        set $agent_api http://agent-api:8000;
        rewrite ^/api/agent/(.*) /$1 break;
        proxy_pass $agent_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        
        # SSE support for streaming + WebSocket for real-time transcription
        proxy_buffering off;
        proxy_cache off;
        chunked_transfer_encoding on;
        proxy_read_timeout 86400;
    }

    # LiteLLM API (OpenAI-compatible)
    location /api/llm/ {
        set $litellm_api http://litellm:4000;
        rewrite ^/api/llm/(.*) /$1 break;
        proxy_pass $litellm_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # SSE support for streaming
        proxy_buffering off;
        proxy_cache off;
    }

    # Docs API - Documentation & OpenAPI Specs
    location /api/docs/ {
        set $docs_api http://docs-api:8004;
        rewrite ^/api/docs/(.*) /$1 break;
        proxy_pass $docs_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Bridge API - Email & Multi-channel Communication
    location /api/bridge/ {
        set $bridge_api http://bridge-api:8081;
        rewrite ^/api/bridge/(.*) /$1 break;
        proxy_pass $bridge_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ==========================================================================
    # FRONTEND APPLICATIONS
    # ==========================================================================

    # Next.js font files - served at root level by next/font
    # next/font/google doesn't always prepend basePath to font URLs,
    # so requests come in as /__nextjs_font/* at the root level.
    # Proxy to Busibox Portal (primary app) to serve these files.
    location /__nextjs_font {
        set $busibox_portal http://busibox-portal:3000;
        proxy_pass $busibox_portal;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $http_host;
        proxy_cache_valid 200 1y;
    }

    # Busibox Portal - /portal path
    # Next.js is configured with basePath=/portal, so we preserve the full path
    # Uses core-apps container (busibox-portal network alias resolves to core-apps)
    location /portal {
        set $busibox_portal http://busibox-portal:3000;
        proxy_pass $busibox_portal;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $http_host;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        
        # WebSocket support for Next.js HMR
        proxy_read_timeout 86400;
    }

    # Busibox Agents - /agents path
    # Next.js is configured with basePath=/agents, so we preserve the full path
    # Uses core-apps container (busibox-agents network alias resolves to core-apps)
    location /agents {
        set $busibox_agents http://busibox-agents:3001;
        proxy_pass $busibox_agents;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $http_host;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        
        # SSE support for streaming agent responses
        proxy_buffering off;
        proxy_cache off;
        add_header X-Accel-Buffering no;
        
        # WebSocket support for Next.js HMR
        proxy_read_timeout 86400;
    }

    # Admin - /admin path
    location /admin {
        set $busibox_admin http://core-apps:3002;
        proxy_pass $busibox_admin;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $http_host;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 86400;
    }

    # Chat - /chat path
    location /chat {
        set $busibox_chat http://core-apps:3003;
        proxy_pass $busibox_chat;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $http_host;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        
        # SSE support for streaming agent responses
        proxy_buffering off;
        proxy_cache off;
        add_header X-Accel-Buffering no;
        
        proxy_read_timeout 86400;
    }

    # Busibox App Builder - /builder path
    # Next.js is configured with basePath=/builder, so we preserve the full path
    # Uses core-apps container (busibox-appbuilder network alias resolves to core-apps)
    location /builder {
        set $busibox_appbuilder http://busibox-appbuilder:3004;
        proxy_pass $busibox_appbuilder;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $http_host;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # WebSocket support for Next.js HMR
        proxy_read_timeout 86400;
    }

    # Media - /media path
    location /media {
        set $busibox_media http://core-apps:3005;
        proxy_pass $busibox_media;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $http_host;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 86400;
    }

    # Documents - /documents path
    location /documents {
        set $busibox_documents http://core-apps:3006;
        proxy_pass $busibox_documents;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $http_host;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 86400;
    }

    # ==========================================================================
    # MINIO OBJECT STORAGE - Presigned URL Proxy
    # ==========================================================================
    # Presigned URLs are self-authenticating (signed by MinIO) so no auth needed.
    # CRITICAL: Host header must match what MinIO used when signing (minio:9000).
    location /files/ {
        set $minio_backend http://minio:9000;
        rewrite ^/files/(.*) /$1 break;
        proxy_pass $minio_backend;
        proxy_http_version 1.1;
        proxy_set_header Host minio:9000;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_hide_header Cache-Control;
        add_header Cache-Control "public, max-age=3600, immutable";
    }

    # ==========================================================================
    # DEFAULT / ROOT
    # ==========================================================================

    # Root redirect to portal (use $http_host to preserve port for SSH tunnels)
    location = / {
        return 302 https://$http_host/portal/;
    }

    # Fallback - API status page (no-store prevents caching of this page on paths
    # that will later be handled by upstream services)
    location / {
        default_type text/html;
        add_header Cache-Control "no-store, no-cache, must-revalidate" always;
        return 200 '<!DOCTYPE html>
<html><head><title>Busibox Local API Gateway</title>
<style>body{font-family:system-ui,-apple-system,sans-serif;padding:40px;max-width:800px;margin:0 auto}
h1{color:#333}h2{color:#666;margin-top:30px}ul{list-style:none;padding:0}
li{padding:8px 0}a{color:#0066cc;text-decoration:none}a:hover{text-decoration:underline}
.status{display:inline-block;width:10px;height:10px;border-radius:50%;margin-right:8px}
.online{background:#22c55e}.offline{background:#ef4444}</style></head>
<body>
<h1>Busibox Local API Gateway</h1>
<h2>Frontend Applications:</h2>
<ul>
<li><a href="/portal/">Busibox Portal</a> - Main application</li>
<li><a href="/agents/">Agent Manager</a> - Agent management</li>
<li><a href="/admin/">Admin</a> - Administrative console</li>
<li><a href="/chat/">Chat</a> - Dedicated chat app</li>
<li><a href="/builder/">App Builder</a> - AI app builder</li>
<li><a href="/media/">Media</a> - Video and media workflows</li>
<li><a href="/documents/">Documents</a> - Document manager</li>
</ul>
<h2>API Endpoints:</h2>
<ul>
<li><a href="/api/authz/">/api/authz/</a> - Authentication & Authorization</li>
<li><a href="/api/data/">/api/data/</a> - Document Data</li>
<li><a href="/api/search/">/api/search/</a> - Semantic Search</li>
<li><a href="/api/agent/">/api/agent/</a> - AI Agents</li>
<li><a href="/api/llm/">/api/llm/</a> - LLM Gateway</li>
<li><a href="/api/docs/">/api/docs/</a> - Documentation API</li>
<li><a href="/api/bridge/">/api/bridge/</a> - Bridge (Email & Messaging)</li>
</ul>
<h2>Direct Service Access:</h2>
<ul>
<li>Busibox Portal: <a href="http://localhost:3000">http://localhost:3000</a></li>
<li>Agent Manager: <a href="http://localhost:3001">http://localhost:3001</a></li>
<li>Admin: <a href="http://localhost:3002">http://localhost:3002</a></li>
<li>Chat: <a href="http://localhost:3003">http://localhost:3003</a></li>
<li>App Builder: <a href="http://localhost:3004">http://localhost:3004</a></li>
<li>Media: <a href="http://localhost:3005">http://localhost:3005</a></li>
<li>Documents: <a href="http://localhost:3006">http://localhost:3006</a></li>
<li>AuthZ API: <a href="http://localhost:8010">http://localhost:8010</a></li>
<li>Data API: <a href="http://localhost:8002">http://localhost:8002</a></li>
<li>Search API: <a href="http://localhost:8003">http://localhost:8003</a></li>
<li>Agent API: <a href="http://localhost:8000">http://localhost:8000</a></li>
<li>LiteLLM: <a href="http://localhost:4000">http://localhost:4000</a></li>
<li>Docs API: <a href="http://localhost:8004">http://localhost:8004</a></li>
<li>Bridge API: <a href="http://localhost:8081">http://localhost:8081</a></li>
</ul>
</body></html>';
    }

    # ==========================================================================
    # ERROR PAGES - Friendly maintenance page with auto-refresh
    # ==========================================================================
    error_page 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
        internal;
    }

    # ==========================================================================
    # DYNAMIC APP ROUTES - Managed by deploy-api
    # ==========================================================================
    # Include all app-specific configurations
    include /etc/nginx/conf.d/apps/*.conf;
}
