
# Busibox App Template Demo - Auto-generated by deployment service
# App ID: app-template-demo
# Uses dynamic DNS resolution via variable to allow nginx to start
# even if this app's backend service isn't running yet.
#
# Next.js apps run with basePath=/myapp, so we preserve the path prefix.
# This matches the agent-manager nginx config pattern exactly.
# proxy_pass WITHOUT trailing slash = preserve the request URI

location /myapp {
    set $backend_app_template_demo http://user-apps:3002;
    proxy_pass $backend_app_template_demo;
    proxy_http_version 1.1;
    
    # Headers
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Host $server_name;
    
    # WebSocket support for Next.js HMR
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    
    # Timeouts - extended for WebSocket/HMR
    proxy_connect_timeout 60s;
    proxy_send_timeout 60s;
    proxy_read_timeout 86400;
    
    # Buffering
    proxy_buffering off;
    proxy_request_buffering off;
}
