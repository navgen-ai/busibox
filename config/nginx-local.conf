# =============================================================================
# Nginx Configuration for Busibox Local Development
# =============================================================================
#
# This configuration routes all traffic through a single domain with SSL:
# - /portal -> AI Portal (port 3000)
# - /agents -> Agent Manager (port 3001)
# - /api/authz -> AuthZ API (port 8010)
# - /api/ingest -> Ingest API (port 8002)
# - /api/search -> Search API (port 8003)
# - /api/agent -> Agent API (port 8000)
# - /api/llm -> LiteLLM (port 4000)
#
# All services accessible via https://localhost/<path>
#
# =============================================================================

user nginx;
worker_processes auto;
pid /run/nginx.pid;

events {
    worker_connections 1024;
    use epoll;
    multi_accept on;
}

http {
    # Basic settings
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    server_tokens off;
    
    # Client settings
    client_max_body_size 100M;
    client_body_timeout 60;
    client_header_timeout 60;
    send_timeout 60;
    
    # Proxy timeouts (longer for development)
    proxy_connect_timeout 120;
    proxy_send_timeout 120;
    proxy_read_timeout 120;

    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # Logging
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for" '
                    'rt=$request_time';
    
    access_log /var/log/nginx/access.log main;
    error_log /var/log/nginx/error.log warn;

    # Gzip
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml text/javascript 
               application/json application/javascript application/xml+rss;

    # ==========================================================================
    # UPSTREAM DEFINITIONS
    # ==========================================================================
    
    # Use Docker's internal DNS resolver for dynamic resolution
    resolver 127.0.0.11 valid=30s ipv6=off;
    resolver_timeout 5s;
    
    # Backend APIs (always available)
    upstream authz_api {
        server authz-api:8010;
    }
    
    upstream ingest_api {
        server ingest-api:8002;
    }
    
    upstream search_api {
        server search-api:8003;
    }
    
    upstream agent_api {
        server agent-api:8000;
    }
    
    upstream litellm {
        server litellm:4000;
    }
    
    # Optional upstreams (may not be running)
    # ai-portal and agent-manager are handled via variables in the location blocks

    # Include site configurations
    include /etc/nginx/conf.d/*.conf;
}
