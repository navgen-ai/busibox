apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Apply to busibox namespace
namespace: busibox

# Labels for all resources
labels:
  - pairs:
      environment: rackspace-spot
      app.kubernetes.io/part-of: busibox

resources:
  - ../../base

# Images pulled from in-cluster registry (localhost:30500)
# No image overrides needed - base manifests already point to localhost:30500

# Patches for Rackspace Spot specific adjustments
patches:
  # Adjust resource limits for the single-node setup (60GB RAM, 8 CPU)
  # Milvus needs less since it's a smaller deployment
  - target:
      kind: Deployment
      name: milvus
    patch: |
      - op: replace
        path: /spec/template/spec/containers/0/resources/limits/memory
        value: 6Gi
      - op: replace
        path: /spec/template/spec/containers/0/resources/requests/memory
        value: 2Gi

  # PostgreSQL - moderate sizing
  - target:
      kind: Deployment
      name: postgres
    patch: |
      - op: replace
        path: /spec/template/spec/containers/0/resources/limits/memory
        value: 2Gi
      - op: replace
        path: /spec/template/spec/containers/0/resources/requests/memory
        value: 512Mi

  # AI capability settings (generated by install wizard)
  - path: ai-capabilities-patch.yaml
