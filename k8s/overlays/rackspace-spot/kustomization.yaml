apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Production overlay for Rackspace Spot
# Storage: ssd-large (50Gi) + sata-large (75Gi) = ~$4.50/mo
# For staging (minimum storage), use rackspace-spot-staging overlay instead

namespace: busibox

labels:
  - pairs:
      environment: rackspace-spot
      app.kubernetes.io/part-of: busibox

resources:
  - ../../base

patches:
  # Milvus - production sizing
  - target:
      kind: Deployment
      name: milvus
    patch: |
      - op: replace
        path: /spec/template/spec/containers/0/resources/limits/memory
        value: 6Gi
      - op: replace
        path: /spec/template/spec/containers/0/resources/requests/memory
        value: 2Gi

  # PostgreSQL - production sizing
  - target:
      kind: Deployment
      name: postgres
    patch: |
      - op: replace
        path: /spec/template/spec/containers/0/resources/limits/memory
        value: 2Gi
      - op: replace
        path: /spec/template/spec/containers/0/resources/requests/memory
        value: 512Mi

  # Scale down in-cluster build infra (using GHCR external builds)
  - target:
      kind: Deployment
      name: build-server
    patch: |
      - op: replace
        path: /spec/replicas
        value: 0
  - target:
      kind: Deployment
      name: registry
    patch: |
      - op: replace
        path: /spec/replicas
        value: 0

  # Reduce CPU requests to fit all services on a single 4-core node
  - target:
      kind: Deployment
      name: embedding-api
    patch: |
      - op: replace
        path: /spec/template/spec/containers/0/resources/requests/cpu
        value: 100m
  - target:
      kind: Deployment
      name: milvus
    patch: |
      - op: replace
        path: /spec/template/spec/containers/0/resources/requests/cpu
        value: 200m
  - target:
      kind: Deployment
      name: agent-api
    patch: |
      - op: replace
        path: /spec/template/spec/containers/0/resources/requests/cpu
        value: 100m
  - target:
      kind: Deployment
      name: data-api
    patch: |
      - op: replace
        path: /spec/template/spec/containers/0/resources/requests/cpu
        value: 100m
  - target:
      kind: Deployment
      name: data-worker
    patch: |
      - op: replace
        path: /spec/template/spec/containers/0/resources/requests/cpu
        value: 100m
  - target:
      kind: Deployment
      name: search-api
    patch: |
      - op: replace
        path: /spec/template/spec/containers/0/resources/requests/cpu
        value: 100m
  - target:
      kind: Deployment
      name: postgres
    patch: |
      - op: replace
        path: /spec/template/spec/containers/0/resources/requests/cpu
        value: 100m

  # AI capability settings (generated by install wizard)
  - path: ai-capabilities-patch.yaml
