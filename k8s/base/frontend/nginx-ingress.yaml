---
# Proxy Ingress - Reverse proxy for all services
# Uses NodePort for external access on Rackspace Spot
apiVersion: v1
kind: Service
metadata:
  name: proxy
  labels:
    app: proxy
    tier: frontend
spec:
  type: NodePort
  ports:
    - name: http
      port: 80
      targetPort: 80
      nodePort: 30080
    - name: https
      port: 443
      targetPort: 443
      nodePort: 30443
  selector:
    app: proxy
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: proxy
  labels:
    app: proxy
    tier: frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: proxy
  template:
    metadata:
      labels:
        app: proxy
        tier: frontend
    spec:
      containers:
        - name: proxy
          image: nginx:alpine
          ports:
            - containerPort: 80
            - containerPort: 443
          volumeMounts:
            - name: proxy-config
              mountPath: /etc/nginx/nginx.conf
              subPath: nginx.conf
            - name: proxy-tls
              mountPath: /etc/nginx/tls
              readOnly: true
          livenessProbe:
            httpGet:
              path: /health
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /health
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 250m
              memory: 256Mi
      volumes:
        - name: proxy-config
          configMap:
            name: proxy-config
        - name: proxy-tls
          secret:
            secretName: proxy-tls
            optional: true
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: proxy-config
  labels:
    app: proxy
data:
  nginx.conf: |
    worker_processes auto;
    error_log /var/log/nginx/error.log warn;
    pid /var/run/nginx.pid;

    events {
        worker_connections 1024;
    }

    http {
        include /etc/nginx/mime.types;
        default_type application/octet-stream;

        log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                        '$status $body_bytes_sent "$http_referer" '
                        '"$http_user_agent"';
        access_log /var/log/nginx/access.log main;

        sendfile on;
        keepalive_timeout 65;
        client_max_body_size 500M;

        # Use kube-dns for runtime DNS resolution (allows services to start later)
        resolver kube-dns.kube-system.svc.cluster.local valid=10s;

        server {
            listen 80;
            server_name _;

            # Health check (always responds, even if backends are down)
            location /health {
                return 200 'OK';
                add_header Content-Type text/plain;
            }

            # AuthZ API
            location /auth/ {
                set $backend_authz "authz-api.busibox.svc.cluster.local:8010";
                proxy_pass http://$backend_authz/;
                proxy_set_header Host $host;
                proxy_set_header X-Real-IP $remote_addr;
                proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                proxy_set_header X-Forwarded-Proto $scheme;
            }

            # Data API
            location /data/ {
                set $backend_data "data-api.busibox.svc.cluster.local:8002";
                proxy_pass http://$backend_data/;
                proxy_set_header Host $host;
                proxy_set_header X-Real-IP $remote_addr;
                proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                proxy_set_header X-Forwarded-Proto $scheme;
            }

            # Search API
            location /search/ {
                set $backend_search "search-api.busibox.svc.cluster.local:8003";
                proxy_pass http://$backend_search/;
                proxy_set_header Host $host;
                proxy_set_header X-Real-IP $remote_addr;
                proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                proxy_set_header X-Forwarded-Proto $scheme;
            }

            # Agent API
            location /agent/ {
                set $backend_agent "agent-api.busibox.svc.cluster.local:8000";
                proxy_pass http://$backend_agent/;
                proxy_set_header Host $host;
                proxy_set_header X-Real-IP $remote_addr;
                proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                proxy_set_header X-Forwarded-Proto $scheme;
                # SSE support
                proxy_buffering off;
                proxy_cache off;
                proxy_read_timeout 300;
            }

            # Docs API
            location /docs/ {
                set $backend_docs "docs-api.busibox.svc.cluster.local:8004";
                proxy_pass http://$backend_docs/;
                proxy_set_header Host $host;
                proxy_set_header X-Real-IP $remote_addr;
            }

            # Bridge API
            location /bridge/ {
                set $backend_bridge "bridge-api.busibox.svc.cluster.local:8081";
                proxy_pass http://$backend_bridge/;
                proxy_set_header Host $host;
                proxy_set_header X-Real-IP $remote_addr;
            }

            # LiteLLM
            location /llm/ {
                set $backend_litellm "litellm.busibox.svc.cluster.local:4000";
                proxy_pass http://$backend_litellm/;
                proxy_set_header Host $host;
                proxy_set_header X-Real-IP $remote_addr;
                proxy_read_timeout 120;
            }

            # Busibox Portal (core app - may not be deployed yet)
            location /portal/ {
                set $backend_portal "busibox-portal.busibox.svc.cluster.local:3000";
                proxy_pass http://$backend_portal/portal/;
                proxy_set_header Host $host;
                proxy_set_header X-Real-IP $remote_addr;
                proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                proxy_set_header X-Forwarded-Proto $scheme;
            }

            # Agent Manager (core app - may not be deployed yet)
            location /agents/ {
                set $backend_agents "busibox-agents.busibox.svc.cluster.local:3001";
                proxy_pass http://$backend_agents/agents/;
                proxy_set_header Host $host;
                proxy_set_header X-Real-IP $remote_addr;
                proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                proxy_set_header X-Forwarded-Proto $scheme;
                # SSE support for agent streaming
                proxy_buffering off;
                proxy_cache off;
                proxy_read_timeout 300;
            }

            # Deploy API
            location /deploy/ {
                set $backend_deploy "deploy-api.busibox.svc.cluster.local:8011";
                proxy_pass http://$backend_deploy/;
                proxy_set_header Host $host;
                proxy_set_header X-Real-IP $remote_addr;
                proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                proxy_set_header X-Forwarded-Proto $scheme;
            }

            # Embedding API
            location /embedding/ {
                set $backend_embedding "embedding-api.busibox.svc.cluster.local:8005";
                proxy_pass http://$backend_embedding/;
                proxy_set_header Host $host;
                proxy_set_header X-Real-IP $remote_addr;
            }

            # Root - return service info
            location / {
                return 200 '{"service": "busibox", "status": "running"}';
                add_header Content-Type application/json;
            }
        }
    }
