---
# Search API - Semantic Search Service
apiVersion: v1
kind: Service
metadata:
  name: search-api
  labels:
    app: search-api
    tier: api
spec:
  ports:
    - port: 8003
      targetPort: 8003
  selector:
    app: search-api
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: search-api
  labels:
    app: search-api
    tier: api
spec:
  replicas: 1
  selector:
    matchLabels:
      app: search-api
  template:
    metadata:
      labels:
        app: search-api
        tier: api
    spec:
      containers:
        - name: search-api
          image: ghcr.io/jazzmind/busibox/search-api:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8003
          env:
            - name: LOG_LEVEL
              value: "INFO"
            - name: POSTGRES_HOST
              value: "postgres"
            - name: POSTGRES_PORT
              value: "5432"
            - name: POSTGRES_DB
              value: "data"
            - name: POSTGRES_USER
              value: "busibox_user"
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: busibox-secrets
                  key: POSTGRES_PASSWORD
            - name: MILVUS_HOST
              value: "milvus"
            - name: MILVUS_PORT
              value: "19530"
            - name: MILVUS_COLLECTION
              value: "documents"
            - name: REDIS_HOST
              value: "redis"
            - name: REDIS_PORT
              value: "6379"
            - name: ENABLE_CACHING
              value: "true"
            - name: EMBEDDING_API_URL
              value: "http://embedding-api:8005"
            - name: LITELLM_BASE_URL
              value: "http://litellm:4000"
            - name: LITELLM_API_KEY
              valueFrom:
                secretKeyRef:
                  name: busibox-secrets
                  key: LITELLM_API_KEY
            - name: AUTHZ_JWKS_URL
              value: "http://authz-api:8010/.well-known/jwks.json"
            - name: AUTHZ_ISSUER
              value: "busibox-authz"
            - name: AUTHZ_AUDIENCE
              value: "search-api"
            - name: AUTHZ_TOKEN_URL
              value: "http://authz-api:8010/oauth/token"
            - name: RERANKING_MODE
              value: "none"
          livenessProbe:
            httpGet:
              path: /
              port: 8003
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /
              port: 8003
            initialDelaySeconds: 30
            periodSeconds: 5
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: "1"
              memory: 2Gi
          volumeMounts:
            - name: model-cache
              mountPath: /root/.cache
      volumes:
        - name: model-cache
          emptyDir: {}
