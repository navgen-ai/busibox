---
# Etcd - Milvus metadata store
# Deployment with shared persistent storage (db-ssd PVC, subPath: etcd)
apiVersion: v1
kind: Service
metadata:
  name: etcd
  labels:
    app: etcd
    tier: infrastructure
spec:
  ports:
    - port: 2379
      targetPort: 2379
  selector:
    app: etcd
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: etcd
  labels:
    app: etcd
    tier: infrastructure
spec:
  replicas: 1
  strategy:
    type: Recreate  # Required for RWO volume
  selector:
    matchLabels:
      app: etcd
  template:
    metadata:
      labels:
        app: etcd
        tier: infrastructure
    spec:
      containers:
        - name: etcd
          image: quay.io/coreos/etcd:v3.5.5
          command:
            - etcd
            - -advertise-client-urls=http://127.0.0.1:2379
            - -listen-client-urls=http://0.0.0.0:2379
            - --data-dir=/etcd
          ports:
            - containerPort: 2379
          env:
            - name: ETCD_AUTO_COMPACTION_MODE
              value: "revision"
            - name: ETCD_AUTO_COMPACTION_RETENTION
              value: "1000"
            - name: ETCD_QUOTA_BACKEND_BYTES
              value: "4294967296"
            - name: ETCD_SNAPSHOT_COUNT
              value: "50000"
          livenessProbe:
            exec:
              command: ["etcdctl", "endpoint", "health"]
            initialDelaySeconds: 30
            periodSeconds: 30
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 1Gi
          volumeMounts:
            - name: etcd-data
              mountPath: /etcd
              subPath: etcd
      volumes:
        - name: etcd-data
          persistentVolumeClaim:
            claimName: db-ssd
---
# Milvus MinIO - Separate MinIO instance for Milvus internal storage
# Deployment with shared persistent storage (objects-store PVC, subPath: milvus-minio)
apiVersion: v1
kind: Service
metadata:
  name: milvus-minio
  labels:
    app: milvus-minio
    tier: infrastructure
spec:
  ports:
    - port: 9000
      targetPort: 9000
  selector:
    app: milvus-minio
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: milvus-minio
  labels:
    app: milvus-minio
    tier: infrastructure
spec:
  replicas: 1
  strategy:
    type: Recreate  # Required for RWO volume
  selector:
    matchLabels:
      app: milvus-minio
  template:
    metadata:
      labels:
        app: milvus-minio
        tier: infrastructure
    spec:
      containers:
        - name: minio
          image: minio/minio:RELEASE.2023-03-20T20-16-18Z
          args: ["server", "/minio_data", "--console-address", ":9001"]
          ports:
            - containerPort: 9000
          env:
            - name: MINIO_ACCESS_KEY
              value: "minioadmin"
            - name: MINIO_SECRET_KEY
              value: "minioadmin"
          livenessProbe:
            httpGet:
              path: /minio/health/live
              port: 9000
            initialDelaySeconds: 20
            periodSeconds: 30
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 1Gi
          volumeMounts:
            - name: milvus-minio-data
              mountPath: /minio_data
              subPath: milvus-minio
      volumes:
        - name: milvus-minio-data
          persistentVolumeClaim:
            claimName: objects-store
---
# Milvus - Vector Database
# Deployment with shared persistent storage (db-ssd PVC, subPath: milvus)
apiVersion: v1
kind: Service
metadata:
  name: milvus
  labels:
    app: milvus
    tier: infrastructure
spec:
  ports:
    - name: grpc
      port: 19530
      targetPort: 19530
    - name: metrics
      port: 9091
      targetPort: 9091
  selector:
    app: milvus
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: milvus
  labels:
    app: milvus
    tier: infrastructure
spec:
  replicas: 1
  strategy:
    type: Recreate  # Required for RWO volume
  selector:
    matchLabels:
      app: milvus
  template:
    metadata:
      labels:
        app: milvus
        tier: infrastructure
    spec:
      securityContext:
        # Milvus needs this for certain operations
        seccompProfile:
          type: Unconfined
      containers:
        - name: milvus
          image: milvusdb/milvus:v2.6.5
          command: ["milvus", "run", "standalone"]
          ports:
            - containerPort: 19530
              name: grpc
            - containerPort: 9091
              name: metrics
          env:
            - name: ETCD_ENDPOINTS
              value: "etcd:2379"
            - name: MINIO_ADDRESS
              value: "milvus-minio:9000"
          livenessProbe:
            httpGet:
              path: /healthz
              port: 9091
            initialDelaySeconds: 90
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /healthz
              port: 9091
            initialDelaySeconds: 90
            periodSeconds: 10
          resources:
            requests:
              cpu: 500m
              memory: 2Gi
            limits:
              cpu: "2"
              memory: 8Gi
          volumeMounts:
            - name: milvus-data
              mountPath: /var/lib/milvus
              subPath: milvus
      volumes:
        - name: milvus-data
          persistentVolumeClaim:
            claimName: db-ssd
