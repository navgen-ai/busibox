---
# Neo4j - Graph Database (Knowledge Graph)
# Deployment with shared persistent storage (db-ssd PVC, subPath: neo4j/*)
apiVersion: v1
kind: Service
metadata:
  name: neo4j
  labels:
    app: neo4j
    tier: infrastructure
spec:
  ports:
    - name: http
      port: 7474
      targetPort: 7474
    - name: bolt
      port: 7687
      targetPort: 7687
  selector:
    app: neo4j
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: neo4j
  labels:
    app: neo4j
    tier: infrastructure
spec:
  replicas: 1
  strategy:
    type: Recreate  # Required for RWO volume
  selector:
    matchLabels:
      app: neo4j
  template:
    metadata:
      labels:
        app: neo4j
        tier: infrastructure
    spec:
      containers:
        - name: neo4j
          image: neo4j:5-community
          ports:
            - containerPort: 7474
              name: http
            - containerPort: 7687
              name: bolt
          env:
            - name: NEO4J_AUTH
              valueFrom:
                secretKeyRef:
                  name: busibox-secrets
                  key: NEO4J_AUTH
                  optional: true
            - name: NEO4J_PLUGINS
              value: '["apoc"]'
            - name: NEO4J_server_memory_heap_initial__size
              value: "256m"
            - name: NEO4J_server_memory_heap_max__size
              value: "512m"
          livenessProbe:
            httpGet:
              path: /
              port: 7474
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
          readinessProbe:
            httpGet:
              path: /
              port: 7474
            initialDelaySeconds: 15
            periodSeconds: 5
            timeoutSeconds: 3
          resources:
            requests:
              cpu: 200m
              memory: 512Mi
            limits:
              cpu: "1"
              memory: 1Gi
          volumeMounts:
            - name: neo4j-data
              mountPath: /data
              subPath: neo4j/data
            - name: neo4j-logs
              mountPath: /logs
              subPath: neo4j/logs
      volumes:
        - name: neo4j-data
          persistentVolumeClaim:
            claimName: db-ssd
        - name: neo4j-logs
          persistentVolumeClaim:
            claimName: db-ssd
