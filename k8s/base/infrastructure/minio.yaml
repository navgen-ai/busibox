---
# MinIO - Object Storage (S3-compatible)
# Deployment with shared persistent storage (objects-store PVC, subPath: minio)
apiVersion: v1
kind: Service
metadata:
  name: minio
  labels:
    app: minio
    tier: infrastructure
spec:
  ports:
    - name: api
      port: 9000
      targetPort: 9000
    - name: console
      port: 9001
      targetPort: 9001
  selector:
    app: minio
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: minio
  labels:
    app: minio
    tier: infrastructure
spec:
  replicas: 1
  strategy:
    type: Recreate  # Required for RWO volume
  selector:
    matchLabels:
      app: minio
  template:
    metadata:
      labels:
        app: minio
        tier: infrastructure
    spec:
      containers:
        - name: minio
          image: minio/minio:latest
          args: ["server", "/data", "--console-address", ":9001"]
          ports:
            - containerPort: 9000
              name: api
            - containerPort: 9001
              name: console
          env:
            - name: MINIO_ROOT_USER
              valueFrom:
                secretKeyRef:
                  name: busibox-secrets
                  key: MINIO_ACCESS_KEY
            - name: MINIO_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: busibox-secrets
                  key: MINIO_SECRET_KEY
          livenessProbe:
            httpGet:
              path: /minio/health/live
              port: 9000
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /minio/health/ready
              port: 9000
            initialDelaySeconds: 10
            periodSeconds: 10
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: "1"
              memory: 1Gi
          volumeMounts:
            - name: minio-data
              mountPath: /data
              subPath: minio
      volumes:
        - name: minio-data
          persistentVolumeClaim:
            claimName: objects-store
