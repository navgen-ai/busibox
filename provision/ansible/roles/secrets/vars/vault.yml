---
# Ansible Vault - Encrypted Secrets Storage
# Created: 2025-10-15
# Purpose: Secure storage for application secrets
#
# IMPORTANT: This file should be encrypted with ansible-vault
#   To encrypt: ansible-vault encrypt provision/ansible/roles/secrets/vars/vault.yml
#   To edit: ansible-vault edit provision/ansible/roles/secrets/vars/vault.yml
#   To decrypt: ansible-vault decrypt provision/ansible/roles/secrets/vars/vault.yml
#
# Schema: secrets.<app_name>.<secret_key>
#
# Referenced by applications[].secrets[] in apps.yml

# T017: Agent-server secrets (add real values and encrypt this file)
secrets:
  agent_server:
    database_url: "postgresql://busibox_user:busibox_password_change_me@{{ postgres_host }}/{{ postgres_db }}"
    minio_access_key: "minioadmin"  # CHANGE_ME in production
    minio_secret_key: "minioadminchange"  # CHANGE_ME in production
    redis_url: "redis://{{ redis_host }}:{{ redis_port }}"

