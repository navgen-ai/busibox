---
# Ansible Vault - Encrypted Secrets Storage
# Created: 2025-10-15
# Purpose: Secure storage for application secrets
#
# IMPORTANT: This file should be encrypted with ansible-vault
#   To encrypt: ansible-vault encrypt provision/ansible/roles/secrets/vars/vault.yml
#   To edit: ansible-vault edit provision/ansible/roles/secrets/vars/vault.yml
#   To decrypt: ansible-vault decrypt provision/ansible/roles/secrets/vars/vault.yml
#
# Schema: secrets.<app_name>.<secret_key>
#
# Referenced by applications[].secrets[] in apps.yml

# T017: Agent-server secrets (TEST VALUES - encrypt this file before production!)
# These are test/development secrets. Replace with real values and encrypt for production:
#   ansible-vault encrypt provision/ansible/roles/secrets/vars/vault.yml
secrets:
  agent-server:  # Must match application name in all.yml (with hyphen, not underscore)
    database_url: "postgresql://{{ postgres_user }}:{{ postgres_password | default('busibox_password_change_me') }}@{{ postgres_host }}:{{ postgres_port }}/{{ postgres_db }}"
    minio_access_key: "minioadmin"  # Matches MinIO default from spec 001
    minio_secret_key: "minioadminchange"  # Matches MinIO default from spec 001
    redis_url: "redis://{{ redis_host }}:{{ redis_port }}"

# Additional application secrets (add as needed):

# Example structure for other applications:
# NOTE: Secret keys must use hyphens (not underscores) to match application names
