---
# Ansible Vault - Encrypted Deployment Configuration
# Created: 2025-10-15
# Updated: 2026-01-28
# Purpose: Bootstrap/infrastructure secrets + environment config
#
# IMPORTANT: This file should be encrypted with ansible-vault
#   To encrypt: ansible-vault encrypt provision/ansible/roles/secrets/vars/vault.yml
#   To edit: ansible-vault edit provision/ansible/roles/secrets/vars/vault.yml
#   To decrypt: ansible-vault decrypt provision/ansible/roles/secrets/vars/vault.yml
#
# ⚠️  IMPORTANT: This file is deployment-specific and should NOT be version controlled
#     Each deployment (customer/environment) has their own vault.yml
#     This repo is generic and reusable across multiple deployments
#
# ============================================================================
# SECRET STORAGE ARCHITECTURE
# ============================================================================
#
# WHAT GOES IN THIS VAULT (bootstrap/infrastructure secrets):
#   - Network configuration (octets, domain)
#   - Database password (can't store DB password in DB!)
#   - MinIO credentials (needed before object storage available)
#   - JWT/auth secrets (needed at service startup)
#   - SSH keys (Ansible connectivity)
#   - SSL certificates
#   - GitHub personal access token (for private repos during install)
#
# WHAT GOES IN DATABASE CONFIG API (runtime, changeable):
#   - SMTP credentials (changeable after install)
#   - External API keys (OpenAI, HuggingFace, Resend, Bedrock)
#   - OAuth provider credentials (Microsoft Entra, GitHub OAuth)
#   - Email settings (allowed domains, admin email)
#   - Feature flags
#
# The database config API is accessible at: GET/PUT /api/v1/config/{key}
# See: docs/reference/config-api.md for details
#
# ============================================================================

# ============================================================================
# SECTION 1: INFRASTRUCTURE (Required at container creation)
# ============================================================================

# Production Network Base
network_base_octets_production: "10.96.200"

# Staging Network Base (typically production + 1 in 3rd octet)
network_base_octets_staging: "10.96.201"

# Base domain for this deployment
base_domain: "maigentpartners.com"

# SSL Configuration
ssl_email: "admin@maigentpartners.com"

# ============================================================================
# SECTION 2: BOOTSTRAP SECRETS (Required before services can start)
# ============================================================================
secrets:


  # ---------------------------------------------------------------------------
  # 2.1 GitHub Personal Access Token (needed for private repo access)
  # ---------------------------------------------------------------------------
  github:
    # GitHub Access Token (for private repository deployments)
    # Create at: https://github.com/settings/tokens
    # Scope: repo (full control of private repositories)
    personal_access_token: "CHANGE_ME_GITHUB_PERSONAL_ACCESS_TOKEN"

    # NOTE: GitHub OAuth is now RUNTIME CONFIG stored in database
    # Configure via AI Portal admin settings after installation
    client_id: ""
    client_secret: ""

  # ---------------------------------------------------------------------------
  # 2.2 Database Credentials (MUST be in vault - can't store in DB!)
  # ---------------------------------------------------------------------------
  postgresql:
    password: "CHANGE_ME_POSTGRES_PASSWORD"
  
  # ---------------------------------------------------------------------------
  # 2.3 Object Storage Credentials (needed before MinIO starts)
  # ---------------------------------------------------------------------------
  minio:
    root_user: "CHANGE_ME_MINIO_ROOT_USER"  # MinIO root username
    root_password: "CHANGE_ME_MINIO_ROOT_PASSWORD"  # MinIO root password

  # ---------------------------------------------------------------------------
  # 2.4 Auth/Security Secrets (needed at service startup)
  # ---------------------------------------------------------------------------
  # Generate all these with: openssl rand -hex 32
  jwt_secret: "CHANGE_ME_JWT_SECRET_32_BYTES"
  better_auth_secret: "CHANGE_ME_BETTER_AUTH_SECRET_32_BYTES"
  session_secret: "CHANGE_ME_SESSION_SECRET_32_BYTES"
  authz_admin_token: "CHANGE_ME_AUTHZ_ADMIN_TOKEN"
  authz_master_key: "CHANGE_ME_AUTHZ_MASTER_KEY_32_BYTES"
  litellm_api_key: "CHANGE_ME_LITELLM_API_KEY"
  encryption_key: "CHANGE_ME_ENCRYPTION_KEY_32_BYTES"

  # OAuth client credentials (internal service-to-service)
  oauth_client_id: "CHANGE_ME_OAUTH_CLIENT_ID"
  oauth_client_secret: "CHANGE_ME_OAUTH_CLIENT_SECRET"

  # ---------------------------------------------------------------------------
  # 2.5 Admin Bootstrap (first admin user)
  # ---------------------------------------------------------------------------
  # Comma-separated list of admin emails (bootstrapped by authz on startup)
  admin_email: "CHANGE_ME_ADMIN_EMAIL"
  
  # Comma-separated list of allowed email domains for authentication
  allowed_email_domains: "CHANGE_ME_ALLOWED_EMAIL_DOMAINS"

  # ---------------------------------------------------------------------------
  # 2.6 SSH/SSL Infrastructure
  # ---------------------------------------------------------------------------
  # Container SSH key for remote deployments (optional)
  container_ssh_private_key: ""

  # Let's Encrypt / SSL
  letsencrypt:
    email: "CHANGE_ME_SSL_EMAIL@example.com"

  # Tailscale VPN Configuration (optional)
  tailscale:
    auth_key: ""

# ============================================================================
# SECTION 3: RUNTIME CONFIG (Can be moved to database after install)
# ============================================================================
# These are included here for backward compatibility but should ideally
# be managed via the deploy-api config endpoints after installation.
# See: GET/PUT /api/v1/config/{key}

  # ---------------------------------------------------------------------------
  # 3.1 Email/SMTP (runtime - changeable via admin UI)
  # ---------------------------------------------------------------------------
  smtp:
    host: "CHANGE_ME_SMTP_HOST"
    port: "587"
    user: "CHANGE_ME_SMTP_USER"
    password: "CHANGE_ME_SMTP_PASSWORD"
    from_email: "CHANGE_ME_FROM_EMAIL"
    secure: "false"
  
  resend_api_key: ""

  # ---------------------------------------------------------------------------
  # 3.2 External AI Providers (runtime - changeable via admin UI)
  # ---------------------------------------------------------------------------
  huggingface:
    token: ""
  
  openai:
    api_key: ""

  bedrock:
    api_key: ""
    region: "us-east-1"

  # ---------------------------------------------------------------------------
  # 3.3 OAuth Providers (runtime - configure in AI Portal admin)
  # ---------------------------------------------------------------------------
  microsoft:
    client_id: ""
    client_secret: ""
    tenant_id: "common"

  # ---------------------------------------------------------------------------
  # 3.4 Bridge Service (optional)
  # ---------------------------------------------------------------------------
  bridge:
    phone_number: ""
    service_user_id: "signal-bot-service"
    service_user_email: "signal-bot@internal.busibox.local"

  # ---------------------------------------------------------------------------
  # 3.5 SSL Certificates (for ssl_mode: provisioned, optional)
  # ---------------------------------------------------------------------------
  ssl_certificates:
    certificate: ""
    private_key: ""
    chain: ""
  

  #############################################################################
  # EVERYTHING BELOW THIS POINT IS AUTO-GENERATED BY THE SETUP SCRIPTS
  #############################################################################


  # AuthZ Service Configuration
  authz:
    database_url: postgresql://{{ postgres_user }}:{{ secrets.postgresql.password }}@{{ postgres_host }}:{{ postgres_port }}/authz
    # Admin token for RBAC management endpoints
    admin_token: "{{ secrets.authz_admin_token }}"
    # Master key for envelope encryption (encrypts KEKs stored in PostgreSQL)
    # CRITICAL: This key protects all encrypted files. Store securely and backup.
    # Generate with: openssl rand -base64 32
    master_key: "{{ secrets.authz_master_key }}"
  
  # Agent Server
  agent-server:
    database_url: "postgresql+asyncpg://{{ postgres_user }}:{{ secrets.postgresql.password }}@{{ postgres_host }}:{{ postgres_port }}/agent_server"
    minio_access_key: "{{ secrets.minio.root_user }}"  # Use MinIO root credentials
    minio_secret_key: "{{ secrets.minio.root_password }}"
    redis_url: "redis://{{ redis_host }}:{{ redis_port }}"
    jwt_secret: "{{ secrets.jwt_secret }}"
    litellm_api_key: "{{ secrets.litellm_api_key }}"
    # OAuth management credentials for admin operations
    management_client_id: "admin-management-client"
    management_client_secret: "CHANGE_ME_MANAGEMENT_CLIENT_SECRET"
    
  # AI Portal
  ai-portal:
    database_url: "postgresql://{{ postgres_user }}:{{ secrets.postgresql.password }}@{{ postgres_host }}:{{ postgres_port }}/ai_portal"
    better_auth_secret: "{{ secrets.better_auth_secret }}"
    better_auth_url: "https://{{ domain }}/ai-portal/"
    email_from: "{{ secrets.smtp.from_email }}"
    session_secret: "{{ secrets.session_secret }}"
    oauth_client_id: "{{ secrets.oauth_client_id }}"
    oauth_client_secret: "{{ secrets.oauth_client_secret }}"
    sso_jwt_secret: "{{ secrets.jwt_secret }}"
    admin_email: "{{ secrets.admin_email }}"
    allowed_email_domains: "{{ secrets.allowed_email_domains }}"
    # Microsoft Entra ID SSO
    microsoft_client_id: "{{ secrets.microsoft.client_id }}"
    microsoft_client_secret: "{{ secrets.microsoft.client_secret }}"
    microsoft_tenant_id: "{{ secrets.microsoft.tenant_id }}"
    # SMTP Configuration (Better Auth prefers SMTP over Resend)
    smtp_host: "{{ secrets.smtp.host }}"
    smtp_port: "{{ secrets.smtp.port }}"
    smtp_user: "{{ secrets.smtp.user }}"
    smtp_password: "{{ secrets.smtp.password }}"
    smtp_secure: "{{ secrets.smtp.secure }}"
    # Keep Resend as fallback if SMTP not configured
    resend_api_key: "{{ secrets.resend_api_key }}"
    litellm_api_key: "{{ secrets.litellm_api_key }}"
    # for video generation
    openai_api_key: "{{ secrets.openai.api_key }}"
    # GitHub OAuth for deployment management
    github_client_id: "{{ secrets.github.client_id }}"
    github_client_secret: "{{ secrets.github.client_secret }}"
    github_redirect_uri: "https://{{ domain }}/api/admin/github/callback"
    # Encryption key for secrets storage (uses better_auth_secret if not set)
    encryption_key: "{{ secrets.encryption_key | default(secrets.better_auth_secret) }}"
    # Container IPs for deployment management (from inventory group_vars)
    current_container_ip: "{{ apps_ip }}"
    apps_container_ip: "{{ apps_ip }}"
    agent_container_ip: "{{ agent_ip }}"
    postgres_container_ip: "{{ postgres_ip }}"
    ingest_container_ip: "{{ ingest_ip }}"
    minio_container_ip: "{{ minio_ip }}"
    milvus_container_ip: "{{ milvus_ip }}"
    # SSH key for remote deployments (optional, only if deploying to other containers)
    container_ssh_private_key: "{{ secrets.container_ssh_private_key | default('') }}"
    # AuthZ admin token for RBAC queries
    authz_admin_token: "{{ secrets.authz.admin_token }}"
  
  # Agent Manager
  agent-manager:
    database_url: "postgresql://{{ postgres_user }}:{{ secrets.postgresql.password }}@{{ postgres_host }}:{{ postgres_port }}/agent_manager"
    agent_api_key: "CHANGE_ME_AGENT_API_KEY"
    jwt_secret: "{{ secrets.jwt_secret }}"  # Shared with agent-server for auth
    session_secret: "{{ secrets.session_secret }}"
    sso_jwt_secret: "{{ secrets.jwt_secret }}"  # For validating SSO tokens from ai-portal
    oauth_client_secret: "CHANGE_ME_AGENT_MANAGER_OAUTH_SECRET"  # For SSO with ai-portal
    # OAuth client credentials for agent API access (chat, RAG)
    # These map to AUTHZ_CLIENT_ID and AUTHZ_CLIENT_SECRET in the .env
    admin_client_id: "agent-manager"
    admin_client_secret: "CHANGE_ME_AGENT_MANAGER_ADMIN_SECRET"
    # LiteLLM API key
    litellm_api_key: "{{ secrets.litellm_api_key }}"
    # Optional: Email service credentials (Resend)
    # resend_api_key: "CHANGE_ME_RESEND_API_KEY"
    # email_from: "Portal <noreply@your-domain.com>"
    # Optional: AuthZ admin token (for admin operations)
    # authz_admin_token: "CHANGE_ME_AUTHZ_ADMIN_TOKEN"
   
  # LiteLLM
  litellm:
    master_key: "{{ secrets.litellm_master_key }}" # Admin password and API key (starts with sk-)
    database_url: "postgresql://{{ postgres_user }}:{{ secrets.postgresql.password }}@{{ postgres_host }}:{{ postgres_port }}/litellm"
    openai_api_key: "{{ secrets.openai.api_key }}"
    bedrock_api_key: "{{ secrets.bedrock.api_key }}"
    bedrock_region: "{{ secrets.bedrock.region }}"
    
  # Files/Ingestion Service
  files:
    database_url: "postgresql://{{ postgres_user }}:{{ secrets.postgresql.password }}@{{ postgres_host }}:{{ postgres_port }}/files"

  # Deploy Service (runs alongside authz for app deployment)
  # Used for deploying external apps, database provisioning, and nginx configuration
  deploy:
    # PostgreSQL admin password (for creating new databases)
    postgres_admin_password: "{{ secrets.postgresql.password }}"
    # SSH private key for remote operations (optional, same as container_ssh_private_key)
    ssh_private_key: "{{ secrets.container_ssh_private_key | default('') }}"
  
 