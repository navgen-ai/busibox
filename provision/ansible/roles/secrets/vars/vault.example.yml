---
# Ansible Vault - Encrypted Deployment Configuration
# Created: 2025-10-15
# Updated: 2025-10-23
# Purpose: Deployment-specific configuration (secrets + environment config)
#
# IMPORTANT: This file should be encrypted with ansible-vault
#   To encrypt: ansible-vault encrypt provision/ansible/roles/secrets/vars/vault.yml
#   To edit: ansible-vault edit provision/ansible/roles/secrets/vars/vault.yml
#   To decrypt: ansible-vault decrypt provision/ansible/roles/secrets/vars/vault.yml
#
# ⚠️  IMPORTANT: This file is deployment-specific and should NOT be version controlled
#     Each deployment (customer/environment) has their own vault.yml
#     This repo is generic and reusable across multiple deployments

# ============================================================================
# Network Configuration (Deployment-Specific)
# ============================================================================
# Production Network Base
network_base_octets_production: "10.96.200"

# Test Network Base (typically production + 1 in 3rd octet)
network_base_octets_test: "10.96.201"

# ============================================================================
# Domain Configuration (Deployment-Specific)
# ============================================================================
# Base domain for this deployment
base_domain: "maigentpartners.com"

# SSL Configuration
ssl_email: "admin@maigentpartners.com"

# ============================================================================
# Secrets (Deployment-Specific)
# ============================================================================
secrets:
  # GitHub Access Token (for private repository deployments)
  # Create at: https://github.com/settings/tokens
  # Scope: repo (full control of private repositories)
  # Used by deploywatch scripts to access private repos
  github_token: "CHANGE_ME_GITHUB_PERSONAL_ACCESS_TOKEN"  
  resend_api_key: "CHANGE_ME_RESEND_API_KEY"
  litellm_api_key: "CHANGE_ME_LITELLM_API_KEY"
  jwt_secret: "CHANGE_ME_JWT_SECRET_32_BYTES"
  openai_api_key: "CHANGE_ME_OPENAI_API_KEY"
  better_auth_secret: "CHANGE_ME_BETTER_AUTH_SECRET_32_BYTES"
  allowed_email_domains: "CHANGE_ME_ALLOWED_EMAIL_DOMAINS"
  admin_email: "CHANGE_ME_ADMIN_EMAIL"
  oauth_client_id: "CHANGE_ME_OAUTH_CLIENT_ID"
  oauth_client_secret: "CHANGE_ME_OAUTH_CLIENT_SECRET"
  session_secret: "CHANGE_ME_SESSION_SECRET_32_BYTES"
  
  # SMTP Configuration (for Better Auth emails)
  # Used instead of Resend for sending authentication emails
  smtp:
    host: "CHANGE_ME_SMTP_HOST"  # e.g., smtp.gmail.com, smtp.sendgrid.net
    port: "587"  # 587 for TLS, 465 for SSL
    user: "CHANGE_ME_SMTP_USER"  # SMTP username/email
    password: "CHANGE_ME_SMTP_PASSWORD"  # SMTP password or app password
    from_email: "CHANGE_ME_FROM_EMAIL"  # e.g., Portal <noreply@yourdomain.com>
    secure: "true"  # Use TLS (true for port 587, false for STARTTLS)
  
  postgresql:
    password: "CHANGE_ME_POSTGRES_PASSWORD"
    
  # Agent Server
  agent-server:
    database_url: "postgresql://{{ postgres_user }}:{{ secrets.postgresql.password }}@{{ postgres_host }}:{{ postgres_port }}/agent_server"
    minio_access_key: "CHANGE_ME_MINIO_ACCESS_KEY"
    minio_secret_key: "CHANGE_ME_MINIO_SECRET_KEY"
    redis_url: "redis://{{ redis_host }}:{{ redis_port }}"
    jwt_secret: "{{ secrets.jwt_secret }}"
  
  # AI Portal
  ai-portal:
    database_url: "postgresql://{{ postgres_user }}:{{ secrets.postgresql.password }}@{{ postgres_host }}:{{ postgres_port }}/ai_portal"
    openai_api_key: "{{secrets.openai_api_key}}"
    better_auth_secret: "{{ secrets.better_auth_secret }}"
    better_auth_url: "https://{{ domain }}/ai-portal/"
    email_from: "{{ secrets.smtp.from_email }}"
    session_secret: "{{ secrets.session_secret }}"
    oauth_client_id: "{{ secrets.oauth_client_id }}"
    oauth_client_secret: "{{ secrets.oauth_client_secret }}"
    sso_jwt_secret: "{{ secrets.jwt_secret }}"
    admin_email: "{{ secrets.admin_email }}"
    allowed_email_domains: "{{ secrets.allowed_email_domains }}"
    # SMTP Configuration (Better Auth prefers SMTP over Resend)
    smtp_host: "{{ secrets.smtp.host }}"
    smtp_port: "{{ secrets.smtp.port }}"
    smtp_user: "{{ secrets.smtp.user }}"
    smtp_password: "{{ secrets.smtp.password }}"
    smtp_secure: "{{ secrets.smtp.secure }}"
    # Keep Resend as fallback if SMTP not configured
    resend_api_key: "{{ secrets.resend_api_key }}"
    litellm_api_key: "{{ secrets.litellm_api_key }}" 
  
  # Agent Client
  agent-client:
    database_url: "postgresql://{{ postgres_user }}:{{ secrets.postgresql.password }}@{{ postgres_host }}:{{ postgres_port }}/agent_client"
    agent_api_key: "CHANGE_ME_AGENT_API_KEY"
    jwt_secret: "{{ secrets.jwt_secret }}"  # Shared with agent-server for auth
    session_secret: "{{ secrets.session_secret }}"
  
  # Doc Intel
  doc-intel:
    database_url: "postgresql://{{ postgres_user }}:{{ secrets.postgresql.password }}@{{ postgres_host }}:{{ postgres_port }}/doc_intel"
    openai_api_key: "{{ secrets.openai_api_key }}"
    better_auth_secret: "{{ secrets.better_auth_secret }}"
    jwt_secret: "{{ secrets.jwt_secret }}"  # Shared for cross-app auth
  
  # Innovation
  innovation:
    database_url: "postgresql://{{ postgres_user }}:{{ secrets.postgresql.password }}@{{ postgres_host }}:{{ postgres_port }}/innovation"
    better_auth_secret: "{{ secrets.better_auth_secret }}"
    jwt_secret: "{{ secrets.jwt_secret }}"  # Shared for cross-app auth
    openai_api_key: "{{ secrets.openai_api_key }}"  # Shared API key
  
  # LiteLLM
  litellm:
    master_key: "CHANGE_ME_LITELLM_MASTER_KEY"  # Admin password and API key (starts with sk-)
    database_url: "postgresql://{{ postgres_user }}:{{ secrets.postgresql.password }}@{{ postgres_host }}:{{ postgres_port }}/litellm"
  
  # Files/Ingestion Service
  files:
    database_url: "postgresql://{{ postgres_user }}:{{ secrets.postgresql.password }}@{{ postgres_host }}:{{ postgres_port }}/files"
  
  # Let's Encrypt / SSL
  letsencrypt:
    email: "CHANGE_ME_SSL_EMAIL@example.com"
    # Uncomment and configure if using DNS challenges:
    # dns_provider: "cloudflare"
    # cloudflare_api_token: "CHANGE_ME_CLOUDFLARE_TOKEN"

  # SSL Certificates (for ssl_mode: provisioned)
  # Only needed if you want to use your own SSL certificates instead of Let's Encrypt or self-signed
  ssl_certificates:
    certificate: |
      -----BEGIN CERTIFICATE-----
      CHANGE_ME_YOUR_SSL_CERTIFICATE_HERE
      -----END CERTIFICATE-----
    private_key: |
      -----BEGIN PRIVATE KEY-----
      CHANGE_ME_YOUR_PRIVATE_KEY_HERE
      -----END PRIVATE KEY-----
    chain: |
      -----BEGIN CERTIFICATE-----
      CHANGE_ME_INTERMEDIATE_CERTIFICATE_CHAIN_HERE
      -----END CERTIFICATE-----
  
