---
# Secrets Management Tasks
# Purpose: Validate and deploy encrypted secrets to applications
# Requirements: FR-007, FR-008, FR-009 (secret management, encryption, env vars)

- name: Load secrets from vault
  include_vars:
    file: "{{ role_path }}/vars/vault.yml"
  no_log: true  # Don't log vault contents

- name: Validate secrets structure
  assert:
    that:
      - secrets is defined
      - secrets is mapping
    fail_msg: "secrets must be defined as a dictionary in vault.yml"
    success_msg: "Secrets vault loaded successfully"
  no_log: true

- name: Validate all required secrets exist for each application
  assert:
    that:
      - secrets[item.0.name] is defined
      - secrets[item.0.name][item.1] is defined
      - secrets[item.0.name][item.1] | length > 0
    fail_msg: |
      ❌ Missing or empty secret for application '{{ item.0.name }}':
      Secret key: {{ item.1 }}
      
      Please add this secret to provision/ansible/roles/secrets/vars/vault.yml:
      
      secrets:
        {{ item.0.name }}:
          {{ item.1 }}: "YOUR_SECRET_VALUE_HERE"
      
      Then encrypt the file:
      ansible-vault encrypt provision/ansible/roles/secrets/vars/vault.yml
    success_msg: "Secret '{{ item.1 }}' exists for '{{ item.0.name }}'"
  with_subelements:
    - "{{ applications }}"
    - secrets
    - skip_missing: yes
  loop_control:
    label: "{{ item.0.name }}.{{ item.1 }}"
  no_log: true  # Don't log secret validation details
  when: applications | length > 0

- name: Create secrets directory on target hosts
  file:
    path: /etc/busibox/secrets
    state: directory
    mode: "0700"
    owner: root
    group: root

- name: Display secrets validation summary
  debug:
    msg: |
      ✅ Secrets validation passed
      - Total applications with secrets: {{ applications | selectattr('secrets', 'defined') | list | length }}
      - Total secret keys validated: {{ applications | selectattr('secrets', 'defined') | map(attribute='secrets') | flatten | list | length }}
  when: applications | length > 0

- name: Warning if vault file is not encrypted
  debug:
    msg: |
      ⚠️  WARNING: Secrets vault may not be encrypted!
      
      To encrypt secrets:
      ansible-vault encrypt provision/ansible/roles/secrets/vars/vault.yml
      
      To edit encrypted secrets:
      ansible-vault edit provision/ansible/roles/secrets/vars/vault.yml
  when: lookup('file', role_path + '/vars/vault.yml', errors='ignore') is not search('$ANSIBLE_VAULT')

