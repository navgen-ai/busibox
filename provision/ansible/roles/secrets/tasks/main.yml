---
# Secrets Management Tasks
# Purpose: Validate and deploy encrypted secrets to applications
# Requirements: FR-007, FR-008, FR-009 (secret management, encryption, env vars)

- name: Determine vault file to use (vault.{env}.yml)
  set_fact:
    vault_file_path: "{{ role_path }}/vars/vault.{{ deployment_environment | default('prod') }}.yml"

- name: Check if environment-specific vault exists on controller (not target)
  stat:
    path: "{{ vault_file_path }}"
  register: vault_stat
  delegate_to: localhost
  become: false

- name: Fail if vault file doesn't exist on controller
  fail:
    msg: |
      Vault file not found on Ansible controller: {{ vault_file_path }}
      Expected vault file for environment '{{ deployment_environment | default('prod') }}'
      Run 'make install' to generate the vault file.
  when: not vault_stat.stat.exists

- name: Load secrets from vault (runs on controller, not target)
  include_vars:
    file: "{{ vault_file_path }}"
  no_log: true  # Don't log vault contents

- name: Validate secrets structure
  assert:
    that:
      - secrets is defined
      - secrets is mapping
    fail_msg: "secrets must be defined as a dictionary in vault.yml"
    success_msg: "Secrets vault loaded successfully"
  no_log: true

- name: Load shared secrets mapping
  include_vars:
    file: "{{ role_path }}/vars/shared_secrets.yml"

- name: Validate base secrets exist (app secrets computed at deploy time)
  assert:
    that:
      - secrets.postgresql is defined
      - secrets.postgresql.password is defined
      - secrets.jwt_secret is defined
      - secrets.minio is defined
      - secrets.minio.root_password is defined
    fail_msg: "Base secrets missing from vault. Run install.sh to generate them."
    success_msg: "Base secrets validated"
  no_log: true

# Note: Application-specific secrets (database_url, etc.) are NOT validated here
# They are computed at deploy time from base secrets using Ansible templates
# See app_deployer role for how secrets are generated for each app

# Single-line summary (replaces per-key debug + no_log; message does not expose secret values)
- name: Validate optional secrets (allow empty)
  ansible.builtin.debug:
    msg: >-
      Optional secrets keys reviewed for
      {{ applications | selectattr('optional_secrets', 'defined') | list | length }}
      application(s) (presence not logged per key).
  when:
    - applications is defined
    - applications | length > 0
    - applications | selectattr('optional_secrets', 'defined') | list | length > 0

- name: Create secrets directory on target hosts
  file:
    path: /etc/busibox/secrets
    state: directory
    mode: "0700"
    owner: root
    group: root

- name: Display secrets validation summary
  debug:
    msg: |
      ✅ Secrets validation passed
      - Total applications with secrets: {{ applications | selectattr('secrets', 'defined') | list | length }}
      - Total secret keys validated: {{ applications | selectattr('secrets', 'defined') | map(attribute='secrets') | flatten | list | length }}
  when: 
    - applications is defined
    - applications | length > 0

# Check the same env-specific vault file loaded above (not legacy vault.yml).
# Use substring test: regex search('$ANSIBLE_VAULT') treats $ as end-anchor, causing false positives.
- name: Warning if vault file is not encrypted
  ansible.builtin.debug:
    msg: |
      ⚠️  WARNING: Secrets vault may not be encrypted!

      File: {{ vault_file_path }}

      To encrypt secrets:
      ansible-vault encrypt {{ vault_file_path }}

      To edit encrypted secrets:
      ansible-vault edit {{ vault_file_path }}
  when:
    - vault_stat.stat.exists
    - "'$ANSIBLE_VAULT' not in (lookup('file', vault_file_path, errors='ignore') | default('', true))"

