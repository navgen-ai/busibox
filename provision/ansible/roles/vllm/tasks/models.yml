---
# vLLM Model Management Tasks
# Download and verify models

- name: Set HuggingFace token if provided
  lineinfile:
    path: "{{ vllm_home }}/.bashrc"
    line: "export HF_TOKEN={{ vllm_hf_token }}"
    create: yes
    owner: "{{ vllm_user }}"
    group: "{{ vllm_group }}"
    mode: '0600'
  when: vllm_hf_token is defined and vllm_hf_token != ""
  no_log: true
  tags: [vllm_models]

- name: Check if model is already cached
  stat:
    path: "{{ vllm_cache_dir }}/hub/models--{{ vllm_default_model | replace('/', '--') }}"
  register: model_cache
  tags: [vllm_models]

- name: Download model to cache (may take 30+ minutes for large models)
  shell: |
    source {{ vllm_venv_dir }}/bin/activate
    export HF_HOME={{ vllm_cache_dir }}
    {% if vllm_hf_token is defined and vllm_hf_token != "" %}
    export HF_TOKEN={{ vllm_hf_token }}
    {% endif %}
    python -c "from huggingface_hub import snapshot_download; snapshot_download('{{ vllm_default_model }}', cache_dir='{{ vllm_cache_dir }}')"
  args:
    creates: "{{ vllm_cache_dir }}/hub/models--{{ vllm_default_model | replace('/', '--') }}"
  become: yes
  become_user: "{{ vllm_user }}"
  async: 7200  # 2 hours for very large models
  poll: 30     # Check every 30 seconds
  when: not model_cache.stat.exists
  no_log: "{{ vllm_hf_token is defined and vllm_hf_token != '' }}"
  tags: [vllm_models]

- name: Verify model files exist
  stat:
    path: "{{ vllm_cache_dir }}/hub/models--{{ vllm_default_model | replace('/', '--') }}"
  register: model_verify
  tags: [vllm_models]

- name: Display model download status
  debug:
    msg: "Model {{ vllm_default_model }} is {{ 'cached' if model_verify.stat.exists else 'NOT FOUND' }}"
  tags: [vllm_models]

- name: Get model directory size
  shell: "du -sh {{ vllm_cache_dir }}/hub/models--{{ vllm_default_model | replace('/', '--') }} | cut -f1"
  register: model_size
  changed_when: false
  when: model_verify.stat.exists
  tags: [vllm_models]

- name: Display model size
  debug:
    msg: "Model size on disk: {{ model_size.stdout }}"
  when: model_size is defined
  tags: [vllm_models]

