---
# vLLM Installation Tasks
# Install Python, CUDA, PyTorch, and vLLM

- name: Update apt cache
  apt:
    update_cache: yes
    cache_valid_time: 3600
  tags: [vllm_install]

- name: Install system dependencies
  apt:
    name:
      - build-essential
      - python3-pip
      - python3-venv
      - python3-dev
      - git
      - curl
      - wget
      - ca-certificates
      - gnupg
      - software-properties-common
    state: present
  tags: [vllm_install]

- name: Check if NVIDIA GPU is available
  command: nvidia-smi
  register: nvidia_check
  failed_when: false
  changed_when: false
  tags: [vllm_install, vllm_gpu]

- name: Install NVIDIA drivers and CUDA if not available
  block:
    - name: Remove old NVIDIA repository configurations
      file:
        path: "{{ item }}"
        state: absent
      loop:
        - /etc/apt/sources.list.d/cuda-debian12-x86_64.list
        - /etc/apt/sources.list.d/nvidia-cuda-debian12.list
        - /usr/share/keyrings/cuda-archive-keyring.gpg
        - /usr/share/keyrings/cuda-archive-keyring.asc
        - /usr/share/keyrings/nvidia-cuda-keyring.gpg
        - /tmp/nvidia-cuda-keyring.asc

    - name: Install gnupg for key conversion
      apt:
        name: gnupg
        state: present
        update_cache: yes

    - name: Download NVIDIA CUDA repository GPG key
      get_url:
        url: https://developer.download.nvidia.com/compute/cuda/repos/debian12/x86_64/3bf863cc.pub
        dest: /tmp/nvidia-cuda-keyring.asc
        mode: '0644'

    - name: Convert and install GPG key
      shell: |
        gpg --dearmor < /tmp/nvidia-cuda-keyring.asc > /usr/share/keyrings/nvidia-cuda-keyring.gpg
        chmod 644 /usr/share/keyrings/nvidia-cuda-keyring.gpg

    - name: Add NVIDIA CUDA repository
      apt_repository:
        repo: "deb [signed-by=/usr/share/keyrings/nvidia-cuda-keyring.gpg] https://developer.download.nvidia.com/compute/cuda/repos/debian12/x86_64/ /"
        state: present
        filename: nvidia-cuda-debian12

    - name: Update apt cache after adding NVIDIA repo
      apt:
        update_cache: yes

    - name: Install NVIDIA drivers and CUDA toolkit
      apt:
        name:
          - nvidia-driver
          - cuda-toolkit
          - nvidia-kernel-dkms
        state: present
        install_recommends: yes
      register: nvidia_install

    - name: Notify about required reboot
      debug:
        msg: "NVIDIA drivers installed. Container reboot required for GPU to be available."
      when: nvidia_install.changed

    - name: Check if nvidia-smi works after install
      command: nvidia-smi
      register: nvidia_check_after
      changed_when: false
      failed_when: false

    - name: Display GPU information if available
      debug:
        msg: "{{ nvidia_check_after.stdout_lines }}"
      when: nvidia_check_after.rc == 0
  when: nvidia_check.rc != 0
  tags: [vllm_install, vllm_gpu]

- name: Display GPU information (if already available)
  debug:
    msg: "{{ nvidia_check.stdout_lines }}"
  when: nvidia_check.rc == 0
  tags: [vllm_install, vllm_gpu]

- name: Check final GPU availability
  command: nvidia-smi
  register: nvidia_final_check
  failed_when: false
  changed_when: false
  tags: [vllm_install, vllm_gpu]

- name: Set GPU availability fact
  set_fact:
    vllm_gpu_ready: "{{ nvidia_final_check.rc == 0 }}"
  tags: [vllm_install, vllm_gpu]

- name: Display GPU readiness status
  debug:
    msg: "{{ 'GPU is ready and available' if vllm_gpu_ready else 'GPU not ready - container reboot may be required if drivers were just installed' }}"
  tags: [vllm_install, vllm_gpu]

- name: Create vLLM system group
  group:
    name: "{{ vllm_group }}"
    system: yes
    state: present
  tags: [vllm_install]

- name: Create vLLM system user
  user:
    name: "{{ vllm_user }}"
    group: "{{ vllm_group }}"
    system: yes
    create_home: yes
    home: "{{ vllm_home }}"
    shell: /bin/bash
    comment: "vLLM Service User"
  tags: [vllm_install]

- name: Create vLLM directories
  file:
    path: "{{ item }}"
    state: directory
    owner: "{{ vllm_user }}"
    group: "{{ vllm_group }}"
    mode: '0755'
  loop:
    - "{{ vllm_install_dir }}"
    - "{{ vllm_home }}"
    - "{{ vllm_cache_dir }}"
    - "{{ vllm_download_dir }}"
  tags: [vllm_install]

- name: Create Python virtual environment
  command: "python3 -m venv {{ vllm_venv_dir }}"
  args:
    creates: "{{ vllm_venv_dir }}/bin/python"
  become: yes
  become_user: "{{ vllm_user }}"
  tags: [vllm_install]

- name: Upgrade pip in virtual environment
  pip:
    name:
      - pip
      - setuptools
      - wheel
    state: latest
    virtualenv: "{{ vllm_venv_dir }}"
  become: yes
  become_user: "{{ vllm_user }}"
  tags: [vllm_install]

- name: Install PyTorch with CUDA support
  pip:
    name:
      - torch
      - torchvision
      - torchaudio
    extra_args: "--index-url {{ vllm_pip_extra_index_url }}"
    virtualenv: "{{ vllm_venv_dir }}"
  become: yes
  become_user: "{{ vllm_user }}"
  tags: [vllm_install]

- name: Verify PyTorch CUDA availability
  shell: |
    source {{ vllm_venv_dir }}/bin/activate
    python -c "import torch; print('CUDA available:', torch.cuda.is_available()); print('CUDA version:', torch.version.cuda); print('GPU count:', torch.cuda.device_count())"
  register: pytorch_cuda_check
  become: yes
  become_user: "{{ vllm_user }}"
  changed_when: false
  tags: [vllm_install, vllm_gpu]

- name: Display PyTorch CUDA status
  debug:
    msg: "{{ pytorch_cuda_check.stdout_lines }}"
  tags: [vllm_install, vllm_gpu]

- name: Fail if PyTorch cannot detect CUDA
  fail:
    msg: "PyTorch cannot detect CUDA! Check GPU passthrough configuration."
  when: "'CUDA available: False' in pytorch_cuda_check.stdout"
  tags: [vllm_install, vllm_gpu]

- name: Install vLLM
  pip:
    name: "vllm{% if vllm_version != 'latest' %}=={{ vllm_version }}{% endif %}"
    virtualenv: "{{ vllm_venv_dir }}"
  become: yes
  become_user: "{{ vllm_user }}"
  tags: [vllm_install]

- name: Install additional Python packages
  pip:
    name:
      - transformers
      - accelerate
      - huggingface_hub
      - fastapi
      - uvicorn
    virtualenv: "{{ vllm_venv_dir }}"
  become: yes
  become_user: "{{ vllm_user }}"
  tags: [vllm_install]

- name: Verify vLLM installation
  shell: |
    source {{ vllm_venv_dir }}/bin/activate
    python -c "import vllm; print('vLLM version:', vllm.__version__)"
  register: vllm_version_check
  become: yes
  become_user: "{{ vllm_user }}"
  changed_when: false
  tags: [vllm_install]

- name: Display vLLM version
  debug:
    msg: "{{ vllm_version_check.stdout }}"
  tags: [vllm_install]

