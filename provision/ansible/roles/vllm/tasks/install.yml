---
# vLLM Installation Tasks
# Install Python, CUDA, PyTorch, and vLLM

- name: Update apt cache
  apt:
    update_cache: yes
    cache_valid_time: 3600
  tags: [vllm_install]

- name: Install system dependencies
  apt:
    name:
      - build-essential
      - python3-pip
      - python3-venv
      - python3-dev
      - git
      - curl
      - wget
      - ca-certificates
      - gnupg
      - software-properties-common
    state: present
  tags: [vllm_install]

- name: Check if NVIDIA GPU is available
  command: nvidia-smi
  register: nvidia_check
  failed_when: false
  changed_when: false
  tags: [vllm_install, vllm_gpu]

- name: Check if GPU devices are present
  shell: "ls -la /dev/nvidia* 2>/dev/null || echo 'No NVIDIA devices found'"
  register: gpu_devices_initial_check
  changed_when: false
  tags: [vllm_install, vllm_gpu]

- name: Always purge existing NVIDIA packages in LXC to avoid version mismatch
  block:
    - name: Display purge reason
      debug:
        msg: "Purging any existing NVIDIA packages to ensure clean install matching host driver version..."

    - name: Stop any running NVIDIA services
      systemd:
        name: "{{ item }}"
        state: stopped
      loop:
        - nvidia-persistenced
      failed_when: false
      ignore_errors: true

    - name: Purge all NVIDIA packages
      apt:
        name:
          - 'nvidia-*'
          - 'cuda-*'
          - 'libnvidia-*'
          - 'libcuda*'
        state: absent
        purge: yes
        autoremove: yes

    - name: Clean apt cache
      apt:
        autoclean: yes
        
    - name: Update apt cache after purge
      apt:
        update_cache: yes

    - name: Remove NVIDIA configuration files
      file:
        path: "{{ item }}"
        state: absent
      loop:
        - /etc/modprobe.d/nvidia.conf
        - /etc/modprobe.d/nvidia-installer-disable-nouveau.conf
        - /usr/local/cuda
        - /usr/local/cuda-12
      ignore_errors: true
  when: "'No NVIDIA devices found' not in gpu_devices_initial_check.stdout"
  tags: [vllm_install, vllm_gpu]

- name: Install NVIDIA drivers and CUDA if not available
  block:
    - name: Remove old NVIDIA repository configurations
      file:
        path: "{{ item }}"
        state: absent
      loop:
        - /etc/apt/sources.list.d/cuda-debian12-x86_64.list
        - /etc/apt/sources.list.d/nvidia-cuda-debian12.list
        - /usr/share/keyrings/cuda-archive-keyring.gpg
        - /usr/share/keyrings/cuda-archive-keyring.asc
        - /usr/share/keyrings/nvidia-cuda-keyring.gpg
        - /tmp/nvidia-cuda-keyring.asc

    - name: Install gnupg for key conversion
      apt:
        name: gnupg
        state: present
        update_cache: yes

    - name: Download NVIDIA CUDA repository GPG key
      get_url:
        url: https://developer.download.nvidia.com/compute/cuda/repos/debian12/x86_64/3bf863cc.pub
        dest: /tmp/nvidia-cuda-keyring.asc
        mode: '0644'

    - name: Convert and install GPG key
      shell: |
        gpg --dearmor < /tmp/nvidia-cuda-keyring.asc > /usr/share/keyrings/nvidia-cuda-keyring.gpg
        chmod 644 /usr/share/keyrings/nvidia-cuda-keyring.gpg

    - name: Add NVIDIA CUDA repository
      apt_repository:
        repo: "deb [signed-by=/usr/share/keyrings/nvidia-cuda-keyring.gpg] https://developer.download.nvidia.com/compute/cuda/repos/debian12/x86_64/ /"
        state: present
        filename: nvidia-cuda-debian12

    - name: Update apt cache after adding NVIDIA repo
      apt:
        update_cache: yes

    - name: Check NVIDIA driver version on host via kernel module
      shell: "cat /proc/driver/nvidia/version 2>/dev/null | head -1 | awk '{print $8}' || echo ''"
      register: host_nvidia_version
      changed_when: false
      failed_when: false

    - name: Display detected host NVIDIA driver version
      debug:
        msg: "Host NVIDIA driver version: {{ host_nvidia_version.stdout }}"

    - name: Install NVIDIA userspace utilities matching host driver
      apt:
        name:
          - cuda-drivers
          - cuda-toolkit
        state: present
        install_recommends: no
      register: nvidia_install
      environment:
        DEBIAN_FRONTEND: noninteractive

    - name: Reboot container if drivers were installed
      shell: "sleep 2 && reboot"
      async: 1
      poll: 0
      when: nvidia_install.changed
      ignore_errors: true

    - name: Wait for container to come back up
      wait_for_connection:
        delay: 10
        timeout: 300
      when: nvidia_install.changed

    - name: Verify nvidia-smi works after reboot
      command: nvidia-smi
      register: nvidia_check_after
      changed_when: false
      retries: 5
      delay: 5
      until: nvidia_check_after.rc == 0
      when: nvidia_install.changed

    - name: Display GPU information after driver install
      debug:
        msg: "{{ nvidia_check_after.stdout_lines }}"
      when: nvidia_install.changed
  when: nvidia_check.rc != 0
  tags: [vllm_install, vllm_gpu]

- name: Display GPU information (if already available)
  debug:
    msg: "{{ nvidia_check.stdout_lines }}"
  when: nvidia_check.rc == 0
  tags: [vllm_install, vllm_gpu]

- name: Check final GPU availability
  command: nvidia-smi
  register: nvidia_final_check
  failed_when: false
  changed_when: false
  tags: [vllm_install, vllm_gpu]

- name: Set GPU availability fact
  set_fact:
    vllm_gpu_ready: "{{ nvidia_final_check.rc == 0 }}"
  tags: [vllm_install, vllm_gpu]

- name: Check if GPU devices are visible in container
  shell: "ls -la /dev/nvidia* 2>/dev/null || echo 'No NVIDIA devices found'"
  register: gpu_devices_check
  changed_when: false
  tags: [vllm_install, vllm_gpu]

- name: Display GPU device status
  debug:
    msg: "{{ gpu_devices_check.stdout_lines }}"
  tags: [vllm_install, vllm_gpu]

- name: Check all devices in /dev for debugging
  shell: "ls -la /dev/ | grep -E '(nvidia|drm|dri)' || echo 'No GPU-related devices found'"
  register: dev_devices_check
  changed_when: false
  tags: [vllm_install, vllm_gpu]

- name: Display all GPU-related devices
  debug:
    msg: "{{ dev_devices_check.stdout_lines }}"
  tags: [vllm_install, vllm_gpu]

- name: Display GPU readiness status
  debug:
    msg: "{{ 'GPU is ready and available' if vllm_gpu_ready else 'GPU not ready - check if GPU passthrough is configured on Proxmox host' }}"
  tags: [vllm_install, vllm_gpu]

- name: Fail if GPU devices not found in container
  fail:
    msg: |
      No NVIDIA GPU devices found in container!
      
      GPU passthrough may not be configured. To configure GPU passthrough:
      1. On Proxmox host, run: bash /root/busibox/provision/pct/configure-gpu-passthrough.sh {{ container_id }}
      2. Or run the test infrastructure script which includes GPU setup
      
      The container needs GPU device {{ gpu_device | default('N/A') }} to be passed through.
  when: "'No NVIDIA devices found' in gpu_devices_check.stdout"
  tags: [vllm_install, vllm_gpu]

- name: Create vLLM system group
  group:
    name: "{{ vllm_group }}"
    system: yes
    state: present
  tags: [vllm_install]

- name: Create vLLM system user
  user:
    name: "{{ vllm_user }}"
    group: "{{ vllm_group }}"
    system: yes
    create_home: yes
    home: "{{ vllm_home }}"
    shell: /bin/bash
    comment: "vLLM Service User"
  tags: [vllm_install]

- name: Create vLLM directories
  file:
    path: "{{ item }}"
    state: directory
    owner: "{{ vllm_user }}"
    group: "{{ vllm_group }}"
    mode: '0755'
  loop:
    - "{{ vllm_install_dir }}"
    - "{{ vllm_home }}"
    - "{{ vllm_cache_dir }}"
    - "{{ vllm_download_dir }}"
  tags: [vllm_install]

- name: Create Python virtual environment
  command: "python3 -m venv {{ vllm_venv_dir }}"
  args:
    creates: "{{ vllm_venv_dir }}/bin/python"
  become: true
  become_user: "{{ vllm_user }}"
  tags: [vllm_install]

- name: Upgrade pip in virtual environment
  pip:
    name:
      - pip
      - setuptools
      - wheel
    state: latest
    virtualenv: "{{ vllm_venv_dir }}"
  become: true
  become_user: "{{ vllm_user }}"
  tags: [vllm_install]

- name: Install PyTorch with CUDA support
  shell: |
    {{ vllm_venv_dir }}/bin/pip install torch torchvision torchaudio --index-url {{ vllm_pip_extra_index_url }}
  become: true
  become_user: "{{ vllm_user }}"
  register: pytorch_install
  changed_when: "'Successfully installed' in pytorch_install.stdout"
  tags: [vllm_install]

- name: Check CUDA libraries in container
  shell: "ldconfig -p | grep -i cuda || echo 'No CUDA libraries found'"
  register: cuda_libs_check
  changed_when: false
  tags: [vllm_install, vllm_gpu]

- name: Display CUDA libraries
  debug:
    msg: "{{ cuda_libs_check.stdout_lines }}"
  tags: [vllm_install, vllm_gpu]

- name: Verify PyTorch CUDA availability
  shell: |
    {{ vllm_venv_dir }}/bin/python -c "
    import torch
    import os
    print('PyTorch version:', torch.__version__)
    print('CUDA compiled version:', torch.version.cuda)
    print('LD_LIBRARY_PATH:', os.environ.get('LD_LIBRARY_PATH', 'not set'))
    try:
        is_available = torch.cuda.is_available()
        print('CUDA available:', is_available)
        device_count = torch.cuda.device_count()
        print('CUDA device count:', device_count)
        if is_available and device_count > 0:
            for i in range(device_count):
                print(f'GPU {i}: {torch.cuda.get_device_name(i)}')
    except Exception as e:
        print('Error initializing CUDA:', type(e).__name__, str(e))
    "
  register: pytorch_cuda_check
  become: true
  become_user: "{{ vllm_user }}"
  changed_when: false
  failed_when: false
  tags: [vllm_install, vllm_gpu]

- name: Display PyTorch CUDA status
  debug:
    msg: "{{ pytorch_cuda_check.stdout_lines }}"
  tags: [vllm_install, vllm_gpu]

- name: Warn if PyTorch cannot detect CUDA but devices are present
  debug:
    msg: "WARNING: PyTorch reports CUDA unavailable but GPU devices exist. This may be due to PyTorch/CUDA library mismatch. Continuing anyway - vLLM may still work."
  when: 
    - "'CUDA available: False' in pytorch_cuda_check.stdout"
    - "'CUDA device count: 0' not in pytorch_cuda_check.stdout"
  tags: [vllm_install, vllm_gpu]

- name: Install vLLM
  pip:
    name: "vllm{% if vllm_version != 'latest' %}=={{ vllm_version }}{% endif %}"
    virtualenv: "{{ vllm_venv_dir }}"
  become: true
  become_user: "{{ vllm_user }}"
  tags: [vllm_install]

- name: Install additional Python packages
  pip:
    name:
      - transformers
      - accelerate
      - huggingface_hub
      - fastapi
      - uvicorn
    virtualenv: "{{ vllm_venv_dir }}"
  become: true
  become_user: "{{ vllm_user }}"
  tags: [vllm_install]

- name: Verify vLLM installation
  shell: |
    {{ vllm_venv_dir }}/bin/python -c "import vllm; print('vLLM version:', vllm.__version__)"
  register: vllm_version_check
  become: true
  become_user: "{{ vllm_user }}"
  changed_when: false
  tags: [vllm_install]

- name: Display vLLM version
  debug:
    msg: "{{ vllm_version_check.stdout }}"
  tags: [vllm_install]

