---
# vLLM Installation Tasks
# Install Python, CUDA, PyTorch, and vLLM

- name: Update apt cache
  apt:
    update_cache: yes
    cache_valid_time: 3600
  tags: [vllm_install]

- name: Install system dependencies
  apt:
    name:
      - build-essential
      - python3-pip
      - python3-venv
      - python3-dev
      - git
      - curl
      - wget
      - ca-certificates
      - gnupg
      - software-properties-common
    state: present
  tags: [vllm_install]

- name: Check if NVIDIA GPU is available
  command: nvidia-smi
  register: nvidia_check
  failed_when: false
  changed_when: false
  tags: [vllm_install, vllm_gpu]

- name: Verify GPU is available
  fail:
    msg: "NVIDIA GPU not detected! vLLM requires GPU for optimal performance."
  when: nvidia_check.rc != 0
  tags: [vllm_install, vllm_gpu]

- name: Display GPU information
  debug:
    msg: "{{ nvidia_check.stdout_lines }}"
  when: nvidia_check.rc == 0
  tags: [vllm_install, vllm_gpu]

- name: Create vLLM system group
  group:
    name: "{{ vllm_group }}"
    system: yes
    state: present
  tags: [vllm_install]

- name: Create vLLM system user
  user:
    name: "{{ vllm_user }}"
    group: "{{ vllm_group }}"
    system: yes
    create_home: yes
    home: "{{ vllm_home }}"
    shell: /bin/bash
    comment: "vLLM Service User"
  tags: [vllm_install]

- name: Create vLLM directories
  file:
    path: "{{ item }}"
    state: directory
    owner: "{{ vllm_user }}"
    group: "{{ vllm_group }}"
    mode: '0755'
  loop:
    - "{{ vllm_install_dir }}"
    - "{{ vllm_home }}"
    - "{{ vllm_cache_dir }}"
    - "{{ vllm_download_dir }}"
  tags: [vllm_install]

- name: Create Python virtual environment
  command: "python3 -m venv {{ vllm_venv_dir }}"
  args:
    creates: "{{ vllm_venv_dir }}/bin/python"
  become: yes
  become_user: "{{ vllm_user }}"
  tags: [vllm_install]

- name: Upgrade pip in virtual environment
  pip:
    name:
      - pip
      - setuptools
      - wheel
    state: latest
    virtualenv: "{{ vllm_venv_dir }}"
  become: yes
  become_user: "{{ vllm_user }}"
  tags: [vllm_install]

- name: Install PyTorch with CUDA support
  pip:
    name:
      - torch
      - torchvision
      - torchaudio
    extra_args: "--index-url {{ vllm_pip_extra_index_url }}"
    virtualenv: "{{ vllm_venv_dir }}"
  become: yes
  become_user: "{{ vllm_user }}"
  tags: [vllm_install]

- name: Verify PyTorch CUDA availability
  shell: |
    source {{ vllm_venv_dir }}/bin/activate
    python -c "import torch; print('CUDA available:', torch.cuda.is_available()); print('CUDA version:', torch.version.cuda); print('GPU count:', torch.cuda.device_count())"
  register: pytorch_cuda_check
  become: yes
  become_user: "{{ vllm_user }}"
  changed_when: false
  tags: [vllm_install, vllm_gpu]

- name: Display PyTorch CUDA status
  debug:
    msg: "{{ pytorch_cuda_check.stdout_lines }}"
  tags: [vllm_install, vllm_gpu]

- name: Fail if PyTorch cannot detect CUDA
  fail:
    msg: "PyTorch cannot detect CUDA! Check GPU passthrough configuration."
  when: "'CUDA available: False' in pytorch_cuda_check.stdout"
  tags: [vllm_install, vllm_gpu]

- name: Install vLLM
  pip:
    name: "vllm{% if vllm_version != 'latest' %}=={{ vllm_version }}{% endif %}"
    virtualenv: "{{ vllm_venv_dir }}"
  become: yes
  become_user: "{{ vllm_user }}"
  tags: [vllm_install]

- name: Install additional Python packages
  pip:
    name:
      - transformers
      - accelerate
      - huggingface_hub
      - fastapi
      - uvicorn
    virtualenv: "{{ vllm_venv_dir }}"
  become: yes
  become_user: "{{ vllm_user }}"
  tags: [vllm_install]

- name: Verify vLLM installation
  shell: |
    source {{ vllm_venv_dir }}/bin/activate
    python -c "import vllm; print('vLLM version:', vllm.__version__)"
  register: vllm_version_check
  become: yes
  become_user: "{{ vllm_user }}"
  changed_when: false
  tags: [vllm_install]

- name: Display vLLM version
  debug:
    msg: "{{ vllm_version_check.stdout }}"
  tags: [vllm_install]

