---
# vLLM Configuration Tasks
# Configure systemd service and environment

- name: Deploy vLLM systemd service file
  template:
    src: vllm.service.j2
    dest: /etc/systemd/system/vllm.service
    owner: root
    group: root
    mode: '0644'
  notify:
    - reload systemd
    - restart vllm
  tags: [vllm_configure]

- name: Create vLLM environment file
  template:
    src: vllm.env.j2
    dest: /etc/default/vllm
    owner: root
    group: root
    mode: '0640'
  notify: restart vllm
  tags: [vllm_configure]

- name: Ensure systemd is reloaded
  systemd:
    daemon_reload: yes
  tags: [vllm_configure]

- name: Enable vLLM service
  systemd:
    name: vllm
    enabled: "{{ vllm_enable_service }}"
  when: vllm_enable_service
  tags: [vllm_configure]

- name: Start vLLM service
  systemd:
    name: vllm
    state: started
  when: vllm_start_service
  tags: [vllm_configure]

- name: Check vLLM service logs immediately
  command: journalctl -u vllm -n 50 --no-pager
  register: vllm_logs_initial
  changed_when: false
  tags: [vllm_configure]

- name: Display initial vLLM service logs
  debug:
    msg: "{{ vllm_logs_initial.stdout_lines }}"
  tags: [vllm_configure]

- name: Wait for vLLM service to be ready
  wait_for:
    host: "{{ vllm_host if vllm_host != '0.0.0.0' else 'localhost' }}"
    port: "{{ vllm_port }}"
    delay: 10
    timeout: 120
  when: vllm_start_service
  failed_when: false
  register: vllm_port_check
  tags: [vllm_configure]

- name: Get vLLM service logs if port check failed
  command: journalctl -u vllm -n 100 --no-pager
  register: vllm_logs
  when: 
    - vllm_start_service
    - vllm_port_check.failed is defined
    - vllm_port_check.failed
  changed_when: false
  tags: [vllm_configure]

- name: Display vLLM service logs if failed
  debug:
    msg: "{{ vllm_logs.stdout_lines }}"
  when: 
    - vllm_start_service
    - vllm_port_check.failed is defined
    - vllm_port_check.failed
  tags: [vllm_configure]

- name: Check vLLM service status
  systemd:
    name: vllm
  register: vllm_service_status
  tags: [vllm_configure]

- name: Display service status
  debug:
    msg: "vLLM service is {{ vllm_service_status.status.ActiveState }}"
  tags: [vllm_configure]

- name: Test vLLM health endpoint
  uri:
    url: "http://{{ vllm_host if vllm_host != '0.0.0.0' else 'localhost' }}:{{ vllm_port }}/health"
    method: GET
    status_code: 200
  register: vllm_health_test
  retries: 5
  delay: 10
  when: vllm_start_service
  tags: [vllm_configure, vllm_test]

- name: Display health check result
  debug:
    msg: "vLLM health check passed: {{ vllm_health_test.json if vllm_health_test.json is defined else 'OK' }}"
  when: vllm_health_test is defined and vllm_health_test.status == 200
  tags: [vllm_configure, vllm_test]

