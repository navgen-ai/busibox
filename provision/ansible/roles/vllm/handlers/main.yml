---
# vLLM Handlers

- name: reload systemd
  systemd:
    daemon_reload: yes

- name: restart vllm
  systemd:
    name: vllm
    state: restarted
  when: vllm_start_service | default(true)

- name: stop vllm
  systemd:
    name: vllm
    state: stopped

- name: start vllm
  systemd:
    name: vllm
    state: started

