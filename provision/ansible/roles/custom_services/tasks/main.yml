---
# Custom Services Container Provisioning
#
# Installs Docker CE + Compose plugin and prepares the container
# for hosting custom Docker Compose service stacks deployed by deploy-api.

- name: Install prerequisite packages
  apt:
    name:
      - ca-certificates
      - curl
      - gnupg
      - git
    state: present
    update_cache: true
  tags: [custom_services]

- name: Create Docker keyring directory
  file:
    path: /etc/apt/keyrings
    state: directory
    mode: '0755'
  tags: [custom_services]

- name: Add Docker GPG key
  shell: |
    curl -fsSL https://download.docker.com/linux/debian/gpg | gpg --dearmor -o /etc/apt/keyrings/docker.gpg
    chmod a+r /etc/apt/keyrings/docker.gpg
  args:
    creates: /etc/apt/keyrings/docker.gpg
  tags: [custom_services]

- name: Add Docker apt repository
  shell: |
    echo "deb [arch=$(dpkg --print-architecture) signed-by=/etc/apt/keyrings/docker.gpg] https://download.docker.com/linux/debian $(. /etc/os-release && echo $VERSION_CODENAME) stable" > /etc/apt/sources.list.d/docker.list
  args:
    creates: /etc/apt/sources.list.d/docker.list
  tags: [custom_services]

- name: Install Docker CE and Compose plugin
  apt:
    name:
      - docker-ce
      - docker-ce-cli
      - containerd.io
      - docker-buildx-plugin
      - docker-compose-plugin
    state: present
    update_cache: true
  tags: [custom_services]

- name: Enable and start Docker service
  systemd:
    name: docker
    enabled: true
    state: started
  tags: [custom_services]

- name: Create custom services base directory
  file:
    path: "{{ custom_services_base_dir }}"
    state: directory
    mode: '0755'
    owner: root
    group: root
  tags: [custom_services]

- name: Verify Docker is working
  command: docker info --format '{{ '{{' }}.ServerVersion{{ '}}' }}'
  register: docker_version
  changed_when: false
  tags: [custom_services]

- name: Report Docker version
  debug:
    msg: "Docker {{ docker_version.stdout }} installed on custom-services container"
  tags: [custom_services]
