---
# PostgreSQL Docker Deployment Tasks
#
# Deploys PostgreSQL via Docker Compose
# Used when deploy_target == 'docker'

- name: Start PostgreSQL container
  include_role:
    name: docker_common
    tasks_from: compose_up
  vars:
    docker_services_to_start:
      - postgres
    docker_wait_for_health: true

- name: Wait for PostgreSQL to be ready
  include_role:
    name: docker_common
    tasks_from: wait_healthy
  vars:
    docker_wait_service: postgres
    docker_wait_timeout: 60

# Create application user and ensure password is synced
# This handles both initial creation and password updates
- name: Create or update application user
  include_role:
    name: docker_common
    tasks_from: compose_exec
  vars:
    docker_exec_service: postgres
    docker_exec_command: >
      psql -U postgres -c "
        DO \$\$
        BEGIN
          IF NOT EXISTS (SELECT FROM pg_catalog.pg_roles WHERE rolname = '{{ postgres_user }}') THEN
            CREATE USER {{ postgres_user }} WITH PASSWORD '{{ postgres_password }}';
          ELSE
            ALTER USER {{ postgres_user }} WITH PASSWORD '{{ postgres_password }}';
          END IF;
        END
        \$\$;
      "

# Create all required databases for busibox services
# Each service needs its own database for isolation
# Using conditional CREATE DATABASE for idempotency
- name: Create all application databases
  include_role:
    name: docker_common
    tasks_from: compose_exec
  vars:
    docker_exec_service: postgres
    docker_exec_command: >
      sh -c "psql -U postgres -tc \"SELECT 1 FROM pg_database WHERE datname='{{ item }}'\" | grep -q 1 || psql -U postgres -c \"CREATE DATABASE {{ item }}\"; psql -U postgres -c \"GRANT ALL PRIVILEGES ON DATABASE {{ item }} TO {{ postgres_user }};\""
    docker_exec_fail_on_error: false
  loop: "{{ postgres_databases | default(['data', 'agent', 'authz', 'litellm']) }}"

# Grant schema permissions on public schema for each database
# PostgreSQL 15+ restricts public schema by default - non-superusers can't create objects
# We need to explicitly grant CREATE on schema public for each database
- name: Grant schema permissions for application user
  include_role:
    name: docker_common
    tasks_from: compose_exec
  vars:
    docker_exec_service: postgres
    docker_exec_command: >
      psql -U postgres -d {{ item }} -c "
        GRANT ALL ON SCHEMA public TO {{ postgres_user }};
        GRANT CREATE ON SCHEMA public TO {{ postgres_user }};
        ALTER DEFAULT PRIVILEGES IN SCHEMA public GRANT ALL ON TABLES TO {{ postgres_user }};
        ALTER DEFAULT PRIVILEGES IN SCHEMA public GRANT ALL ON SEQUENCES TO {{ postgres_user }};
      "
    docker_exec_fail_on_error: false
  loop: "{{ postgres_databases | default(['data', 'agent', 'authz', 'litellm']) }}"

- name: Display PostgreSQL status
  ansible.builtin.debug:
    msg: |
      PostgreSQL is running and ready for connections
      Databases created: {{ postgres_databases | default(['busibox', 'authz', 'data', 'agent', 'litellm']) | join(', ') }}
      User: {{ postgres_user }}
