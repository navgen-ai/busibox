---
# PostgreSQL Docker Deployment Tasks
#
# Deploys PostgreSQL via Docker Compose
# Used when deploy_target == 'docker'

- name: Start PostgreSQL container
  include_role:
    name: docker_common
    tasks_from: compose_up
  vars:
    docker_services_to_start:
      - postgres
    docker_wait_for_health: true

- name: Wait for PostgreSQL to be ready
  include_role:
    name: docker_common
    tasks_from: wait_healthy
  vars:
    docker_wait_service: postgres
    docker_wait_timeout: 60

- name: Check if databases need to be created
  include_role:
    name: docker_common
    tasks_from: compose_exec
  vars:
    docker_exec_service: postgres
    docker_exec_command: >
      psql -U postgres -tAc "SELECT 1 FROM pg_database WHERE datname='{{ postgres_db }}'"
    docker_exec_fail_on_error: false
  register: db_exists

- name: Create application database if not exists
  include_role:
    name: docker_common
    tasks_from: compose_exec
  vars:
    docker_exec_service: postgres
    docker_exec_command: >
      psql -U postgres -c "CREATE DATABASE {{ postgres_db }}"
  when: db_exists.exec_result.stdout | default('') | trim != '1'

- name: Create application user if not exists
  include_role:
    name: docker_common
    tasks_from: compose_exec
  vars:
    docker_exec_service: postgres
    docker_exec_command: >
      psql -U postgres -c "
        DO \$\$
        BEGIN
          IF NOT EXISTS (SELECT FROM pg_catalog.pg_roles WHERE rolname = '{{ postgres_user }}') THEN
            CREATE USER {{ postgres_user }} WITH PASSWORD '{{ postgres_password }}';
          END IF;
        END
        \$\$;
        GRANT ALL PRIVILEGES ON DATABASE {{ postgres_db }} TO {{ postgres_user }};
      "

- name: Display PostgreSQL status
  ansible.builtin.debug:
    msg: "PostgreSQL is running and ready for connections"
