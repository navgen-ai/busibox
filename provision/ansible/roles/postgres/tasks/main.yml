- name: Configure peer/md5 authentication for non-postgres users (after migrations)
  lineinfile:
    path: "/etc/postgresql/{{ pg_version.stdout }}/main/pg_hba.conf"
    regexp: "^local\\s+all\\s+all\\s+trust"
    line: "local   all             all                                     peer"
    insertafter: "^local\\s+all\\s+postgres"
  notify: Reload Postgres
