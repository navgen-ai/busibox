- name: Install Postgres and Python dependencies
  apt:
    name:
      - postgresql
      - postgresql-contrib
      - python3-psycopg2
      - locales
    state: present
    update_cache: yes

- name: Generate en_US.UTF-8 locale
  locale_gen:
    name: en_US.UTF-8
    state: present

- name: Ensure PostgreSQL is started
  systemd:
    name: postgresql
    state: started
    enabled: yes

- name: Get PostgreSQL version
  shell: |
    psql --version | awk '{print $3}' | cut -d'.' -f1
  register: pg_version
  changed_when: false
  check_mode: no  # Always run this task, even in check mode

- name: Verify PostgreSQL version detected
  debug:
    msg: "PostgreSQL version: {{ pg_version.stdout }}"

- name: Allow listen on all
  lineinfile:
    path: "/etc/postgresql/{{ pg_version.stdout }}/main/postgresql.conf"
    regexp: "^#?listen_addresses"
    line: "listen_addresses = '*'"
  notify: Restart Postgres

- name: Configure trust authentication for local setup
  lineinfile:
    path: "/etc/postgresql/{{ pg_version.stdout }}/main/pg_hba.conf"
    regexp: "^local\\s+all\\s+postgres"
    line: "local   all             postgres                                trust"
    insertbefore: "^# TYPE"
  notify: Reload Postgres

- name: Configure trust authentication for all local users
  lineinfile:
    path: "/etc/postgresql/{{ pg_version.stdout }}/main/pg_hba.conf"
    regexp: "^local\\s+all\\s+all"
    line: "local   all             all                                     trust"
    insertafter: "^local\\s+all\\s+postgres"
  notify: Reload Postgres

- name: pg_hba for network access
  blockinfile:
    path: "/etc/postgresql/{{ pg_version.stdout }}/main/pg_hba.conf"
    marker: "# {mark} ANSIBLE MANAGED BLOCK - Network Access"
    block: |
      host    all             all             10.96.200.0/21          md5
  notify: Reload Postgres

- name: Flush handlers to restart/reload PostgreSQL
  meta: flush_handlers

- name: Wait for PostgreSQL to be ready
  wait_for:
    port: 5432
    delay: 2
    timeout: 30

- name: Create busibox database user
  become_user: postgres
  postgresql_user:
    name: "{{ postgres_user }}"
    password: "{{ secrets.postgresql.password | default(postgres_password) | default('busibox_password_change_me') }}"
    role_attr_flags: "LOGIN,CREATEDB"
    state: present

- name: Create service-specific databases
  become_user: postgres
  postgresql_db:
    name: "{{ item }}"
    owner: "{{ postgres_user }}"
    encoding: UTF8
    lc_collate: en_US.UTF-8
    lc_ctype: en_US.UTF-8
    template: template0
    state: present
  loop:
    - data      # Data API database (files/documents/chunks)
    - agent     # Agent API database
    - authz     # AuthZ API database
  tags: [postgres]

# =============================================================================
# Pytest Database Infrastructure
# =============================================================================
# When enable_pytest_databases is enabled, create a separate test user with
# their own set of databases (same table names, different owner).
# 
# This provides complete isolation for automated tests while using identical
# table names so test code doesn't need to change.
#
# Architecture:
#   busibox_user     -> data, agent, authz (production/staging)
#   busibox_test_user -> test_data, test_agent, test_authz (pytest)

- name: Create pytest test user
  become_user: postgres
  postgresql_user:
    name: "busibox_test_user"
    password: "{{ pytest_db_password | default('testpassword') }}"
    role_attr_flags: "LOGIN,CREATEDB"
    state: present
  when: enable_pytest_databases | default(false)
  tags: [postgres, pytest_databases]

- name: Create pytest test databases
  become_user: postgres
  postgresql_db:
    name: "{{ item }}"
    owner: "busibox_test_user"
    encoding: UTF8
    lc_collate: en_US.UTF-8
    lc_ctype: en_US.UTF-8
    template: template0
    state: present
  loop:
    - test_data      # Test database for data API
    - test_agent     # Test database for agent API
    - test_authz     # Test database for authz API
  when: enable_pytest_databases | default(false)
  tags: [postgres, pytest_databases]

- name: Grant pytest database permissions
  become_user: postgres
  postgresql_query:
    db: "{{ item }}"
    query: |
      GRANT ALL ON SCHEMA public TO busibox_test_user;
      GRANT CREATE ON SCHEMA public TO busibox_test_user;
      ALTER DEFAULT PRIVILEGES IN SCHEMA public GRANT ALL ON TABLES TO busibox_test_user;
      ALTER DEFAULT PRIVILEGES IN SCHEMA public GRANT ALL ON SEQUENCES TO busibox_test_user;
  loop:
    - test_data
    - test_agent
    - test_authz
  when: enable_pytest_databases | default(false)
  failed_when: false
  tags: [postgres, pytest_databases]

- name: Enable required extensions in pytest databases
  become_user: postgres
  postgresql_query:
    db: "{{ item }}"
    query: |
      CREATE EXTENSION IF NOT EXISTS "uuid-ossp";
      CREATE EXTENSION IF NOT EXISTS "pgcrypto";
  loop:
    - test_agent
    - test_authz
    - test_data
  when: enable_pytest_databases | default(false)
  failed_when: false
  tags: [postgres, pytest_databases]

- name: Load secrets to determine which apps need databases
  include_vars:
    file: "{{ playbook_dir }}/roles/secrets/vars/vault.yml"
  no_log: true
  tags: [postgres, secrets]

- name: Debug - Show vault structure
  debug:
    msg: "Vault loaded. Top-level keys: {{ hostvars[inventory_hostname].keys() | select('match', '^(secrets|network_base|base_domain)') | list }}"
  tags: [postgres]

# Application-specific databases are created by their respective app deployment roles
# This ensures proper separation of concerns and avoids encoding issues

- name: Create migrations directory
  file:
    path: /var/lib/postgresql/migrations
    state: directory
    mode: "0755"
    owner: postgres
    group: postgres
  tags: [postgres]

- name: Copy migration files
  copy:
    src: "data/migrations/"
    dest: /var/lib/postgresql/migrations/
    mode: "0644"
    owner: postgres
    group: postgres
  tags: [postgres]

- name: Create migrations table in data database
  become_user: postgres
  postgresql_query:
    db: data
    query: |
      CREATE TABLE IF NOT EXISTS ansible_migrations (
        version INTEGER PRIMARY KEY,
        name VARCHAR(255) NOT NULL,
        applied_at TIMESTAMP NOT NULL DEFAULT CURRENT_TIMESTAMP
      );
  tags: [postgres]

- name: Check if data schema migration has been applied
  become_user: postgres
  postgresql_query:
    db: data
    query: "SELECT COUNT(*) as count FROM ansible_migrations WHERE version = 10"
  register: migration_check
  failed_when: false
  tags: [postgres]

- name: Debug migration check result
  debug:
    msg: "Migration check: {{ migration_check }}"
  tags: [postgres]

- name: Apply data schema to data database
  become_user: postgres
  command: psql -U postgres -d data -f /var/lib/postgresql/migrations/010_ingestion_schema.sql
  when: >
    (migration_check.query_result is not defined or 
    (migration_check.query_result | length == 0) or
    (migration_check.query_result[0].count | int == 0))
  register: data_migration_result
  tags: [postgres]

- name: Display migration result
  debug:
    msg: "Data schema migration: {{ 'applied' if data_migration_result.changed else 'already exists' }}"
  tags: [postgres]

- name: Grant ownership of all tables to postgres user (data database)
  become_user: postgres
  postgresql_query:
    db: data
    query: |
      -- Grant ownership of all tables in public schema
      DO $$
      DECLARE
        tbl RECORD;
      BEGIN
        FOR tbl IN SELECT tablename FROM pg_tables WHERE schemaname = 'public'
        LOOP
          EXECUTE 'ALTER TABLE public.' || quote_ident(tbl.tablename) || ' OWNER TO {{ postgres_user }}';
        END LOOP;
      END $$;
      
      -- Grant ownership of all sequences
      DO $$
      DECLARE
        seq RECORD;
      BEGIN
        FOR seq IN SELECT sequencename FROM pg_sequences WHERE schemaname = 'public'
        LOOP
          EXECUTE 'ALTER SEQUENCE public.' || quote_ident(seq.sequencename) || ' OWNER TO {{ postgres_user }}';
        END LOOP;
      END $$;
      
      -- Grant schema usage
      GRANT USAGE ON SCHEMA public TO {{ postgres_user }};
      GRANT CREATE ON SCHEMA public TO {{ postgres_user }};
      
      -- Grant all privileges on all tables
      GRANT ALL PRIVILEGES ON ALL TABLES IN SCHEMA public TO {{ postgres_user }};
      GRANT ALL PRIVILEGES ON ALL SEQUENCES IN SCHEMA public TO {{ postgres_user }};
      
      -- Set default privileges for future objects
      ALTER DEFAULT PRIVILEGES IN SCHEMA public GRANT ALL ON TABLES TO {{ postgres_user }};
      ALTER DEFAULT PRIVILEGES IN SCHEMA public GRANT ALL ON SEQUENCES TO {{ postgres_user }};
  tags: [postgres]

- name: Ensure ai_portal database exists with correct owner
  become_user: postgres
  postgresql_db:
    name: ai_portal
    owner: "{{ postgres_user }}"
    encoding: UTF8
    lc_collate: en_US.UTF-8
    lc_ctype: en_US.UTF-8
    template: template0
    state: present
  tags: [postgres]

- name: Fix ai_portal database permissions
  become_user: postgres
  postgresql_query:
    db: ai_portal
    query: |
      -- Grant ownership of database
      ALTER DATABASE ai_portal OWNER TO {{ postgres_user }};
      
      -- Grant ownership of all tables in public schema
      DO $$
      DECLARE
        tbl RECORD;
      BEGIN
        FOR tbl IN SELECT tablename FROM pg_tables WHERE schemaname = 'public'
        LOOP
          EXECUTE 'ALTER TABLE public.' || quote_ident(tbl.tablename) || ' OWNER TO {{ postgres_user }}';
        END LOOP;
      END $$;
      
      -- Grant ownership of all sequences
      DO $$
      DECLARE
        seq RECORD;
      BEGIN
        FOR seq IN SELECT sequencename FROM pg_sequences WHERE schemaname = 'public'
        LOOP
          EXECUTE 'ALTER SEQUENCE public.' || quote_ident(seq.sequencename) || ' OWNER TO {{ postgres_user }}';
        END LOOP;
      END $$;
      
      -- Grant schema usage
      GRANT USAGE ON SCHEMA public TO {{ postgres_user }};
      GRANT CREATE ON SCHEMA public TO {{ postgres_user }};
      
      -- Grant all privileges on all tables
      GRANT ALL PRIVILEGES ON ALL TABLES IN SCHEMA public TO {{ postgres_user }};
      GRANT ALL PRIVILEGES ON ALL SEQUENCES IN SCHEMA public TO {{ postgres_user }};
      
      -- Set default privileges for future objects
      ALTER DEFAULT PRIVILEGES IN SCHEMA public GRANT ALL ON TABLES TO {{ postgres_user }};
      ALTER DEFAULT PRIVILEGES IN SCHEMA public GRANT ALL ON SEQUENCES TO {{ postgres_user }};
  tags: [postgres]

- name: Apply database migrations (data database)
  become_user: postgres
  shell: |
    # Check if migration {{ item.version }} has been applied
    APPLIED=$(psql -U postgres -d data -t -c "SELECT COUNT(*) FROM ansible_migrations WHERE version = {{ item.version }}" 2>/dev/null || echo "0")
    
    if [ "$APPLIED" -eq "0" ]; then
      echo "Applying migration {{ item.version }}: {{ item.name }}"
      psql -U postgres -d data -f /var/lib/postgresql/migrations/{{ item.file }}
      if [ $? -eq 0 ]; then
        echo "Migration {{ item.version }} applied successfully"
      else
        echo "Migration {{ item.version }} failed"
        exit 1
      fi
    else
      echo "Migration {{ item.version }} already applied, skipping"
    fi
  loop:
    - { version: 1, name: "initial_schema", file: "001_initial_schema.sql" }
    - { version: 2, name: "add_rls_policies", file: "002_add_rls_policies.sql" }
    - { version: 3, name: "fix_schema_migrations", file: "003_fix_schema_migrations.sql" }
    - { version: 12, name: "config_table", file: "012_config_table.sql" }
  register: migration_result
  changed_when: "'applied successfully' in migration_result.stdout"

