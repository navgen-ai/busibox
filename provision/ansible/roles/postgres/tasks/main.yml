- name: Install Postgres and Python dependencies
  apt:
    name:
      - postgresql
      - postgresql-contrib
      - python3-psycopg2
      - locales
    state: present
    update_cache: yes

- name: Generate en_US.UTF-8 locale
  locale_gen:
    name: en_US.UTF-8
    state: present

- name: Ensure PostgreSQL is started
  systemd:
    name: postgresql
    state: started
    enabled: yes

- name: Get PostgreSQL version
  shell: |
    psql --version | awk '{print $3}' | cut -d'.' -f1
  register: pg_version
  changed_when: false
  check_mode: no  # Always run this task, even in check mode

- name: Verify PostgreSQL version detected
  debug:
    msg: "PostgreSQL version: {{ pg_version.stdout }}"

- name: Allow listen on all
  lineinfile:
    path: "/etc/postgresql/{{ pg_version.stdout }}/main/postgresql.conf"
    regexp: "^#?listen_addresses"
    line: "listen_addresses = '*'"
  notify: Restart Postgres

- name: Configure trust authentication for local setup
  lineinfile:
    path: "/etc/postgresql/{{ pg_version.stdout }}/main/pg_hba.conf"
    regexp: "^local\\s+all\\s+postgres"
    line: "local   all             postgres                                trust"
    insertbefore: "^# TYPE"
  notify: Reload Postgres

- name: Configure trust authentication for all local users
  lineinfile:
    path: "/etc/postgresql/{{ pg_version.stdout }}/main/pg_hba.conf"
    regexp: "^local\\s+all\\s+all"
    line: "local   all             all                                     trust"
    insertafter: "^local\\s+all\\s+postgres"
  notify: Reload Postgres

- name: pg_hba for network access
  blockinfile:
    path: "/etc/postgresql/{{ pg_version.stdout }}/main/pg_hba.conf"
    marker: "# {mark} ANSIBLE MANAGED BLOCK - Network Access"
    block: |
      host    all             all             10.96.200.0/21          md5
  notify: Reload Postgres

- name: Flush handlers to restart/reload PostgreSQL
  meta: flush_handlers

- name: Wait for PostgreSQL to be ready
  wait_for:
    port: 5432
    delay: 2
    timeout: 30

- name: Create busibox database user
  become_user: postgres
  postgresql_user:
    name: "{{ postgres_user }}"
    password: "{{ postgres_password | default('busibox_password_change_me') }}"
    role_attr_flags: "LOGIN,CREATEDB"
    state: present

- name: Create busibox database
  become_user: postgres
  postgresql_db:
    name: "{{ postgres_db }}"
    owner: "{{ postgres_user }}"
    encoding: UTF8
    lc_collate: en_US.UTF-8
    lc_ctype: en_US.UTF-8
    template: template0

- name: Load secrets to determine which apps need databases
  include_vars:
    file: "{{ playbook_dir }}/roles/secrets/vars/vault.yml"
  no_log: true
  tags: [postgres, secrets]

- name: Debug - Show vault structure
  debug:
    msg: "Vault loaded. Top-level keys: {{ hostvars[inventory_hostname].keys() | select('match', '^(secrets|network_base|base_domain)') | list }}"
  tags: [postgres]

- name: Debug - Show secrets keys
  debug:
    msg: "Secrets keys available: {{ secrets.keys() | list }}"
  when: secrets is defined
  tags: [postgres]

- name: Build list of application databases from secrets
  set_fact:
    app_databases: []
  tags: [postgres]

- name: Debug - Check each secret entry
  debug:
    msg: "Checking {{ item.key }}: is_mapping={{ item.value is mapping }}, has_database_url={{ (item.value is mapping) and (item.value.database_url is defined) }}"
  loop: "{{ secrets | dict2items }}"
  loop_control:
    label: "{{ item.key }}"
  when: secrets is defined
  tags: [postgres]

- name: Find apps with database_url in secrets
  set_fact:
    app_databases: "{{ app_databases + [item.key | replace('-', '_')] }}"
  loop: "{{ secrets | dict2items }}"
  loop_control:
    label: "{{ item.key }}"
  when: 
    - secrets is defined
    - item.value is mapping
    - item.value.database_url is defined
  tags: [postgres]

- name: Display databases to be created
  debug:
    msg: "Will create databases: {{ app_databases | default([]) }}"
  tags: [postgres]

- name: Create application-specific databases
  become_user: postgres
  postgresql_db:
    name: "{{ item }}"
    owner: "{{ postgres_user }}"
    encoding: UTF8
    lc_collate: en_US.UTF-8
    lc_ctype: en_US.UTF-8
    template: template0
  loop: "{{ app_databases | default([]) }}"
  when: app_databases is defined and app_databases | length > 0
  tags: [postgres]

- name: Create migrations table in files database
  become_user: postgres
  postgresql_query:
    db: files
    query: |
      CREATE TABLE IF NOT EXISTS ansible_migrations (
        version INTEGER PRIMARY KEY,
        name VARCHAR(255) NOT NULL,
        applied_at TIMESTAMP NOT NULL DEFAULT CURRENT_TIMESTAMP
      );
  when: "'files' in (app_databases | default([]))"

- name: Check if ingestion schema migration has been applied
  become_user: postgres
  postgresql_query:
    db: files
    query: "SELECT COUNT(*) as count FROM ansible_migrations WHERE version = 10"
  register: migration_check
  failed_when: false
  when: "'files' in (app_databases | default([]))"

- name: Debug migration check result
  debug:
    msg: "Migration check: {{ migration_check }}"
  when: "'files' in (app_databases | default([]))"

- name: Apply ingestion schema to files database
  become_user: postgres
  command: psql -U postgres -d files -f /var/lib/postgresql/migrations/010_ingestion_schema.sql
  when: >
    'files' in (app_databases | default([])) and
    (migration_check.query_result is not defined or 
    (migration_check.query_result | length == 0) or
    (migration_check.query_result[0].count | int == 0))
  register: files_migration_result

- name: Display migration result
  debug:
    msg: "Ingestion schema migration: {{ 'applied' if files_migration_result.changed else 'already exists' }}"
  when: "'files' in (app_databases | default([]))"

- name: Grant ownership of all tables to postgres user (files database)
  become_user: postgres
  postgresql_query:
    db: files
    query: |
      -- Grant ownership of all tables in public schema
      DO $$
      DECLARE
        tbl RECORD;
      BEGIN
        FOR tbl IN SELECT tablename FROM pg_tables WHERE schemaname = 'public'
        LOOP
          EXECUTE 'ALTER TABLE public.' || quote_ident(tbl.tablename) || ' OWNER TO {{ postgres_user }}';
        END LOOP;
      END $$;
      
      -- Grant ownership of all sequences
      DO $$
      DECLARE
        seq RECORD;
      BEGIN
        FOR seq IN SELECT sequencename FROM pg_sequences WHERE schemaname = 'public'
        LOOP
          EXECUTE 'ALTER SEQUENCE public.' || quote_ident(seq.sequencename) || ' OWNER TO {{ postgres_user }}';
        END LOOP;
      END $$;
      
      -- Grant schema usage
      GRANT USAGE ON SCHEMA public TO {{ postgres_user }};
      GRANT CREATE ON SCHEMA public TO {{ postgres_user }};
      
      -- Grant all privileges on all tables
      GRANT ALL PRIVILEGES ON ALL TABLES IN SCHEMA public TO {{ postgres_user }};
      GRANT ALL PRIVILEGES ON ALL SEQUENCES IN SCHEMA public TO {{ postgres_user }};
      
      -- Set default privileges for future objects
      ALTER DEFAULT PRIVILEGES IN SCHEMA public GRANT ALL ON TABLES TO {{ postgres_user }};
      ALTER DEFAULT PRIVILEGES IN SCHEMA public GRANT ALL ON SEQUENCES TO {{ postgres_user }};
  when: "'files' in (app_databases | default([]))"

- name: Create migrations directory
  file:
    path: /var/lib/postgresql/migrations
    state: directory
    mode: "0755"
    owner: postgres
    group: postgres

- name: Copy migration files
  copy:
    src: "files/migrations/"
    dest: /var/lib/postgresql/migrations/
    mode: "0644"
    owner: postgres
    group: postgres

- name: Apply database migrations (main database)
  become_user: postgres
  shell: |
    # Check if migration {{ item.version }} has been applied
    APPLIED=$(psql -U postgres -d {{ postgres_db }} -t -c "SELECT COUNT(*) FROM ansible_migrations WHERE version = {{ item.version }}" 2>/dev/null || echo "0")
    
    if [ "$APPLIED" -eq "0" ]; then
      echo "Applying migration {{ item.version }}: {{ item.name }}"
      psql -U postgres -d {{ postgres_db }} -f /var/lib/postgresql/migrations/{{ item.file }}
      if [ $? -eq 0 ]; then
        echo "Migration {{ item.version }} applied successfully"
      else
        echo "Migration {{ item.version }} failed"
        exit 1
      fi
    else
      echo "Migration {{ item.version }} already applied, skipping"
    fi
  loop:
    - { version: 1, name: "initial_schema", file: "001_initial_schema.sql" }
    - { version: 2, name: "add_rls_policies", file: "002_add_rls_policies.sql" }
    - { version: 3, name: "fix_schema_migrations", file: "003_fix_schema_migrations.sql" }
  register: migration_result
  changed_when: "'applied successfully' in migration_result.stdout"

- name: Grant ownership of all tables to application user (main database)
  become_user: postgres
  postgresql_query:
    db: "{{ postgres_db }}"
    query: |
      -- Grant ownership of all tables in public schema
      DO $$
      DECLARE
        tbl RECORD;
      BEGIN
        FOR tbl IN SELECT tablename FROM pg_tables WHERE schemaname = 'public'
        LOOP
          EXECUTE 'ALTER TABLE public.' || quote_ident(tbl.tablename) || ' OWNER TO {{ postgres_user }}';
        END LOOP;
      END $$;
      
      -- Grant ownership of all sequences
      DO $$
      DECLARE
        seq RECORD;
      BEGIN
        FOR seq IN SELECT sequencename FROM pg_sequences WHERE schemaname = 'public'
        LOOP
          EXECUTE 'ALTER SEQUENCE public.' || quote_ident(seq.sequencename) || ' OWNER TO {{ postgres_user }}';
        END LOOP;
      END $$;
      
      -- Grant schema usage
      GRANT USAGE ON SCHEMA public TO {{ postgres_user }};
      GRANT CREATE ON SCHEMA public TO {{ postgres_user }};
      
      -- Grant all privileges on all tables
      GRANT ALL PRIVILEGES ON ALL TABLES IN SCHEMA public TO {{ postgres_user }};
      GRANT ALL PRIVILEGES ON ALL SEQUENCES IN SCHEMA public TO {{ postgres_user }};
      
      -- Set default privileges for future objects
      ALTER DEFAULT PRIVILEGES IN SCHEMA public GRANT ALL ON TABLES TO {{ postgres_user }};
      ALTER DEFAULT PRIVILEGES IN SCHEMA public GRANT ALL ON SEQUENCES TO {{ postgres_user }};

- name: Grant ownership of all tables to postgres user (files database)
  become_user: postgres
  postgresql_query:
    db: "{{ files_db | default('files') }}"
    query: |
      -- Grant ownership of all tables in public schema
      DO $$
      DECLARE
        tbl RECORD;
      BEGIN
        FOR tbl IN SELECT tablename FROM pg_tables WHERE schemaname = 'public'
        LOOP
          EXECUTE 'ALTER TABLE public.' || quote_ident(tbl.tablename) || ' OWNER TO {{ postgres_user }}';
        END LOOP;
      END $$;
      
      -- Grant ownership of all sequences
      DO $$
      DECLARE
        seq RECORD;
      BEGIN
        FOR seq IN SELECT sequencename FROM pg_sequences WHERE schemaname = 'public'
        LOOP
          EXECUTE 'ALTER SEQUENCE public.' || quote_ident(seq.sequencename) || ' OWNER TO {{ postgres_user }}';
        END LOOP;
      END $$;
      
      -- Grant schema usage
      GRANT USAGE ON SCHEMA public TO {{ postgres_user }};
      GRANT CREATE ON SCHEMA public TO {{ postgres_user }};
      
      -- Grant all privileges on all tables
      GRANT ALL PRIVILEGES ON ALL TABLES IN SCHEMA public TO {{ postgres_user }};
      GRANT ALL PRIVILEGES ON ALL SEQUENCES IN SCHEMA public TO {{ postgres_user }};
      
      -- Set default privileges for future objects
      ALTER DEFAULT PRIVILEGES IN SCHEMA public GRANT ALL ON TABLES TO {{ postgres_user }};
      ALTER DEFAULT PRIVILEGES IN SCHEMA public GRANT ALL ON SEQUENCES TO {{ postgres_user }};

- name: Configure peer/md5 authentication for non-postgres users (after migrations)
  lineinfile:
    path: "/etc/postgresql/{{ pg_version.stdout }}/main/pg_hba.conf"
    regexp: "^local\\s+all\\s+all\\s+trust"
    line: "local   all             all                                     peer"
    insertafter: "^local\\s+all\\s+postgres"
  notify: Reload Postgres
