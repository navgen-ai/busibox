---
# vLLM Docker Deployment Tasks
#
# Reads model_config.yml to find the first assigned vLLM model,
# sets compose environment variables, and starts the vLLM container.
# Only runs when LLM_BACKEND=vllm.

- name: Check if model_config.yml exists
  ansible.builtin.stat:
    path: "{{ playbook_dir }}/group_vars/all/model_config.yml"
  register: _vllm_model_config
  delegate_to: localhost

- name: Skip vLLM - no model_config.yml
  ansible.builtin.debug:
    msg: |
      WARNING: model_config.yml not found — vLLM container will not be started.
      Run the installer with LLM_BACKEND=vllm to generate model configuration.
  when: not _vllm_model_config.stat.exists

- name: Read primary vLLM model from model_config.yml
  ansible.builtin.shell: |
    python3 -c "
    import yaml, sys, json
    with open(sys.argv[1]) as f:
        data = yaml.safe_load(f) or {}
    models = data.get('models', {}) or {}
    best = None
    for key, cfg in models.items():
        if cfg.get('provider', '').lower() != 'vllm':
            continue
        if not cfg.get('assigned'):
            continue
        port = cfg.get('port', 9999)
        if best is None or port < best.get('port', 9999):
            best = dict(cfg)
            best['_key'] = key
    if best is None:
        print(json.dumps({}))
    else:
        print(json.dumps(best))
    " "{{ playbook_dir }}/group_vars/all/model_config.yml"
  register: _vllm_model_json
  delegate_to: localhost
  changed_when: false
  when: _vllm_model_config.stat.exists

- name: Parse vLLM model config
  ansible.builtin.set_fact:
    _vllm_model: "{{ _vllm_model_json.stdout | from_json }}"
  when: _vllm_model_config.stat.exists and _vllm_model_json.stdout | default('{}') != '{}'

- name: Skip vLLM - no assigned models
  ansible.builtin.debug:
    msg: "WARNING: No assigned vLLM models found in model_config.yml — vLLM container will not be started."
  when: _vllm_model is not defined or _vllm_model | length == 0

- name: Display vLLM model configuration
  ansible.builtin.debug:
    msg: |
      vLLM Docker Configuration:
        Model: {{ _vllm_model.model_name | default('unknown') }}
        Served as: {{ _vllm_model.served_model_name | default('(auto)') }}
        GPU: {{ _vllm_model.gpu | default('all') }}
        Port: {{ _vllm_model.port | default(8000) }}
        Tensor Parallel: {{ _vllm_model.tensor_parallel | default(1) }}
        GPU Memory Util: {{ _vllm_model.gpu_memory_utilization | default(0.9) }}
        Max Model Len: {{ _vllm_model.max_model_len | default(8192) }}
  when: _vllm_model is defined and _vllm_model | length > 0

- name: Set vLLM compose variables
  ansible.builtin.set_fact:
    _vllm_compose_dir: "{{ playbook_dir }}/../.."
    _vllm_prefix: "{{ container_prefix | default('dev') }}"
  when: _vllm_model is defined and _vllm_model | length > 0

- name: Check for env file
  ansible.builtin.stat:
    path: "{{ _vllm_compose_dir }}/.env.{{ _vllm_prefix }}"
  register: _vllm_env_file
  when: _vllm_model is defined and _vllm_model | length > 0

- name: Stop and remove any container using vLLM port
  ansible.builtin.shell: |
    target_port="{{ _vllm_model.port | default(8000) }}"
    # Remove the expected container name first
    docker rm -f {{ _vllm_prefix }}-vllm 2>/dev/null || true
    # Also check for any other container binding to the target port
    blocking=$(docker ps -q --filter "publish=${target_port}" 2>/dev/null)
    if [ -n "$blocking" ]; then
      echo "Stopping container(s) blocking port ${target_port}: $blocking"
      docker rm -f $blocking 2>/dev/null || true
    fi
  changed_when: false
  when: _vllm_model is defined and _vllm_model | length > 0

- name: Start vLLM container
  ansible.builtin.shell: |
    cd {{ _vllm_compose_dir }}
    docker compose \
      -f docker-compose.yml -f docker-compose.local-dev.yml \
      {{ '--env-file .env.' ~ _vllm_prefix if _vllm_env_file.stat.exists else '' }} \
      --profile vllm \
      up -d --no-deps --force-recreate vllm 2>&1
  args:
    chdir: "{{ _vllm_compose_dir }}"
  environment:
    COMPOSE_PROJECT_NAME: "{{ _vllm_prefix }}-busibox"
    CONTAINER_PREFIX: "{{ _vllm_prefix }}"
    BUSIBOX_HOST_PATH: "{{ _vllm_compose_dir }}"
    BUSIBOX_REPO_ROOT: "{{ _vllm_compose_dir }}"
    LLM_BACKEND: "vllm"
    HF_HOST_CACHE: "{{ lookup('env', 'HF_HOST_CACHE') | default(_vllm_compose_dir | dirname ~ '/.cache/huggingface', true) }}"
    HF_TOKEN: "{{ lookup('env', 'HF_TOKEN') | default('', true) }}"
    HF_HUB_OFFLINE: "{{ lookup('env', 'HF_HUB_OFFLINE') | default('1', true) }}"
    # Vault secrets required by docker compose even for unrelated services
    POSTGRES_PASSWORD: "{{ busibox_secrets.POSTGRES_PASSWORD }}"
    MINIO_ROOT_USER: "{{ busibox_secrets.MINIO_ROOT_USER }}"
    MINIO_ROOT_PASSWORD: "{{ busibox_secrets.MINIO_ROOT_PASSWORD }}"
    MINIO_ACCESS_KEY: "{{ busibox_secrets.MINIO_ROOT_USER }}"
    MINIO_SECRET_KEY: "{{ busibox_secrets.MINIO_ROOT_PASSWORD }}"
    SSO_JWT_SECRET: "{{ busibox_secrets.SSO_JWT_SECRET }}"
    AUTHZ_MASTER_KEY: "{{ busibox_secrets.AUTHZ_MASTER_KEY }}"
    LITELLM_API_KEY: "{{ busibox_secrets.LITELLM_MASTER_KEY }}"
    LITELLM_MASTER_KEY: "{{ busibox_secrets.LITELLM_MASTER_KEY }}"
    LITELLM_SALT_KEY: "{{ busibox_secrets.LITELLM_SALT_KEY }}"
    NEO4J_PASSWORD: "{{ busibox_secrets.NEO4J_PASSWORD }}"
    CONFIG_ENCRYPTION_KEY: "{{ busibox_secrets.CONFIG_ENCRYPTION_KEY }}"
    GITHUB_AUTH_TOKEN: "{{ busibox_secrets.GITHUB_AUTH_TOKEN }}"
    ADMIN_EMAIL: "{{ busibox_secrets.ADMIN_EMAILS }}"
    ALLOWED_EMAIL_DOMAINS: "{{ busibox_secrets.ALLOWED_EMAIL_DOMAINS }}"
    # vLLM-specific config
    VLLM_MODEL: "{{ _vllm_model.model_name }}"
    VLLM_SERVED_MODEL_NAME: "{{ _vllm_model.served_model_name | default('') }}"
    VLLM_MAX_MODEL_LEN: "{{ _vllm_model.max_model_len | default(8192) | string }}"
    VLLM_GPU_MEMORY_UTILIZATION: "{{ _vllm_model.gpu_memory_utilization | default(0.9) | string }}"
    VLLM_TENSOR_PARALLEL_SIZE: "{{ _vllm_model.tensor_parallel | default(1) | string }}"
    VLLM_QUANTIZATION: "{{ _vllm_model.quantization | default('') }}"
    VLLM_TOOL_CALL_PARSER: "{{ _vllm_model.tool_call_parser | default('') }}"
    VLLM_TOOL_CHAT_TEMPLATE: "{{ _vllm_model.tool_chat_template | default('') }}"
    VLLM_MAX_NUM_SEQS: "{{ _vllm_model.max_num_seqs | default(32) | string }}"
    VLLM_CPU_OFFLOAD_GB: "{{ _vllm_model.cpu_offload_gb | default(0) | string }}"
    VLLM_CUDA_VISIBLE_DEVICES: "{{ _vllm_model.gpu | default('') }}"
    VLLM_PORT: "{{ _vllm_model.port | default(8000) | string }}"
    VLLM_HOST_PORT: "{{ _vllm_model.port | default(8000) | string }}"
  register: _vllm_up_result
  changed_when: true
  when: _vllm_model is defined and _vllm_model | length > 0

- name: Show vLLM compose output
  ansible.builtin.debug:
    msg: "{{ _vllm_up_result.stdout_lines | default([]) + _vllm_up_result.stderr_lines | default([]) }}"
  when: _vllm_up_result is defined and _vllm_up_result is not skipped

- name: Display vLLM startup info
  ansible.builtin.debug:
    msg: |
      vLLM container started. Health polling handled by the CLI.
      Model: {{ _vllm_model.model_name | default('unknown') }}
      Container endpoint: http://vllm:{{ _vllm_model.port | default(8000) }}/v1
      Host endpoint: http://localhost:{{ _vllm_model.port | default(8000) }}/v1
      Check logs: docker logs {{ _vllm_prefix }}-vllm
  when: _vllm_model is defined and _vllm_model | length > 0
