---
# NGINX Role - Main Tasks
# Purpose: Install and configure NGINX reverse proxy with SSL
# Requirements: FR-012, FR-013, FR-016, FR-017 (reverse proxy, SSL, HTTP redirect, graceful reload)

- name: Load secrets
  include_vars:
    file: "{{ playbook_dir }}/roles/secrets/vars/vault.{{ deployment_environment | default('dev') }}.yml"
  no_log: true

- name: Validate full_domain for non-docker environments
  assert:
    that:
      - full_domain is defined
      - (full_domain | trim | length) > 0
      - full_domain != "localhost"
    fail_msg: >-
      full_domain is '{{ full_domain | default('') }}', which is invalid for staging/production.
      Set site_domain in your environment vault (vault.staging.yml / vault.prod.yml)
      or set SITE_DOMAIN before running make.
  when: deployment_environment is defined and deployment_environment in ['staging', 'prod', 'production']
  tags: [nginx, nginx_configure, nginx_ssl, apps]

- name: Install NGINX
  apt:
    name:
      - nginx
      - ssl-cert
    state: present
    update_cache: yes
  tags: [nginx, nginx_install]

- name: Ensure NGINX is enabled and started
  systemd:
    name: nginx
    enabled: yes
    state: started
  tags: [nginx, nginx_install, nginx_start]

- name: Create NGINX configuration directories
  file:
    path: "{{ item }}"
    state: directory
    mode: "0755"
    owner: root
    group: root
  loop:
    - /etc/nginx/sites-available
    - /etc/nginx/sites-enabled
    - /etc/nginx/snippets
    - /etc/nginx/app-locations
  tags: [nginx, nginx_install, nginx_configure]

- name: Setup SSL certificates (discover from ssl/ or generate self-signed)
  include_tasks:
    file: ssl-certificates.yml
    apply:
      tags: [nginx, nginx_configure, nginx_ssl, apps]
  tags: [nginx, nginx_configure, nginx_ssl, apps]

- name: Deploy main NGINX configuration
  template:
    src: nginx.conf.j2
    dest: /etc/nginx/nginx.conf
    mode: "0644"
    owner: root
    group: root
  notify: Reload NGINX
  tags: [nginx, nginx_configure]

- name: Deploy HTTP to HTTPS redirect configuration
  template:
    src: redirect-https.conf.j2
    dest: /etc/nginx/sites-available/redirect-to-https.conf
    mode: "0644"
    owner: root
    group: root
  notify: Reload NGINX
  tags: [nginx, nginx_configure]

- name: Enable HTTP to HTTPS redirect
  file:
    src: /etc/nginx/sites-available/redirect-to-https.conf
    dest: /etc/nginx/sites-enabled/redirect-to-https.conf
    state: link
  notify: Reload NGINX
  tags: [nginx, nginx_configure]

- name: Deploy custom error pages to /usr/share/nginx/html
  copy:
    src: "errors/{{ item }}"
    dest: "/usr/share/nginx/html/{{ item }}"
    mode: "0644"
    owner: root
    group: root
  loop:
    - 50x.html
    - 404.html
  tags: [nginx, nginx_install, nginx_configure]

- name: Deploy placeholder HTML pages
  include_tasks:
    file: placeholders.yml
    apply:
      tags: [nginx, nginx_configure, placeholders]
  tags: [nginx, nginx_configure, placeholders]

- name: Configure NGINX with placeholders (if placeholder_mode enabled)
  include_tasks:
    file: configure-placeholders.yml
    apply:
      tags: [nginx, nginx_configure, placeholders]
  when: placeholder_mode is defined and placeholder_mode | bool
  tags: [nginx, nginx_configure, placeholders]

- name: Configure NGINX with application routing (normal mode)
  include_tasks:
    file: configure.yml
    apply:
      tags: [nginx, nginx_configure, apps]
  when: 
    - placeholder_mode is not defined or not placeholder_mode | bool
    - applications is defined 
    - applications | length > 0
  tags: [nginx, nginx_configure, apps]

- name: Test NGINX configuration
  command: nginx -t
  changed_when: false
  register: nginx_test
  tags: [nginx, nginx_configure, nginx_test]

- name: Display NGINX configuration test result
  debug:
    msg: "{{ nginx_test.stderr_lines }}"
  tags: [nginx, nginx_configure, nginx_test]

- name: Display NGINX configuration summary
  debug:
    msg: |
      NGINX configuration complete
      - SSL Mode: {{ ssl_mode_used | default('auto-discovered') }}
      - Applications configured: {{ applications | selectattr('routes', 'defined') | selectattr('routes', 'ne', []) | list | length }}
      - HTTP to HTTPS redirect: enabled
      
      Next steps:
      1. Access applications via HTTPS
      2. Monitor NGINX logs: journalctl -u nginx -f
  tags: [nginx, nginx_configure]

