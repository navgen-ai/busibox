---
# Provisioned SSL Certificate Tasks
# Purpose: Deploy pre-existing SSL certificates from secrets vault
# Requirements: FR-013a (provisioned certificate mode)

- name: Create SSL certificates directory
  file:
    path: /etc/ssl/busibox
    state: directory
    mode: "0755"
    owner: root
    group: root

- name: Check if provisioned certificates exist in vault
  assert:
    that:
      - secrets.ssl_certificates is defined
      - secrets.ssl_certificates.certificate is defined
      - secrets.ssl_certificates.private_key is defined
      - secrets.ssl_certificates.chain is defined or true
    fail_msg: |
      ❌ Provisioned SSL mode selected but certificates not found in vault.yml
      
      Please add to provision/ansible/roles/secrets/vars/vault.yml:
      
      secrets:
        ssl_certificates:
          certificate: |
            -----BEGIN CERTIFICATE-----
            ...certificate content...
            -----END CERTIFICATE-----
          private_key: |
            -----BEGIN PRIVATE KEY-----
            ...private key content...
            -----END PRIVATE KEY-----
          chain: |
            -----BEGIN CERTIFICATE-----
            ...intermediate certificate chain...
            -----END CERTIFICATE-----
      
      Then encrypt: ansible-vault encrypt provision/ansible/roles/secrets/vars/vault.yml
  no_log: true

- name: Determine certificate domain name
  set_fact:
    cert_domain: "{{ full_domain | default(domain) }}"

- name: Deploy and format SSL certificate
  shell: |
    # Deploy certificate content and reformat in one step
    cat > "/etc/ssl/busibox/{{ cert_domain }}.crt" << 'CERTEOF'
    {{ secrets.ssl_certificates.certificate }}
    CERTEOF
    
    # Reformat: extract base64, remove all spaces, split into 64-char lines
    sed -i.bak '
      # Put BEGIN and END markers on separate lines if they run together
      s/-----END CERTIFICATE-----/\n-----END CERTIFICATE-----/g
      s/-----BEGIN CERTIFICATE-----/-----BEGIN CERTIFICATE-----\n/g
    ' "/etc/ssl/busibox/{{ cert_domain }}.crt"
    
    # Extract just the base64 content between markers
    awk '
      BEGIN { in_cert=0 }
      /-----BEGIN CERTIFICATE-----/ {
        print
        in_cert=1
        buf=""
        next
      }
      /-----END CERTIFICATE-----/ {
        # Output buffered base64 in 64-char lines
        gsub(/[[:space:]]/, "", buf)
        for (i=1; i<=length(buf); i+=64) {
          print substr(buf, i, 64)
        }
        print
        in_cert=0
        buf=""
        next
      }
      in_cert {
        # Accumulate all base64 content, stripping whitespace
        gsub(/[[:space:]]/, "")
        buf = buf $0
      }
    ' "/etc/ssl/busibox/{{ cert_domain }}.crt.bak" > "/etc/ssl/busibox/{{ cert_domain }}.crt"
    
    rm -f "/etc/ssl/busibox/{{ cert_domain }}.crt.bak"
  no_log: true

- name: Deploy SSL private key
  copy:
    content: "{{ secrets.ssl_certificates.private_key }}"
    dest: "/etc/ssl/busibox/{{ cert_domain }}.key"
    mode: "0600"
    owner: root
    group: root
  no_log: true

- name: Deploy and format SSL certificate chain
  shell: |
    # Deploy chain content
    cat > "/etc/ssl/busibox/{{ cert_domain }}-chain.crt" << 'CHAINEOF'
    {{ secrets.ssl_certificates.chain }}
    CHAINEOF
    
    # First, ensure BEGIN/END markers are on separate lines
    sed -i.bak '
      s/-----END CERTIFICATE-----/\n-----END CERTIFICATE-----\n/g
      s/-----BEGIN CERTIFICATE-----/-----BEGIN CERTIFICATE-----\n/g
    ' "/etc/ssl/busibox/{{ cert_domain }}-chain.crt"
    
    # Process each certificate in the chain
    awk '
      BEGIN { in_cert=0; buf="" }
      /-----BEGIN CERTIFICATE-----/ {
        print
        in_cert=1
        buf=""
        next
      }
      /-----END CERTIFICATE-----/ {
        # Output accumulated base64 in 64-char lines
        gsub(/[[:space:]]/, "", buf)
        if (length(buf) > 0) {
          for (i=1; i<=length(buf); i+=64) {
            print substr(buf, i, 64)
          }
        }
        print
        in_cert=0
        buf=""
        next
      }
      in_cert {
        # Strip whitespace and accumulate
        gsub(/[[:space:]]/, "")
        buf = buf $0
      }
    ' "/etc/ssl/busibox/{{ cert_domain }}-chain.crt.bak" > "/etc/ssl/busibox/{{ cert_domain }}-chain.crt"
    
    rm -f "/etc/ssl/busibox/{{ cert_domain }}-chain.crt.bak"
  when: 
    - secrets.ssl_certificates.chain is defined
    - secrets.ssl_certificates.chain | length > 0
  no_log: true

- name: Check if chain file exists and has content
  stat:
    path: "/etc/ssl/busibox/{{ cert_domain }}-chain.crt"
  register: chain_file_stat

- name: Create fullchain certificate (certificate + chain)
  shell: |
    cat /etc/ssl/busibox/{{ cert_domain }}.crt /etc/ssl/busibox/{{ cert_domain }}-chain.crt > /etc/ssl/busibox/{{ cert_domain }}-fullchain.crt
  when: 
    - chain_file_stat.stat.exists
    - chain_file_stat.stat.size > 0

- name: Set SSL certificate paths for NGINX (with chain)
  set_fact:
    ssl_certificate: "/etc/ssl/busibox/{{ cert_domain }}-fullchain.crt"
    ssl_certificate_key: "/etc/ssl/busibox/{{ cert_domain }}.key"
  when: 
    - chain_file_stat.stat.exists
    - chain_file_stat.stat.size > 0

- name: Set SSL certificate paths for NGINX (without chain)
  set_fact:
    ssl_certificate: "/etc/ssl/busibox/{{ cert_domain }}.crt"
    ssl_certificate_key: "/etc/ssl/busibox/{{ cert_domain }}.key"
  when: not (chain_file_stat.stat.exists and chain_file_stat.stat.size > 0)

- name: Display provisioned certificate summary
  debug:
    msg: |
      ✅ Provisioned SSL certificates deployed
      - Domain: {{ cert_domain }}
      - Certificate: {{ ssl_certificate }}
      - Private key: {{ ssl_certificate_key }}
      - Chain included: {{ 'Yes' if (chain_file_stat.stat.exists and chain_file_stat.stat.size > 0) else 'No' }}
      - Mode: Manual management (you must renew certificates manually)
      
      ⚠️ IMPORTANT: Monitor certificate expiration and update vault.yml before expiry

