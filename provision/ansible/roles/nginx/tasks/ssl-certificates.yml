---
# SSL Certificate Discovery and Setup
# Purpose: Find SSL certificates from ssl/ directory or generate self-signed
# Priority:
#   1. Exact domain match: {full_domain}.crt + {full_domain}.key (with cert/key verification)
#   2. Wildcard parent match: {parent_domain}.crt + {parent_domain}.key (with cert/key verification)
#   3. Self-signed fallback: Generate certificates
#
# Note: For each candidate, we verify that the certificate and key modulus match
# before using them. This prevents deployment failures from mismatched cert/key pairs.

- name: Determine SSL source directory
  set_fact:
    ssl_source_dir: "{{ ssl_certificates_path | default(playbook_dir + '/../../ssl') }}"

- name: Resolve SSL source directory to absolute path
  command: "realpath {{ ssl_source_dir }}"
  register: ssl_dir_resolved
  delegate_to: localhost
  become: false
  changed_when: false

- name: Set resolved SSL source directory
  set_fact:
    ssl_source_dir: "{{ ssl_dir_resolved.stdout }}"

- name: Ensure SSL source directory exists on controller
  file:
    path: "{{ ssl_source_dir }}"
    state: directory
    mode: "0755"
  delegate_to: localhost
  become: false

- name: Materialize certificate from vault to SSL source dir
  copy:
    content: "{{ secrets.ssl_certificates.certificate }}"
    dest: "{{ ssl_source_dir }}/{{ full_domain }}.crt"
    mode: "0644"
  delegate_to: localhost
  become: false
  when:
    - secrets is defined
    - secrets.ssl_certificates is defined
    - secrets.ssl_certificates.certificate is defined
    - (secrets.ssl_certificates.certificate | trim | length) > 0

- name: Materialize private key from vault to SSL source dir
  copy:
    content: "{{ secrets.ssl_certificates.private_key }}"
    dest: "{{ ssl_source_dir }}/{{ full_domain }}.key"
    mode: "0600"
  delegate_to: localhost
  become: false
  when:
    - secrets is defined
    - secrets.ssl_certificates is defined
    - secrets.ssl_certificates.private_key is defined
    - (secrets.ssl_certificates.private_key | trim | length) > 0

- name: Materialize fullchain cert from vault to SSL source dir
  copy:
    content: "{{ secrets.ssl_certificates.certificate }}\n{{ secrets.ssl_certificates.chain }}"
    dest: "{{ ssl_source_dir }}/{{ full_domain }}.fullchain.crt"
    mode: "0644"
  delegate_to: localhost
  become: false
  when:
    - secrets is defined
    - secrets.ssl_certificates is defined
    - secrets.ssl_certificates.certificate is defined
    - secrets.ssl_certificates.chain is defined
    - (secrets.ssl_certificates.certificate | trim | length) > 0
    - (secrets.ssl_certificates.chain | trim | length) > 0

- name: Extract parent domain for wildcard lookup
  set_fact:
    parent_domain: "{{ full_domain.split('.', 1)[1] if full_domain.split('.')|length > 2 else full_domain }}"

- name: Debug SSL lookup
  debug:
    msg: |
      SSL Certificate Lookup:
      - Full domain: {{ full_domain }}
      - Parent domain: {{ parent_domain }}
      - Source directory: {{ ssl_source_dir }}

# Check file existence
- name: Check for exact domain certificate (with fullchain)
  stat:
    path: "{{ ssl_source_dir }}/{{ full_domain }}.fullchain.crt"
  register: exact_fullchain_stat
  delegate_to: localhost
  become: false

- name: Check for exact domain certificate (without fullchain)
  stat:
    path: "{{ ssl_source_dir }}/{{ full_domain }}.crt"
  register: exact_cert_stat
  delegate_to: localhost
  become: false

- name: Check for exact domain key
  stat:
    path: "{{ ssl_source_dir }}/{{ full_domain }}.key"
  register: exact_key_stat
  delegate_to: localhost
  become: false

- name: Check for wildcard parent certificate (with fullchain)
  stat:
    path: "{{ ssl_source_dir }}/{{ parent_domain }}.fullchain.crt"
  register: wildcard_fullchain_stat
  delegate_to: localhost
  become: false
  when: parent_domain != full_domain

- name: Check for wildcard parent certificate (without fullchain)
  stat:
    path: "{{ ssl_source_dir }}/{{ parent_domain }}.crt"
  register: wildcard_cert_stat
  delegate_to: localhost
  become: false
  when: parent_domain != full_domain

- name: Check for wildcard parent key
  stat:
    path: "{{ ssl_source_dir }}/{{ parent_domain }}.key"
  register: wildcard_key_stat
  delegate_to: localhost
  become: false
  when: parent_domain != full_domain

# Verify cert/key pairs match (modulus comparison)
- name: Verify exact fullchain cert matches key
  shell: |
    cert_mod=$(openssl x509 -noout -modulus -in "{{ ssl_source_dir }}/{{ full_domain }}.fullchain.crt" 2>/dev/null | md5sum | cut -d' ' -f1)
    key_mod=$(openssl rsa -noout -modulus -in "{{ ssl_source_dir }}/{{ full_domain }}.key" 2>/dev/null | md5sum | cut -d' ' -f1)
    [ "$cert_mod" = "$key_mod" ] && echo "MATCH" || echo "MISMATCH"
  register: exact_fullchain_verify
  delegate_to: localhost
  become: false
  changed_when: false
  when:
    - exact_fullchain_stat.stat.exists | default(false)
    - exact_key_stat.stat.exists | default(false)

- name: Verify exact cert matches key
  shell: |
    cert_mod=$(openssl x509 -noout -modulus -in "{{ ssl_source_dir }}/{{ full_domain }}.crt" 2>/dev/null | md5sum | cut -d' ' -f1)
    key_mod=$(openssl rsa -noout -modulus -in "{{ ssl_source_dir }}/{{ full_domain }}.key" 2>/dev/null | md5sum | cut -d' ' -f1)
    [ "$cert_mod" = "$key_mod" ] && echo "MATCH" || echo "MISMATCH"
  register: exact_cert_verify
  delegate_to: localhost
  become: false
  changed_when: false
  when:
    - exact_cert_stat.stat.exists | default(false)
    - exact_key_stat.stat.exists | default(false)

- name: Verify wildcard fullchain cert matches key
  shell: |
    cert_mod=$(openssl x509 -noout -modulus -in "{{ ssl_source_dir }}/{{ parent_domain }}.fullchain.crt" 2>/dev/null | md5sum | cut -d' ' -f1)
    key_mod=$(openssl rsa -noout -modulus -in "{{ ssl_source_dir }}/{{ parent_domain }}.key" 2>/dev/null | md5sum | cut -d' ' -f1)
    [ "$cert_mod" = "$key_mod" ] && echo "MATCH" || echo "MISMATCH"
  register: wildcard_fullchain_verify
  delegate_to: localhost
  become: false
  changed_when: false
  when:
    - parent_domain != full_domain
    - wildcard_fullchain_stat.stat.exists | default(false)
    - wildcard_key_stat.stat.exists | default(false)

- name: Verify wildcard cert matches key
  shell: |
    cert_mod=$(openssl x509 -noout -modulus -in "{{ ssl_source_dir }}/{{ parent_domain }}.crt" 2>/dev/null | md5sum | cut -d' ' -f1)
    key_mod=$(openssl rsa -noout -modulus -in "{{ ssl_source_dir }}/{{ parent_domain }}.key" 2>/dev/null | md5sum | cut -d' ' -f1)
    [ "$cert_mod" = "$key_mod" ] && echo "MATCH" || echo "MISMATCH"
  register: wildcard_cert_verify
  delegate_to: localhost
  become: false
  changed_when: false
  when:
    - parent_domain != full_domain
    - wildcard_cert_stat.stat.exists | default(false)
    - wildcard_key_stat.stat.exists | default(false)

# Determine which certificate to use (with verification)
- name: Use exact domain certificate (fullchain) if verified
  set_fact:
    ssl_cert_source: "{{ ssl_source_dir }}/{{ full_domain }}.fullchain.crt"
    ssl_key_source: "{{ ssl_source_dir }}/{{ full_domain }}.key"
    ssl_mode_used: "exact-fullchain"
  when:
    - exact_fullchain_stat.stat.exists | default(false)
    - exact_key_stat.stat.exists | default(false)
    - exact_fullchain_verify.stdout | default('') == 'MATCH'

- name: Use exact domain certificate (without fullchain) if verified
  set_fact:
    ssl_cert_source: "{{ ssl_source_dir }}/{{ full_domain }}.crt"
    ssl_key_source: "{{ ssl_source_dir }}/{{ full_domain }}.key"
    ssl_mode_used: "exact"
  when:
    - ssl_mode_used is not defined
    - exact_cert_stat.stat.exists | default(false)
    - exact_key_stat.stat.exists | default(false)
    - exact_cert_verify.stdout | default('') == 'MATCH'

- name: Use wildcard parent certificate (fullchain) if verified
  set_fact:
    ssl_cert_source: "{{ ssl_source_dir }}/{{ parent_domain }}.fullchain.crt"
    ssl_key_source: "{{ ssl_source_dir }}/{{ parent_domain }}.key"
    ssl_mode_used: "wildcard-fullchain"
  when:
    - ssl_mode_used is not defined
    - parent_domain != full_domain
    - wildcard_fullchain_stat.stat.exists | default(false)
    - wildcard_key_stat.stat.exists | default(false)
    - wildcard_fullchain_verify.stdout | default('') == 'MATCH'

- name: Use wildcard parent certificate (without fullchain) if verified
  set_fact:
    ssl_cert_source: "{{ ssl_source_dir }}/{{ parent_domain }}.crt"
    ssl_key_source: "{{ ssl_source_dir }}/{{ parent_domain }}.key"
    ssl_mode_used: "wildcard"
  when:
    - ssl_mode_used is not defined
    - parent_domain != full_domain
    - wildcard_cert_stat.stat.exists | default(false)
    - wildcard_key_stat.stat.exists | default(false)
    - wildcard_cert_verify.stdout | default('') == 'MATCH'

- name: Generate self-signed certificate (fallback)
  set_fact:
    ssl_mode_used: "selfsigned"
  when: ssl_mode_used is not defined

- name: Warn if certificates found but not verified
  debug:
    msg: |
      ⚠️  WARNING: SSL certificates found but cert/key modulus mismatch detected!
      Falling back to self-signed certificate.
      Please verify your SSL certificate and key files match.
      
      Checked files:
      {% if exact_fullchain_stat.stat.exists | default(false) and exact_key_stat.stat.exists | default(false) %}
      - {{ full_domain }}.fullchain.crt + .key: {{ exact_fullchain_verify.stdout | default('NOT CHECKED') }}
      {% endif %}
      {% if exact_cert_stat.stat.exists | default(false) and exact_key_stat.stat.exists | default(false) %}
      - {{ full_domain }}.crt + .key: {{ exact_cert_verify.stdout | default('NOT CHECKED') }}
      {% endif %}
      {% if parent_domain != full_domain and wildcard_fullchain_stat.stat.exists | default(false) and wildcard_key_stat.stat.exists | default(false) %}
      - {{ parent_domain }}.fullchain.crt + .key: {{ wildcard_fullchain_verify.stdout | default('NOT CHECKED') }}
      {% endif %}
      {% if parent_domain != full_domain and wildcard_cert_stat.stat.exists | default(false) and wildcard_key_stat.stat.exists | default(false) %}
      - {{ parent_domain }}.crt + .key: {{ wildcard_cert_verify.stdout | default('NOT CHECKED') }}
      {% endif %}
  when:
    - ssl_mode_used == 'selfsigned'
    - (exact_fullchain_stat.stat.exists | default(false) and exact_key_stat.stat.exists | default(false)) or
      (exact_cert_stat.stat.exists | default(false) and exact_key_stat.stat.exists | default(false)) or
      (parent_domain != full_domain and wildcard_fullchain_stat.stat.exists | default(false) and wildcard_key_stat.stat.exists | default(false)) or
      (parent_domain != full_domain and wildcard_cert_stat.stat.exists | default(false) and wildcard_key_stat.stat.exists | default(false))

- name: Display SSL certificate decision
  debug:
    msg: |
      SSL Certificate Mode: {{ ssl_mode_used }}
      {% if ssl_mode_used != 'selfsigned' %}
      Certificate: {{ ssl_cert_source }}
      Key: {{ ssl_key_source }}
      {% else %}
      Self-signed certificate will be generated for {{ full_domain }}
      {% endif %}

# Copy certificates if we found them
- name: Create SSL directory on target
  file:
    path: /etc/ssl/busibox
    state: directory
    mode: "0755"
    owner: root
    group: root

- name: Copy SSL certificate to target
  copy:
    src: "{{ ssl_cert_source }}"
    dest: "/etc/ssl/busibox/{{ full_domain }}.crt"
    mode: "0644"
    owner: root
    group: root
  when: ssl_mode_used != 'selfsigned'

- name: Copy SSL key to target
  copy:
    src: "{{ ssl_key_source }}"
    dest: "/etc/ssl/busibox/{{ full_domain }}.key"
    mode: "0600"
    owner: root
    group: root
  when: ssl_mode_used != 'selfsigned'

# Generate self-signed if needed
- name: Generate self-signed certificate
  command: >
    openssl req -x509 -nodes -days 365 -newkey rsa:2048
    -keyout /etc/ssl/busibox/{{ full_domain }}.key
    -out /etc/ssl/busibox/{{ full_domain }}.crt
    -subj "/C=US/ST=State/L=City/O=Organization/CN={{ full_domain }}"
  args:
    creates: /etc/ssl/busibox/{{ full_domain }}.crt
  when: ssl_mode_used == 'selfsigned'

# Set final paths for nginx templates
- name: Set SSL certificate paths for NGINX
  set_fact:
    ssl_certificate: "/etc/ssl/busibox/{{ full_domain }}.crt"
    ssl_certificate_key: "/etc/ssl/busibox/{{ full_domain }}.key"
