---
# LiteLLM Role - Default Variables
# Created: 2025-10-16
# Purpose: Unified API gateway for multiple LLM backends

# LiteLLM Installation
litellm_version: "latest"
litellm_install_method: "pip"
litellm_install_dir: /opt/litellm
litellm_venv_dir: "{{ litellm_install_dir }}/venv"
litellm_config_dir: /etc/litellm

# Python Configuration
litellm_python_version: "3.11"

# LiteLLM Service Configuration
litellm_user: litellm
litellm_group: litellm
litellm_home: /var/lib/litellm

# Network Configuration
litellm_host: "0.0.0.0"
litellm_port: 4000

# Master Key (should be overridden with vault)
litellm_master_key: "{{ secrets.litellm.master_key | default('sk-litellm-master-key-change-me') }}"

# Backend Configuration
litellm_backends:
  # ollama:  # Temporarily disabled
  #   host: "{{ ollama_ip }}"
  #   port: "{{ ollama_port }}"
  vllm:
    host: "{{ vllm_ip }}"
    port: "{{ vllm_port }}"
  vllm_embedding:
    host: "{{ vllm_ip }}"
    port: "{{ vllm_embedding_port }}"
  vllm_analysis:
    host: "{{ vllm_ip }}"
    port: "{{ vllm_analysis_port }}"

# Model Configuration
# Model names use purpose names (fast, frontier, embedding, etc.) so applications
# can call LiteLLM using purpose names directly.
# References model_registry.yml for model names and configurations
litellm_models:
  # Model configurations use new structure:
  # - model_purposes maps purpose -> model key (e.g., "fast" -> "phi-4")
  # - available_models[model_key] contains full config including GPU and port
  # - Lookup: available_models[model_purposes.purpose]
  
  # Fast model - purpose name: "fast"
  # Applications call LiteLLM with model="fast"
  - model_name: "fast"
    litellm_params:
      model: "openai/{{ available_models[model_purposes.fast].model_name }}"
      api_base: "http://{{ vllm_ip }}:{{ available_models[model_purposes.fast].port | default(8000) }}/v1"
      api_key: "EMPTY"

  # Default model - purpose name: "default"
  # Applications call LiteLLM with model="default"
  - model_name: "default"
    litellm_params:
      model: "openai/{{ available_models[model_purposes.default].model }}"
      api_base: "http://{{ vllm_ip }}:{{ available_models[model_purposes.default].port | default(8000) }}/v1"
      api_key: "EMPTY"

  # Chat model - purpose name: "chat"
  # Applications call LiteLLM with model="chat"
  - model_name: "chat"
    litellm_params:
      model: "openai/{{ available_models[model_purposes.chat].model_name }}"
      api_base: "http://{{ vllm_ip }}:{{ available_models[model_purposes.chat].port | default(8000) }}/v1"
      api_key: "EMPTY"

  # Cleanup model - purpose name: "cleanup"
  # Applications call LiteLLM with model="cleanup"
  - model_name: "cleanup"
    litellm_params:
      model: "openai/{{ available_models[model_purposes.cleanup].model_name }}"
      api_base: "http://{{ vllm_ip }}:{{ available_models[model_purposes.cleanup].port | default(8000) }}/v1"
      api_key: "EMPTY"

  # Research model - purpose name: "research"
  # Applications call LiteLLM with model="research"
  - model_name: "research"
    litellm_params:
      model: "openai/{{ available_models[model_purposes.research].model }}"
      api_base: "http://{{ vllm_ip }}:{{ available_models[model_purposes.research].port | default(8000) }}/v1"
      api_key: "EMPTY"

  # Analysis model - purpose name: "analysis"
  # Applications call LiteLLM with model="analysis"
  - model_name: "analysis"
    litellm_params:
      model: "openai/{{ available_models[model_purposes.analysis].model }}"
      api_base: "http://{{ vllm_ip }}:{{ available_models[model_purposes.analysis].port | default(8000) }}/v1"
      api_key: "EMPTY"

  # Embedding model - purpose name: "embedding"
  # Applications call LiteLLM with model="embedding"
  - model_name: "embedding"
    litellm_params:
      model: "openai/{{ available_models[model_purposes.embedding].model }}"
      api_base: "http://{{ vllm_ip }}:{{ available_models[model_purposes.embedding].port | default(8001) }}/v1"
      api_key: "EMPTY"

  # Frontier model - purpose name: "frontier" (AWS Bedrock)
  # Applications call LiteLLM with model="frontier"
  # Uses AWS Bedrock API - requires AWS credentials configured
  - model_name: "frontier"
    litellm_params:
      model: "bedrock/{{ available_models[model_purposes.frontier].model_name }}"
      aws_access_key_id: "{{ secrets.bedrock_api_key.split(':')[0] if secrets.bedrock_api_key and ':' in secrets.bedrock_api_key else '' }}"
      aws_secret_access_key: "{{ secrets.bedrock_api_key.split(':')[1] if secrets.bedrock_api_key and ':' in secrets.bedrock_api_key else secrets.bedrock_api_key }}"
      aws_region_name: "{{ secrets.bedrock_region | default('us-east-1') }}"


# Router Settings
litellm_routing_strategy: "simple-shuffle"
litellm_allowed_fails: 3
litellm_num_retries: 2
litellm_timeout: 60
litellm_fallbacks: []

# General Settings
litellm_drop_params: true
litellm_add_function_to_prompt: true

# Service Configuration
litellm_enable_service: true
litellm_start_service: true
litellm_restart_on_failure: true
litellm_restart_sec: 10

# Logging
litellm_log_level: info
litellm_detailed_debug: false

# Resource Limits
litellm_memory_limit: "4G"
litellm_cpu_limit: "2"

# Database (optional - for cost tracking, caching)
litellm_enable_database: true
litellm_database_url: "{{ secrets.litellm.database_url | default('sqlite:///{{ litellm_home }}/litellm.db') }}"

# Proxy Features
litellm_enable_swagger: true
litellm_enable_prometheus: false

