---
# LiteLLM Role - Default Variables
# Created: 2025-10-16
# Purpose: Unified API gateway for multiple LLM backends

# LiteLLM Installation
litellm_version: "latest"
litellm_install_method: "pip"
litellm_install_dir: /opt/litellm
litellm_venv_dir: "{{ litellm_install_dir }}/venv"
litellm_config_dir: /etc/litellm

# Python Configuration
litellm_python_version: "3.11"

# LiteLLM Service Configuration
litellm_user: litellm
litellm_group: litellm
litellm_home: /var/lib/litellm

# Network Configuration
litellm_host: "0.0.0.0"
litellm_port: 4000

# Master Key (should be overridden with vault)
litellm_master_key: "{{ secrets.litellm.master_key | default('sk-litellm-master-key-change-me') }}"

# Backend Configuration
litellm_backends:
  # ollama:  # Temporarily disabled
  #   host: "{{ ollama_ip }}"
  #   port: "{{ ollama_port }}"
  vllm:
    host: "{{ vllm_ip }}"
    port: "{{ vllm_port }}"

# Model Configuration (vLLM only - Ollama disabled)
litellm_models:
  # Ollama models (temporarily disabled)
  # - model_name: "llama3-8b"
  #   litellm_params:
  #     model: "ollama/llama3:8b"
  #     api_base: "http://{{ ollama_ip }}:{{ ollama_port }}"
  # - model_name: "phi3"
  #   litellm_params:
  #     model: "ollama/phi3:3.8b"
  #     api_base: "http://{{ ollama_ip }}:{{ ollama_port }}"
  # - model_name: "gemma-2b"
  #   litellm_params:
  #     model: "ollama/gemma:2b"
  #     api_base: "http://{{ ollama_ip }}:{{ ollama_port }}"
  
  # vLLM models (active) - Only Phi-4 for now
  - model_name: "phi-4-multimodal"
    litellm_params:
      model: "openai/microsoft/Phi-4-multimodal-instruct"
      api_base: "http://{{ vllm_ip }}:{{ vllm_port }}/v1"
      api_key: "EMPTY"  # vLLM doesn't require authentication
  
  # Qwen3-VL (disabled - not loaded in vLLM)
  # To enable: Deploy a second vLLM instance with Qwen3-VL-8B-Instruct
  # - model_name: "qwen3-vl-8b"
  #   litellm_params:
  #     model: "openai/Qwen/Qwen3-VL-8B-Instruct"
  #     api_base: "http://{{ vllm_ip }}:{{ vllm_port }}/v1"
  
  # Embedding models (for ingestion service)
  # Using vLLM with Qwen3 embedding model
  - model_name: "qwen3-embedding"
    litellm_params:
      model: "openai/qwen3-embedding"  # Use vLLM's served-model-name, not HF model path
      api_base: "http://{{ vllm_ip }}:8001/v1"
      api_key: "EMPTY"  # vLLM doesn't require auth, but OpenAI provider needs a key
    # Embedding dimension: 4096
    # Max sequence length: 32K
    # Used by ingestion service for dense semantic embeddings
    # Requires separate vLLM instance on port 8001

# Router Settings
litellm_routing_strategy: "simple-shuffle"
litellm_allowed_fails: 3
litellm_num_retries: 2
litellm_timeout: 60
litellm_fallbacks: []

# General Settings
litellm_drop_params: true
litellm_add_function_to_prompt: true

# Service Configuration
litellm_enable_service: true
litellm_start_service: true
litellm_restart_on_failure: true
litellm_restart_sec: 10

# Logging
litellm_log_level: info
litellm_detailed_debug: false

# Resource Limits
litellm_memory_limit: "4G"
litellm_cpu_limit: "2"

# Database (optional - for cost tracking, caching)
litellm_enable_database: true
litellm_database_url: "{{ secrets.litellm.database_url | default('sqlite:///{{ litellm_home }}/litellm.db') }}"

# Proxy Features
litellm_enable_swagger: true
litellm_enable_prometheus: false

