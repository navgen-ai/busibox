---
# LiteLLM Role - Default Variables
# Created: 2025-10-16
# Purpose: Unified API gateway for multiple LLM backends

# LiteLLM Installation
litellm_version: "latest"
litellm_install_method: "pip"
litellm_install_dir: /opt/litellm
litellm_venv_dir: "{{ litellm_install_dir }}/venv"
litellm_config_dir: /etc/litellm

# Python Configuration
litellm_python_version: "3.11"

# LiteLLM Service Configuration
litellm_user: litellm
litellm_group: litellm
litellm_home: /var/lib/litellm

# Network Configuration
litellm_host: "0.0.0.0"
litellm_port: 4000

# Master Key (should be overridden with vault)
litellm_master_key: "{{ secrets.litellm.master_key | default('sk-litellm-master-key-change-me') }}"

# Backend Configuration
# Note: Backends are now dynamically configured via litellm_models
# which reads port assignments from model_config.yml
litellm_backends: {}

# Model Configuration
# Dynamically generated from model_config.yml and model_registry.yml
# Model names use purpose names (fast, frontier, embedding, etc.) so applications
# can call LiteLLM using purpose names directly.
litellm_models: >-
  {% set models = [] %}
  {% if model_purposes is defined and model_config is defined and model_config.models is defined %}
    {% for purpose, model_key in model_purposes.items() %}
      {% set model_entry = available_models.get(model_key, {}) %}
      {% if model_entry %}
        {% set model_name = model_entry.get('model_name', '') %}
        {% set provider = model_entry.get('provider', '').lower() %}
        {% set config = model_config.models.get(model_name, {}) %}
        
        {% if provider == 'bedrock' %}
          {# Bedrock API model #}
          {% set _ = models.append({
               'model_name': purpose,
               'litellm_params': {
                 'model': 'bedrock/' + model_name,
                 'aws_access_key_id': (secrets.bedrock_api_key.split(':')[0] if secrets.bedrock_api_key and ':' in secrets.bedrock_api_key else '') | default(''),
                 'aws_secret_access_key': (secrets.bedrock_api_key.split(':')[1] if secrets.bedrock_api_key and ':' in secrets.bedrock_api_key else secrets.bedrock_api_key) | default(''),
                 'aws_region_name': secrets.bedrock_region | default('us-east-1')
               }
             }) %}
        {% elif config.assigned | default(false) and config.port %}
          {# vLLM model assigned to a port #}
          {% set _ = models.append({
               'model_name': purpose,
               'litellm_params': {
                 'model': 'openai/' + model_entry.get('model', model_key),
                 'api_base': 'http://' + vllm_ip + ':' + config.port|string + '/v1',
                 'api_key': 'EMPTY'
               }
             }) %}
        {% endif %}
      {% endif %}
    {% endfor %}
  {% endif %}
  {{ models }}


# Router Settings
litellm_routing_strategy: "simple-shuffle"
litellm_allowed_fails: 3
litellm_num_retries: 2
litellm_timeout: 60
litellm_fallbacks: []

# General Settings
litellm_drop_params: true
litellm_add_function_to_prompt: true

# Service Configuration
litellm_enable_service: true
litellm_start_service: true
litellm_restart_on_failure: true
litellm_restart_sec: 10

# Logging
litellm_log_level: info
litellm_detailed_debug: false

# Resource Limits
litellm_memory_limit: "4G"
litellm_cpu_limit: "2"

# Database (optional - for cost tracking, caching)
litellm_enable_database: true
litellm_database_url: "{{ secrets.litellm.database_url | default('sqlite:///{{ litellm_home }}/litellm.db') }}"

# Proxy Features
litellm_enable_swagger: true
litellm_enable_prometheus: false

