---
# LiteLLM Configuration Tasks

- name: Check if model_config.yml exists
  stat:
    path: "{{ playbook_dir }}/group_vars/all/model_config.yml"
  register: model_config_file
  delegate_to: localhost
  tags: [litellm_configure]

- name: Warning if model_config.yml does not exist
  debug:
    msg:
      - "=========================================="
      - "WARNING: model_config.yml not found!"
      - "=========================================="
      - "No models will be configured in LiteLLM."
      - ""
      - "To generate model_config.yml on Proxmox host:"
      - "  1. cd /root/busibox/provision/pct/host"
      - "  2. bash update-model-config.sh"
      - "  3. bash configure-vllm-model-routing.sh --interactive"
      - ""
      - "Then re-run this deployment."
      - "=========================================="
  when: not model_config_file.stat.exists
  tags: [litellm_configure]

- name: Load model_config.yml if it exists
  include_vars:
    file: "{{ playbook_dir }}/group_vars/all/model_config.yml"
    name: model_config_data
  when: model_config_file.stat.exists
  delegate_to: localhost
  tags: [litellm_configure]

- name: Build litellm_models list from model_config.yml using Python
  shell: |
    python3 << 'PYTHON_EOF'
    import json
    import sys
    import yaml
    from pathlib import Path
    
    # Load files
    config_file = Path("{{ playbook_dir }}/group_vars/all/model_config.yml")
    registry_file = Path("{{ playbook_dir }}/group_vars/all/model_registry.yml")
    
    models = []
    
    if config_file.exists():
        with open(config_file, 'r') as f:
            model_config_data = yaml.safe_load(f) or {}
        
        with open(registry_file, 'r') as f:
            registry_data = yaml.safe_load(f) or {}
        
        model_purposes = registry_data.get('model_purposes', {})
        available_models = registry_data.get('available_models', {})
        model_configs = model_config_data.get('models', {})
        
        # Debug: Show what's in model_configs
        print(f"DEBUG: model_configs keys: {list(model_configs.keys())}", file=sys.stderr)
        
        for purpose, model_key in model_purposes.items():
            model_entry = available_models.get(model_key, {})
            if not model_entry:
                print(f"WARNING: No model entry for purpose '{purpose}' with key '{model_key}'", file=sys.stderr)
                continue
            
            model_name = model_entry.get('model_name', '')
            provider = model_entry.get('provider', '').lower()
            config = model_configs.get(model_name, {})
            config_provider = config.get('provider', '').lower()
            
            # Debug logging
            if purpose == 'reranking':
                print(f"DEBUG reranking: model_key={model_key}, model_name={model_name}, provider={provider}", file=sys.stderr)
                print(f"DEBUG reranking: config={config}", file=sys.stderr)
                print(f"DEBUG reranking: assigned={config.get('assigned')}, port={config.get('port')}", file=sys.stderr)
            
            # Use provider from registry as source of truth
            # But skip if config has a conflicting provider (stale data)
            if config_provider and config_provider != provider:
                print(f"WARNING: Provider mismatch for {model_name}: registry={provider}, config={config_provider}", file=sys.stderr)
                continue
            
            if provider == 'bedrock':
                # Bedrock API model
                bedrock_key = "{{ secrets.bedrock_api_key | default('') }}"
                aws_access_key = bedrock_key.split(':')[0] if ':' in bedrock_key else ''
                aws_secret_key = bedrock_key.split(':')[1] if ':' in bedrock_key else bedrock_key
                
                models.append({
                    'model_name': purpose,
                    'litellm_params': {
                        'model': f'bedrock/{model_name}',
                        'aws_access_key_id': aws_access_key,
                        'aws_secret_access_key': aws_secret_key,
                        'aws_region_name': "{{ secrets.bedrock_region | default('us-east-1') }}"
                    }
                })
            elif provider == 'vllm' and config.get('assigned', False) and config.get('port'):
                # vLLM model assigned to a port
                models.append({
                    'model_name': purpose,
                    'litellm_params': {
                        'model': f"openai/{model_name}",
                        'api_base': f"http://{{ vllm_ip }}:{config['port']}/v1",
                        'api_key': 'EMPTY'
                    }
                })
            # Skip fastembed, colpali, marker, and other non-LiteLLM providers
    
    print(json.dumps(models))
    PYTHON_EOF
  register: models_json_output
  delegate_to: localhost
  changed_when: false
  tags: [litellm_configure]

- name: Set litellm_models fact from Python output
  set_fact:
    litellm_models: "{{ models_json_output.stdout | from_json }}"
  tags: [litellm_configure]

- name: Debug - Display model configuration details
  debug:
    msg: |
      ==========================================
      Model Configuration Details
      ==========================================
      Number of models configured: {{ litellm_models | length }}
      
      {% for model in litellm_models %}
      Model: {{ model.model_name }}
        Backend: {{ model.litellm_params.model }}
      {% if model.litellm_params.api_base is defined %}
        API Base: {{ model.litellm_params.api_base }}
      {% endif %}
      {% endfor %}
      ==========================================
  tags: [litellm_configure, litellm_debug]

- name: Deploy LiteLLM configuration file
  template:
    src: config.yaml.j2
    dest: "{{ litellm_config_dir }}/config.yaml"
    owner: "{{ litellm_user }}"
    group: "{{ litellm_group }}"
    mode: '0640'
  notify: restart litellm
  tags: [litellm_configure]

- name: Debug - Display generated LiteLLM config (model_list section)
  shell: "grep -A 50 '^model_list:' {{ litellm_config_dir }}/config.yaml | head -100"
  register: config_preview
  changed_when: false
  tags: [litellm_configure, litellm_debug]

- name: Debug - Show config preview
  debug:
    msg: "{{ config_preview.stdout_lines }}"
  tags: [litellm_configure, litellm_debug]

- name: Deploy LiteLLM systemd service file
  template:
    src: litellm.service.j2
    dest: /etc/systemd/system/litellm.service
    owner: root
    group: root
    mode: '0644'
  notify:
    - reload systemd
    - restart litellm
  tags: [litellm_configure]

- name: Create LiteLLM environment file
  template:
    src: litellm.env.j2
    dest: /etc/default/litellm
    owner: root
    group: "{{ litellm_group }}"
    mode: '0640'
  notify: restart litellm
  tags: [litellm_configure]

# Operational Tools (always deployed)
- name: Deploy venv rebuild script
  copy:
    src: rebuild-venv.sh
    dest: /usr/local/bin/rebuild-litellm-venv
    owner: root
    group: root
    mode: '0755'
  tags: [litellm_configure]

- name: Deploy restart script
  copy:
    src: restart-litellm.sh
    dest: /usr/local/bin/restart-litellm
    owner: root
    group: root
    mode: '0755'
  tags: [litellm_configure]

# Debug Tools (only deployed with litellm_debug tag)
- name: Deploy LiteLLM debug script
  copy:
    src: debug-litellm.sh
    dest: /usr/local/bin/litellm-debug
    owner: root
    group: root
    mode: '0755'
  tags: [litellm_debug]

- name: Deploy LiteLLM database test script
  copy:
    src: test-litellm-db.sh
    dest: /usr/local/bin/test-litellm-db
    owner: root
    group: root
    mode: '0755'
  tags: [litellm_debug]

- name: Deploy Prisma diagnostic script
  copy:
    src: check-prisma.sh
    dest: /usr/local/bin/check-prisma
    owner: root
    group: root
    mode: '0755'
  tags: [litellm_debug]

- name: Deploy LiteLLM API test script
  copy:
    src: test-litellm-api.sh
    dest: /usr/local/bin/test-litellm-api
    owner: root
    group: root
    mode: '0755'
  tags: [litellm_debug]

- name: Deploy schema inspection script
  copy:
    src: inspect-schema.sh
    dest: /usr/local/bin/inspect-schema
    owner: root
    group: root
    mode: '0755'
  tags: [litellm_debug]

- name: Deploy Prisma import test script
  copy:
    src: test-prisma-import.sh
    dest: /usr/local/bin/test-prisma-import
    owner: root
    group: root
    mode: '0755'
  tags: [litellm_debug]

- name: Ensure systemd is reloaded
  systemd:
    daemon_reload: yes
  tags: [litellm_configure]

- name: Generate Prisma client for LiteLLM
  shell: |
    set -e
    source {{ litellm_venv_dir }}/bin/activate
    export DATABASE_URL="{{ litellm_database_url }}"
    
    # Navigate to LiteLLM proxy directory
    PRISMA_DIR=$(python -c "import os, litellm; print(os.path.dirname(litellm.__file__))")/proxy
    echo "Prisma schema directory: $PRISMA_DIR"
    cd "$PRISMA_DIR"
    
    # Generate Prisma client
    echo "Generating Prisma client..."
    prisma generate
    
    # Find where it actually generated to
    echo ""
    echo "Searching for generated Prisma client..."
    
    # Check possible locations
    SITE_PACKAGES=$(python -c "import site; print(site.getsitepackages()[0])")
    echo "Site packages: $SITE_PACKAGES"
    
    # Look for prisma directory
    if [ -d "$SITE_PACKAGES/prisma" ]; then
      echo "✓ Found at: $SITE_PACKAGES/prisma"
      ls -la "$SITE_PACKAGES/prisma/" | head -10
    elif [ -d "$SITE_PACKAGES/litellm/prisma" ]; then
      echo "✓ Found at: $SITE_PACKAGES/litellm/prisma"
      ls -la "$SITE_PACKAGES/litellm/prisma/" | head -10
    else
      echo "ERROR: Cannot find generated Prisma client"
      echo "Searched:"
      echo "  - $SITE_PACKAGES/prisma"
      echo "  - $SITE_PACKAGES/litellm/prisma"
      echo ""
      echo "Finding all prisma directories in site-packages:"
      find "$SITE_PACKAGES" -type d -name "prisma" 2>/dev/null || echo "  None found"
      exit 1
    fi
  args:
    executable: /bin/bash
  become: true
  become_user: "{{ litellm_user }}"
  when: litellm_enable_database
  register: prisma_generate_result
  tags: [litellm_configure, litellm_db]

- name: Display Prisma generate output
  debug:
    var: prisma_generate_result.stdout_lines
  when: litellm_enable_database and prisma_generate_result is defined
  tags: [litellm_configure, litellm_db]

- name: Push Prisma schema to database (non-destructive)
  shell: |
    set -e
    source {{ litellm_venv_dir }}/bin/activate
    export DATABASE_URL="{{ litellm_database_url }}"
    
    # Navigate to LiteLLM proxy directory
    PRISMA_DIR=$(python -c "import os, litellm; print(os.path.dirname(litellm.__file__))")/proxy
    cd "$PRISMA_DIR"
    
    # Push schema to database (preserves existing data)
    echo "Updating database schema (non-destructive)..."
    prisma db push --skip-generate
    
    echo "Database schema updated successfully"
  args:
    executable: /bin/bash
  become: true
  become_user: "{{ litellm_user }}"
  when: litellm_enable_database
  tags: [litellm_configure, litellm_db]

- name: Enable LiteLLM service
  systemd:
    name: litellm
    enabled: "{{ litellm_enable_service }}"
  when: litellm_enable_service
  tags: [litellm_configure]

- name: Start LiteLLM service
  systemd:
    name: litellm
    state: started
  when: litellm_start_service
  tags: [litellm_configure]

- name: Check LiteLLM service logs
  command: journalctl -u litellm -n 50 --no-pager
  register: litellm_logs
  changed_when: false
  tags: [litellm_configure]

- name: Display LiteLLM service logs
  debug:
    msg: "{{ litellm_logs.stdout_lines }}"
  tags: [litellm_configure]

- name: Wait for LiteLLM service to be ready
  wait_for:
    host: "{{ litellm_host if litellm_host != '0.0.0.0' else 'localhost' }}"
    port: "{{ litellm_port }}"
    delay: 5
    timeout: 60
  when: litellm_start_service
  tags: [litellm_configure]

- name: Check LiteLLM service status
  systemd:
    name: litellm
  register: litellm_service_status
  tags: [litellm_configure]

- name: Display service status
  debug:
    msg: "LiteLLM service is {{ litellm_service_status.status.ActiveState }}"
  tags: [litellm_configure]

- name: Test LiteLLM health endpoint with auth
  uri:
    url: "http://{{ litellm_host if litellm_host != '0.0.0.0' else 'localhost' }}:{{ litellm_port }}/health"
    method: GET
    headers:
      Authorization: "Bearer {{ litellm_master_key }}"
    status_code: 200
  register: litellm_health_test
  retries: 3
  delay: 2
  when: litellm_start_service
  tags: [litellm_configure, litellm_test]

- name: Display health check result
  debug:
    msg: "LiteLLM health check passed (authenticated)"
  when: litellm_health_test is defined and litellm_health_test.status == 200
  tags: [litellm_configure, litellm_test]

- name: Test LiteLLM models endpoint
  uri:
    url: "http://{{ litellm_host if litellm_host != '0.0.0.0' else 'localhost' }}:{{ litellm_port }}/models"
    method: GET
    status_code: 200
    headers:
      Authorization: "Bearer {{ litellm_master_key }}"
  register: litellm_models_test
  retries: 3
  delay: 2
  when: litellm_start_service
  tags: [litellm_configure, litellm_test]

- name: Display available models
  debug:
    msg: 
      - "=========================================="
      - "Available Models in LiteLLM"
      - "=========================================="
      - "{{ litellm_models_test.json.data | map(attribute='id') | list if litellm_models_test.json is defined else 'Unable to retrieve models' }}"
      - "=========================================="
  when: litellm_models_test is defined
  tags: [litellm_configure, litellm_test]

- name: Check vLLM backend health for fast model
  uri:
    url: "{{ litellm_models | selectattr('model_name', 'equalto', 'fast') | map(attribute='litellm_params.api_base') | first | default('') }}/health"
    method: GET
    status_code: 200
    timeout: 5
  register: fast_backend_health
  failed_when: false
  when: litellm_start_service and (litellm_models | selectattr('model_name', 'equalto', 'fast') | list | length > 0)
  tags: [litellm_configure, litellm_test]

- name: Display fast backend health
  debug:
    msg: "Fast model vLLM backend at {{ litellm_models | selectattr('model_name', 'equalto', 'fast') | map(attribute='litellm_params.api_base') | first | default('N/A') }}: {{ 'HEALTHY' if fast_backend_health.status == 200 else 'UNHEALTHY - Status: ' + (fast_backend_health.status | string) }}"
  when: fast_backend_health is defined
  tags: [litellm_configure, litellm_test]

- name: Check vLLM backend health for analysis model
  uri:
    url: "{{ litellm_models | selectattr('model_name', 'equalto', 'analysis') | map(attribute='litellm_params.api_base') | first | default('') }}/health"
    method: GET
    status_code: 200
    timeout: 5
  register: analysis_backend_health
  failed_when: false
  when: litellm_start_service and (litellm_models | selectattr('model_name', 'equalto', 'analysis') | list | length > 0)
  tags: [litellm_configure, litellm_test]

- name: Display analysis backend health
  debug:
    msg: "Analysis model vLLM backend at {{ litellm_models | selectattr('model_name', 'equalto', 'analysis') | map(attribute='litellm_params.api_base') | first | default('N/A') }}: {{ 'HEALTHY' if analysis_backend_health.status == 200 else 'UNHEALTHY - Status: ' + (analysis_backend_health.status | string) }}"
  when: analysis_backend_health is defined
  tags: [litellm_configure, litellm_test]

- name: Test embedding model
  uri:
    url: "http://{{ litellm_host if litellm_host != '0.0.0.0' else 'localhost' }}:{{ litellm_port }}/v1/embeddings"
    method: POST
    headers:
      Authorization: "Bearer {{ litellm_master_key }}"
      Content-Type: "application/json"
    body_format: json
    body:
      model: "embedding"
      input: "This is a small test document for embedding generation."
    status_code: 200
  register: embedding_test
  retries: 3
  delay: 2
  when: litellm_start_service and (model_purposes.embedding is defined)
  failed_when: false
  tags: [litellm_configure, litellm_test]

- name: Display embedding test result
  debug:
    msg: "{{ 'Embedding test passed - generated ' + (embedding_test.json.data | length | string) + ' embeddings' if embedding_test.json is defined and embedding_test.json.data is defined else 'Embedding test skipped or failed: ' + (embedding_test.json.error.message | default('No embedding model configured')) }}"
  when: embedding_test is defined
  tags: [litellm_configure, litellm_test]

- name: Test fast chat model
  uri:
    url: "http://{{ litellm_host if litellm_host != '0.0.0.0' else 'localhost' }}:{{ litellm_port }}/v1/chat/completions"
    method: POST
    headers:
      Authorization: "Bearer {{ litellm_master_key }}"
      Content-Type: "application/json"
    body_format: json
    body:
      model: "fast"
      messages:
        - role: "user"
          content: "Say 'hello' in one word."
      max_tokens: 10
    status_code: 200
  register: fast_test
  retries: 3
  delay: 2
  when: litellm_start_service and (model_purposes.fast is defined)
  failed_when: false
  tags: [litellm_configure, litellm_test]

- name: Display fast model test result
  debug:
    msg: "{{ 'Fast model test passed - response: ' + fast_test.json.choices[0].message.content if fast_test.json is defined and fast_test.json.choices is defined else 'Fast model test skipped or failed: ' + (fast_test.json.error.message | default('No fast model configured')) }}"
  when: fast_test is defined
  tags: [litellm_configure, litellm_test]

- name: Test analysis chat model
  uri:
    url: "http://{{ litellm_host if litellm_host != '0.0.0.0' else 'localhost' }}:{{ litellm_port }}/v1/chat/completions"
    method: POST
    headers:
      Authorization: "Bearer {{ litellm_master_key }}"
      Content-Type: "application/json"
    body_format: json
    body:
      model: "analysis"
      messages:
        - role: "user"
          content: "What is 2+2? Answer with just the number."
      max_tokens: 10
    status_code: 200
  register: analysis_test
  retries: 3
  delay: 2
  when: litellm_start_service and (model_purposes.analysis is defined)
  failed_when: false
  tags: [litellm_configure, litellm_test]

- name: Display analysis model test result
  debug:
    msg: "{{ 'Analysis model test passed - response: ' + analysis_test.json.choices[0].message.content if analysis_test.json is defined and analysis_test.json.choices is defined else 'Analysis model test skipped or failed: ' + (analysis_test.json.error.message | default('No analysis model configured')) }}"
  when: analysis_test is defined
  tags: [litellm_configure, litellm_test]

- name: Summary of model tests
  debug:
    msg:
      - "=========================================="
      - "LiteLLM Model Test Summary"
      - "=========================================="
      - "Embedding model: {{ 'PASSED' if embedding_test is defined and embedding_test.status == 200 else 'SKIPPED/FAILED' }}"
      - "Fast model: {{ 'PASSED' if fast_test is defined and fast_test.status == 200 else 'SKIPPED/FAILED' }}"
      - "Analysis model: {{ 'PASSED' if analysis_test is defined and analysis_test.status == 200 else 'SKIPPED/FAILED' }}"
      - "=========================================="
  tags: [litellm_configure, litellm_test]

