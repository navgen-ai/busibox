---
# LiteLLM Role - Main Tasks
# Created: 2025-10-16
# Purpose: Install and configure LiteLLM proxy

- name: Load secrets
  include_vars:
    file: "{{ playbook_dir }}/roles/secrets/vars/vault.{{ deployment_environment | default('dev') }}.yml"
  no_log: true
  tags:
    - always

- name: Include installation tasks
  include_tasks:
    file: install.yml
    apply:
      tags: [litellm, litellm_install, llm_litellm]
  tags: [litellm, litellm_install, llm_litellm]

- name: Include configuration tasks
  include_tasks:
    file: configure.yml
    apply:
      tags: [litellm, litellm_configure, llm_litellm]
  tags: [litellm, litellm_configure, llm_litellm]

