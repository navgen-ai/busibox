---
# LiteLLM Docker Deployment Tasks
#
# Deploys LiteLLM gateway via Docker Compose
# Used when deploy_target == 'docker'

- name: Force-sync database user password before LiteLLM startup
  include_role:
    name: docker_common
    tasks_from: compose_exec
  vars:
    docker_exec_service: postgres
    docker_exec_command: >
      psql -U postgres -c
      "ALTER USER {{ postgres_user }} WITH PASSWORD '{{ postgres_password | replace(\"'\", \"''\") }}';"

- name: Verify LiteLLM database credentials before startup
  include_role:
    name: docker_common
    tasks_from: compose_exec
  vars:
    docker_exec_service: postgres
    docker_exec_command: >
      sh -c "PGPASSWORD='{{ postgres_password | replace(\"'\", \"'\\''\") }}'
      psql -h localhost -U {{ postgres_user }} -d litellm -c 'SELECT 1;'"

- name: Start LiteLLM container
  include_role:
    name: docker_common
    tasks_from: compose_up
  vars:
    docker_services_to_start:
      - litellm
    docker_wait_for_health: true

- name: Wait for LiteLLM to be ready
  include_role:
    name: docker_common
    tasks_from: wait_healthy
  vars:
    docker_wait_service: litellm
    docker_wait_timeout: 120

- name: Verify LiteLLM health endpoint
  ansible.builtin.uri:
    # /health requires auth when master_key is enabled.
    # Use liveness endpoint for unauthenticated readiness checks.
    # Use Docker service hostname (manager runs on Docker network)
    url: "http://litellm:{{ litellm_port }}/health/liveliness"
    method: GET
    status_code: [200]
  register: litellm_health
  retries: 10
  delay: 5
  until: litellm_health.status == 200
  failed_when: false

- name: Display LiteLLM status
  ansible.builtin.debug:
    msg: |
      LiteLLM is running and ready
      Health: http://litellm:{{ litellm_port }}/health/liveliness
      API: http://litellm:{{ litellm_port }}
