---
# LiteLLM Docker Deployment Tasks
#
# Deploys LiteLLM gateway via Docker Compose
# Used when deploy_target == 'docker'

- name: Start LiteLLM container
  include_role:
    name: docker_common
    tasks_from: compose_up
  vars:
    docker_services_to_start:
      - litellm
    docker_wait_for_health: true

- name: Wait for LiteLLM to be ready
  include_role:
    name: docker_common
    tasks_from: wait_healthy
  vars:
    docker_wait_service: litellm
    docker_wait_timeout: 60

- name: Verify LiteLLM health endpoint
  ansible.builtin.uri:
    url: "http://localhost:{{ litellm_port }}/health"
    method: GET
    status_code: [200]
  register: litellm_health
  retries: 5
  delay: 3
  until: litellm_health.status == 200
  failed_when: false

- name: Display LiteLLM status
  ansible.builtin.debug:
    msg: |
      LiteLLM is running and ready
      Health: http://localhost:{{ litellm_port }}/health
      API: http://localhost:{{ litellm_port }}
