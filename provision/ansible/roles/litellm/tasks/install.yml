---
# LiteLLM Installation Tasks

- name: Update apt cache
  apt:
    update_cache: yes
    cache_valid_time: 3600
  tags: [litellm_install]

- name: Install system dependencies
  apt:
    name:
      - python3-pip
      - python3-venv
      - python3-dev
      - build-essential
      - curl
      - ca-certificates
    state: present
  tags: [litellm_install]

- name: Create LiteLLM system group
  group:
    name: "{{ litellm_group }}"
    system: yes
    state: present
  tags: [litellm_install]

- name: Create LiteLLM system user
  user:
    name: "{{ litellm_user }}"
    group: "{{ litellm_group }}"
    system: yes
    create_home: yes
    home: "{{ litellm_home }}"
    shell: /bin/bash
    comment: "LiteLLM Service User"
  tags: [litellm_install]

- name: Create LiteLLM directories
  file:
    path: "{{ item }}"
    state: directory
    owner: "{{ litellm_user }}"
    group: "{{ litellm_group }}"
    mode: '0755'
  loop:
    - "{{ litellm_install_dir }}"
    - "{{ litellm_home }}"
    - "{{ litellm_config_dir }}"
  tags: [litellm_install]

- name: Create Python virtual environment
  command: "python3 -m venv {{ litellm_venv_dir }}"
  args:
    creates: "{{ litellm_venv_dir }}/bin/python"
  become: true
  become_user: "{{ litellm_user }}"
  tags: [litellm_install]

- name: Upgrade pip in virtual environment
  pip:
    name:
      - pip
      - setuptools
      - wheel
    state: latest
    virtualenv: "{{ litellm_venv_dir }}"
  become: true
  become_user: "{{ litellm_user }}"
  tags: [litellm_install]

- name: Install LiteLLM
  pip:
    name: "litellm{% if litellm_version != 'latest' %}=={{ litellm_version }}{% endif %}[proxy]"
    virtualenv: "{{ litellm_venv_dir }}"
  become: true
  become_user: "{{ litellm_user }}"
  tags: [litellm_install]

- name: Install additional dependencies
  pip:
    name:
      - fastapi
      - uvicorn
      - pyyaml
      - python-dotenv
      - psycopg2-binary  # PostgreSQL adapter
      - prisma  # Database ORM for LiteLLM
    virtualenv: "{{ litellm_venv_dir }}"
  become: true
  become_user: "{{ litellm_user }}"
  tags: [litellm_install]

- name: Fix database table ownership for LiteLLM (change from test user to configured user)
  shell: |
    set -e
    # Extract database connection details from URL
    DB_URL="{{ litellm_database_url }}"
    DB_NAME=$(echo "$DB_URL" | sed -n 's|.*@[^/]*/\([^?]*\).*|\1|p')
    DB_USER=$(echo "$DB_URL" | sed -n 's|.*://\([^:]*\):.*|\1|p')
    
    echo "Fixing ownership for database: $DB_NAME, user: $DB_USER"
    
    # Change ownership of all LiteLLM tables to the configured user
    for table in $(psql "$DB_URL" -t -c "SELECT tablename FROM pg_tables WHERE schemaname = 'public' AND (tablename LIKE 'LiteLLM_%' OR tablename = '_prisma_migrations');" 2>/dev/null | tr -d ' '); do
      if [ -n "$table" ]; then
        echo "Changing ownership of table: $table"
        psql "$DB_URL" -c "ALTER TABLE \"$table\" OWNER TO ${DB_USER};" 2>/dev/null || echo "  Failed to change ownership of $table"
      fi
    done
    
    # Change ownership of all sequences
    for seq in $(psql "$DB_URL" -t -c "SELECT sequencename FROM pg_sequences WHERE schemaname = 'public';" 2>/dev/null | tr -d ' '); do
      if [ -n "$seq" ]; then
        echo "Changing ownership of sequence: $seq"
        psql "$DB_URL" -c "ALTER SEQUENCE \"$seq\" OWNER TO ${DB_USER};" 2>/dev/null || echo "  Failed to change ownership of $seq"
      fi
    done
    
    echo "Ownership changes complete"
  args:
    executable: /bin/bash
  become: yes
  become_user: root
  when: litellm_enable_database
  register: ownership_fix
  failed_when: false
  tags: [litellm_install]

- name: Display ownership fix results
  debug:
    msg: "{{ ownership_fix.stdout_lines }}"
  when: 
    - litellm_enable_database
    - ownership_fix.stdout_lines is defined
  tags: [litellm_install]

- name: Generate Prisma binaries for LiteLLM database support
  shell: |
    set -e
    source {{ litellm_venv_dir }}/bin/activate
    export DATABASE_URL="{{ litellm_database_url }}"
    
    # Navigate to the correct directory where Prisma schema is located
    PRISMA_DIR=$(python -c "import os, litellm; print(os.path.dirname(litellm.__file__))")/proxy
    
    echo "Prisma schema directory: $PRISMA_DIR"
    cd "$PRISMA_DIR"
    
    # Generate Prisma client
    echo "Running prisma generate..."
    prisma generate
    
    # Push schema to database
    echo "Running prisma db push..."
    prisma db push --accept-data-loss --skip-generate
  args:
    executable: /bin/bash
  become: yes
  become_user: "{{ litellm_user }}"
  when: litellm_enable_database
  tags: [litellm_install]

- name: Verify LiteLLM installation
  shell: |
    {{ litellm_venv_dir }}/bin/python -c "import litellm; from importlib.metadata import version; print('LiteLLM version:', version('litellm')); print('LiteLLM imported successfully!')"
  args:
    executable: /bin/bash
  register: litellm_version_check
  become: true
  become_user: "{{ litellm_user }}"
  changed_when: false
  tags: [litellm_install]

- name: Display LiteLLM version
  debug:
    msg: "{{ litellm_version_check.stdout_lines }}"
  tags: [litellm_install]

