---
# Bridge Service Role Defaults
# Created: 2026-01-18
# Purpose: Configure multi-channel communication bridge (Signal, Email, WhatsApp, Webhooks)
# Note: This service is under development

# Signal CLI REST API configuration
signal_cli_image: "bbernhard/signal-cli-rest-api:latest"
signal_cli_container_name: "signal-cli-rest-api"
signal_cli_port: 8080
signal_cli_data_dir: "/srv/signal-cli"

# Bridge service configuration
bridge_dir: "/srv/bridge"
bridge_venv: "/srv/bridge/venv"
bridge_user: "bridge"
bridge_group: "bridge"

# Service configuration
bridge_service_name: "bridge"
bridge_enabled: true

# Bot behavior (Signal-specific for now)
signal_bot_enable_web_search: true
signal_bot_enable_doc_search: true
signal_bot_default_model: "auto"
signal_bot_poll_interval: 1.0

# Rate limiting
signal_bot_rate_limit_messages: 30
signal_bot_rate_limit_window: 60

# Max message length (Signal has a ~8000 char limit, use 4000 for safety)
signal_bot_max_message_length: 4000

# Logging
bridge_log_level: "INFO"
bridge_debug: false

# HTTP API server
bridge_api_port: 8081

# Phone number (from vault - Signal-specific)
signal_bot_phone_number: "{{ secrets.bridge.phone_number | default('') }}"

# Auth configuration (Zero Trust - delegation token from vault)
# The delegation token is created for a signal-bot service account user
# via the AuthZ /oauth/delegation/create endpoint
bridge_delegation_token: "{{ secrets.bridge.delegation_token | default('') }}"

# Allowed phone numbers (empty = allow all)
signal_bot_allowed_numbers: []

# Email channel configuration (from vault, managed via deploy-api config store)
bridge_email_enabled: "{{ secrets.bridge.email_enabled | default('false') }}"
bridge_smtp_host: "{{ secrets.bridge.smtp_host | default('') }}"
bridge_smtp_port: "{{ secrets.bridge.smtp_port | default('') }}"
bridge_smtp_user: "{{ secrets.bridge.smtp_user | default('') }}"
bridge_smtp_password: "{{ secrets.bridge.smtp_password | default('') }}"
bridge_smtp_secure: "{{ secrets.bridge.smtp_secure | default('false') }}"
bridge_email_from: "{{ secrets.bridge.email_from | default('') }}"
bridge_resend_api_key: "{{ secrets.bridge.resend_api_key | default('') }}"

# Future channel configurations (placeholders)
# whatsapp_enabled: false
# webhook_enabled: false
