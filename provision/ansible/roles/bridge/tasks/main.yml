---
# Bridge Service Installation and Configuration
# Created: 2026-01-18
# Purpose: Deploy multi-channel communication bridge (Signal, Email, WhatsApp, Webhooks)
# Note: This service is under development and deployment is optional/non-blocking

- name: Load secrets
  include_vars:
    file: "{{ playbook_dir }}/roles/secrets/vars/vault.{{ deployment_environment | default('dev') }}.yml"
  no_log: true

- name: Load shared secrets mapping
  include_vars:
    file: "{{ playbook_dir }}/roles/secrets/vars/shared_secrets.yml"

- name: Install Docker (for signal-cli-rest-api)
  ansible.builtin.apt:
    name:
      - docker.io
      - docker-compose
      - python3-docker
    state: present
    update_cache: true

- name: Ensure Docker is running
  ansible.builtin.systemd:
    name: docker
    state: started
    enabled: true

- name: Create signal-cli data directory
  ansible.builtin.file:
    path: "{{ signal_cli_data_dir }}"
    state: directory
    mode: "0755"

- name: Pull signal-cli-rest-api image
  community.docker.docker_image:
    name: "{{ signal_cli_image }}"
    source: pull
    force_source: true

- name: Run signal-cli-rest-api container
  community.docker.docker_container:
    name: "{{ signal_cli_container_name }}"
    image: "{{ signal_cli_image }}"
    state: started
    restart_policy: unless-stopped
    ports:
      - "{{ signal_cli_port }}:8080"
    volumes:
      - "{{ signal_cli_data_dir }}:/home/.local/share/signal-cli"
    env:
      MODE: "json-rpc"

- name: Wait for signal-cli-rest-api to be ready
  ansible.builtin.uri:
    url: "http://localhost:{{ signal_cli_port }}/v1/about"
    method: GET
  register: signal_cli_health
  until: signal_cli_health.status == 200
  retries: 30
  delay: 2

# Bridge Service Python Application
- name: Install Python dependencies
  ansible.builtin.apt:
    name:
      - python3
      - python3-pip
      - python3-venv
    state: present

- name: Create bridge user
  ansible.builtin.user:
    name: "{{ bridge_user }}"
    system: true
    shell: /usr/sbin/nologin
    home: "{{ bridge_dir }}"
    create_home: false

- name: Create bridge directory
  ansible.builtin.file:
    path: "{{ bridge_dir }}"
    state: directory
    owner: "{{ bridge_user }}"
    group: "{{ bridge_group }}"
    mode: "0755"

- name: Create bridge app directory
  ansible.builtin.file:
    path: "{{ bridge_dir }}/app"
    state: directory
    owner: "{{ bridge_user }}"
    group: "{{ bridge_group }}"
    mode: "0755"

- name: Copy bridge source code
  ansible.builtin.copy:
    src: "{{ playbook_dir }}/../../srv/bridge/app/"
    dest: "{{ bridge_dir }}/app/"
    owner: "{{ bridge_user }}"
    group: "{{ bridge_group }}"
    mode: "0644"
  notify: restart bridge

- name: Copy requirements.txt
  ansible.builtin.copy:
    src: "{{ playbook_dir }}/../../srv/bridge/requirements.txt"
    dest: "{{ bridge_dir }}/requirements.txt"
    owner: "{{ bridge_user }}"
    group: "{{ bridge_group }}"
    mode: "0644"
  register: bridge_requirements_file

- name: Check if venv pip exists
  ansible.builtin.stat:
    path: "{{ bridge_venv }}/bin/pip"
  register: bridge_venv_pip

- name: Remove broken venv (missing pip)
  ansible.builtin.file:
    path: "{{ bridge_venv }}"
    state: absent
  when: not bridge_venv_pip.stat.exists

- name: Create Python virtual environment
  ansible.builtin.command:
    cmd: python3 -m venv {{ bridge_venv }}
    creates: "{{ bridge_venv }}/bin/pip"

- name: Install Python dependencies in venv
  ansible.builtin.command:
    cmd: "{{ bridge_venv }}/bin/pip install -r {{ bridge_dir }}/requirements.txt"
  register: bridge_pip_install
  changed_when: "'Successfully installed' in bridge_pip_install.stdout"
  notify: restart bridge

- name: Upgrade dependencies when requirements.txt changes
  ansible.builtin.command:
    cmd: "{{ bridge_venv }}/bin/pip install --upgrade -r {{ bridge_dir }}/requirements.txt"
  when: bridge_requirements_file.changed
  notify: restart bridge

- name: Set venv ownership
  ansible.builtin.file:
    path: "{{ bridge_venv }}"
    owner: "{{ bridge_user }}"
    group: "{{ bridge_group }}"
    recurse: true

- name: Create bridge environment file
  ansible.builtin.template:
    src: bridge.env.j2
    dest: "{{ bridge_dir }}/.env"
    owner: "{{ bridge_user }}"
    group: "{{ bridge_group }}"
    mode: "0600"
  notify: restart bridge

- name: Create bridge systemd service
  ansible.builtin.template:
    src: bridge.service.j2
    dest: /etc/systemd/system/{{ bridge_service_name }}.service
    mode: "0644"
  notify: restart bridge

- name: Enable and start bridge service
  ansible.builtin.systemd:
    name: "{{ bridge_service_name }}"
    enabled: "{{ bridge_enabled }}"
    state: "{{ 'started' if bridge_enabled else 'stopped' }}"
    daemon_reload: true

- name: Create registration helper script (Signal)
  ansible.builtin.template:
    src: register-signal.sh.j2
    dest: /usr/local/bin/register-signal
    mode: "0755"

- name: Write deployment version file
  copy:
    content: |
      {
        "git_commit": "{{ git_deploy_commit | default(lookup('pipe', 'cd ' + playbook_dir + '/../.. && git rev-parse --short HEAD 2>/dev/null || echo unknown'), true) }}",
        "branch": "{{ git_deploy_branch | default(lookup('pipe', 'cd ' + playbook_dir + '/../.. && git branch --show-current 2>/dev/null || echo unknown'), true) }}",
        "timestamp": "{{ now(utc=true).isoformat() }}",
        "deployed_by": "ansible"
      }
    dest: /opt/bridge/.deploy_version
    owner: "{{ bridge_user }}"
    group: "{{ bridge_group }}"
    mode: "0644"
  ignore_errors: true

- name: Create status script
  ansible.builtin.copy:
    dest: /usr/local/bin/bridge-status
    mode: "0755"
    content: |
      #!/bin/bash
      echo "=== Signal CLI REST API ==="
      curl -s http://localhost:{{ signal_cli_port }}/v1/about | jq .
      echo ""
      echo "=== Bridge Service ==="
      systemctl status {{ bridge_service_name }} --no-pager
      echo ""
      echo "=== Recent Logs ==="
      journalctl -u {{ bridge_service_name }} -n 20 --no-pager
