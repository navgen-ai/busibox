---
# Bridge API Docker Deployment Tasks
#
# Deploys Bridge API via Docker Compose
# Used when deploy_target == 'docker'

- name: Build Bridge API container
  include_role:
    name: docker_common
    tasks_from: compose_build
  vars:
    docker_services_to_build:
      - bridge-api
    docker_build_no_cache: "{{ docker_force_rebuild | default(false) }}"

- name: Start Bridge API container
  include_role:
    name: docker_common
    tasks_from: compose_up
  vars:
    docker_services_to_start:
      - bridge-api
    docker_wait_for_health: true

- name: Wait for Bridge API to be ready
  include_role:
    name: docker_common
    tasks_from: wait_healthy
  vars:
    docker_wait_service: bridge-api
    docker_wait_timeout: 60

- name: Display Bridge API status
  ansible.builtin.debug:
    msg: |
      Bridge API is running and ready
      API: http://localhost:{{ bridge_api_port | default(8081) }}

- name: Re-apply stored bridge runtime config after redeploy
  ansible.builtin.uri:
    url: "http://localhost:8011/api/v1/config/apply/bridge"
    method: POST
    headers:
      Authorization: "Bearer {{ secrets.litellm_master_key if (secrets.litellm_master_key | default('') | length > 0) else (secrets.litellm_api_key | default('')) }}"
    return_content: true
    status_code:
      - 200
  register: bridge_config_apply_result
  retries: 5
  delay: 2
  until: bridge_config_apply_result.status == 200

- name: Show bridge runtime config apply result
  ansible.builtin.debug:
    msg: "{{ bridge_config_apply_result.json.message | default('Bridge runtime config applied after redeploy.') }}"
