---
# Neo4j LXC/Proxmox Deployment Tasks
#
# Deploys Neo4j natively inside dedicated neo4j-lxc.
# Used when deploy_target != 'docker' (Proxmox/LXC path).

- name: Install prerequisites for Neo4j apt repo
  ansible.builtin.apt:
    name:
      - ca-certificates
      - curl
      - gnupg
    state: present
    update_cache: true

- name: Ensure apt keyring directory exists
  ansible.builtin.file:
    path: /etc/apt/keyrings
    state: directory
    mode: "0755"

- name: Add Neo4j apt repository key
  ansible.builtin.get_url:
    url: https://debian.neo4j.com/neotechnology.gpg.key
    dest: /tmp/neo4j-archive-keyring.asc
    mode: "0644"

- name: Convert Neo4j apt key to keyring format
  ansible.builtin.command: >
    gpg --dearmor --yes --output /etc/apt/keyrings/neo4j.gpg /tmp/neo4j-archive-keyring.asc
  args:
    creates: /etc/apt/keyrings/neo4j.gpg

- name: Add Neo4j apt repository
  ansible.builtin.copy:
    dest: /etc/apt/sources.list.d/neo4j.list
    mode: "0644"
    content: |
      deb [signed-by=/etc/apt/keyrings/neo4j.gpg] https://debian.neo4j.com stable 5

- name: Remove temporary Neo4j apt key file
  ansible.builtin.file:
    path: /tmp/neo4j-archive-keyring.asc
    state: absent

- name: Install Neo4j package
  ansible.builtin.apt:
    name: neo4j
    state: present
    update_cache: true
    policy_rc_d: 101

- name: Ensure Neo4j data and log directories exist
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: neo4j
    group: neo4j
    mode: "0755"
  loop:
    - /srv/neo4j
    - /srv/neo4j/data
    - /srv/neo4j/logs

- name: Remove legacy Neo4j managed block (prevents duplicate keys)
  ansible.builtin.blockinfile:
    path: /etc/neo4j/neo4j.conf
    marker: "# {mark} ANSIBLE MANAGED NEO4J SETTINGS"
    state: absent
  notify: Restart Neo4j

- name: Configure Neo4j server settings
  ansible.builtin.lineinfile:
    path: /etc/neo4j/neo4j.conf
    regexp: "^#?\\s*{{ item.key | regex_escape() }}\\s*=.*$"
    line: "{{ item.key }}={{ item.value }}"
    state: present
  loop:
    - { key: "server.default_listen_address", value: "0.0.0.0" }
    - { key: "server.bolt.listen_address", value: ":{{ neo4j_bolt_port | default(7687) }}" }
    - { key: "server.http.listen_address", value: ":{{ neo4j_http_port | default(7474) }}" }
    - { key: "dbms.security.auth_enabled", value: "true" }
    - { key: "server.directories.data", value: "/srv/neo4j/data" }
    - { key: "server.directories.logs", value: "/srv/neo4j/logs" }
  notify: Restart Neo4j

- name: Stop Neo4j before initial password setup
  ansible.builtin.systemd:
    name: neo4j
    state: stopped
  failed_when: false

# First deploy: initialise the auth store with the vault password.
# This is a no-op on redeploys (creates: guard skips when auth file exists),
# so vault password rotations need the re-sync block below to take effect.
- name: Set initial Neo4j password if auth db not initialized
  ansible.builtin.command: >
    neo4j-admin dbms set-initial-password {{ neo4j_password | default('changeme') }}
  args:
    creates: /srv/neo4j/data/dbms/auth
  no_log: true

- name: Ensure Neo4j service is enabled and running
  ansible.builtin.systemd:
    name: neo4j
    state: started
    enabled: true
    daemon_reload: true

- name: Wait for Neo4j HTTP port to be available
  ansible.builtin.wait_for:
    host: 127.0.0.1
    port: "{{ neo4j_http_port | default(7474) }}"
    state: started
    timeout: 120

- name: Wait for Neo4j health endpoint
  ansible.builtin.uri:
    url: "http://localhost:{{ neo4j_http_port | default(7474) }}"
    method: GET
    status_code:
      - 200
      - 401
  register: neo4j_health
  until: neo4j_health.status in [200, 401]
  retries: 30
  delay: 2

# ---------------------------------------------------------------------------
# Auth-store resync (idempotent)
#
# The `creates:` guard on set-initial-password above means Neo4j only honours
# the vault password on its very first boot. If NEO4J_PASSWORD is later
# rotated in the vault, data-api's env updates but Neo4j keeps validating
# against the old credential, producing Neo.ClientError.Security.Unauthorized.
#
# This block probes the current password via cypher-shell and, if rejected,
# stops Neo4j, removes only the auth file (graph data is preserved under
# /srv/neo4j/data), re-seeds the password, and restarts.
# ---------------------------------------------------------------------------

- name: Probe Neo4j auth with the vault password
  ansible.builtin.shell: |
    set -o pipefail
    cypher-shell \
      -a bolt://127.0.0.1:{{ neo4j_bolt_port | default(7687) }} \
      -u {{ neo4j_user | default('neo4j') }} \
      -p "$NEO4J_PASSWORD" \
      --non-interactive \
      "RETURN 1" >/dev/null 2>&1
  args:
    executable: /bin/bash
  environment:
    NEO4J_PASSWORD: "{{ neo4j_password | default('changeme') }}"
  register: neo4j_auth_probe
  changed_when: false
  failed_when: false
  no_log: true

- name: Neo4j auth-store resync required
  when: neo4j_auth_probe.rc is defined and neo4j_auth_probe.rc != 0
  block:
    - name: Log auth-store drift (password does not match vault)
      ansible.builtin.debug:
        msg: >
          Neo4j rejected the vault password. Resetting its auth store to
          re-sync with NEO4J_PASSWORD. Graph data is untouched.

    - name: Stop Neo4j for auth reset
      ansible.builtin.systemd:
        name: neo4j
        state: stopped

    - name: Remove stale Neo4j auth file
      ansible.builtin.file:
        path: /srv/neo4j/data/dbms/auth
        state: absent

    - name: Re-seed Neo4j initial password from vault
      ansible.builtin.command: >
        neo4j-admin dbms set-initial-password {{ neo4j_password | default('changeme') }}
      no_log: true

    - name: Start Neo4j after auth reset
      ansible.builtin.systemd:
        name: neo4j
        state: started

    - name: Wait for Neo4j bolt port after auth reset
      ansible.builtin.wait_for:
        host: 127.0.0.1
        port: "{{ neo4j_bolt_port | default(7687) }}"
        state: started
        timeout: 120

    - name: Verify re-synced password works
      ansible.builtin.shell: |
        set -o pipefail
        cypher-shell \
          -a bolt://127.0.0.1:{{ neo4j_bolt_port | default(7687) }} \
          -u {{ neo4j_user | default('neo4j') }} \
          -p "$NEO4J_PASSWORD" \
          --non-interactive \
          "RETURN 1"
      args:
        executable: /bin/bash
      environment:
        NEO4J_PASSWORD: "{{ neo4j_password | default('changeme') }}"
      register: neo4j_auth_reverify
      changed_when: true
      no_log: true

    - name: Auth reset succeeded
      ansible.builtin.debug:
        msg: "Neo4j auth store re-synced with vault password"
      when: neo4j_auth_reverify.rc == 0

- name: Display Neo4j status
  ansible.builtin.debug:
    msg: |
      Neo4j is running and ready
      Browser: http://{{ ansible_host }}:{{ neo4j_http_port | default(7474) }}
      Bolt: bolt://{{ ansible_host }}:{{ neo4j_bolt_port | default(7687) }}
