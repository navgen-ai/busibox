---
- name: Restart Redis
  systemd:
    name: redis-server
    state: restarted
  tags: [redis, data]

- name: Restart data API
  systemd:
    name: data-api
    state: restarted
    daemon_reload: yes
  tags: [data, data_start]

- name: Restart data worker
  systemd:
    name: data-worker
    state: restarted
    daemon_reload: yes
  tags: [data, data_start]

- name: restart data services
  systemd:
    name: "{{ item }}"
    state: restarted
    daemon_reload: yes
  loop:
    - data-api
    - data-worker
  tags: [data, data_start]

- name: Reload nginx
  systemd:
    name: nginx
    state: reloaded
  tags: [data, data_start]

