---
# Deploy model registry configuration to data service

- name: Create data config directory
  file:
    path: /etc/data
    state: directory
    mode: '0755'
    owner: root
    group: root
  tags: [data, data_configure, model_registry]

# Merge default_purposes + environment overrides and resolve aliases.
# Aliases: if a value matches another purpose key (not an available_model key),
# follow the chain until a concrete model key is reached.
- name: Merge default and environment model purposes
  set_fact:
    _merged_purposes: "{{ (default_purposes | default({})) | combine(model_purposes | default({})) }}"
  tags: [data, data_configure, model_registry]

- name: Resolve model purpose aliases
  set_fact:
    resolved_purposes: >-
      {%- set merged = _merged_purposes -%}
      {%- set ns = namespace(json='{') -%}
      {%- for purpose, value in merged.items() -%}
        {%- set ns2 = namespace(v=value, depth=0) -%}
        {%- for _ in range(10) -%}
          {%- if ns2.v in merged and ns2.v not in available_models and ns2.depth < 10 -%}
            {%- set ns2.v = merged[ns2.v] -%}
            {%- set ns2.depth = ns2.depth + 1 -%}
          {%- endif -%}
        {%- endfor -%}
        {%- if not loop.first -%}{%- set ns.json = ns.json ~ ', ' -%}{%- endif -%}
        {%- set ns.json = ns.json ~ '"' ~ purpose ~ '": "' ~ ns2.v ~ '"' -%}
      {%- endfor -%}
      {{ ns.json ~ '}' }}
  tags: [data, data_configure, model_registry]

- name: Deploy model registry configuration
  template:
    src: model_registry.json.j2
    dest: "{{ model_registry_path }}"
    mode: '0644'
    owner: root
    group: root
  notify: restart data services
  tags: [data, data_configure, model_registry]

- name: Verify model registry file
  stat:
    path: "{{ model_registry_path }}"
  register: registry_file
  tags: [data, data_configure, model_registry]

- name: Display model registry status
  debug:
    msg: "Model registry deployed: {{ registry_file.stat.exists }}"
  tags: [data, data_configure, model_registry]

