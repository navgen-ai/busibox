---
# Apply database migrations for data service

- name: Ensure busibox_user exists
  become_user: postgres
  delegate_to: "{{ postgres_host }}"
  postgresql_user:
    name: busibox_user
    password: "{{ secrets.postgresql.password }}"
    role_attr_flags: LOGIN,CREATEDB
    state: present
  tags: [data, data_migrations, data_db]

- name: Ensure files database exists
  become_user: postgres
  delegate_to: "{{ postgres_host }}"
  postgresql_db:
    name: "{{ files_db | default('files') }}"
    owner: busibox_user
    encoding: UTF8
    lc_collate: en_US.UTF-8
    lc_ctype: en_US.UTF-8
    template: template0
    state: present
  tags: [data, data_migrations, data_db]

- name: Ensure test_files database exists (for pytest)
  become_user: postgres
  delegate_to: "{{ postgres_host }}"
  postgresql_db:
    name: "test_files"
    owner: busibox_user
    encoding: UTF8
    lc_collate: en_US.UTF-8
    lc_ctype: en_US.UTF-8
    template: template0
    state: present
  when: enable_pytest_databases | default(false)
  tags: [data, data_migrations, data_db, data_pytest_db]

- name: Create migrations directory
  file:
    path: /srv/data/migrations
    state: directory
    mode: '0755'
  tags: [data, data_migrations]

- name: Check if migrations source directory exists
  stat:
    path: "{{ playbook_dir }}/../../srv/data/migrations"
  register: migrations_source
  delegate_to: localhost
  tags: [data, data_migrations]

- name: Copy migration files
  copy:
    src: "{{ playbook_dir }}/../../srv/data/migrations/"
    dest: /srv/data/migrations/
    mode: '0644'
  when: migrations_source.stat.exists
  tags: [data, data_migrations]

- name: Check if multi-flow migration file exists
  stat:
    path: /srv/data/migrations/add_multi_flow_support.sql
  register: multi_flow_migration_file
  tags: [data, data_migrations]

- name: Check if multi-flow migration has been applied
  shell: |
    PGPASSWORD='{{ secrets.postgresql.password }}' psql -h {{ postgres_host }} -U {{ postgres_user }} -d {{ files_db }} -tAc \
    "SELECT EXISTS (SELECT 1 FROM information_schema.columns WHERE table_name='data_chunks' AND column_name='processing_strategy');"
  register: migration_check
  changed_when: false
  when: multi_flow_migration_file.stat.exists
  tags: [data, data_migrations]

- name: Apply multi-flow support migration
  shell: |
    PGPASSWORD='{{ secrets.postgresql.password }}' psql -h {{ postgres_host }} -U {{ postgres_user }} -d {{ files_db }} -f /srv/data/migrations/add_multi_flow_support.sql
  when: 
    - multi_flow_migration_file.stat.exists
    - migration_check.stdout is defined
    - migration_check.stdout == 'f'
  register: migration_result
  tags: [data, data_migrations]

- name: Display multi-flow migration status
  debug:
    msg: "{{ 'Multi-flow migration applied successfully' if (migration_result.changed | default(false)) else ('Multi-flow migration skipped - file not found' if not multi_flow_migration_file.stat.exists else 'Multi-flow migration already applied') }}"
  tags: [data, data_migrations]

- name: Check if cleanup stage migration file exists
  stat:
    path: /srv/data/migrations/add_cleanup_stage.sql
  register: cleanup_migration_file
  tags: [data, data_migrations]

- name: Check if cleanup stage migration has been applied
  shell: |
    PGPASSWORD='{{ secrets.postgresql.password }}' psql -h {{ postgres_host }} -U {{ postgres_user }} -d {{ files_db }} -tAc \
    "SELECT EXISTS (SELECT 1 FROM pg_constraint WHERE conname='data_status_stage_check' AND consrc LIKE '%cleanup%');"
  register: cleanup_migration_check
  changed_when: false
  failed_when: false
  when: cleanup_migration_file.stat.exists
  tags: [data, data_migrations]

- name: Apply cleanup stage migration
  shell: |
    PGPASSWORD='{{ secrets.postgresql.password }}' psql -h {{ postgres_host }} -U {{ postgres_user }} -d {{ files_db }} -f /srv/data/migrations/add_cleanup_stage.sql
  when: 
    - cleanup_migration_file.stat.exists
    - cleanup_migration_check.stdout is defined
    - cleanup_migration_check.stdout != 't'
  register: cleanup_migration_result
  tags: [data, data_migrations]

- name: Display cleanup migration status
  debug:
    msg: "{{ 'Cleanup stage migration applied successfully' if (cleanup_migration_result.changed | default(false)) else ('Cleanup migration skipped - file not found' if not cleanup_migration_file.stat.exists else 'Cleanup stage migration already applied') }}"
  tags: [data, data_migrations]

