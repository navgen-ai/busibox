---
# vLLM Embedding Service Installation and Configuration
# Runs on same host as main vLLM but on different GPU and port

- name: Check if model is pre-cached on host
  stat:
    path: "{{ vllm_embedding_cache_dir }}/models--Qwen--Qwen3-Embedding-8B"
  register: model_cache_check
  delegate_to: "{{ inventory_hostname }}"

- name: Display model cache status
  debug:
    msg: >-
      Model cache status: {{ 'Found - vLLM will start quickly' if model_cache_check.stat.exists 
      else 'NOT FOUND - vLLM will download on first start (may take 30+ minutes)' }}

- name: Warn if model not cached
  fail:
    msg: |
      ⚠️  Model Qwen3-Embedding-8B is not pre-cached!
      
      vLLM will download the model on first start, which can take 30+ minutes.
      
      To pre-download models and speed up deployment:
      1. SSH to Proxmox host: ssh root@proxmox-host
      2. Run: cd /root/busibox/provision/pct/host
      3. Run: bash setup-llm-models.sh
      
      Then re-run this playbook.
      
      To continue anyway (with slow first start), add: -e skip_model_check=true
  when: 
    - not model_cache_check.stat.exists
    - skip_model_check is not defined or not skip_model_check

- name: Create vLLM embedding home directory
  file:
    path: "{{ vllm_embedding_home }}"
    state: directory
    owner: "{{ vllm_embedding_user }}"
    group: "{{ vllm_embedding_group }}"
    mode: "0755"

- name: Deploy vLLM embedding systemd service
  template:
    src: vllm-embedding.service.j2
    dest: /etc/systemd/system/vllm-embedding.service
    mode: "0644"
  notify: Reload systemd

- name: Enable vLLM embedding service
  systemd:
    name: vllm-embedding
    enabled: yes
    daemon_reload: yes
  when: vllm_embedding_enable_service

- name: Start vLLM embedding service
  systemd:
    name: vllm-embedding
    state: started
  when: vllm_embedding_start_service

- name: Wait for vLLM embedding to be ready (quick check)
  uri:
    url: "http://localhost:{{ vllm_embedding_port }}/health"
    method: GET
    status_code: 200
  register: vllm_embedding_health
  retries: 6
  delay: 5
  until: vllm_embedding_health.status == 200
  when: vllm_embedding_start_service
  ignore_errors: yes

- name: Display vLLM embedding status
  debug:
    msg: >-
      vLLM embedding server is {{ 'ready' if (vllm_embedding_health.status | default(0)) == 200 
      else 'starting (check logs: journalctl -u vllm-embedding -f)' }}

