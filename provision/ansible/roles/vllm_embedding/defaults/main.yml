---
# vLLM Embedding Role - Default Variables
# Purpose: Dedicated vLLM instance for embedding models on separate GPU

# Inherit from main vLLM role but override for embedding-specific config
vllm_embedding_version: "0.6.3"
vllm_embedding_install_dir: /opt/vllm  # Share installation with main vLLM
vllm_embedding_venv_dir: "{{ vllm_embedding_install_dir }}/venv"

# Service Configuration
vllm_embedding_user: vllm
vllm_embedding_group: vllm
vllm_embedding_home: /var/lib/vllm-embedding
vllm_embedding_cache_dir: /var/lib/llm-models/huggingface

# Network Configuration
vllm_embedding_host: "0.0.0.0"
# Port is set below from model registry

# Model Configuration - References model_registry.yml
# New structure: model_purposes.embedding -> model key, lookup in available_models
# This allows changing embedding models without modifying this file
vllm_embedding_model: "{{ available_models[model_purposes.embedding].model_name | default('Qwen/Qwen3-Embedding-8B') }}"
vllm_embedding_tensor_parallel_size: 1  # Single GPU for embeddings
vllm_embedding_gpu_memory_utilization: 0.85  # 8B model needs more memory
vllm_embedding_max_model_len: "{{ available_models[model_purposes.embedding].max_tokens | default(32768) }}"
vllm_embedding_max_num_seqs: 256  # Moderate throughput for larger model
vllm_embedding_trust_remote_code: true

# Performance Configuration
vllm_embedding_max_num_batched_tokens: null
vllm_embedding_enable_prefix_caching: false  # Not useful for embeddings
vllm_embedding_disable_log_stats: false

# CPU Offloading Configuration
# Embedding models can benefit from CPU offload for high-throughput scenarios
vllm_embedding_cpu_offload_gb: 50  # Offload 50GB for embeddings (less than main model)

# API Configuration - References model_registry.yml
vllm_embedding_served_model_name: "{{ available_models[model_purposes.embedding].model }}"  # Friendly name for liteLLM

# GPU and Port Configuration - Read from model registry
vllm_embedding_cuda_visible_devices: "{{ available_models[model_purposes.embedding].gpu | default('1') }}"
vllm_embedding_port: "{{ available_models[model_purposes.embedding].port | default(8001) }}"
vllm_embedding_api_key: null
vllm_embedding_enable_api_key: false

# Service Configuration
vllm_embedding_enable_service: true
vllm_embedding_start_service: true
vllm_embedding_restart_on_failure: true
vllm_embedding_restart_sec: 15
vllm_embedding_startup_timeout: 300  # 5 minutes (embedding models load faster)

# Resource Limits
# Increased to support CPU offloading
vllm_embedding_memory_limit: "70G"  # Model + CPU offload + overhead
vllm_embedding_cpu_limit: "4"

# CUDA Configuration - Set above from model registry

# HuggingFace Configuration
vllm_embedding_hf_token: ""  # Set via secrets if needed

