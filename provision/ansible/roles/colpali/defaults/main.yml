---
# ColPali Service Configuration
# Native ColPali implementation using colpali-engine package
# Runs on dedicated GPU for visual document embeddings

# Service Configuration
colpali_user: "colpali"
colpali_group: "colpali"
colpali_home: "/opt/colpali"
colpali_venv_dir: "{{ colpali_home }}/venv"

# Network Configuration
colpali_host: "0.0.0.0"
# Port is set below from model registry

# Model Configuration - References model_registry.yml
# New structure: model_purposes['visual-embedding'] -> model key, lookup in available_models
colpali_model: "{{ available_models[model_purposes['visual-embedding']].model_name | default('vidore/colpali-v1.3') }}"
colpali_device: "cuda:0"  # Device index within CUDA_VISIBLE_DEVICES
colpali_dtype: "bfloat16"

# GPU and Port Configuration - Read from model registry
colpali_cuda_visible_devices: "{{ available_models[model_purposes['visual-embedding']].gpu | default('0') }}"
colpali_port: "{{ available_models[model_purposes['visual-embedding']].port | default(8002) }}"

# HuggingFace Configuration
colpali_hf_token: "{{ secrets.huggingface.token | default('') }}"
colpali_cache_dir: "/var/lib/llm-models/huggingface"

# Performance Configuration
colpali_batch_size: 4
colpali_max_workers: 2

# Resource Limits
colpali_memory_limit: "16G"
colpali_cpu_limit: "4"

# CUDA Configuration
# GPU allocation strategy:
# - GPU 0: Ingest container (Marker PDF extraction + ColPali visual embeddings)
# - GPU 1+: vLLM container (LLM inference)
# 
# ColPali shares GPU 0 with Marker by default.
# Memory is managed automatically - Marker uses ~3.5GB per task, ColPali uses ~15GB.
# Future: Will support multi-GPU ColPali for larger workloads.
# GPU is set above from model registry

# Service Management
colpali_restart_on_failure: true
colpali_restart_sec: 10
colpali_startup_timeout: 300

