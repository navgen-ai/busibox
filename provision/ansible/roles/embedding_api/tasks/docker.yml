---
# Embedding API Docker Deployment Tasks
#
# Builds and deploys the Embedding API via Docker Compose.
# Separated from the data role so embedding-api can be deployed independently.

- name: Build Embedding API
  include_role:
    name: docker_common
    tasks_from: compose_build
  vars:
    docker_services_to_build:
      - embedding-api
    docker_build_no_cache: "{{ docker_force_rebuild | default(false) }}"

- name: Start Embedding API container
  include_role:
    name: docker_common
    tasks_from: compose_up
  vars:
    docker_services_to_start:
      - embedding-api
    docker_wait_for_health: true

- name: Wait for Embedding API to be ready
  include_role:
    name: docker_common
    tasks_from: wait_healthy
  vars:
    docker_wait_service: embedding-api
    docker_wait_timeout: 60

- name: Display Embedding API status
  ansible.builtin.debug:
    msg: |
      Embedding API is running and ready
      Embedding API: http://localhost:{{ embedding_port | default(8005) }}
