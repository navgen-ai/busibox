---
# Embedding API deployment tasks
# Deploys the FastEmbed-based embedding service to the data container
#
# Tag structure:
#   - embedding_api: runs all embedding_api tasks
#   - embedding_api_install: system deps, venv, pip packages
#   - embedding_api_deploy: source code sync
#   - embedding_api_configure: env file, systemd service
#   - embedding_api_start: enable/start service, health check

- name: Load secrets
  include_vars:
    file: "{{ playbook_dir }}/roles/secrets/vars/vault.{{ deployment_environment | default('dev') }}.yml"
  no_log: true
  tags:
    - always

- name: Create embedding user
  ansible.builtin.user:
    name: "{{ embedding_api_user }}"
    system: true
    shell: /usr/sbin/nologin
    createhome: true
    home: /home/{{ embedding_api_user }}
  become: true
  tags: [embedding_api, embedding_api_install]

- name: Create embedding directories
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: "{{ embedding_api_user }}"
    group: "{{ embedding_api_user }}"
    mode: "0755"
  become: true
  loop:
    - /opt/embedding
    - "{{ embedding_api_src_path }}"
    - "{{ embedding_api_log_path }}"
    - /etc/embedding
    - "{{ embedding_cache_dir }}"
  tags: [embedding_api, embedding_api_install]

- name: Install system dependencies
  ansible.builtin.apt:
    name:
      - python3
      - python3-venv
      - python3-pip
    state: present
  become: true
  tags: [embedding_api, embedding_api_install]

- name: Create Python virtual environment
  ansible.builtin.command:
    cmd: python3 -m venv {{ embedding_api_venv_path }}
    creates: "{{ embedding_api_venv_path }}/bin/python"
  become: true
  become_user: "{{ embedding_api_user }}"
  tags: [embedding_api, embedding_api_install]

- name: Upgrade pip in virtual environment
  ansible.builtin.pip:
    name:
      - pip
      - setuptools
      - wheel
    state: latest
    virtualenv: "{{ embedding_api_venv_path }}"
  become: true
  become_user: "{{ embedding_api_user }}"
  tags: [embedding_api, embedding_api_install]

- name: Copy embedding source code
  ansible.builtin.copy:
    src: "{{ playbook_dir }}/../../srv/embedding/src/"
    dest: "{{ embedding_api_src_path }}/"
    owner: "{{ embedding_api_user }}"
    group: "{{ embedding_api_user }}"
    mode: "0644"
  become: true
  notify: Restart embedding-api
  tags: [embedding_api, embedding_api_deploy]

- name: Copy requirements.txt
  ansible.builtin.copy:
    src: "{{ playbook_dir }}/../../srv/embedding/requirements.txt"
    dest: /opt/embedding/requirements.txt
    owner: "{{ embedding_api_user }}"
    group: "{{ embedding_api_user }}"
    mode: "0644"
  become: true
  register: requirements_changed
  tags: [embedding_api, embedding_api_deploy]

- name: Install Python dependencies
  ansible.builtin.pip:
    requirements: /opt/embedding/requirements.txt
    virtualenv: "{{ embedding_api_venv_path }}"
  become: true
  become_user: "{{ embedding_api_user }}"
  when: requirements_changed.changed or force_reinstall | default(false)
  tags: [embedding_api, embedding_api_install]

- name: Configure embedding-api environment
  ansible.builtin.template:
    src: embedding-api.env.j2
    dest: /etc/embedding/embedding-api.env
    owner: "{{ embedding_api_user }}"
    group: "{{ embedding_api_user }}"
    mode: "0600"
  become: true
  notify: Restart embedding-api
  tags: [embedding_api, embedding_api_configure]

- name: Configure embedding-api systemd service
  ansible.builtin.template:
    src: embedding-api.service.j2
    dest: /etc/systemd/system/embedding-api.service
    owner: root
    group: root
    mode: "0644"
  become: true
  notify: Restart embedding-api
  tags: [embedding_api, embedding_api_configure]

# Pre-download embedding model if not already cached
# This avoids slow startup on first run and prevents health check timeouts
- name: Get embedding model name from environment
  ansible.builtin.shell: |
    source /etc/embedding/embedding-api.env
    echo "$FASTEMBED_MODEL"
  args:
    executable: /bin/bash
  register: embedding_model_name
  changed_when: false
  tags: [embedding_api, embedding_api_deploy]

- name: Check if embedding model is already cached
  ansible.builtin.find:
    paths: "{{ embedding_cache_dir }}"
    patterns: "model*.onnx"
    recurse: yes
  register: cached_model_files
  become: true
  tags: [embedding_api, embedding_api_deploy]

- name: Pre-download embedding model if not cached
  ansible.builtin.shell: |
    {{ embedding_api_venv_path }}/bin/python -c "
    import os
    import sys
    
    # Set cache directory
    os.environ['FASTEMBED_CACHE_PATH'] = '{{ embedding_cache_dir }}'
    
    from fastembed import TextEmbedding
    import structlog
    
    logger = structlog.get_logger()
    model_name = '{{ embedding_model_name.stdout }}'
    cache_dir = '{{ embedding_cache_dir }}'
    
    logger.info(f'Pre-downloading embedding model: {model_name}')
    logger.info(f'Cache directory: {cache_dir}')
    
    try:
        embedder = TextEmbedding(model_name=model_name, cache_dir=cache_dir)
        # Warmup to ensure model is fully loaded
        list(embedder.embed(['warmup test']))
        logger.info('Embedding model downloaded successfully')
    except Exception as e:
        logger.error(f'Failed to download embedding model: {e}')
        sys.exit(1)
    "
  become: true
  become_user: "{{ embedding_api_user }}"
  when: cached_model_files.matched == 0
  register: model_download
  retries: 3
  delay: 10
  until: model_download.rc == 0
  tags: [embedding_api, embedding_api_deploy]

- name: Enable and start embedding-api service
  ansible.builtin.systemd:
    name: embedding-api
    enabled: true
    state: started
    daemon_reload: true
  become: true
  tags: [embedding_api, embedding_api_start]

- name: Wait for embedding-api to be healthy
  ansible.builtin.uri:
    url: "http://localhost:{{ embedding_api_port }}/health"
    method: GET
    status_code: 200
    return_content: true
    timeout: 30
  register: health_check
  retries: 60
  delay: 10
  until: health_check.status == 200 and health_check.json.model_loaded | default(false)
  tags: [embedding_api, embedding_api_start]

- name: Display embedding-api health status
  ansible.builtin.debug:
    msg: "Embedding API is healthy: {{ health_check.json }}"
  tags: [embedding_api, embedding_api_start]
