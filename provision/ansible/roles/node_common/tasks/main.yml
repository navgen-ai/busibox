# Install Node.js via NodeSource (stable, official repository)
- name: Install Node.js prerequisites
  apt:
    name:
      - curl
      - ca-certificates
      - gnupg
      - git
      - jq
      - build-essential
      - ffmpeg  # For video poster frame extraction in busibox-portal
    state: present
    update_cache: yes

- name: Add NodeSource GPG key
  shell: |
    mkdir -p /etc/apt/keyrings
    curl -fsSL https://deb.nodesource.com/gpgkey/nodesource-repo.gpg.key | gpg --dearmor -o /etc/apt/keyrings/nodesource.gpg
  args:
    creates: /etc/apt/keyrings/nodesource.gpg

- name: Add NodeSource repository (Node.js 20.x LTS)
  shell: |
    echo "deb [signed-by=/etc/apt/keyrings/nodesource.gpg] https://deb.nodesource.com/node_20.x nodistro main" | tee /etc/apt/sources.list.d/nodesource.list
  args:
    creates: /etc/apt/sources.list.d/nodesource.list

- name: Install Node.js
  apt:
    name: nodejs
    state: present
    update_cache: yes

- name: Verify Node.js installation
  command: node --version
  register: node_version
  changed_when: false

- name: Display Node.js version
  debug:
    msg: "Node.js {{ node_version.stdout }} installed"

- name: Create apps root directory
  file:
    path: /srv/apps
    state: directory
    mode: "0755"

- name: Install common Node.js utilities
  npm:
    name: "{{ item }}"
    global: yes
    state: present
  loop:
    - yarn
    - pnpm
