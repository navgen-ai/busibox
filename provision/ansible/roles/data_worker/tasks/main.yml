---
# Data Worker Role - Main Tasks

- name: Load secrets
  include_vars:
    file: "{{ playbook_dir }}/roles/secrets/vars/vault.{{ deployment_environment | default('dev') }}.yml"
  no_log: true

# Redis Installation (for job queue)
- name: Install Redis
  apt:
    name:
      - redis-server
      - redis-tools
    state: present
    update_cache: yes

- name: Configure Redis to listen on all interfaces
  lineinfile:
    path: /etc/redis/redis.conf
    regexp: '^bind '
    line: 'bind 0.0.0.0 ::1'
  notify: Restart Redis

- name: Enable Redis protected mode (require password for remote access)
  lineinfile:
    path: /etc/redis/redis.conf
    regexp: '^protected-mode '
    line: 'protected-mode no'
  notify: Restart Redis

- name: Start and enable Redis
  systemd:
    name: redis-server
    state: started
    enabled: yes

# Python Environment for Data Worker
- name: Install Python and dependencies
  apt:
    name:
      - python3
      - python3-pip
      - python3-venv
      - python3-dev
      - build-essential
      - poppler-utils  # For pdf2image (PDF page extraction)
      - tesseract-ocr  # For OCR on scanned PDFs
      - libtesseract-dev  # Tesseract development libraries
    state: present

- name: Create data worker directories
  file:
    path: "{{ item }}"
    state: directory
    mode: "0755"
  loop:
    - /srv/data
    - /opt/data-worker

- name: Create Python virtual environment
  shell: python3 -m venv /srv/data/venv
  args:
    creates: /srv/data/venv/bin/python

- name: Copy data worker source code
  copy:
    src: "{{ playbook_dir }}/../../srv/data/src/"
    dest: /srv/data/src/
    mode: "0644"

# Test documents are in a separate git repo for efficiency (large files)
# Clone/pull the testdocs repo to get sample files
- name: Install git for testdocs repo
  apt:
    name: git
    state: present
  when: testdocs_enabled | default(true)

# Deploy GitHub token to data container for private repo access
- name: Deploy GitHub token for testdocs access
  copy:
    content: "{{ secrets.github.personal_access_token }}"
    dest: /root/.github_token
    mode: '0600'
  when: 
    - testdocs_enabled | default(true)
    - secrets.github.personal_access_token is defined
  no_log: true

# Construct authenticated repo URL (same pattern as nextjs_app role)
- name: Set testdocs repo URL with authentication
  set_fact:
    testdocs_repo_url: "{% if secrets.github.personal_access_token is defined and secrets.github.personal_access_token %}https://{{ secrets.github.personal_access_token }}@github.com/jazzmind/busibox-testdocs.git{% else %}https://github.com/jazzmind/busibox-testdocs.git{% endif %}"
  no_log: true
  when: testdocs_enabled | default(true)

- name: Clone testdocs repo (first time)
  git:
    repo: "{{ testdocs_repo_url }}"
    dest: /srv/data/testdocs
    depth: 1
    version: "{{ testdocs_branch | default('main') }}"
    force: no
  register: testdocs_clone
  when: testdocs_enabled | default(true)
  ignore_errors: yes
  no_log: true

- name: Update testdocs repo (if already cloned)
  git:
    repo: "{{ testdocs_repo_url }}"
    dest: /srv/data/testdocs
    depth: 1
    version: "{{ testdocs_branch | default('main') }}"
    update: yes
  when: 
    - testdocs_enabled | default(true)
    - testdocs_clone is failed or testdocs_clone.changed == false
  no_log: true

- name: Create samples symlink to testdocs (backwards compatibility)
  file:
    src: /srv/data/testdocs
    dest: /srv/data/samples
    state: link
    force: yes
  when: testdocs_enabled | default(true)

- name: Copy requirements.txt
  copy:
    src: "{{ playbook_dir }}/../../srv/data/requirements.txt"
    dest: /srv/data/requirements.txt
    mode: "0644"

- name: Install Python dependencies
  pip:
    requirements: /srv/data/requirements.txt
    virtualenv: /srv/data/venv

- name: Check if spaCy model is already installed
  shell: /srv/data/venv/bin/python -c "import en_core_web_sm; print('OK')"
  register: spacy_model_check
  changed_when: false
  failed_when: false

- name: Download spaCy English model
  shell: |
    set -e
    /srv/data/venv/bin/python -m spacy download en_core_web_sm --no-cache-dir
  when: 
    - not ansible_check_mode
    - spacy_model_check.rc != 0
  register: spacy_download
  retries: 3
  delay: 5
  until: spacy_download.rc == 0

- name: Verify spaCy model installation
  shell: /srv/data/venv/bin/python -c "import en_core_web_sm; nlp = en_core_web_sm.load(); print('spaCy model loaded successfully')"
  register: spacy_verify
  changed_when: false
  when: not ansible_check_mode

- name: Create data worker environment file
  copy:
    dest: /srv/data/.env
    content: |
      # Redis configuration
      REDIS_HOST={{ redis_host | default('localhost') }}
      REDIS_PORT={{ redis_port | default('6379') }}
      REDIS_STREAM=jobs:data
      REDIS_CONSUMER_GROUP=workers
      
      # PostgreSQL configuration (files database)
      POSTGRES_HOST={{ postgres_host | default('10.96.200.203') }}
      POSTGRES_PORT={{ postgres_port | default('5432') }}
      POSTGRES_DB={{ files_db | default('files') }}
      POSTGRES_USER={{ postgres_user }}
      POSTGRES_PASSWORD={{ secrets.postgresql.password }}
      
      # Milvus configuration
      MILVUS_HOST={{ milvus_host | default('10.96.200.204') }}
      MILVUS_PORT={{ milvus_port | default('19530') }}
      MILVUS_COLLECTION={{ milvus_collection | default('documents') }}
      
      # MinIO configuration
      MINIO_ENDPOINT={{ minio_host | default(minio_ip) }}:{{ minio_port | default('9000') }}
      MINIO_ACCESS_KEY={{ minio_root_user }}
      MINIO_SECRET_KEY={{ minio_root_password }}
      MINIO_SECURE=false
      
      # liteLLM configuration
      LITELLM_BASE_URL={{ litellm_base_url | default('http://10.96.200.207:8000') }}
      LITELLM_API_KEY={{ secrets.litellm_master_key | default('') }}
      
      # Processing configuration
      CHUNK_SIZE_MIN=400
      CHUNK_SIZE_MAX=800
      CHUNK_OVERLAP_PCT=0.12
      EMBEDDING_MODEL={{ embedding_model | default('qwen3-embedding') }}
      EMBEDDING_DIMENSION={{ embedding_dimension | default('4096') }}
      
      # Timeout configuration (seconds)
      TIMEOUT_SMALL=300
      TIMEOUT_MEDIUM=600
      TIMEOUT_LARGE=1200
      
      # ColPali configuration (vision embeddings for PDFs)
      # Uses production ColPali via vllm_ip when use_production_vllm is true
      COLPALI_BASE_URL={{ colpali_base_url | default('http://' + vllm_ip + ':9006/v1') }}
      COLPALI_API_KEY={{ colpali_api_key | default('EMPTY') }}
      COLPALI_ENABLED={{ colpali_enabled | default('true') }}
      
      # Marker configuration (PDF extraction - gold standard, pdfplumber is fallback)
      MARKER_ENABLED={{ marker_enabled | default('true') }}
      MARKER_USE_GPU={{ marker_use_gpu | default('true') }}
      MARKER_GPU_DEVICE={{ marker_gpu_device | default('cuda') }}
      # Remote Marker service URL - if set, calls remote API instead of local Marker
      MARKER_SERVICE_URL={{ marker_service_url | default('') }}
      # Surya batch sizes - control VRAM usage (40MB per batch item for recognition)
      # Default 512 = ~20GB VRAM, set lower to share GPU with other services
      RECOGNITION_BATCH_SIZE={{ recognition_batch_size | default('128') }}
      DETECTOR_BATCH_SIZE={{ detector_batch_size | default('32') }}
      LAYOUT_BATCH_SIZE={{ layout_batch_size | default('16') }}
      # Table recognition - can fail on complex tables, lower batch size helps stability
      TABLE_REC_BATCH_SIZE={{ table_rec_batch_size | default('4') }}
      # Max boxes per table - reduce if getting tensor shape errors on complex tables
      TABLE_REC_MAX_BOXES={{ table_rec_max_boxes | default('100') }}
      
      # ONNX Runtime - disable CPU affinity (not supported in LXC containers)
      OMP_NUM_THREADS={{ omp_num_threads | default('4') }}
      
      # ColPali batch size - process pages in batches to avoid GPU OOM
      # Each page uses ~200MB VRAM, batch_size=3 is safe for most GPUs
      COLPALI_BATCH_SIZE={{ colpali_batch_size | default('3') }}
      
      # Worker configuration
      WORKER_ID={{ ansible_hostname }}
    mode: "0600"

- name: Create systemd service for data worker
  copy:
    dest: /etc/systemd/system/data-worker.service
    content: |
      [Unit]
      Description=Busibox File Data Worker
      After=network-online.target redis-server.service
      Wants=network-online.target
      Requires=redis-server.service
      
      [Service]
      Type=simple
      User=root
      WorkingDirectory=/srv/data/src
      EnvironmentFile=/srv/data/.env
      ExecStart=/srv/data/venv/bin/python worker.py
      
      # Clean up any orphan GPU processes before starting
      ExecStartPre=/bin/bash -c 'pkill -9 -f "surya|marker" 2>/dev/null || true; sleep 1'
      
      # Proper cleanup - kill all child processes and release GPU memory
      KillMode=control-group
      KillSignal=SIGTERM
      TimeoutStopSec=30
      # Force kill any remaining processes (including GPU child processes)
      ExecStopPost=/bin/bash -c 'pkill -9 -f "/srv/data/venv/bin/python" || true'
      
      Restart=always
      RestartSec=10
      StandardOutput=journal
      StandardError=journal
      
      [Install]
      WantedBy=multi-user.target
  register: data_service_file

- name: Reload systemd daemon if service file changed
  systemd:
    daemon_reload: yes
  when: data_service_file.changed

- name: Enable data worker service
  systemd:
    name: data-worker
    enabled: yes

- name: Write deployment version file for data worker
  copy:
    content: |
      {
        "commit": "{{ git_deploy_commit | default(lookup('pipe', 'cd ' + playbook_dir + '/../.. && git rev-parse --short HEAD 2>/dev/null || echo unknown'), true) }}",
        "branch": "{{ git_deploy_branch | default(lookup('pipe', 'cd ' + playbook_dir + '/../.. && git branch --show-current 2>/dev/null || echo unknown'), true) }}",
        "timestamp": "{{ now(utc=true).isoformat() }}",
        "deployed_by": "ansible"
      }
    dest: /opt/data-worker/.deploy_version
    mode: "0644"
  ignore_errors: true

- name: Write deployment version file to /srv (backup location)
  copy:
    content: |
      {
        "commit": "{{ git_deploy_commit | default(lookup('pipe', 'cd ' + playbook_dir + '/../.. && git rev-parse --short HEAD 2>/dev/null || echo unknown'), true) }}",
        "branch": "{{ git_deploy_branch | default(lookup('pipe', 'cd ' + playbook_dir + '/../.. && git branch --show-current 2>/dev/null || echo unknown'), true) }}",
        "timestamp": "{{ now(utc=true).isoformat() }}",
        "deployed_by": "ansible"
      }
    dest: /srv/data/.deploy_version
    mode: "0644"
  ignore_errors: true

- name: Restart data worker service (always restart on deploy)
  systemd:
    name: data-worker
    state: restarted
