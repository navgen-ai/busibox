---
# vLLM Port 8002 Role - Default Variables
# Shared installation vars (vllm_install_dir, vllm_venv_dir, etc.) are in vllm_common.

# Port configuration
vllm_port: 8002
vllm_service_name: "vllm-{{ vllm_port }}"

# Model assignment (set dynamically from model_config.yml)
vllm_assigned_model: ""

# Model Configuration (from model_config.yml)
vllm_default_model: ""
vllm_tensor_parallel_size: 1
vllm_cuda_visible_devices: ""
vllm_host: "0.0.0.0"

# LoRA Adapter Support
vllm_enable_lora: false
vllm_lora_base_model: ""
vllm_max_loras: 1
vllm_max_lora_rank: 128

# Performance Configuration
vllm_gpu_memory_utilization: 0.9
vllm_max_model_len: 8192
vllm_max_num_seqs: 256
vllm_trust_remote_code: false
vllm_max_num_batched_tokens: null
vllm_enable_prefix_caching: true
vllm_enable_chunked_prefill: false
vllm_enable_expert_parallel: false
vllm_kv_cache_dtype: ""        # e.g. "fp8" for Qwen3.6 FP8 MoE recipe
vllm_reasoning_parser: ""      # e.g. "qwen3" so vLLM splits <think> blocks
vllm_disable_log_stats: false
vllm_cpu_offload_gb: 0

# API Configuration
vllm_served_model_name: null
vllm_api_key: null
vllm_enable_api_key: false

# Service Configuration
vllm_enable_service: true
vllm_start_service: true
vllm_restart_on_failure: true
vllm_restart_sec: 15
vllm_log_level: info
vllm_memory_limit: "180G"
vllm_cpu_limit: "8"
vllm_health_check_enabled: true
vllm_health_check_interval: 60
vllm_startup_timeout: 900
