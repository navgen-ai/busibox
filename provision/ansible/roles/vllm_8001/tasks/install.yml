---
# vLLM Installation Tasks (shared across all port-based roles)
# This file can be symlinked or copied to other port roles

- name: Update apt cache
  apt:
    update_cache: yes
    cache_valid_time: 3600
  tags: [vllm_install]

- name: Install system dependencies
  apt:
    name:
      - build-essential
      - python3-pip
      - python3-venv
      - python3-dev
      - git
      - curl
      - wget
      - ca-certificates
    state: present
  tags: [vllm_install]

- name: Check if GPU devices are present in container
  shell: "ls -la /dev/nvidia* 2>/dev/null || echo 'No NVIDIA devices'"
  register: gpu_devices_check
  changed_when: false
  failed_when: false
  tags: [vllm_install, vllm_gpu]

- name: Display GPU device status
  debug:
    msg: "{{ gpu_devices_check.stdout_lines }}"
  tags: [vllm_install, vllm_gpu]

- name: Check if NVIDIA drivers are installed
  shell: "nvidia-smi 2>&1 || echo 'NOT_INSTALLED'"
  register: nvidia_drivers_check
  changed_when: false
  failed_when: false
  tags: [vllm_install, vllm_gpu]

- name: Install NVIDIA drivers using install-nvidia-drivers.sh (on Proxmox host)
  shell: "bash /root/busibox/provision/pct/host/install-nvidia-drivers.sh {{ container_id }}"
  delegate_to: localhost
  become: false
  when: 
    - "'No NVIDIA devices' not in gpu_devices_check.stdout"
    - (nvidia_drivers_check.stdout is defined and 'NOT_INSTALLED' in nvidia_drivers_check.stdout) or (nvidia_drivers_check.stderr is defined and 'Driver/library version mismatch' in nvidia_drivers_check.stderr)
  register: driver_install_result
  changed_when: driver_install_result.rc == 0
  failed_when: driver_install_result.rc != 0
  tags: [vllm_install, vllm_gpu]

- name: Verify drivers after installation
  shell: "nvidia-smi 2>&1"
  register: nvidia_drivers_verify
  changed_when: false
  failed_when: "'Driver/library version mismatch' in nvidia_drivers_verify.stderr"
  tags: [vllm_install, vllm_gpu]

- name: Display nvidia-smi output
  debug:
    msg: "{{ nvidia_drivers_verify.stdout_lines }}"
  when: "'Driver/library version mismatch' not in nvidia_drivers_verify.stderr"
  tags: [vllm_install, vllm_gpu]

- name: Create vLLM system group
  group:
    name: "{{ vllm_user }}"
    system: yes
    state: present
  tags: [vllm_install]

- name: Create vLLM system user
  user:
    name: "{{ vllm_user }}"
    group: "{{ vllm_user }}"
    system: yes
    create_home: yes
    home: "{{ vllm_home }}"
    shell: /bin/false
    state: present
  tags: [vllm_install]

- name: Create vLLM directories
  file:
    path: "{{ item }}"
    state: directory
    owner: "{{ vllm_user }}"
    group: "{{ vllm_user }}"
    mode: '0755'
  loop:
    - "{{ vllm_install_dir }}"
    - "{{ vllm_home }}"
    - "{{ vllm_home }}/.cache"
    - "{{ vllm_home }}/.cache/vllm"
    - "{{ vllm_home }}/.cache/vllm/modelinfos"
    - "{{ vllm_cache_dir }}"
    - "{{ vllm_cache_dir }}/hub"
  tags: [vllm_install]

- name: Create Python virtual environment
  command: python3 -m venv {{ vllm_venv_dir }}
  args:
    creates: "{{ vllm_venv_dir }}/bin/python"
  tags: [vllm_install]

- name: Upgrade pip in virtual environment
  pip:
    name: pip
    state: latest
    virtualenv: "{{ vllm_venv_dir }}"
  tags: [vllm_install]

- name: Detect CUDA version from nvidia-smi
  shell: "nvidia-smi | grep 'CUDA Version' | awk '{print $9}' | cut -d. -f1"
  register: cuda_version_detect
  changed_when: false
  failed_when: false
  tags: [vllm_install, vllm_gpu]

- name: Set PyTorch index URL based on CUDA version
  set_fact:
    pytorch_index_url: >-
      {% if cuda_version_detect.stdout == '13' %}
      https://download.pytorch.org/whl/cu121
      {% elif cuda_version_detect.stdout == '12' %}
      https://download.pytorch.org/whl/cu121
      {% elif cuda_version_detect.stdout == '11' %}
      https://download.pytorch.org/whl/cu118
      {% else %}
      https://download.pytorch.org/whl/cu121
      {% endif %}
  tags: [vllm_install, vllm_gpu]

- name: Install PyTorch with CUDA support
  pip:
    name:
      - torch
      - torchvision
      - torchaudio
    extra_args: "--index-url {{ pytorch_index_url }}"
    virtualenv: "{{ vllm_venv_dir }}"
  tags: [vllm_install, vllm_gpu]

- name: Check CUDA libraries and GPU device permissions
  shell: |
    echo "=== Checking for CUDA libraries ==="
    ldconfig -p | grep -i cuda || echo "No CUDA libs in ldconfig cache"
    echo ""
    echo "=== Checking for libcuda.so ==="
    find /usr/lib /lib -name "libcuda.so*" 2>/dev/null || echo "libcuda.so not found"
    echo ""
    echo "=== Checking /dev/nvidia* permissions ==="
    ls -la /dev/nvidia* || echo "No /dev/nvidia* devices"
    echo ""
    echo "=== Checking nvidia-smi ==="
    nvidia-smi -L || echo "nvidia-smi failed"
    echo ""
    echo "=== Trying to access GPU as current user ==="
    nvidia-smi || echo "nvidia-smi as user failed"
  register: cuda_libs_check
  changed_when: false
  tags: [vllm_install, vllm_gpu]

# - name: Display CUDA libraries check
#   debug:
#     msg: "{{ cuda_libs_check.stdout_lines }}"
#   tags: [vllm_install, vllm_gpu]

- name: Test PyTorch CUDA availability
  shell: |
    unset CUDA_VISIBLE_DEVICES
    {{ vllm_venv_dir }}/bin/python -c "
    import os
    print('LD_LIBRARY_PATH:', os.environ.get('LD_LIBRARY_PATH', 'NOT SET'))
    print('CUDA_VISIBLE_DEVICES:', os.environ.get('CUDA_VISIBLE_DEVICES', 'NOT SET'))
    import torch
    print('PyTorch version:', torch.__version__)
    print('CUDA available:', torch.cuda.is_available())
    print('CUDA version:', torch.version.cuda)
    print('GPU count:', torch.cuda.device_count())
    if torch.cuda.is_available():
        for i in range(torch.cuda.device_count()):
            print(f'GPU {i}: {torch.cuda.get_device_name(i)}')
    else:
        print('CUDA not available - checking why...')
        try:
            torch.cuda.init()
        except Exception as e:
            print(f'CUDA init error: {e}')
    "
  args:
    executable: /bin/bash
  environment:
    LD_LIBRARY_PATH: "/usr/local/cuda/targets/x86_64-linux/lib:/usr/lib/x86_64-linux-gnu:/lib/x86_64-linux-gnu"
  register: pytorch_cuda_test
  changed_when: false
  tags: [vllm_install, vllm_gpu]

- name: Display PyTorch CUDA test results
  debug:
    msg: "{{ pytorch_cuda_test.stdout_lines }}"
  tags: [vllm_install, vllm_gpu]

- name: Verify PyTorch can detect CUDA
  shell: |
    {{ vllm_venv_dir }}/bin/python -c "import torch; assert torch.cuda.is_available(), 'CUDA not available'"
  environment:
    LD_LIBRARY_PATH: "/usr/local/cuda/targets/x86_64-linux/lib:/usr/lib/x86_64-linux-gnu:/lib/x86_64-linux-gnu"
  register: pytorch_cuda_verify
  changed_when: false
  failed_when: pytorch_cuda_verify.rc != 0
  tags: [vllm_install, vllm_gpu]

- name: Install vLLM
  pip:
    name: vllm
    virtualenv: "{{ vllm_venv_dir }}"
  tags: [vllm_install]

- name: Install additional Python packages
  pip:
    name:
      - huggingface-hub
      - transformers
    virtualenv: "{{ vllm_venv_dir }}"
  tags: [vllm_install]

- name: Verify vLLM installation
  command: "{{ vllm_venv_dir }}/bin/python -c 'import vllm; print(vllm.__version__)'"
  register: vllm_version_check
  changed_when: false
  tags: [vllm_install]

- name: Display vLLM version
  debug:
    msg: "vLLM version: {{ vllm_version_check.stdout }}"
  tags: [vllm_install]

- name: Set vLLM directory ownership
  file:
    path: "{{ item }}"
    owner: "{{ vllm_user }}"
    group: "{{ vllm_user }}"
    recurse: yes
  loop:
    - "{{ vllm_install_dir }}"
    - "{{ vllm_home }}"
  tags: [vllm_install]

