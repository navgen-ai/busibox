---
# Main tasks for agent_api role

- name: Create agent user
  user:
    name: "{{ agent_api_user }}"
    system: yes
    home: /srv/agent
    shell: /bin/bash

- name: Install system dependencies
  apt:
    name:
      - python3
      - python3-pip
      - python3-venv
      - python3-dev
      - build-essential
      - git
      - rsync
    state: present
    update_cache: yes

- name: Stop agent-api service if running (to allow cleanup)
  systemd:
    name: agent-api
    state: stopped
  ignore_errors: yes

- name: Clean up old agent directory (from previous Node.js deployment)
  file:
    path: /srv/agent
    state: absent

- name: Create agent directories
  file:
    path: "{{ item }}"
    state: directory
    owner: "{{ agent_api_user }}"
    group: "{{ agent_api_user }}"
    mode: "0755"
  loop:
    - /srv/agent
    - "{{ agent_api_log_path }}"

- name: Copy agent service source code
  synchronize:
    src: "{{ playbook_dir }}/../../srv/agent/"
    dest: "{{ agent_api_src_path }}/"
    delete: yes
    rsync_opts:
      - "--exclude=.git"
      - "--exclude=.venv"
      - "--exclude=__pycache__"
      - "--exclude=*.pyc"
      - "--exclude=.pytest_cache"
      - "--exclude=.env"
      - "--exclude=htmlcov"
      - "--exclude=.coverage"
  notify: Restart agent-api

- name: Fix ownership of agent directory
  file:
    path: /srv/agent
    owner: "{{ agent_api_user }}"
    group: "{{ agent_api_user }}"
    recurse: yes

- name: Create Python virtual environment
  command: python3 -m venv "{{ agent_api_venv_path }}"
  args:
    creates: "{{ agent_api_venv_path }}/bin/python"
  become: yes
  become_user: "{{ agent_api_user }}"

- name: Upgrade pip in venv
  pip:
    name: pip
    state: latest
    virtualenv: "{{ agent_api_venv_path }}"
  become: yes
  become_user: "{{ agent_api_user }}"

- name: Install agent service dependencies
  pip:
    name: "."
    state: present
    virtualenv: "{{ agent_api_venv_path }}"
    chdir: "{{ agent_api_src_path }}"
    editable: yes
  become: yes
  become_user: "{{ agent_api_user }}"
  notify: Restart agent-api

- name: Install test dependencies
  pip:
    requirements: "{{ agent_api_src_path }}/requirements.test.txt"
    virtualenv: "{{ agent_api_venv_path }}"
  become: yes
  become_user: "{{ agent_api_user }}"

- name: Deploy agent service environment file
  template:
    src: agent-api.env.j2
    dest: /srv/agent/.env
    owner: "{{ agent_api_user }}"
    group: "{{ agent_api_user }}"
    mode: "0600"
  notify: Restart agent-api

- name: Make migration script executable
  file:
    path: /srv/agent/scripts/run-migrations.sh
    mode: "0755"
    owner: "{{ agent_api_user }}"
    group: "{{ agent_api_user }}"

- name: Check if alembic version table exists
  shell: |
    cd /srv/agent
    . .venv/bin/activate
    alembic current
  become: yes
  become_user: "{{ agent_api_user }}"
  environment:
    DATABASE_URL: "{{ secrets['agent-server'].database_url }}"
  register: alembic_current
  failed_when: false
  changed_when: false

- name: Stamp database with current version if tables exist but no migration history
  shell: |
    cd /srv/agent
    . .venv/bin/activate
    alembic stamp head
  become: yes
  become_user: "{{ agent_api_user }}"
  environment:
    DATABASE_URL: "{{ secrets['agent-server'].database_url }}"
  when: alembic_current.rc != 0
  register: stamp_result
  failed_when: false

- name: Grant database permissions for migrations
  shell: |
    su - postgres -c "psql -d busibox << 'EOF'
    GRANT ALL PRIVILEGES ON ALL TABLES IN SCHEMA public TO agent_server;
    GRANT ALL PRIVILEGES ON ALL SEQUENCES IN SCHEMA public TO agent_server;
    GRANT ALL PRIVILEGES ON SCHEMA public TO agent_server;
    ALTER DEFAULT PRIVILEGES IN SCHEMA public GRANT ALL ON TABLES TO agent_server;
    ALTER DEFAULT PRIVILEGES IN SCHEMA public GRANT ALL ON SEQUENCES TO agent_server;
    EOF
    "
  delegate_to: "{{ groups['pg'][0] }}"
  become: yes
  register: grant_result
  failed_when: false
  changed_when: false

- name: Run database migrations
  shell: |
    cd /srv/agent
    . .venv/bin/activate
    alembic upgrade head
  become: yes
  become_user: "{{ agent_api_user }}"
  environment:
    DATABASE_URL: "{{ secrets['agent-server'].database_url }}"
    PYTHONPATH: "/srv/agent"
  register: migration_result
  changed_when: "'Running upgrade' in migration_result.stderr"

- name: Display migration output
  debug:
    var: migration_result.stdout_lines
  when: migration_result.stdout_lines is defined

- name: Deploy agent service systemd unit
  template:
    src: agent-api.service.j2
    dest: /etc/systemd/system/agent-api.service
    mode: "0644"
  notify:
    - Reload systemd
    - Restart agent-api

- name: Enable and start agent service
  systemd:
    name: agent-api
    enabled: yes
    state: started
    daemon_reload: yes

- name: Wait for agent service to be ready
  uri:
    url: "http://localhost:{{ agent_api_port }}/health"
    status_code: 200
    timeout: 30
  retries: 12
  delay: 5
  register: health_check
  until: health_check is success









