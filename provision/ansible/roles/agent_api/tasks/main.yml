# Python Environment for Agent API
- name: Install Python and dependencies
  apt:
    name:
      - python3
      - python3-pip
      - python3-venv
      - python3-dev
      - build-essential
    state: present

- name: Create agent API directory
  file:
    path: /srv/agent
    state: directory
    mode: "0755"

- name: Create Python virtual environment
  shell: python3 -m venv /srv/agent/venv
  args:
    creates: /srv/agent/venv/bin/python

- name: Copy agent API source code
  copy:
    src: "{{ playbook_dir }}/../../srv/agent/src/"
    dest: /srv/agent/src/
    mode: "0644"

- name: Copy requirements.txt
  copy:
    src: "{{ playbook_dir }}/../../srv/agent/requirements.txt"
    dest: /srv/agent/requirements.txt
    mode: "0644"

- name: Install Python dependencies
  pip:
    requirements: /srv/agent/requirements.txt
    virtualenv: /srv/agent/venv

- name: Create agent API environment file
  copy:
    dest: /srv/agent/.env
    content: |
      # API Configuration
      API_HOST=0.0.0.0
      API_PORT=8000
      API_RELOAD=false
      API_VERSION=0.1.0
      
      # CORS Configuration
      CORS_ORIGINS=*
      
      # PostgreSQL configuration
      POSTGRES_HOST={{ postgres_host | default('10.96.200.26') }}
      POSTGRES_PORT={{ postgres_port | default('5432') }}
      POSTGRES_DB={{ postgres_db | default('busibox') }}
      POSTGRES_USER={{ postgres_user | default('busibox_user') }}
      POSTGRES_PASSWORD={{ postgres_password | default('busibox_password_change_me') }}
      
      # Milvus configuration
      MILVUS_HOST={{ milvus_host | default('10.96.200.27') }}
      MILVUS_PORT={{ milvus_port | default('19530') }}
      
      # MinIO configuration
      MINIO_ENDPOINT={{ minio_endpoint | default('10.96.200.28:9000') }}
      MINIO_ACCESS_KEY={{ minio_root_user | default('minioadmin') }}
      MINIO_SECRET_KEY={{ minio_root_password | default('minioadminchange') }}
      MINIO_SECURE=false
      
      # Redis configuration
      REDIS_HOST={{ redis_host | default('10.96.200.29') }}
      REDIS_PORT={{ redis_port | default('6379') }}
      
      # liteLLM configuration
      LITELLM_BASE_URL={{ litellm_base_url | default('http://localhost:8000') }}
      LITELLM_API_KEY={{ litellm_api_key | default('') }}
      
      # JWT Configuration
      JWT_SECRET_KEY={{ jwt_secret | default('change-this-secret-key-in-production') }}
      JWT_ALGORITHM=HS256
      JWT_EXPIRATION_MINUTES=1440
    mode: "0600"

- name: Create systemd service for agent API
  copy:
    dest: /etc/systemd/system/agent-api.service
    content: |
      [Unit]
      Description=Busibox Agent API Server
      After=network-online.target postgresql.service
      Wants=network-online.target
      
      [Service]
      Type=simple
      User=root
      WorkingDirectory=/srv/agent/src
      EnvironmentFile=/srv/agent/.env
      ExecStart=/srv/agent/venv/bin/python main.py
      Restart=always
      RestartSec=10
      StandardOutput=journal
      StandardError=journal
      
      [Install]
      WantedBy=multi-user.target
  notify: Restart agent API

- name: Enable agent API service
  systemd:
    name: agent-api
    enabled: yes
    daemon_reload: yes

- name: Create agent API health check script
  copy:
    dest: /usr/local/bin/agent-api-health-check
    content: |
      #!/bin/bash
      curl -f -s http://localhost:8000/health/live > /dev/null
    mode: "0755"
