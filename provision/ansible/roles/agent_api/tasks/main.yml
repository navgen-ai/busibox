---
# Main tasks for agent_api role

- name: Load secrets
  include_vars:
    file: "{{ playbook_dir }}/roles/secrets/vars/vault.{{ deployment_environment | default('dev') }}.yml"
  no_log: true
  tags:
    - always

- name: Create agent user
  user:
    name: "{{ agent_api_user }}"
    system: yes
    home: /srv/agent
    shell: /bin/bash

- name: Install system dependencies
  apt:
    name:
      - python3
      - python3-pip
      - python3-venv
      - python3-dev
      - build-essential
      - git
      - rsync
    state: present
    update_cache: yes

- name: Check current deployed version
  stat:
    path: /opt/agent-api/.deploy_version
  register: agent_deploy_version_file

- name: Read current deployed version
  slurp:
    path: /opt/agent-api/.deploy_version
  register: agent_current_version_content
  when: agent_deploy_version_file.stat.exists

- name: Parse current deployed version
  set_fact:
    agent_current_commit: "{{ (agent_current_version_content.content | b64decode | from_json).commit | default('') }}"
  when: agent_deploy_version_file.stat.exists

- name: Get new version to deploy
  set_fact:
    agent_new_commit: "{{ lookup('pipe', 'git rev-parse --short HEAD', cwd=playbook_dir + '/../..') }}"

- name: Check if deployment is needed
  set_fact:
    agent_deployment_needed: "{{ not agent_deploy_version_file.stat.exists or agent_current_commit != agent_new_commit }}"

- name: Display version check
  debug:
    msg: |
      Agent API Version Check:
      - Current deployed: {{ agent_current_commit | default('none') }}
      - New version: {{ agent_new_commit }}
      - Deployment needed: {{ agent_deployment_needed }}

- name: Stop agent-api service if running (to allow cleanup)
  systemd:
    name: agent-api
    state: stopped
  ignore_errors: yes
  when: agent_deployment_needed

- name: Clean up old agent directory (from previous Node.js deployment)
  file:
    path: /srv/agent
    state: absent
  when: agent_deployment_needed

- name: Create agent directories
  file:
    path: "{{ item }}"
    state: directory
    owner: "{{ agent_api_user }}"
    group: "{{ agent_api_user }}"
    mode: "0755"
  loop:
    - /srv/agent
    - "{{ agent_api_log_path }}"
    - /opt/agent-api
  when: agent_deployment_needed

- name: Copy agent service source code
  synchronize:
    src: "{{ playbook_dir }}/../../srv/agent/"
    dest: "{{ agent_api_src_path }}/"
    delete: yes
    rsync_opts:
      - "--exclude=.git"
      - "--exclude=.venv"
      - "--exclude=__pycache__"
      - "--exclude=*.pyc"
      - "--exclude=.pytest_cache"
      - "--exclude=.env"
      - "--exclude=htmlcov"
      - "--exclude=.coverage"
  notify: Restart agent-api
  when: agent_deployment_needed

- name: Copy shared testing library
  synchronize:
    src: "{{ playbook_dir }}/../../srv/shared/testing/"
    dest: "{{ agent_api_src_path }}/testing/"
    delete: yes
    rsync_opts:
      - "--exclude=__pycache__"
      - "--exclude=*.pyc"
  when: agent_deployment_needed

- name: Copy shared busibox_common library
  synchronize:
    src: "{{ playbook_dir }}/../../srv/shared/busibox_common/"
    dest: "{{ agent_api_src_path }}/busibox_common/"
    delete: yes
    rsync_opts:
      - "--exclude=__pycache__"
      - "--exclude=*.pyc"
  notify: Restart agent-api
  when: agent_deployment_needed

- name: Fix ownership of agent directory
  file:
    path: /srv/agent
    owner: "{{ agent_api_user }}"
    group: "{{ agent_api_user }}"
    recurse: yes
  when: agent_deployment_needed

- name: Create Python virtual environment
  command: python3 -m venv "{{ agent_api_venv_path }}"
  args:
    creates: "{{ agent_api_venv_path }}/bin/python"
  become: yes
  become_user: "{{ agent_api_user }}"
  when: agent_deployment_needed

- name: Upgrade pip in venv
  pip:
    name: pip
    state: latest
    virtualenv: "{{ agent_api_venv_path }}"
  become: yes
  become_user: "{{ agent_api_user }}"
  when: agent_deployment_needed

- name: Install agent service dependencies
  pip:
    name: "."
    state: present
    virtualenv: "{{ agent_api_venv_path }}"
    chdir: "{{ agent_api_src_path }}"
    editable: yes
  become: yes
  become_user: "{{ agent_api_user }}"
  notify: Restart agent-api
  when: agent_deployment_needed

- name: Install test dependencies
  pip:
    requirements: "{{ agent_api_src_path }}/requirements.test.txt"
    virtualenv: "{{ agent_api_venv_path }}"
  become: yes
  become_user: "{{ agent_api_user }}"
  when: agent_deployment_needed

- name: Deploy agent service environment file
  template:
    src: agent-api.env.j2
    dest: /srv/agent/.env
    owner: "{{ agent_api_user }}"
    group: "{{ agent_api_user }}"
    mode: "0600"
  notify: Restart agent-api

# Deploy model registry for embedding config (same as data)
- name: Create config directory for model registry
  file:
    path: /etc/data
    state: directory
    mode: '0755'
    owner: root
    group: root
  tags: [agent, model_registry]

- name: Deploy model registry configuration
  template:
    src: "{{ playbook_dir }}/roles/data/templates/model_registry.json.j2"
    dest: "{{ model_registry_path | default('/etc/data/model_registry.json') }}"
    mode: '0644'
    owner: root
    group: root
  notify: Restart agent-api
  tags: [agent, model_registry]

- name: Make migration script executable
  file:
    path: /srv/agent/scripts/run-migrations.sh
    mode: "0755"
    owner: "{{ agent_api_user }}"
    group: "{{ agent_api_user }}"

# =============================================================================
# Database Setup
# =============================================================================
# Ensure the database user and database exist before running migrations
# This makes the agent_api role self-sufficient - it can be deployed standalone

- name: Ensure agent database user exists
  postgresql_user:
    name: "{{ postgres_user }}"
    password: "{{ secrets.postgresql.password }}"
    role_attr_flags: "LOGIN,CREATEDB"
    state: present
  become_user: postgres
  delegate_to: "{{ groups['pg'][0] }}"
  tags: [agent, agent_api]

- name: Ensure agent database exists
  postgresql_db:
    name: agent
    owner: "{{ postgres_user }}"
    encoding: UTF8
    lc_collate: en_US.UTF-8
    lc_ctype: en_US.UTF-8
    template: template0
    state: present
  become_user: postgres
  delegate_to: "{{ groups['pg'][0] }}"
  tags: [agent, agent_api]

- name: Grant database privileges to agent user
  postgresql_privs:
    database: agent
    state: present
    privs: ALL
    type: database
    role: "{{ postgres_user }}"
  become_user: postgres
  delegate_to: "{{ groups['pg'][0] }}"
  tags: [agent, agent_api]

- name: Grant schema privileges to agent user
  postgresql_privs:
    database: agent
    state: present
    privs: ALL
    type: schema
    objs: public
    role: "{{ postgres_user }}"
  become_user: postgres
  delegate_to: "{{ groups['pg'][0] }}"
  tags: [agent, agent_api]

- name: Grant table privileges to agent user
  postgresql_privs:
    database: agent
    state: present
    privs: ALL
    type: table
    objs: ALL_IN_SCHEMA
    schema: public
    role: "{{ postgres_user }}"
  become_user: postgres
  delegate_to: "{{ groups['pg'][0] }}"
  tags: [agent, agent_api]

- name: Transfer ownership of existing tables to agent user
  shell: |
    su - postgres -c "psql -d agent -c \"
    DO \\\$\\\$
    DECLARE
      r RECORD;
    BEGIN
      FOR r IN (SELECT tablename FROM pg_tables WHERE schemaname = 'public')
      LOOP
        EXECUTE 'ALTER TABLE ' || quote_ident(r.tablename) || ' OWNER TO {{ postgres_user }}';
      END LOOP;
      FOR r IN (SELECT sequence_name FROM information_schema.sequences WHERE sequence_schema = 'public')
      LOOP
        EXECUTE 'ALTER SEQUENCE ' || quote_ident(r.sequence_name) || ' OWNER TO {{ postgres_user }}';
      END LOOP;
    END \\\$\\\$;
    \""
  delegate_to: "{{ groups['pg'][0] }}"
  tags: [agent, agent_api]

- name: Check if alembic_version table exists
  shell: |
    su - postgres -c "psql -d agent -tAc \"
      SELECT EXISTS (
        SELECT FROM information_schema.tables 
        WHERE table_schema = 'public' 
        AND table_name = 'alembic_version'
      );
    \""
  delegate_to: "{{ groups['pg'][0] }}"
  register: alembic_table_exists
  changed_when: false

- name: Get current alembic version from database
  shell: |
    su - postgres -c "psql -d agent -tAc \"SELECT version_num FROM alembic_version;\""
  delegate_to: "{{ groups['pg'][0] }}"
  register: alembic_version_num
  failed_when: false
  changed_when: false
  when: alembic_table_exists.stdout == 't'

- name: Count all agent tables in database (excluding alembic_version)
  shell: |
    su - postgres -c "psql -d agent -tAc \"
      SELECT COUNT(*) FROM information_schema.tables 
      WHERE table_schema = 'public' 
      AND table_name != 'alembic_version';
    \""
  delegate_to: "{{ groups['pg'][0] }}"
  register: tables_count
  changed_when: false

- name: Debug migration state
  debug:
    msg: |
      Tables in DB: {{ tables_count.stdout|int }}
      Alembic table exists: {{ alembic_table_exists.stdout }}
      Current version: {{ alembic_version_num.stdout if alembic_table_exists.stdout == 't' else 'N/A' }}

- name: Backup all tables before stamping (if tables exist but no valid alembic version)
  shell: |
    TIMESTAMP=$(date +%Y%m%d_%H%M%S)
    BACKUP_DIR="/var/backups/postgres/agent_prestamp_${TIMESTAMP}"
    mkdir -p "$BACKUP_DIR"
    
    su - postgres -c "
      # Get list of all tables and backup each
      for table in \$(psql -d agent -tAc \"SELECT tablename FROM pg_tables WHERE schemaname = 'public' AND tablename != 'alembic_version';\"); do
        echo \"Backing up \$table...\"
        pg_dump -d agent -t \$table --data-only > \"$BACKUP_DIR/\${table}.sql\" 2>/dev/null || true
      done
    "
    
    echo "Backup saved to: $BACKUP_DIR"
    ls -lh "$BACKUP_DIR" 2>/dev/null || echo "No tables to backup"
  delegate_to: "{{ groups['pg'][0] }}"
  when: >
    tables_count.stdout|int > 0 and 
    (alembic_table_exists.stdout != 't' or alembic_version_num.stdout == '')
  register: backup_before_stamp
  changed_when: false

- name: Grant database permissions for migrations
  shell: |
    su - postgres -c "psql -d busibox << 'EOF'
    GRANT ALL PRIVILEGES ON ALL TABLES IN SCHEMA public TO agent;
    GRANT ALL PRIVILEGES ON ALL SEQUENCES IN SCHEMA public TO agent;
    GRANT ALL PRIVILEGES ON SCHEMA public TO agent;
    ALTER DEFAULT PRIVILEGES IN SCHEMA public GRANT ALL ON TABLES TO agent;
    ALTER DEFAULT PRIVILEGES IN SCHEMA public GRANT ALL ON SEQUENCES TO agent;
    EOF
    "
  delegate_to: "{{ groups['pg'][0] }}"
  become: yes
  register: grant_result
  failed_when: false
  changed_when: false

- name: Stamp database to head if tables exist but no valid alembic version
  shell: |
    cd /srv/agent
    . .venv/bin/activate
    echo "Stamping database to head (tables exist but alembic version missing/empty)"
    alembic stamp head
  become: yes
  become_user: "{{ agent_api_user }}"
  environment:
    DATABASE_URL: "postgresql+asyncpg://{{ postgres_user }}:{{ secrets.postgresql.password }}@{{ postgres_host }}:{{ postgres_port }}/agent"
  when: >
    tables_count.stdout|int > 0 and 
    (alembic_table_exists.stdout != 't' or 
     (alembic_version_num.stdout is defined and alembic_version_num.stdout | trim == ''))
  register: stamp_result
  changed_when: true

- name: Debug stamp decision
  debug:
    msg: |
      Tables: {{ tables_count.stdout|int }}
      Alembic table exists: {{ alembic_table_exists.stdout }}
      Version defined: {{ alembic_version_num.stdout is defined }}
      Version value: '{{ alembic_version_num.stdout | default("undefined") | trim }}'
      Should stamp: {{ tables_count.stdout|int > 0 and (alembic_table_exists.stdout != 't' or (alembic_version_num.stdout is defined and alembic_version_num.stdout | trim == '')) }}

- name: Run database migrations
  shell: |
    cd /srv/agent
    . .venv/bin/activate
    alembic upgrade head
  become: yes
  become_user: "{{ agent_api_user }}"
  environment:
    DATABASE_URL: "postgresql+asyncpg://{{ postgres_user }}:{{ secrets.postgresql.password }}@{{ postgres_host }}:{{ postgres_port }}/agent"
    PYTHONPATH: "/srv/agent"
  register: migration_result
  changed_when: "'Running upgrade' in migration_result.stderr"

- name: Display migration output
  debug:
    var: migration_result.stdout_lines
  when: migration_result.stdout_lines is defined

# =============================================================================
# Pytest Database Migrations
# =============================================================================
# When pytest databases are enabled, also run migrations on the test database
# This ensures pytest schemas stay in sync with the main schemas
#
# Test database: test_agent (owned by busibox_test_user)

- name: Build pytest database URL
  set_fact:
    agent_pytest_database_url: "postgresql+asyncpg://busibox_test_user:{{ pytest_db_password | default('testpassword') }}@{{ postgres_host }}:{{ postgres_port }}/test_agent"
  when: enable_pytest_databases | default(false)
  tags: [agent, agent_pytest_db]

- name: Run migrations on pytest database
  shell: |
    cd /srv/agent
    . .venv/bin/activate
    alembic upgrade head
  become: yes
  become_user: "{{ agent_api_user }}"
  environment:
    DATABASE_URL: "{{ agent_pytest_database_url }}"
    PYTHONPATH: "/srv/agent"
  register: pytest_migration_result
  changed_when: "'Running upgrade' in pytest_migration_result.stderr"
  when: enable_pytest_databases | default(false)
  tags: [agent, agent_pytest_db]

- name: Display pytest migration output
  debug:
    var: pytest_migration_result.stdout_lines
  when: enable_pytest_databases | default(false) and pytest_migration_result.stdout_lines is defined
  tags: [agent, agent_pytest_db]

- name: Deploy agent service systemd unit
  template:
    src: agent-api.service.j2
    dest: /etc/systemd/system/agent-api.service
    mode: "0644"
  notify:
    - Reload systemd
    - Restart agent-api

- name: Enable agent service
  systemd:
    name: agent-api
    enabled: yes
    daemon_reload: yes

- name: Write deployment version file
  copy:
    content: |
      {
        "commit": "{{ lookup('pipe', 'git rev-parse --short HEAD', cwd=playbook_dir + '/../..') }}",
        "branch": "{{ lookup('pipe', 'git branch --show-current', cwd=playbook_dir + '/../..') }}",
        "timestamp": "{{ ansible_date_time.iso8601 }}",
        "deployed_by": "ansible"
      }
    dest: /opt/agent-api/.deploy_version
    owner: "{{ agent_api_user }}"
    group: "{{ agent_api_user }}"
    mode: "0644"

- name: Restart agent service (always restart on deploy)
  systemd:
    name: agent-api
    state: restarted
  register: restart_result

- name: Wait for agent service to be ready
  uri:
    url: "http://localhost:{{ agent_api_port }}/health"
    status_code: 200
    timeout: 30
  retries: 12
  delay: 5
  register: health_check
  until: health_check is success
  failed_when: false

- name: Check agent service status if health check failed
  shell: systemctl status agent-api --no-pager
  register: service_status
  when: health_check is failed

- name: Show agent service logs if startup failed
  shell: journalctl -u agent-api -n 50 --no-pager
  register: service_logs
  when: health_check is failed

- name: Display service status and logs if failed
  debug:
    msg: 
      - "=== Service Status ==="
      - "{{ service_status.stdout_lines | default([]) }}"
      - ""
      - "=== Recent Logs ==="
      - "{{ service_logs.stdout_lines | default([]) }}"
  when: health_check is failed

- name: Fail if agent service did not start
  fail:
    msg: "Agent service failed to start. Check logs above."
  when: health_check is failed

# Post-Deployment Validation Tests (PVT)
- name: Run PVT tests
  shell: |
    set -a
    . /srv/agent/.env
    set +a
    cd /srv/agent
    .venv/bin/python -m pytest tests/integration/test_pvt.py -v --tb=short 2>&1
  args:
    executable: /bin/bash
  register: agent_pvt_result
  failed_when: false
  changed_when: false
  when: run_pvt_tests | default(true)
  tags: [agent, pvt]

- name: Display PVT test results
  debug:
    msg: "{{ agent_pvt_result.stdout_lines | default([]) }}"
  when: run_pvt_tests | default(true) and agent_pvt_result.stdout is defined
  tags: [agent, pvt]

- name: Fail if PVT tests failed
  fail:
    msg: "Post-deployment validation tests failed! Check logs above."
  when: run_pvt_tests | default(true) and agent_pvt_result.rc != 0
  tags: [agent, pvt]









