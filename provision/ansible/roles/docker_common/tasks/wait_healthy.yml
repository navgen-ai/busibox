---
# Wait for Service Health Task
#
# Usage:
#   - include_role:
#       name: docker_common
#       tasks_from: wait_healthy
#     vars:
#       docker_wait_service: "postgres"
#       docker_wait_timeout: 60

- name: Set compose command arguments
  ansible.builtin.set_fact:
    docker_compose_file_args: "{{ docker_compose_files_list | map('regex_replace', '^(.*)$', '-f \\1') | join(' ') }}"

- name: Wait for {{ docker_wait_service }} to be healthy
  ansible.builtin.shell: |
    cd {{ docker_compose_dir }}
    timeout={{ docker_wait_timeout | default(60) }}
    elapsed=0
    while [ $elapsed -lt $timeout ]; do
      # Docker compose ps --format json returns either an object (single) or array (multiple)
      # Use jq to handle both: if array, get first element; if object, use directly
      json_output=$(docker compose {{ docker_compose_file_args }} \
        ps --format json {{ docker_wait_service }} 2>/dev/null)
      health=$(echo "$json_output" | jq -r 'if type == "array" then .[0].Health else .Health end // "none"')
      
      case "$health" in
        healthy)
          echo "Service {{ docker_wait_service }} is healthy"
          exit 0
          ;;
        unhealthy)
          echo "Service {{ docker_wait_service }} is unhealthy"
          exit 1
          ;;
        none|null|"")
          # No healthcheck defined, check if running
          state=$(echo "$json_output" | jq -r 'if type == "array" then .[0].State else .State end // "none"')
          if [ "$state" = "running" ]; then
            echo "Service {{ docker_wait_service }} is running (no healthcheck)"
            exit 0
          fi
          ;;
      esac
      
      sleep 2
      elapsed=$((elapsed + 2))
    done
    echo "Timeout waiting for {{ docker_wait_service }}"
    exit 1
  args:
    chdir: "{{ docker_compose_dir }}"
    executable: /bin/bash
  environment:
    CONTAINER_PREFIX: "{{ container_prefix | default('dev') }}"
    POSTGRES_PASSWORD: "{{ secrets.postgresql.password | default('') }}"
    MINIO_ACCESS_KEY: "{{ secrets.minio.root_user | default('minioadmin') }}"
    MINIO_SECRET_KEY: "{{ secrets.minio.root_password | default('') }}"
    GITHUB_AUTH_TOKEN: "{{ secrets.github.personal_access_token | default(github_token) | default('') }}"
  register: wait_result
  changed_when: false
