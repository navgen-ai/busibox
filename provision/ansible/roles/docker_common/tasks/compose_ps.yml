---
# Docker Compose PS (Status) Task
#
# Usage:
#   - include_role:
#       name: docker_common
#       tasks_from: compose_ps
#     vars:
#       docker_ps_services: ["postgres", "redis"]  # optional, all if not specified

- name: Set service list for compose ps
  ansible.builtin.set_fact:
    _services_arg: "{{ docker_ps_services | default([]) | join(' ') }}"

- name: Get container status
  ansible.builtin.shell: |
    cd {{ docker_compose_dir }}
    docker compose {{ docker_compose_file_args }} {{ docker_compose_env_args }} \
      ps --format json {{ _services_arg }}
  args:
    chdir: "{{ docker_compose_dir }}"
  register: ps_result
  changed_when: false

- name: Parse container status
  ansible.builtin.set_fact:
    docker_container_status: "{{ ps_result.stdout | from_json if ps_result.stdout else [] }}"

- name: Display container status
  ansible.builtin.debug:
    msg: |
      {% for container in docker_container_status %}
      {{ container.Name }}: {{ container.State }} ({{ container.Health | default('no healthcheck') }})
      {% endfor %}
  when: docker_container_status | length > 0
