---
# Docker Compose PS (Status) Task
#
# Usage:
#   - include_role:
#       name: docker_common
#       tasks_from: compose_ps
#     vars:
#       docker_ps_services: ["postgres", "redis"]  # optional, all if not specified

- name: Set compose command arguments
  ansible.builtin.set_fact:
    docker_compose_file_args: "{{ docker_compose_files_list | map('regex_replace', '^(.*)$', '-f \\1') | join(' ') }}"
    _services_arg: "{{ docker_ps_services | default([]) | join(' ') }}"

- name: Get container status
  ansible.builtin.shell: |
    cd {{ docker_compose_dir }}
    docker compose {{ docker_compose_file_args }} \
      ps --format json {{ _services_arg }}
  args:
    chdir: "{{ docker_compose_dir }}"
  environment:
    CONTAINER_PREFIX: "{{ container_prefix | default('dev') }}"
    GITHUB_AUTH_TOKEN: "{{ secrets.github.personal_access_token | default(github_token) | default('') }}"
  register: ps_result
  changed_when: false

- name: Parse container status
  ansible.builtin.set_fact:
    # Docker compose ps --format json returns either an object (single) or array (multiple)
    # Normalize to always be a list
    docker_container_status: >-
      {%- set parsed = ps_result.stdout | from_json if ps_result.stdout else [] -%}
      {%- if parsed is mapping -%}
        {{ [parsed] }}
      {%- else -%}
        {{ parsed }}
      {%- endif -%}

- name: Display container status
  ansible.builtin.debug:
    msg: |
      {% for container in docker_container_status %}
      {{ container.Name }}: {{ container.State }} ({{ container.Health | default('no healthcheck') }})
      {% endfor %}
  when: docker_container_status | length > 0
