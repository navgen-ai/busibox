---
# Generate Docker Environment File Task
#
# Usage:
#   - include_role:
#       name: docker_common
#       tasks_from: generate_env
#     vars:
#       docker_env_template: "docker.env.j2"  # or use docker_env_vars dict

- name: Generate environment file from template
  ansible.builtin.template:
    src: "{{ docker_env_template }}"
    dest: "{{ docker_env_file }}"
    mode: '0600'
  when: docker_env_template is defined

- name: Generate environment file from variables
  ansible.builtin.copy:
    content: |
      # Generated by Ansible - {{ now(utc=true).isoformat() }}
      # Do not edit manually
      
      {% for key, value in docker_env_vars.items() %}
      {{ key }}={{ value }}
      {% endfor %}
    dest: "{{ docker_env_file }}"
    mode: '0600'
  when: docker_env_vars is defined and docker_env_template is not defined
