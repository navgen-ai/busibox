---
# Docker Compose Up Task
#
# Usage:
#   - include_role:
#       name: docker_common
#       tasks_from: compose_up
#     vars:
#       docker_services_to_start: ["postgres", "redis"]
#       docker_build_first: true
#       docker_wait_for_health: true
#
# Secrets are injected from the encrypted Ansible vault at runtime.
# No secrets are stored in .env files.

- name: Check if environment file exists
  ansible.builtin.stat:
    path: "{{ docker_env_file }}"
  register: _env_file_stat

- name: Sanitize Docker config (macOS keychain workaround)
  ansible.builtin.include_tasks: sanitize_docker_config.yml

- name: Set compose command arguments
  ansible.builtin.set_fact:
    docker_compose_file_args: "{{ docker_compose_files_list | map('regex_replace', '^(.*)$', '-f \\1') | join(' ') }}"
    _env_file_arg: "{{ '--env-file ' ~ docker_env_file if _env_file_stat.stat.exists else '' }}"
    _services_arg: "{{ docker_services_to_start | default([]) | join(' ') }}"

- name: Pull pre-built images from registry (if requested)
  ansible.builtin.shell: |
    cd {{ docker_compose_dir }}
    docker compose {{ docker_compose_file_args }} {{ _env_file_arg }} \
      pull {{ _services_arg }} 2>&1
  args:
    chdir: "{{ docker_compose_dir }}"
  environment: &docker_secrets_env
    DOCKER_CONFIG: "{{ _docker_config_override }}"
    DOCKER_HOST: "{{ lookup('env', 'DOCKER_HOST') | default('', true) }}"
    COMPOSE_PROJECT_NAME: "{{ compose_project_name }}"
    CONTAINER_PREFIX: "{{ container_prefix | default('dev') }}"
    BUSIBOX_HOST_PATH: "{{ docker_compose_dir }}"
    BUSIBOX_REPO_ROOT: "{{ docker_compose_dir }}"
    # Secrets from centralized busibox_secrets mapping (shared_secrets.yml)
    POSTGRES_PASSWORD: "{{ busibox_secrets.POSTGRES_PASSWORD }}"
    MINIO_ROOT_USER: "{{ busibox_secrets.MINIO_ROOT_USER }}"
    MINIO_ROOT_PASSWORD: "{{ busibox_secrets.MINIO_ROOT_PASSWORD }}"
    MINIO_ACCESS_KEY: "{{ busibox_secrets.MINIO_ROOT_USER }}"
    MINIO_SECRET_KEY: "{{ busibox_secrets.MINIO_ROOT_PASSWORD }}"
    SSO_JWT_SECRET: "{{ busibox_secrets.SSO_JWT_SECRET }}"
    AUTHZ_MASTER_KEY: "{{ busibox_secrets.AUTHZ_MASTER_KEY }}"
    LITELLM_API_KEY: "{{ busibox_secrets.LITELLM_MASTER_KEY }}"
    LITELLM_MASTER_KEY: "{{ busibox_secrets.LITELLM_MASTER_KEY }}"
    LITELLM_SALT_KEY: "{{ busibox_secrets.LITELLM_SALT_KEY }}"
    NEO4J_PASSWORD: "{{ busibox_secrets.NEO4J_PASSWORD }}"
    CONFIG_ENCRYPTION_KEY: "{{ busibox_secrets.CONFIG_ENCRYPTION_KEY }}"
    GITHUB_AUTH_TOKEN: "{{ busibox_secrets.GITHUB_AUTH_TOKEN }}"
    ADMIN_EMAIL: "{{ busibox_secrets.ADMIN_EMAILS }}"
    ALLOWED_EMAIL_DOMAINS: "{{ busibox_secrets.ALLOWED_EMAIL_DOMAINS }}"
    # Docker-specific config (not secrets)
    BUSIBOX_PORTAL_GITHUB_REF: "{{ lookup('env', 'BUSIBOX_PORTAL_GITHUB_REF') | default('main', true) }}"
    BUSIBOX_ADMIN_GITHUB_REF: "{{ lookup('env', 'BUSIBOX_ADMIN_GITHUB_REF') | default('main', true) }}"
    MODEL_HOST_CACHE: "{{ lookup('env', 'MODEL_HOST_CACHE') | default('model_cache', true) }}"
    HF_HOST_CACHE: "{{ lookup('env', 'HF_HOST_CACHE') | default('model_cache', true) }}"
    FASTEMBED_HOST_CACHE: "{{ lookup('env', 'FASTEMBED_HOST_CACHE') | default('fastembed_cache', true) }}"
    LLM_BACKEND: "{{ lookup('env', 'LLM_BACKEND') | default('', true) }}"
    HOST_AGENT_TOKEN: "{{ lookup('env', 'HOST_AGENT_TOKEN') | default('', true) }}"
  when: docker_pull_images | default(false)
  register: pull_result
  changed_when: "'Pulled' in pull_result.stdout or 'Downloaded' in pull_result.stdout"
  no_log: false

- name: Build services (if requested)
  ansible.builtin.shell: |
    cd {{ docker_compose_dir }}
    docker compose {{ docker_compose_file_args }} {{ _env_file_arg }} \
      build {{ '--no-cache' if docker_build_no_cache else '' }} {{ _services_arg }}
  args:
    chdir: "{{ docker_compose_dir }}"
  environment: *docker_secrets_env
  when: (docker_build_first | default(false)) and not (docker_pull_images | default(false))
  register: build_result
  changed_when: "'Building' in build_result.stdout or 'built' in build_result.stdout"
  no_log: false

- name: Show docker compose command (debug)
  ansible.builtin.debug:
    msg: |
      Running: docker compose {{ docker_compose_file_args }} {{ _env_file_arg }} up -d --no-deps {{ _services_arg }}
      Compose dir: {{ docker_compose_dir }}
      DOCKER_CONFIG: {{ _docker_config_override }}
      Note: Secrets are injected from vault at runtime (not shown)

- name: Verify Docker config contents (debug)
  ansible.builtin.shell: |
    echo "=== DOCKER_CONFIG debug ==="
    echo "DOCKER_CONFIG={{ _docker_config_override }}"
    echo "--- config.json at DOCKER_CONFIG ---"
    cat "{{ _docker_config_override }}/config.json" 2>&1 || echo "(file not found)"
    echo "--- original ~/.docker/config.json ---"
    cat "$HOME/.docker/config.json" 2>&1 || echo "(file not found)"
    echo "--- docker context ls ---"
    DOCKER_CONFIG="{{ _docker_config_override }}" docker context ls 2>&1 || echo "(context command failed)"
    echo "--- credential helpers in PATH ---"
    which docker-credential-desktop 2>&1 || echo "(not found)"
    which docker-credential-osxkeychain 2>&1 || echo "(not found)"
  changed_when: false

- name: Remove stale or conflicting containers before recreate
  ansible.builtin.shell: |
    for svc in {{ _services_arg }}; do
      cname="{{ container_prefix | default('dev') }}-${svc}"
      existing_id=$(docker inspect -f '{%raw%}{{.Id}}{%endraw%}' "$cname" 2>/dev/null || true)
      if [ -n "$existing_id" ]; then
        existing_project=$(docker inspect -f '{%raw%}{{ index .Config.Labels "com.docker.compose.project" }}{%endraw%}' "$cname" 2>/dev/null || echo "")
        if [ -n "$existing_project" ] && [ "$existing_project" != "{{ compose_project_name }}" ]; then
          echo "[WARN] Removing stale container $cname (project=$existing_project, expected={{ compose_project_name }})"
          docker rm -f "$cname" >/dev/null 2>&1 || true
        elif [ "{{ docker_force_recreate | default(false) | string | lower }}" = "true" ]; then
          echo "[INFO] Force-recreate: stopping and removing $cname"
          docker stop "$cname" >/dev/null 2>&1 || true
          docker rm "$cname" >/dev/null 2>&1 || true
        fi
      fi
    done
  changed_when: false
  when: docker_services_to_start | default([]) | length > 0

- name: Start services with docker compose up
  ansible.builtin.shell: |
    cd {{ docker_compose_dir }}
    docker compose {{ docker_compose_file_args }} {{ _env_file_arg }} \
      up -d --no-deps {{ '--force-recreate' if docker_force_recreate else '' }} \
      {{ '--remove-orphans' if docker_remove_orphans else '' }} \
      {{ _services_arg }} 2>&1
  args:
    chdir: "{{ docker_compose_dir }}"
  environment: *docker_secrets_env
  register: up_result
  changed_when: "'Creating' in up_result.stdout or 'Recreating' in up_result.stdout or 'Started' in up_result.stdout or 'Creating' in up_result.stderr or 'Recreating' in up_result.stderr"
  no_log: false

- name: Show docker compose output
  ansible.builtin.debug:
    msg: "{{ up_result.stdout_lines | default([]) + up_result.stderr_lines | default([]) }}"
  when: up_result is defined

- name: Wait for services to be healthy
  ansible.builtin.shell:
    cmd: |
      timeout={{ docker_health_timeout | int }}
      elapsed=0

      if command -v jq >/dev/null 2>&1; then
        parse_health() { echo "$1" | jq -r 'if type == "array" then [.[].Health] else [.Health] end | .[]? // "none"' 2>/dev/null; }
      elif command -v python3 >/dev/null 2>&1; then
        parse_health() { echo "$1" | python3 -c "
      import sys,json
      d=json.load(sys.stdin)
      items=d if isinstance(d,list) else [d]
      for i in items: print(i.get('Health','none'))
      " 2>/dev/null || echo "none"; }
      else
        echo "WARNING: Neither jq nor python3 found"
        exit 1
      fi

      while [ $elapsed -lt $timeout ]; do
        json_output=$(${COMPOSE_CMD} ps --format json ${WAIT_SERVICES} 2>/dev/null)
        healths=$(parse_health "$json_output")

        starting=0
        for h in $healths; do
          [ "$h" = "starting" ] && starting=$((starting+1))
        done

        if [ $starting -eq 0 ]; then
          echo "All services healthy (${elapsed}s)"
          exit 0
        fi

        sleep 5
        elapsed=$((elapsed + 5))
      done
      echo "Timeout after ${timeout}s — some services may still be starting"
      exit 0
    chdir: "{{ docker_compose_dir }}"
    executable: /bin/bash
  environment:
    DOCKER_CONFIG: "{{ _docker_config_override }}"
    DOCKER_HOST: "{{ lookup('env', 'DOCKER_HOST') | default('', true) }}"
    COMPOSE_PROJECT_NAME: "{{ compose_project_name }}"
    COMPOSE_CMD: "docker compose {{ docker_compose_file_args }} {{ _env_file_arg }}"
    WAIT_SERVICES: "{{ _services_arg }}"
    CONTAINER_PREFIX: "{{ container_prefix | default('dev') }}"
    POSTGRES_PASSWORD: "{{ busibox_secrets.POSTGRES_PASSWORD }}"
    MINIO_ROOT_USER: "{{ busibox_secrets.MINIO_ROOT_USER }}"
    MINIO_ROOT_PASSWORD: "{{ busibox_secrets.MINIO_ROOT_PASSWORD }}"
    MINIO_ACCESS_KEY: "{{ busibox_secrets.MINIO_ROOT_USER }}"
    MINIO_SECRET_KEY: "{{ busibox_secrets.MINIO_ROOT_PASSWORD }}"
    NEO4J_PASSWORD: "{{ busibox_secrets.NEO4J_PASSWORD }}"
    CONFIG_ENCRYPTION_KEY: "{{ busibox_secrets.CONFIG_ENCRYPTION_KEY }}"
    LITELLM_MASTER_KEY: "{{ busibox_secrets.LITELLM_MASTER_KEY }}"
    LITELLM_API_KEY: "{{ busibox_secrets.LITELLM_MASTER_KEY }}"
    LITELLM_SALT_KEY: "{{ busibox_secrets.LITELLM_SALT_KEY }}"
    AUTHZ_MASTER_KEY: "{{ busibox_secrets.AUTHZ_MASTER_KEY }}"
    SSO_JWT_SECRET: "{{ busibox_secrets.SSO_JWT_SECRET }}"
    GITHUB_AUTH_TOKEN: "{{ busibox_secrets.GITHUB_AUTH_TOKEN }}"
  when: docker_wait_for_health | default(false)
  register: health_check
  changed_when: false
