---
# Config API defaults
# Co-located with authz and deploy-api on the authz container

# Service configuration
config_api_user: authz
config_api_group: authz
config_api_service_name: config-api
config_api_service_port: 8012

# Directories (lives alongside authz and deploy-api)
config_api_base_dir: /opt/config
config_api_app_dir: /opt/config/app
config_api_venv_dir: /opt/config/venv
config_api_src_dir: "{{ playbook_dir }}/../../srv/config"

# Authz service (for JWT validation via JWKS — localhost since co-located)
config_api_authz_url: "http://localhost:{{ authz_service_port | default(8010) }}"

# PostgreSQL
# Prefer DNS hostname 'postgres' (resolved via /etc/hosts from internal_dns role)
config_api_postgres_host: "{{ 'postgres' if (lookup('pipe', 'getent hosts postgres 2>/dev/null || true') | length > 0) else (hostvars[groups['pg'][0]]['ansible_host'] | default('postgres')) }}"
config_api_postgres_port: 5432
config_api_postgres_db: config
config_api_postgres_user: "{{ secrets.postgresql.user | default('busibox_user') }}"
config_api_postgres_password: "{{ secrets.postgresql.password | default('') }}"

# Encryption key for encrypted config values
config_api_encryption_key: "{{ secrets.config_api.encryption_key | default('') }}"
