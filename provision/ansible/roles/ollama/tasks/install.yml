---
# Ollama Installation Tasks
# Simplified approach: Install userspace NVIDIA drivers and Ollama

- name: Update apt cache
  apt:
    update_cache: yes
    cache_valid_time: 3600
  tags: [ollama_install]

- name: Install dependencies
  apt:
    name:
      - curl
      - wget
      - ca-certificates
    state: present
  tags: [ollama_install]

- name: Check if GPU devices are present in container
  shell: "ls -la /dev/nvidia* 2>/dev/null || echo 'No NVIDIA devices'"
  register: gpu_devices_check
  changed_when: false
  failed_when: false
  tags: [ollama_install, ollama_gpu]

- name: Display GPU device status
  debug:
    msg: "{{ gpu_devices_check.stdout_lines }}"
  tags: [ollama_install, ollama_gpu]

- name: Install NVIDIA userspace drivers for LXC
  block:
    - name: Add NVIDIA CUDA repository
      block:
        - name: Download CUDA keyring
          get_url:
            url: https://developer.download.nvidia.com/compute/cuda/repos/debian12/x86_64/cuda-keyring_1.1-1_all.deb
            dest: /tmp/cuda-keyring.deb
            mode: '0644'

        - name: Install CUDA keyring
          apt:
            deb: /tmp/cuda-keyring.deb
            state: present

        - name: Remove keyring deb file
          file:
            path: /tmp/cuda-keyring.deb
            state: absent

        - name: Update apt cache
          apt:
            update_cache: yes

    - name: Install NVIDIA drivers and CUDA toolkit (userspace only in LXC)
      apt:
        name:
          - cuda-drivers
          - cuda-toolkit
        state: present
        install_recommends: no
      environment:
        DEBIAN_FRONTEND: noninteractive
      register: nvidia_drivers_install

    - name: Verify nvidia-smi is available
      command: nvidia-smi
      register: nvidia_smi_check
      changed_when: false
      failed_when: false

    - name: Display nvidia-smi output
      debug:
        msg: "{{ nvidia_smi_check.stdout_lines }}"
      when: nvidia_smi_check.rc == 0

  when: "'No NVIDIA devices' not in gpu_devices_check.stdout"
  tags: [ollama_install, ollama_gpu]

- name: Create Ollama system group
  group:
    name: "{{ ollama_user }}"
    system: yes
    state: present
  tags: [ollama_install]

- name: Create Ollama system user
  user:
    name: "{{ ollama_user }}"
    group: "{{ ollama_user }}"
    system: yes
    home: "{{ ollama_home }}"
    create_home: yes
    shell: /bin/false
    state: present
  tags: [ollama_install]

- name: Create Ollama directories
  file:
    path: "{{ item }}"
    state: directory
    owner: "{{ ollama_user }}"
    group: "{{ ollama_user }}"
    mode: '0755'
  loop:
    - "{{ ollama_home }}"
    - "{{ ollama_models_dir }}"
  tags: [ollama_install]

- name: Check if Ollama is already installed
  stat:
    path: /usr/local/bin/ollama
  register: ollama_binary
  tags: [ollama_install]

- name: Install Ollama using official install script
  shell: curl -fsSL https://ollama.com/install.sh | sh
  args:
    creates: /usr/local/bin/ollama
  when: not ollama_binary.stat.exists
  tags: [ollama_install]

- name: Verify Ollama installation
  command: /usr/local/bin/ollama --version
  register: ollama_version
  changed_when: false
  tags: [ollama_install]

- name: Display Ollama version
  debug:
    msg: "{{ ollama_version.stdout }}"
  tags: [ollama_install]
