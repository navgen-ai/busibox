---
# Ollama Installation Tasks
# Simplified approach: Install userspace NVIDIA drivers and Ollama

- name: Update apt cache
  apt:
    update_cache: yes
    cache_valid_time: 3600
  tags: [ollama_install]

- name: Install dependencies
  apt:
    name:
      - curl
      - wget
      - ca-certificates
    state: present
  tags: [ollama_install]

- name: Check if GPU devices are present in container
  shell: "ls -la /dev/nvidia* 2>/dev/null || echo 'No NVIDIA devices'"
  register: gpu_devices_check
  changed_when: false
  failed_when: false
  tags: [ollama_install, ollama_gpu]

- name: Display GPU device status
  debug:
    msg: "{{ gpu_devices_check.stdout_lines }}"
  tags: [ollama_install, ollama_gpu]

- name: Check if NVIDIA drivers are installed (must match host version)
  shell: "nvidia-smi 2>&1 || echo 'NOT_INSTALLED'"
  register: nvidia_drivers_check
  changed_when: false
  failed_when: false
  tags: [ollama_install, ollama_gpu]

- name: Install NVIDIA drivers using install-nvidia-drivers.sh (on Proxmox host)
  shell: "bash /root/busibox/provision/pct/host/install-nvidia-drivers.sh {{ container_id }}"
  delegate_to: localhost
  become: false
  when: 
    - "'No NVIDIA devices' not in gpu_devices_check.stdout"
    - ("'NOT_INSTALLED' in nvidia_drivers_check.stdout" or "'Driver/library version mismatch' in nvidia_drivers_check.stderr")
  register: driver_install_result
  changed_when: driver_install_result.rc == 0
  failed_when: driver_install_result.rc != 0
  tags: [ollama_install, ollama_gpu]

- name: Verify drivers after installation
  shell: "nvidia-smi 2>&1"
  register: nvidia_drivers_verify
  changed_when: false
  failed_when: "'Driver/library version mismatch' in nvidia_drivers_verify.stderr"
  tags: [ollama_install, ollama_gpu]

- name: Display nvidia-smi output
  debug:
    msg: "{{ nvidia_drivers_verify.stdout_lines }}"
  when: "'Driver/library version mismatch' not in nvidia_drivers_verify.stderr"
  tags: [ollama_install, ollama_gpu]

  when: "'No NVIDIA devices' not in gpu_devices_check.stdout"
  tags: [ollama_install, ollama_gpu]

- name: Create Ollama system group
  group:
    name: "{{ ollama_user }}"
    system: yes
    state: present
  tags: [ollama_install]

- name: Create Ollama system user
  user:
    name: "{{ ollama_user }}"
    group: "{{ ollama_user }}"
    system: yes
    home: "{{ ollama_home }}"
    create_home: yes
    shell: /bin/false
    state: present
  tags: [ollama_install]

- name: Create Ollama directories
  file:
    path: "{{ item }}"
    state: directory
    owner: "{{ ollama_user }}"
    group: "{{ ollama_user }}"
    mode: '0755'
  loop:
    - "{{ ollama_home }}"
    - "{{ ollama_models_dir }}"
  tags: [ollama_install]

- name: Check if Ollama is already installed
  stat:
    path: /usr/local/bin/ollama
  register: ollama_binary
  tags: [ollama_install]

- name: Install Ollama using official install script
  shell: curl -fsSL https://ollama.com/install.sh | sh
  args:
    creates: /usr/local/bin/ollama
  when: not ollama_binary.stat.exists
  tags: [ollama_install]

- name: Verify Ollama installation
  command: /usr/local/bin/ollama --version
  register: ollama_version
  changed_when: false
  tags: [ollama_install]

- name: Display Ollama version
  debug:
    msg: "{{ ollama_version.stdout }}"
  tags: [ollama_install]
