---
# Ollama Installation Tasks
# Install Ollama binary and dependencies

- name: Update apt cache
  apt:
    update_cache: yes
    cache_valid_time: 3600
  tags: [ollama_install]

- name: Install dependencies
  apt:
    name:
      - curl
      - ca-certificates
      - gnupg
      - lsb-release
      - software-properties-common
      - wget
    state: present
  tags: [ollama_install]

- name: Check if NVIDIA GPU is available
  command: nvidia-smi
  register: nvidia_check
  failed_when: false
  changed_when: false
  tags: [ollama_install, ollama_gpu]

- name: Check if GPU devices are present
  shell: "ls -la /dev/nvidia* 2>/dev/null || echo 'No NVIDIA devices found'"
  register: ollama_gpu_devices_check
  changed_when: false
  tags: [ollama_install, ollama_gpu]

- name: Set GPU availability fact
  set_fact:
    ollama_has_gpu: "{{ nvidia_check.rc == 0 }}"
  tags: [ollama_install, ollama_gpu]

- name: Display GPU status
  debug:
    msg: "GPU {{ 'AVAILABLE' if ollama_has_gpu else 'NOT AVAILABLE' }} - {{ 'will use GPU acceleration' if ollama_has_gpu else 'will use CPU only' }}"
  tags: [ollama_install, ollama_gpu]

- name: Purge existing NVIDIA drivers if GPU devices exist but nvidia-smi fails
  block:
    - name: Display purge reason
      debug:
        msg: "GPU devices detected but nvidia-smi not working. Purging and reinstalling NVIDIA drivers..."

    - name: Stop any running NVIDIA services
      systemd:
        name: "{{ item }}"
        state: stopped
      loop:
        - nvidia-persistenced
      failed_when: false
      ignore_errors: true

    - name: Purge all NVIDIA packages
      apt:
        name:
          - 'nvidia-*'
          - 'cuda-*'
          - 'libnvidia-*'
          - 'libcuda*'
        state: absent
        purge: yes
        autoremove: yes

    - name: Clean apt cache
      apt:
        autoclean: yes

    - name: Remove NVIDIA configuration files
      file:
        path: "{{ item }}"
        state: absent
      loop:
        - /etc/modprobe.d/nvidia.conf
        - /etc/modprobe.d/nvidia-installer-disable-nouveau.conf
        - /usr/local/cuda
      ignore_errors: true
  when: 
    - not ollama_has_gpu
    - ollama_gpu_enabled
    - "'No NVIDIA devices found' not in ollama_gpu_devices_check.stdout"
  tags: [ollama_install, ollama_gpu]

- name: Install NVIDIA drivers and CUDA (if GPU available)
  block:
    - name: Remove old NVIDIA repository configurations
      file:
        path: "{{ item }}"
        state: absent
      loop:
        - /etc/apt/sources.list.d/cuda-debian12-x86_64.list
        - /usr/share/keyrings/cuda-archive-keyring.gpg
        - /usr/share/keyrings/cuda-archive-keyring.asc
        - /usr/share/keyrings/nvidia-cuda-keyring.gpg
        - /tmp/nvidia-cuda-keyring.asc

    - name: Install gnupg for key conversion
      apt:
        name: gnupg
        state: present
        update_cache: yes

    - name: Download NVIDIA CUDA repository GPG key
      get_url:
        url: https://developer.download.nvidia.com/compute/cuda/repos/debian12/x86_64/3bf863cc.pub
        dest: /tmp/nvidia-cuda-keyring.asc
        mode: '0644'

    - name: Convert and install GPG key
      shell: |
        gpg --dearmor < /tmp/nvidia-cuda-keyring.asc > /usr/share/keyrings/nvidia-cuda-keyring.gpg
        chmod 644 /usr/share/keyrings/nvidia-cuda-keyring.gpg

    - name: Add NVIDIA CUDA repository
      apt_repository:
        repo: "deb [signed-by=/usr/share/keyrings/nvidia-cuda-keyring.gpg] https://developer.download.nvidia.com/compute/cuda/repos/debian12/x86_64/ /"
        state: present
        filename: nvidia-cuda-debian12

    - name: Update apt cache after adding NVIDIA repo
      apt:
        update_cache: yes

    - name: Check NVIDIA driver version on host via kernel module
      shell: "cat /proc/driver/nvidia/version 2>/dev/null | head -1 | awk '{print $8}' || echo ''"
      register: host_nvidia_version
      changed_when: false
      failed_when: false

    - name: Display detected host NVIDIA driver version
      debug:
        msg: "Host NVIDIA driver version: {{ host_nvidia_version.stdout }}"

    - name: Install NVIDIA userspace utilities (nvidia-drivers-cuda + cuda-toolkit)
      apt:
        name:
          - nvidia-driver-cuda
          - cuda-toolkit
        state: present
        install_recommends: yes
      register: nvidia_install
      environment:
        DEBIAN_FRONTEND: noninteractive

    - name: Reboot container if drivers were installed
      shell: "sleep 2 && reboot"
      async: 1
      poll: 0
      when: nvidia_install.changed
      ignore_errors: true

    - name: Wait for container to come back up
      wait_for_connection:
        delay: 10
        timeout: 300
      when: nvidia_install.changed

    - name: Verify nvidia-smi works after reboot
      command: nvidia-smi
      register: nvidia_smi_check
      changed_when: false
      retries: 5
      delay: 5
      until: nvidia_smi_check.rc == 0
      when: nvidia_install.changed

    - name: Display NVIDIA driver info after install
      debug:
        msg: "{{ nvidia_smi_check.stdout_lines }}"
      when: nvidia_install.changed
  when: not ollama_has_gpu and ollama_gpu_enabled
  tags: [ollama_install, ollama_gpu]

- name: Create Ollama system group
  group:
    name: "{{ ollama_group }}"
    system: yes
    state: present
  tags: [ollama_install]

- name: Create Ollama system user
  user:
    name: "{{ ollama_user }}"
    group: "{{ ollama_group }}"
    system: yes
    create_home: yes
    home: "{{ ollama_home }}"
    shell: /bin/bash
    comment: "Ollama Service User"
  tags: [ollama_install]

- name: Create Ollama directories
  file:
    path: "{{ item }}"
    state: directory
    owner: "{{ ollama_user }}"
    group: "{{ ollama_group }}"
    mode: '0755'
  loop:
    - "{{ ollama_home }}"
    - "{{ ollama_models_dir }}"
  tags: [ollama_install]

- name: Check if Ollama is already installed
  stat:
    path: "{{ ollama_install_dir }}/ollama"
  register: ollama_binary
  tags: [ollama_install]

- name: Get installed Ollama version
  command: "{{ ollama_install_dir }}/ollama --version"
  register: ollama_version_check
  when: ollama_binary.stat.exists
  changed_when: false
  failed_when: false
  tags: [ollama_install]

- name: Install Ollama using official install script
  shell: curl -fsSL https://ollama.com/install.sh | sh
  args:
    creates: "{{ ollama_install_dir }}/ollama"
  when: not ollama_binary.stat.exists
  tags: [ollama_install]

- name: Stop Ollama service installed by script (we'll reconfigure it)
  systemd:
    name: ollama
    state: stopped
  when: not ollama_binary.stat.exists
  failed_when: false
  tags: [ollama_install]

- name: Verify Ollama installation
  command: "{{ ollama_install_dir }}/ollama --version"
  register: ollama_verify
  changed_when: false
  tags: [ollama_install]

- name: Display Ollama version
  debug:
    msg: "Ollama installed: {{ ollama_verify.stdout }}"
  tags: [ollama_install]

