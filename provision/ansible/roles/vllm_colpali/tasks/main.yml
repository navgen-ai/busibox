---
# vLLM ColPali - Main Tasks
# Purpose: Deploy ColPali vision model on dedicated GPU

- name: Check if model cache directory exists
  stat:
    path: "/var/lib/llm-models/huggingface/hub"
  register: cache_dir_check

- name: Check if ColPali model is cached
  shell: |
    find /var/lib/llm-models/huggingface/hub -type d -name "*colpali*" -o -name "*paligemma*" 2>/dev/null | head -1
  register: colpali_cache_check
  changed_when: false
  failed_when: false
  when: cache_dir_check.stat.exists

- name: Display model cache status
  debug:
    msg: "Model cache status: {{ 'FOUND' if (colpali_cache_check.stdout | default('') | length > 0) else 'NOT FOUND - will download on first start (may take 10-20 min)' }}"
  when: cache_dir_check.stat.exists

- name: Create vLLM ColPali home directory
  file:
    path: "{{ vllm_colpali_home }}"
    state: directory
    owner: "{{ vllm_colpali_user }}"
    group: "{{ vllm_colpali_group }}"
    mode: "0755"

- name: Create vLLM ColPali cache directory
  file:
    path: "{{ vllm_colpali_home }}/.cache/vllm"
    state: directory
    owner: "{{ vllm_colpali_user }}"
    group: "{{ vllm_colpali_group }}"
    mode: "0755"
  
- name: Deploy vLLM ColPali systemd service
  template:
    src: vllm-colpali.service.j2
    dest: /etc/systemd/system/vllm-colpali.service
    owner: root
    group: root
    mode: "0644"
  notify: reload systemd

- name: Enable vLLM ColPali service
  systemd:
    name: vllm-colpali
    enabled: yes
    daemon_reload: yes
  when: vllm_colpali_enable_service

- name: Start vLLM ColPali service
  systemd:
    name: vllm-colpali
    state: started
  when: vllm_colpali_start_service
  register: vllm_colpali_start

- name: Wait for vLLM ColPali to be ready
  uri:
    url: "http://{{ vllm_colpali_host }}:{{ vllm_colpali_port }}/health"
    method: GET
    status_code: 200
  register: health_check
  until: health_check.status == 200
  retries: 60
  delay: 10
  when: vllm_colpali_start_service and vllm_colpali_start.changed

