- name: Install docker
  apt:
    name: [ca-certificates, curl, gnupg]
    state: present
    update_cache: yes

- shell: |
    install -m 0755 -d /etc/apt/keyrings
    curl -fsSL https://download.docker.com/linux/debian/gpg | gpg --dearmor -o /etc/apt/keyrings/docker.gpg
    chmod a+r /etc/apt/keyrings/docker.gpg
    echo "deb [arch=$(dpkg --print-architecture) signed-by=/etc/apt/keyrings/docker.gpg] https://download.docker.com/linux/debian $(. /etc/os-release && echo $VERSION_CODENAME) stable" > /etc/apt/sources.list.d/docker.list
    apt update && apt install -y docker-ce docker-ce-cli containerd.io docker-compose-plugin
  args: { executable: /bin/bash }

- name: Create Milvus directories
  file:
    path: "{{ item }}"
    state: directory
    mode: "0755"
  loop:
    - /srv/milvus
    - /srv/milvus/data

- name: Deploy Milvus standalone
  copy:
    dest: /srv/milvus/docker-compose.yml
    content: |
      services:
        milvus:
          container_name: milvus-standalone
          image: milvusdb/milvus:v2.5.4
          restart: unless-stopped
          ports:
            - "19530:19530"
            - "9091:9091"
          environment:
            ETCD_USE_EMBED: "true"
            MINIO_USE_EMBED: "true"
            ROCKSMQ_USE_EMBED: "true"
            COMMON_STORAGETYPE: local
          volumes:
            - /srv/milvus/data:/var/lib/milvus
          command: ["milvus", "run", "standalone"]
          # Add required sysctls for LXC environment
          sysctls:
            - net.ipv4.ip_unprivileged_port_start=0
          healthcheck:
            test: ["CMD", "curl", "-f", "http://localhost:9091/healthz"]
            interval: 30s
            timeout: 10s
            retries: 3
            start_period: 90s
  notify: Up Milvus

- name: Start Milvus
  shell: docker compose up -d
  args: { chdir: /srv/milvus }

- name: Wait for Milvus to be ready
  wait_for:
    host: localhost
    port: 19530
    delay: 10
    timeout: 120

- name: Install Python and dependencies for Milvus initialization
  apt:
    name:
      - python3
      - python3-pip
      - python3-venv
    state: present

- name: Check if old marshmallow version exists
  shell: |
    if [ -f /opt/milvus-tools/bin/python ]; then
      /opt/milvus-tools/bin/python -c "import marshmallow; print(marshmallow.__version__)" 2>/dev/null || echo "old"
    else
      echo "none"
    fi
  register: marshmallow_check
  changed_when: false
  failed_when: false

- name: Remove old Python virtual environment if it has incompatible marshmallow
  file:
    path: /opt/milvus-tools
    state: absent
  when: 
    - marshmallow_check.stdout is defined
    - marshmallow_check.stdout in ['old', 'none'] or (marshmallow_check.stdout not in ['old', 'none'] and marshmallow_check.stdout is version('3.13.0', '<'))

- name: Create Python virtual environment for Milvus tools
  shell: python3 -m venv /opt/milvus-tools
  args:
    creates: /opt/milvus-tools/bin/python

- name: Upgrade pip in virtual environment
  pip:
    name: pip
    state: latest
    virtualenv: /opt/milvus-tools

- name: Install marshmallow first (required version for environs)
  pip:
    name: "marshmallow>=3.13.0"
    virtualenv: /opt/milvus-tools
    state: present

- name: Install pymilvus in virtual environment
  pip:
    name: "pymilvus==2.6.3"
    virtualenv: /opt/milvus-tools
    state: present
    extra_args: "--no-deps"  # Don't install dependencies to avoid downgrading marshmallow

- name: Install remaining pymilvus dependencies
  pip:
    name:
      - "grpcio>=1.49.1"
      - "grpcio-tools>=1.49.1"
      - "protobuf>=3.20.0"
      - "environs>=9.5.0"
      - "ujson>=2.0.0"
      - "orjson>=3.9.0"
      - "pandas>=1.2.4"
      - "numpy"
      - "requests>=2.20.0"
      - "urllib3>=1.26.0"
      - "minio>=7.0.0"
      - "pyarrow>=12.0.0"
      - "certifi>=2023.0.0"
    virtualenv: /opt/milvus-tools
    state: present

- name: Copy Milvus initialization script
  copy:
    src: "{{ playbook_dir }}/../../tools/milvus_init.py"
    dest: /root/milvus_init.py
    mode: "0755"

- name: Initialize Milvus collection
  shell: |
    /opt/milvus-tools/bin/python /root/milvus_init.py
  environment:
    MILVUS_HOST: localhost
    MILVUS_PORT: "19530"
    EMBEDDING_DIM: "768"
  register: milvus_init
  ignore_errors: yes

- name: Display Milvus initialization result
  debug:
    var: milvus_init.stdout_lines
  when: milvus_init.stdout_lines is defined

- name: Copy Milvus schema migration script
  copy:
    src: files/migrate_schema.py
    dest: /root/migrate_schema.py
    mode: "0755"

- name: Run Milvus schema migration
  shell: |
    /opt/milvus-tools/bin/python /root/migrate_schema.py
  environment:
    MILVUS_HOST: localhost
    MILVUS_PORT: "19530"
  register: milvus_migration
  failed_when: false

- name: Display Milvus migration result
  debug:
    var: milvus_migration.stdout_lines
  when: milvus_migration.stdout_lines is defined

- name: Copy hybrid search schema script
  copy:
    src: files/hybrid_schema.py
    dest: /root/hybrid_schema.py
    mode: "0755"

- name: Initialize hybrid search collection
  shell: |
    /opt/milvus-tools/bin/python /root/hybrid_schema.py
  environment:
    MILVUS_HOST: localhost
    MILVUS_PORT: "19530"
  register: hybrid_schema_init
  ignore_errors: yes

- name: Display hybrid schema initialization result
  debug:
    var: hybrid_schema_init.stdout_lines
  when: hybrid_schema_init.stdout_lines is defined

- name: Create Milvus health check script
  copy:
    dest: /usr/local/bin/milvus-health-check
    content: |
      #!/bin/bash
      curl -f -s http://localhost:9091/healthz > /dev/null
    mode: "0755"

- name: Create systemd service for Milvus (ensures Docker Compose starts on boot)
  copy:
    dest: /etc/systemd/system/milvus.service
    content: |
      [Unit]
      Description=Milvus Vector Database
      Requires=docker.service
      After=docker.service
      
      [Service]
      Type=oneshot
      RemainAfterExit=yes
      WorkingDirectory=/srv/milvus
      ExecStart=/usr/bin/docker compose up -d
      ExecStop=/usr/bin/docker compose down
      
      [Install]
      WantedBy=multi-user.target

- name: Enable Milvus systemd service
  systemd:
    name: milvus
    enabled: yes
    daemon_reload: yes
