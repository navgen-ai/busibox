- name: Install docker
  apt:
    name: [ca-certificates, curl, gnupg]
    state: present
    update_cache: yes

- shell: |
    install -m 0755 -d /etc/apt/keyrings
    curl -fsSL https://download.docker.com/linux/debian/gpg | gpg --dearmor -o /etc/apt/keyrings/docker.gpg
    chmod a+r /etc/apt/keyrings/docker.gpg
    echo "deb [arch=$(dpkg --print-architecture) signed-by=/etc/apt/keyrings/docker.gpg] https://download.docker.com/linux/debian $(. /etc/os-release && echo $VERSION_CODENAME) stable" > /etc/apt/sources.list.d/docker.list
    apt update && apt install -y docker-ce docker-ce-cli containerd.io docker-compose-plugin
  args: { executable: /bin/bash }

- name: Create Milvus directories
  file:
    path: "{{ item }}"
    state: directory
    mode: "0755"
  loop:
    - /srv/milvus
    - /srv/milvus/data

- name: Check current Milvus version
  shell: |
    if docker ps | grep -q milvus-standalone; then
      docker exec milvus-standalone milvus version 2>/dev/null | grep "Milvus version" | awk '{print $3}' || echo "unknown"
    else
      echo "none"
    fi
  register: current_milvus_version
  changed_when: false
  failed_when: false

- name: Warn about Milvus 2.5 to 2.6 upgrade
  debug:
    msg: |
      WARNING: Upgrading from Milvus 2.5 to 2.6 requires data migration.
      Current version: {{ current_milvus_version.stdout }}
      Target version: 2.6.5
      
      Milvus 2.6 has breaking changes. Your options:
      1. Clear data directory (DATA LOSS): rm -rf /srv/milvus/data/* 
      2. Back up and manually migrate data
      3. Abort this deployment
      
      Proceeding will attempt automatic upgrade...
  when: 
    - current_milvus_version.stdout is defined
    - current_milvus_version.stdout | length > 0
    - current_milvus_version.stdout not in ['none', 'unknown', '']
    - current_milvus_version.stdout is version('2.6.0', '<')

- name: Deploy Milvus standalone
  copy:
    dest: /srv/milvus/docker-compose.yml
    content: |
    
      services:
        etcd:
          container_name: milvus-etcd
          image: quay.io/coreos/etcd:v3.5.18
          environment:
            - ETCD_AUTO_COMPACTION_MODE=revision
            - ETCD_AUTO_COMPACTION_RETENTION=1000
            - ETCD_QUOTA_BACKEND_BYTES=4294967296
            - ETCD_SNAPSHOT_COUNT=50000
          volumes:
            - ${DOCKER_VOLUME_DIRECTORY:-.}/volumes/etcd:/etcd
          command: etcd -advertise-client-urls=http://etcd:2379 -listen-client-urls http://0.0.0.0:2379 --data-dir /etcd
          healthcheck:
            test: ["CMD", "etcdctl", "endpoint", "health"]
            interval: 30s
            timeout: 20s
            retries: 3
        minio:
          container_name: milvus-minio
          image: minio/minio:RELEASE.2024-12-18T13-15-44Z
          environment:
            MINIO_ACCESS_KEY: minioadmin
            MINIO_SECRET_KEY: minioadmin
          ports:
            - "9001:9001"
            - "9000:9000"
          volumes:
            - ${DOCKER_VOLUME_DIRECTORY:-.}/volumes/minio:/minio_data
          command: minio server /minio_data --console-address ":9001"
          healthcheck:
            test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
            interval: 30s
            timeout: 20s
            retries: 3

        milvus:
          container_name: milvus-standalone
          image: milvusdb/milvus:v2.6.5
          command: ["milvus", "run", "standalone"]
          security_opt:
          - seccomp:unconfined
          environment:
            ETCD_ENDPOINTS: etcd:2379
            MINIO_ADDRESS: minio:9000
            MQ_TYPE: woodpecker
          volumes:
            - ${DOCKER_VOLUME_DIRECTORY:-.}/volumes/milvus:/var/lib/milvus
          healthcheck:
            test: ["CMD", "curl", "-f", "http://localhost:9091/healthz"]
            interval: 30s
            start_period: 90s
            timeout: 20s
            retries: 3
          ports:
            - "19530:19530"
            - "9091:9091"
          depends_on:
            - "etcd"
            - "minio"
      networks:
        default:
          name: milvus      

  register: milvus_compose_changed
  notify: Up Milvus

- name: Check for RocksDB corruption before stopping
  shell: |
    if docker logs milvus-standalone 2>&1 | grep -q "Corruption:"; then
      echo "corrupted"
    else
      echo "ok"
    fi
  register: rocksdb_check_before
  ignore_errors: yes
  changed_when: false

- name: Stop any existing Milvus containers (for clean restart)
  shell: docker compose down
  args: { chdir: /srv/milvus }
  ignore_errors: yes

- name: Check for RocksDB MANIFEST files indicating corruption
  shell: >
    if [ -d /srv/milvus/data/rdb_data_meta_kv ]; then
      manifest_count=$(find /srv/milvus/data/rdb_data_meta_kv -name "MANIFEST-*" 2>/dev/null | wc -l);
      ldb_count=$(find /srv/milvus/data/rdb_data_meta_kv -name "*.ldb" 2>/dev/null | wc -l);
      if [ "$manifest_count" -gt 0 ] && [ "$ldb_count" -lt 2 ]; then
        echo "corrupted";
      else
        echo "ok";
      fi;
    else
      echo "ok";
    fi
  register: rocksdb_check_files
  ignore_errors: yes
  changed_when: false

- name: Clean up corrupted RocksDB data (ONLY if corruption detected)
  shell: |
    echo "WARNING: RocksDB corruption detected, cleaning up corrupted data..."
    # Remove corrupted RocksDB directories
    rm -rf /srv/milvus/data/rdb_data*
    echo "Corrupted RocksDB data removed. Milvus will rebuild on restart."
  when: >
    (rocksdb_check_before.stdout is defined and "corrupted" in rocksdb_check_before.stdout) or
    (rocksdb_check_files.stdout is defined and "corrupted" in rocksdb_check_files.stdout)
  ignore_errors: yes

- name: Remove stale RocksDB lock files
  shell: |
    find /srv/milvus/data -type f -name "LOCK" -delete
  ignore_errors: yes

- name: Stop and remove any existing Milvus containers
  shell: |
    # Stop any running docker compose services
    docker compose down 2>/dev/null || true
    # Remove any orphaned containers with the same names
    docker rm -f milvus-standalone milvus-etcd milvus-minio 2>/dev/null || true
  args: { chdir: /srv/milvus }
  ignore_errors: yes

- name: Start Milvus
  shell: docker compose up -d
  args: { chdir: /srv/milvus }
  register: milvus_start

- name: Wait a moment for Milvus to initialize
  pause:
    seconds: 5

- name: Check if Milvus started successfully
  shell: docker ps | grep milvus-standalone
  register: milvus_running
  retries: 3
  delay: 5
  until: milvus_running.rc == 0
  ignore_errors: yes
  when: ansible_verbosity >= 1

- name: Show Milvus logs if startup failed
  shell: docker logs --tail 50 milvus-standalone
  when: 
    - ansible_verbosity >= 1
    - milvus_running.failed | default(false)
  ignore_errors: yes

- name: Wait for Milvus port to be listening
  wait_for:
    port: 19530
    host: 0.0.0.0
    state: started
    delay: 10
    timeout: 180
  register: milvus_port_check
  ignore_errors: yes

- name: Check Milvus health endpoint
  uri:
    url: http://localhost:9091/healthz
    method: GET
    status_code: 200
  register: milvus_health
  retries: 30
  delay: 6
  until: milvus_health.status == 200
  when: not (milvus_port_check.failed | default(false))
  ignore_errors: yes

- name: Show detailed Milvus status if health check failed
  block:
    - name: Check if Milvus container is running
      shell: docker ps -a | grep milvus-standalone
      register: milvus_container_status
      ignore_errors: yes

    - name: Show Milvus container logs
      shell: docker logs --tail 100 milvus-standalone
      register: milvus_logs
      ignore_errors: yes

    - name: Show port listening status
      shell: netstat -tlnp | grep 19530 || ss -tlnp | grep 19530 || echo "Port 19530 not listening"
      register: port_status
      ignore_errors: yes

    - name: Display diagnostic information
      debug:
        msg:
          - "Container Status: {{ milvus_container_status.stdout | default('Not found') }}"
          - "Port Status: {{ port_status.stdout | default('Not listening') }}"
          - "Last 20 log lines: {{ milvus_logs.stdout_lines[-20:] | default(['No logs']) }}"

    - name: Fail with helpful message
      fail:
        msg: |
          Milvus failed to start properly. Run with -v for diagnostic information.
          Quick checks:
          - SSH to container and run: docker logs milvus-standalone
          - Check port: netstat -tlnp | grep 19530
          - Check container: docker ps -a | grep milvus
  when: 
    - milvus_health.failed | default(false) or milvus_port_check.failed | default(false)
    - ansible_verbosity >= 1

- name: Fail silently if health check failed (non-debug mode)
  fail:
    msg: "Milvus failed to start. Run with -v for detailed diagnostics."
  when:
    - milvus_health.failed | default(false) or milvus_port_check.failed | default(false)
    - ansible_verbosity < 1

- name: Install Python and dependencies for Milvus initialization
  apt:
    name:
      - python3
      - python3-pip
      - python3-venv
    state: present

- name: Check if old marshmallow version exists
  shell: |
    if [ -f /opt/milvus-tools/bin/python ]; then
      /opt/milvus-tools/bin/python -c "import marshmallow; print(marshmallow.__version__)" 2>/dev/null || echo "old"
    else
      echo "none"
    fi
  register: marshmallow_check
  changed_when: false
  failed_when: false

- name: Remove old Python virtual environment if it has incompatible marshmallow
  file:
    path: /opt/milvus-tools
    state: absent
  when: 
    - marshmallow_check.stdout is defined
    - marshmallow_check.stdout in ['old', 'none'] or (marshmallow_check.stdout not in ['old', 'none'] and marshmallow_check.stdout is version('3.13.0', '<'))

- name: Create Python virtual environment for Milvus tools
  shell: python3 -m venv /opt/milvus-tools
  args:
    creates: /opt/milvus-tools/bin/python

- name: Upgrade pip in virtual environment
  pip:
    name: pip
    state: latest
    virtualenv: /opt/milvus-tools

- name: Install marshmallow first (required version for environs)
  pip:
    name: "marshmallow>=3.13.0"
    virtualenv: /opt/milvus-tools
    state: present

- name: Install pymilvus in virtual environment
  pip:
    name: "pymilvus>=2.6.0,<2.7.0"
    virtualenv: /opt/milvus-tools
    state: present
    extra_args: "--no-deps"  # Don't install dependencies to avoid downgrading marshmallow

- name: Install remaining pymilvus dependencies
  pip:
    name:
      - "grpcio>=1.49.1"
      - "grpcio-tools>=1.49.1"
      - "protobuf>=3.20.0"
      - "environs>=9.5.0"
      - "ujson>=2.0.0"
      - "orjson>=3.9.0"
      - "pandas>=1.2.4"
      - "numpy"
      - "requests>=2.20.0"
      - "urllib3>=1.26.0"
      - "minio>=7.0.0"
      - "pyarrow>=12.0.0"
      - "certifi>=2023.0.0"
    virtualenv: /opt/milvus-tools
    state: present

- name: Copy Milvus initialization script
  copy:
    src: "{{ playbook_dir }}/../../tools/milvus_init.py"
    dest: /root/milvus_init.py
    mode: "0755"

- name: Initialize Milvus collection
  shell: |
    /opt/milvus-tools/bin/python /root/milvus_init.py
  environment:
    MILVUS_HOST: localhost
    MILVUS_PORT: "19530"
    EMBEDDING_DIM: "768"
  register: milvus_init
  ignore_errors: yes

- name: Display Milvus initialization result
  debug:
    var: milvus_init.stdout_lines
  when: milvus_init.stdout_lines is defined

- name: Copy Milvus schema migration script
  copy:
    src: files/migrate_schema.py
    dest: /root/migrate_schema.py
    mode: "0755"

- name: Run Milvus schema migration
  shell: |
    /opt/milvus-tools/bin/python /root/migrate_schema.py
  environment:
    MILVUS_HOST: localhost
    MILVUS_PORT: "19530"
  register: milvus_migration
  failed_when: false

- name: Display Milvus migration result
  debug:
    var: milvus_migration.stdout_lines
  when: milvus_migration.stdout_lines is defined

- name: Copy hybrid search schema script
  copy:
    src: files/hybrid_schema.py
    dest: /root/hybrid_schema.py
    mode: "0755"

- name: Wait for Milvus to be fully ready before schema initialization
  pause:
    seconds: 10
  when: milvus_health.status == 200

- name: Initialize hybrid search collection
  shell: |
    /opt/milvus-tools/bin/python /root/hybrid_schema.py
  environment:
    MILVUS_HOST: localhost
    MILVUS_PORT: "19530"
    # Embedding dimension from model registry
    EMBEDDING_DIMENSION: "{{ available_models[model_purposes.embedding | default('bge-large')].dimension | default(1024) }}"
  register: hybrid_schema_init
  failed_when: false  # Don't fail - we'll check result and advise user
  when: milvus_health.status is defined and milvus_health.status == 200

- name: Display hybrid schema initialization result
  debug:
    var: hybrid_schema_init.stdout_lines
  when: hybrid_schema_init.stdout_lines is defined

- name: Check if schema needs manual migration
  debug:
    msg: |
      ⚠️  COLLECTION EXISTS WITHOUT BM25 FUNCTION
      
      The 'documents' collection exists but may not have the Milvus 2.6 BM25 Function
      configured for full-text search. To enable full-text search:
      
      1. SSH to milvus-lxc: ssh root@{{ milvus_ip }}
      2. Run with --drop flag (WARNING: deletes all data!):
         /opt/milvus-tools/bin/python /root/hybrid_schema.py --drop
      3. Re-ingest all documents
      
      Or, if you want to keep existing data, the collection will work but
      keyword/BM25 search will return empty results (semantic search still works).
  when: 
    - hybrid_schema_init is defined
    - hybrid_schema_init.rc is defined
    - hybrid_schema_init.rc != 0

- name: Copy Milvus partition initialization script
  copy:
    src: "{{ playbook_dir }}/../../tools/milvus_init_partitions.py"
    dest: /root/milvus_init_partitions.py
    mode: "0755"

- name: Initialize Milvus partitions for RBAC
  shell: |
    /opt/milvus-tools/bin/python /root/milvus_init_partitions.py
  environment:
    MILVUS_HOST: localhost
    MILVUS_PORT: "19530"
  register: milvus_partitions_init
  retries: 3
  delay: 5
  until: milvus_partitions_init.rc == 0
  when: milvus_health.status is defined and milvus_health.status == 200

- name: Display Milvus partition initialization result
  debug:
    var: milvus_partitions_init.stdout_lines
  when: milvus_partitions_init.stdout_lines is defined

- name: Create Milvus health check script
  copy:
    dest: /usr/local/bin/milvus-health-check
    content: |
      #!/bin/bash
      curl -f -s http://localhost:9091/healthz > /dev/null
    mode: "0755"

- name: Create systemd service for Milvus (ensures Docker Compose starts on boot)
  copy:
    dest: /etc/systemd/system/milvus.service
    content: |
      [Unit]
      Description=Milvus Vector Database
      Requires=docker.service
      After=docker.service
      
      [Service]
      Type=oneshot
      RemainAfterExit=yes
      WorkingDirectory=/srv/milvus
      ExecStart=/usr/bin/docker compose up -d
      ExecStop=/usr/bin/docker compose down
      
      [Install]
      WantedBy=multi-user.target

- name: Enable Milvus systemd service
  systemd:
    name: milvus
    enabled: yes
    daemon_reload: yes
