---
# Ingest Services Docker Deployment Tasks
#
# Deploys Redis, Ingest API, Ingest Worker, and Embedding API via Docker Compose
# Used when deploy_target == 'docker'

- name: Start Redis container
  include_role:
    name: docker_common
    tasks_from: compose_up
  vars:
    docker_services_to_start:
      - redis
    docker_wait_for_health: true

- name: Wait for Redis to be ready
  include_role:
    name: docker_common
    tasks_from: wait_healthy
  vars:
    docker_wait_service: redis
    docker_wait_timeout: 30

- name: Build Ingest services
  include_role:
    name: docker_common
    tasks_from: compose_build
  vars:
    docker_services_to_build:
      - embedding-api
      - ingest-api
      - ingest-worker
    docker_build_no_cache: "{{ docker_force_rebuild | default(false) }}"

- name: Start Embedding API container
  include_role:
    name: docker_common
    tasks_from: compose_up
  vars:
    docker_services_to_start:
      - embedding-api
    docker_wait_for_health: true

- name: Start Ingest API container
  include_role:
    name: docker_common
    tasks_from: compose_up
  vars:
    docker_services_to_start:
      - ingest-api
    docker_wait_for_health: true

- name: Start Ingest Worker container
  include_role:
    name: docker_common
    tasks_from: compose_up
  vars:
    docker_services_to_start:
      - ingest-worker
    docker_wait_for_health: false

- name: Wait for Ingest API to be ready
  include_role:
    name: docker_common
    tasks_from: wait_healthy
  vars:
    docker_wait_service: ingest-api
    docker_wait_timeout: 60

- name: Verify Ingest API health endpoint
  ansible.builtin.uri:
    url: "http://localhost:{{ ingest_port }}/health"
    method: GET
    status_code: [200]
  register: ingest_health
  retries: 5
  delay: 3
  until: ingest_health.status == 200

- name: Display Ingest services status
  ansible.builtin.debug:
    msg: |
      Ingest services are running and ready
      Redis: localhost:{{ redis_port }}
      Embedding API: http://localhost:{{ embedding_port }}
      Ingest API: http://localhost:{{ ingest_port }}
