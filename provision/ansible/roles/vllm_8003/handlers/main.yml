---
# vLLM Port 8003 Handlers

- name: reload systemd for vllm-8003
  systemd:
    daemon_reload: yes

- name: restart vllm-8003
  systemd:
    name: "{{ vllm_service_name }}"
    state: restarted
  when: vllm_start_service | default(true)

- name: stop vllm-8003
  systemd:
    name: "{{ vllm_service_name }}"
    state: stopped

- name: start vllm-8003
  systemd:
    name: "{{ vllm_service_name }}"
    state: started
