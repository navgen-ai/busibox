---
# vLLM Port 8000 Configuration Tasks
# Configure systemd service and environment for port 8000

- name: Discover nvidia library paths in venv
  shell: |
    {{ vllm_venv_dir }}/bin/python -c "
    import glob, os
    site = os.path.join('{{ vllm_venv_dir }}', 'lib', 'python3.11', 'site-packages', 'nvidia')
    dirs = sorted(glob.glob(os.path.join(site, '*/lib')))
    print(':'.join(dirs))
    "
  register: nvidia_lib_dirs
  changed_when: false
  failed_when: false
  tags: [vllm_configure]

- name: Set vllm_nvidia_lib_path fact
  set_fact:
    vllm_nvidia_lib_path: "{{ nvidia_lib_dirs.stdout | default('') }}"
  tags: [vllm_configure]

- name: Check if vLLM service file exists
  stat:
    path: /etc/systemd/system/{{ vllm_service_name }}.service
  register: vllm_service_file
  tags: [vllm_configure]

- name: Check current model in service file
  shell: grep -oP '(?<=--model )[^ ]+' /etc/systemd/system/{{ vllm_service_name }}.service || echo "none"
  register: current_vllm_model
  changed_when: false
  when: vllm_service_file.stat.exists
  tags: [vllm_configure]

- name: Remove old service file if model changed
  file:
    path: /etc/systemd/system/{{ vllm_service_name }}.service
    state: absent
  when: 
    - vllm_service_file.stat.exists
    - current_vllm_model.stdout != vllm_default_model
  notify:
    - reload systemd for vllm-8003
  tags: [vllm_configure]

- name: Deploy vLLM systemd service file
  template:
    src: vllm.service.j2
    dest: /etc/systemd/system/{{ vllm_service_name }}.service
    owner: root
    group: root
    mode: '0644'
  notify:
    - reload systemd for vllm-8003
    - restart vllm-8003
  tags: [vllm_configure]

- name: Create vLLM environment file
  template:
    src: vllm.env.j2
    dest: /etc/default/{{ vllm_service_name }}
    owner: root
    group: root
    mode: '0640'
  notify: restart vllm-8003
  tags: [vllm_configure]

- name: Ensure systemd is reloaded
  systemd:
    daemon_reload: yes
  tags: [vllm_configure]

- name: Enable vLLM service
  systemd:
    name: "{{ vllm_service_name }}"
    enabled: "{{ vllm_enable_service }}"
  when: vllm_enable_service
  tags: [vllm_configure]

- name: Start vLLM service
  systemd:
    name: "{{ vllm_service_name }}"
    state: started
  when: vllm_start_service
  tags: [vllm_configure]

- name: Check vLLM service logs (last 2 minutes only)
  command: journalctl -u {{ vllm_service_name }} --since "2 minutes ago" --no-pager
  register: vllm_logs_initial
  changed_when: false
  tags: [vllm_configure]

- name: Display initial vLLM service logs
  debug:
    msg: "{{ vllm_logs_initial.stdout_lines if vllm_logs_initial.stdout_lines | length > 0 else ['No recent logs'] }}"
  tags: [vllm_configure]

- name: Check vLLM service status
  systemd:
    name: "{{ vllm_service_name }}"
  register: vllm_service_status
  tags: [vllm_configure]

- name: Display service status
  debug:
    msg: "vLLM service {{ vllm_service_name }} is {{ vllm_service_status.status.ActiveState }}"
  tags: [vllm_configure]

