---
# Deploy API Service - runs alongside authz in the same container
#
# NOTE: Secrets are loaded by the authz role (which runs first on this container).
# If deploying deploy_api independently, ensure secrets are available.

- name: Load secrets for deploy_api
  include_vars:
    file: "{{ playbook_dir }}/roles/secrets/vars/vault.{{ deployment_environment | default('dev') }}.yml"
  no_log: true
  tags: [deploy_api, deploy, apis]

- name: Load shared secrets mapping
  include_vars:
    file: "{{ playbook_dir }}/roles/secrets/vars/shared_secrets.yml"

- name: Install rsync for synchronize module
  apt:
    name: rsync
    state: present
    update_cache: yes
  tags: [deploy_api]

- name: Install system dependencies for deployment operations
  apt:
    name:
      - openssh-client
      - ansible
      - python3-venv
      - python3-pip
    state: present
  tags: [deploy_api]

- name: Create deploy-api directories
  file:
    path: "{{ item }}"
    state: directory
    owner: root
    group: root
    mode: "0755"
  loop:
    - "{{ deploy_api_base_dir }}"
    - "{{ deploy_api_app_dir }}"
    - "{{ deploy_api_app_dir }}/src"
  tags: [deploy_api]

# =============================================================================
# Source Code Deployment
# =============================================================================

- name: Clean Python cache before source sync
  shell: find {{ deploy_api_app_dir }}/src -type d -name '__pycache__' -exec rm -rf {} + 2>/dev/null || true
  changed_when: false
  tags: [deploy_api]

- name: Sync deploy-api source (removes stale files)
  synchronize:
    src: "{{ deploy_api_src_dir }}/src/"
    dest: "{{ deploy_api_app_dir }}/src/"
    delete: yes
    owner: no
    group: no
    rsync_opts:
      - "--exclude=__pycache__"
      - "--exclude=*.pyc"
      - "--exclude=busibox_common"
  register: deploy_api_source_sync
  notify: Restart deploy-api service
  tags: [deploy_api]

# =============================================================================
# Tests Directory - for PVT tests
# =============================================================================

- name: Sync deploy-api tests directory
  synchronize:
    src: "{{ deploy_api_src_dir }}/tests/"
    dest: "{{ deploy_api_app_dir }}/tests/"
    delete: yes
    owner: no
    group: no
    rsync_opts:
      - "--exclude=__pycache__"
      - "--exclude=*.pyc"
      - "--exclude=.pytest_cache"
  tags: [deploy_api, pvt]

- name: Copy pytest configuration
  copy:
    src: "{{ deploy_api_src_dir }}/pytest.ini"
    dest: "{{ deploy_api_app_dir }}/pytest.ini"
    owner: root
    group: root
    mode: "0644"
  tags: [deploy_api, pvt]

# =============================================================================
# Shared Library (busibox_common) - MUST be after source sync
# =============================================================================

- name: Copy shared busibox_common library
  synchronize:
    src: "{{ playbook_dir }}/../../srv/shared/busibox_common/"
    dest: "{{ deploy_api_app_dir }}/src/busibox_common/"
    delete: yes
    owner: no
    group: no
    rsync_opts:
      - "--exclude=__pycache__"
      - "--exclude=*.pyc"
      - "--exclude=.pytest_cache"
  register: shared_lib_sync
  notify: Restart deploy-api service
  tags: [deploy_api]

- name: Copy requirements.txt
  copy:
    src: "{{ deploy_api_src_dir }}/requirements.txt"
    dest: "{{ deploy_api_app_dir }}/requirements.txt"
    owner: root
    group: root
    mode: "0644"
  notify: Restart deploy-api service
  tags: [deploy_api]

- name: Create virtualenv
  command: python3 -m venv "{{ deploy_api_venv_dir }}"
  args:
    creates: "{{ deploy_api_venv_dir }}/bin/activate"
  tags: [deploy_api]

- name: Install deploy-api dependencies
  pip:
    requirements: "{{ deploy_api_app_dir }}/requirements.txt"
    virtualenv: "{{ deploy_api_venv_dir }}"
  register: deploy_api_deps_install
  notify: Restart deploy-api service
  tags: [deploy_api]

# =============================================================================
# SSH Key Setup (for remote operations)
# =============================================================================

- name: Ensure SSH directory exists
  file:
    path: /root/.ssh
    state: directory
    owner: root
    group: root
    mode: "0700"
  tags: [deploy_api]

- name: Copy SSH private key for remote operations
  copy:
    content: "{{ secrets.ssh.private_key | default('') }}"
    dest: "{{ deploy_api_ssh_key_path }}"
    owner: root
    group: root
    mode: "0600"
  when: secrets.ssh is defined and secrets.ssh.private_key is defined
  tags: [deploy_api]

# Generate SSH key if not provided in secrets
- name: Generate SSH key pair for deploy-api
  openssh_keypair:
    path: /root/.ssh/id_rsa
    type: rsa
    size: 4096
    state: present
    force: false
  register: deploy_api_ssh_key
  when: secrets.ssh is not defined or secrets.ssh.private_key is not defined
  tags: [deploy_api]

# Read the public key
- name: Read deploy-api SSH public key
  slurp:
    src: /root/.ssh/id_rsa.pub
  register: deploy_api_public_key
  tags: [deploy_api]

# Add deploy-api public key to core-apps authorized_keys
- name: Add deploy-api public key to core-apps container
  authorized_key:
    user: root
    key: "{{ deploy_api_public_key.content | b64decode }}"
    state: present
  delegate_to: "{{ core_apps_ip }}"
  tags: [deploy_api]

# =============================================================================
# Service Configuration
# =============================================================================

- name: Render env file
  template:
    src: deploy-api.env.j2
    dest: "{{ deploy_api_base_dir }}/.env"
    owner: root
    group: root
    mode: "0600"
  register: deploy_api_env_file
  notify: Restart deploy-api service
  tags: [deploy_api]

- name: Install systemd service
  template:
    src: deploy-api.service.j2
    dest: /etc/systemd/system/{{ deploy_api_service_name }}.service
    mode: "0644"
  notify: Restart deploy-api service
  tags: [deploy_api]

- name: Reload systemd
  systemd:
    daemon_reload: true
  tags: [deploy_api]

- name: Enable deploy-api service
  systemd:
    name: "{{ deploy_api_service_name }}"
    enabled: true
  tags: [deploy_api]

# Flush handlers to ensure service restarts with new .env before apps deploy
- name: Flush handlers (restart deploy-api if .env changed)
  meta: flush_handlers
  tags: [deploy_api]

# Force restart if requested (used by Full Install to ensure fresh service state)
- name: Force restart deploy-api if requested
  systemd:
    name: "{{ deploy_api_service_name }}"
    state: restarted
    daemon_reload: true
  when: force_service_restart | default(false) | bool
  tags: [deploy_api]

# =============================================================================
# Start Service
# =============================================================================

- name: Start deploy-api service
  systemd:
    name: "{{ deploy_api_service_name }}"
    state: started
  tags: [deploy_api]

- name: Wait for deploy-api service to start
  wait_for:
    port: "{{ deploy_api_service_port }}"
    host: localhost
    timeout: 60
  tags: [deploy_api]
  register: deploy_api_wait
  ignore_errors: true

- name: Check deploy-api service status if wait failed
  shell: |
    echo "=== Service Status ==="
    systemctl status {{ deploy_api_service_name }} || true
    echo ""
    echo "=== Recent Logs ==="
    journalctl -u {{ deploy_api_service_name }} -n 30 --no-pager || true
  register: deploy_api_debug_output
  when: deploy_api_wait is failed
  tags: [deploy_api]

- name: Display deploy-api debug info
  debug:
    msg: "{{ deploy_api_debug_output.stdout_lines | default([]) }}"
  when: deploy_api_wait is failed
  tags: [deploy_api]

- name: Fail if deploy-api did not start
  fail:
    msg: "Deploy API failed to start within 60 seconds. Check the debug output above."
  when: deploy_api_wait is failed
  tags: [deploy_api]

- name: Check deploy-api service health
  uri:
    url: "http://localhost:{{ deploy_api_service_port }}/health/live"
    method: GET
    status_code: 200
    timeout: 5
  register: deploy_api_health_check
  until: deploy_api_health_check.status == 200
  retries: 5
  delay: 2
  failed_when: false
  tags: [deploy_api]

- name: Warn if deploy-api service is not healthy
  debug:
    msg: "Warning: Deploy API service may not be responding correctly. Check logs with: journalctl -u {{ deploy_api_service_name }} -n 50"
  when: deploy_api_health_check.status != 200
  tags: [deploy_api]

- name: Write deployment version file
  copy:
    content: |
      {
        "commit": "{{ git_deploy_commit | default(lookup('pipe', 'cd ' + playbook_dir + '/../.. && git rev-parse --short HEAD 2>/dev/null || echo unknown'), true) }}",
        "branch": "{{ git_deploy_branch | default(lookup('pipe', 'cd ' + playbook_dir + '/../.. && git branch --show-current 2>/dev/null || echo unknown'), true) }}",
        "timestamp": "{{ now(utc=true).isoformat() }}",
        "deployed_by": "ansible"
      }
    dest: "{{ deploy_api_base_dir }}/.deploy_version"
    owner: root
    group: root
    mode: "0644"
  ignore_errors: true
  tags: [deploy_api]

# ============================================================================
# SSH Keys Setup - enables deploy-api to manage services on other containers
# ============================================================================
- name: Setup SSH keys for container-to-container communication
  include_tasks: ssh-keys.yml
  tags: [deploy_api, deploy_api_ssh]

# ============================================================================
# Post-Deployment Validation Tests (PVT)
# ============================================================================
- name: Wait for deploy-api service to be ready before PVT tests
  uri:
    url: "http://localhost:{{ deploy_api_service_port }}/health/live"
    method: GET
    status_code: 200
    timeout: 5
  delegate_to: "{{ inventory_hostname }}"
  register: deploy_api_ready_check
  until: deploy_api_ready_check.status == 200
  retries: 12
  delay: 2
  failed_when: false
  when: run_pvt_tests | default(true)
  tags: [deploy_api, pvt]

- name: Fail if service not ready for PVT tests
  fail:
    msg: "Deploy API service did not become ready within 24 seconds. Check logs: journalctl -u {{ deploy_api_service_name }} -n 50"
  when: run_pvt_tests | default(true) and deploy_api_ready_check.status != 200
  tags: [deploy_api, pvt]

- name: Run PVT tests
  shell: |
    set -a
    . {{ deploy_api_base_dir }}/.env
    set +a
    export PYTHONPATH={{ deploy_api_app_dir }}/src
    export DEPLOYMENT_BACKEND={{ 'proxmox' if (ansible_distribution is defined) else 'docker' }}
    cd {{ deploy_api_app_dir }}
    {{ deploy_api_venv_dir }}/bin/python -m pytest tests/integration/test_pvt.py -v --tb=short 2>&1
  args:
    executable: /bin/bash
  register: deploy_api_pvt_result
  failed_when: false
  changed_when: false
  when: run_pvt_tests | default(true)
  tags: [deploy_api, pvt]

- name: Display PVT test results
  debug:
    msg: "{{ deploy_api_pvt_result.stdout_lines | default([]) }}"
  when: run_pvt_tests | default(true) and deploy_api_pvt_result.stdout is defined
  tags: [deploy_api, pvt]

- name: Fail if PVT tests failed
  fail:
    msg: "Post-deployment validation tests failed! Check logs above."
  when: run_pvt_tests | default(true) and deploy_api_pvt_result.rc != 0
  tags: [deploy_api, pvt]
