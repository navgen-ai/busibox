  failed_when: false
  tags: [deploy_api, deploy_api_ssh]

- name: Test SSH connection from authz to proxy (nginx)
  shell: "ssh -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null root@nginx 'echo SSH_OK'"
  register: ssh_test_proxy
  changed_when: false
  failed_when: false
  tags: [deploy_api, deploy_api_ssh]

- name: Test SSH connection from authz to Proxmox host
  shell: "ssh -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null root@{{ deploy_api_proxmox_host }} 'echo SSH_OK'"
  register: ssh_test_proxmox
  changed_when: false
  failed_when: false
  tags: [deploy_api, deploy_api_ssh]

- name: Display SSH test results
  debug:
    msg: |
      SSH Tests from authz-lxc (deploy-api):
      - Proxmox Host: {{ 'OK' if ssh_test_proxmox.rc == 0 else 'FAILED' }}
      - Core Apps: {{ 'OK' if ssh_test_core_apps.rc == 0 else 'FAILED' }}
      - Data (Redis): {{ 'OK' if ssh_test_data.rc == 0 else 'FAILED' }}
      - Agent: {{ 'OK' if ssh_test_agent.rc == 0 else 'FAILED' }}
      - Milvus: {{ 'OK' if ssh_test_milvus.rc == 0 else 'FAILED' }}
      - Files (MinIO): {{ 'OK' if ssh_test_files.rc == 0 else 'FAILED' }}
      - PostgreSQL: {{ 'OK' if ssh_test_pg.rc == 0 else 'FAILED' }}
      - LiteLLM: {{ 'OK' if ssh_test_litellm.rc == 0 else 'FAILED' }}
      - Proxy (Nginx): {{ 'OK' if ssh_test_proxy.rc == 0 else 'FAILED' }}
  tags: [deploy_api, deploy_api_ssh]

- name: Fail if SSH to Proxmox host failed
  fail:
    msg: "SSH to Proxmox host failed! deploy-api needs SSH access to run make install commands."
  when: ssh_test_proxmox.rc != 0
  tags: [deploy_api, deploy_api_ssh]
