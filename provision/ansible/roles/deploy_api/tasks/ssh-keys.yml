  tags: [deploy_api, deploy_api_ssh]

- name: Test SSH connection from authz to litellm
  shell: "ssh -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null root@litellm 'echo SSH_OK'"
  register: ssh_test_litellm
