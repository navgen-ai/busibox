# ============================================================================
# Test SSH connections
# ============================================================================

- name: Test SSH connection from authz to core-apps
  shell: "ssh -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null root@ai-portal 'echo SSH_OK'"
  register: ssh_test_core_apps
  changed_when: false
  failed_when: false
  tags: [deploy_api, deploy_api_ssh]

- name: Test SSH connection from authz to data (redis)
  shell: "ssh -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null root@redis 'echo SSH_OK'"
  register: ssh_test_data
  changed_when: false
  failed_when: false
  tags: [deploy_api, deploy_api_ssh]

- name: Test SSH connection from authz to agent
  shell: "ssh -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null root@agent-api 'echo SSH_OK'"
  register: ssh_test_agent
  changed_when: false
  failed_when: false
  tags: [deploy_api, deploy_api_ssh]

- name: Test SSH connection from authz to milvus
  shell: "ssh -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null root@milvus 'echo SSH_OK'"
  register: ssh_test_milvus
