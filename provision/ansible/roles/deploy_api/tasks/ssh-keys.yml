---
# SSH key setup for deploy-api container-to-container communication
# Enables authz container (where deploy-api runs) to SSH to:
# 1. Other LXC containers (for service management via systemctl)
# 2. The Proxmox host (for running make install commands)
#
# Target containers: data-lxc, agent-lxc, milvus-lxc, files-lxc, pg-lxc, 
#                    litellm-lxc, proxy-lxc, core-apps-lxc, bridge-lxc
# Target host: Proxmox host (for running Ansible playbooks)

- name: Generate SSH key pair on authz container for root user
  openssh_keypair:
    path: /root/.ssh/id_rsa
    type: rsa
    size: 4096
    state: present
    force: false  # Don't overwrite existing key
  register: ssh_key_result
  tags: [deploy_api, deploy_api_ssh]

- name: Read public key from authz container
  slurp:
    src: /root/.ssh/id_rsa.pub
  register: authz_public_key
  tags: [deploy_api, deploy_api_ssh]

# ============================================================================
# Proxmox Host - for running make install commands (Ansible playbooks)
# ============================================================================
# Ansible runs ON the Proxmox host, so we use local_action to add the key
# Note: proxmox_host must be set in inventory group_vars or via PROXMOX_HOST env var

- name: Check if proxmox_host is configured
  set_fact:
    proxmox_host_configured: "{{ proxmox_host is defined and proxmox_host | length > 0 }}"
  tags: [deploy_api, deploy_api_ssh]

- name: Add authz container public key to Proxmox host authorized_keys
  local_action:
    module: authorized_key
    user: root
    key: "{{ authz_public_key.content | b64decode }}"
    state: present
  become: true
  when: proxmox_host_configured
  tags: [deploy_api, deploy_api_ssh]

# Try to scan Proxmox host SSH key - may fail if SSH not accessible from container
- name: Scan Proxmox host SSH key from authz container
  shell: "ssh-keyscan -t ed25519,rsa {{ deploy_api_proxmox_host }} 2>/dev/null || true"
  register: proxmox_host_keys
  changed_when: false
  when: proxmox_host_configured
  tags: [deploy_api, deploy_api_ssh]

- name: Add Proxmox host to known_hosts on authz container
  known_hosts:
    name: "{{ deploy_api_proxmox_host }}"
    key: "{{ proxmox_host_keys.stdout }}"
    state: present
  when: proxmox_host_configured and proxmox_host_keys.stdout | length > 0
  tags: [deploy_api, deploy_api_ssh]

- name: Display warning if Proxmox host not configured
  debug:
    msg: |
      WARNING: PROXMOX_HOST is not configured.
      
      To enable deploy-api to install infrastructure services, set PROXMOX_HOST:
        export PROXMOX_HOST=<proxmox-management-ip>
      
      Or add to inventory group_vars:
        proxmox_host: "<proxmox-management-ip>"
      
      Then redeploy internal_dns and deploy-api.
  when: not proxmox_host_configured
  tags: [deploy_api, deploy_api_ssh]

- name: Display warning if Proxmox host SSH key scan failed
  debug:
    msg: |
      WARNING: Could not scan SSH keys from Proxmox host ({{ deploy_api_proxmox_host }}).
      This may be because:
      1. SSH is not listening on this IP from containers
      2. Firewall is blocking SSH from containers to the host
      3. The hostname 'proxmox' is not resolvable yet (run internal_dns role first)
      
      deploy-api will use StrictHostKeyChecking=no for now.
  when: proxmox_host_configured and (proxmox_host_keys.stdout | default('') | length == 0)
  tags: [deploy_api, deploy_api_ssh]

# ============================================================================
# User Apps Container (user-apps-lxc) - for external/untrusted app deployments
# ============================================================================

- name: Ensure .ssh directory exists on user-apps container
  file:
    path: /root/.ssh
    state: directory
    mode: '0700'
    owner: root
    group: root
  delegate_to: "{{ hostvars[groups['user_apps'][0]]['ansible_host'] }}"
  when: groups['user_apps'] is defined and groups['user_apps'] | length > 0
  tags: [deploy_api, deploy_api_ssh]

- name: Add authz container public key to user-apps container authorized_keys
  authorized_key:
    user: root
    key: "{{ authz_public_key.content | b64decode }}"
    state: present
  delegate_to: "{{ hostvars[groups['user_apps'][0]]['ansible_host'] }}"
  when: groups['user_apps'] is defined and groups['user_apps'] | length > 0
  tags: [deploy_api, deploy_api_ssh]

