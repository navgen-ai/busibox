  changed_when: false
  failed_when: false
  when: groups['custom_services'] is defined and groups['custom_services'] | length > 0
  tags: [deploy_api, deploy_api_ssh]

- name: Test SSH connection from authz to Proxmox host
  shell: "ssh -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null -o ConnectTimeout=5 root@{{ deploy_api_proxmox_host }} 'echo SSH_OK'"
  register: ssh_test_proxmox
  changed_when: false
  failed_when: false
  when: proxmox_host_configured
  tags: [deploy_api, deploy_api_ssh]

- name: Display SSH test results
  debug:
    msg: |
      SSH Tests from authz-lxc (deploy-api):
      - Proxmox Host: {{ 'NOT CONFIGURED' if not proxmox_host_configured else ('OK' if ssh_test_proxmox.rc == 0 else 'FAILED (required for make install)') }}
      - Core Apps: {{ 'OK' if ssh_test_core_apps.rc == 0 else 'FAILED' }}
      - User Apps: {{ 'NOT CONFIGURED' if (groups['user_apps'] is not defined or groups['user_apps'] | length == 0) else ('OK' if ssh_test_user_apps.rc == 0 else 'FAILED (required for user app deployments)') }}
      - Custom Services: {{ 'NOT CONFIGURED' if (groups['custom_services'] is not defined or groups['custom_services'] | length == 0) else ('OK' if ssh_test_custom_services.rc == 0 else 'FAILED (required for custom service deployments)') }}
      - Data (Redis): {{ 'OK' if ssh_test_data.rc == 0 else 'FAILED' }}
      - Agent: {{ 'OK' if ssh_test_agent.rc == 0 else 'FAILED' }}
      - Milvus: {{ 'OK' if ssh_test_milvus.rc == 0 else 'FAILED' }}
      - Files (MinIO): {{ 'OK' if ssh_test_files.rc == 0 else 'FAILED' }}
      - PostgreSQL: {{ 'OK' if ssh_test_pg.rc == 0 else 'FAILED' }}
      - LiteLLM: {{ 'OK' if ssh_test_litellm.rc == 0 else 'FAILED' }}
      - Proxy (Nginx): {{ 'OK' if ssh_test_proxy.rc == 0 else 'FAILED' }}
      - Bridge: {{ 'NOT CONFIGURED' if (groups['bridge'] is not defined or groups['bridge'] | length == 0) else ('OK' if ssh_test_bridge.rc == 0 else 'FAILED') }}
  tags: [deploy_api, deploy_api_ssh]

- name: Warn if SSH to Proxmox host failed (not fatal - service management still works)
  debug:
    msg: |
      WARNING: SSH to Proxmox host ({{ deploy_api_proxmox_host }}) failed!
      
      This means deploy-api cannot run 'make install' commands for infrastructure services.
      Service start/stop/restart will still work for already-installed services.
      
      To enable infrastructure installation via deploy-api:
      1. Set PROXMOX_HOST to the Proxmox management IP reachable from containers
      2. Ensure SSH is enabled on the Proxmox host at that IP
      3. Run: make install SERVICE=internal_dns,deploy-api
      
      Debug: ssh -v root@{{ deploy_api_proxmox_host }} from the authz container
  when: proxmox_host_configured and ssh_test_proxmox.rc != 0
  tags: [deploy_api, deploy_api_ssh]
