# ============================================================================
# Test SSH connections
# ============================================================================

- name: Test SSH connection from authz to user-apps
  shell: "ssh -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null root@{{ deploy_api_user_apps_container_ip }} 'echo SSH_OK'"
  register: ssh_test_user_apps
  changed_when: false
  failed_when: false
  when: groups['user_apps'] is defined and groups['user_apps'] | length > 0
  tags: [deploy_api, deploy_api_ssh]

- name: Test SSH connection from authz to core-apps
  shell: "ssh -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null root@busibox-portal 'echo SSH_OK'"
  register: ssh_test_core_apps
  changed_when: false
  failed_when: false
  tags: [deploy_api, deploy_api_ssh]

