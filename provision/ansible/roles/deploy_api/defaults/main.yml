---
# Deploy API defaults

# Service configuration
deploy_api_user: authz
deploy_api_group: authz
deploy_api_service_name: deploy-api
deploy_api_service_port: 8011

# Directories (lives alongside authz)
deploy_api_base_dir: /opt/deploy
deploy_api_app_dir: /opt/deploy/app
deploy_api_venv_dir: /opt/deploy/venv
deploy_api_src_dir: "{{ playbook_dir }}/../../srv/deploy"

# Authz service (for token validation)
deploy_api_authz_url: "http://localhost:{{ authz_service_port | default(8010) }}"

# PostgreSQL (for database provisioning)
# Uses busibox_user which has CREATEDB permission (see init-databases.sql)
# Prefer DNS hostname 'postgres' (resolved via /etc/hosts from internal_dns role)
# Falls back to Ansible host IP if DNS not available
deploy_api_postgres_host: "{{ 'postgres' if (lookup('pipe', 'getent hosts postgres 2>/dev/null || true') | length > 0) else (hostvars[groups['pg'][0]]['ansible_host'] | default('postgres')) }}"
deploy_api_postgres_port: 5432
deploy_api_postgres_admin_user: "{{ busibox_secrets.POSTGRES_USER | default('busibox_user') }}"
deploy_api_postgres_admin_password: "{{ busibox_secrets.POSTGRES_PASSWORD }}"

# Container hosts (prefer DNS hostnames from internal_dns role)
# Note: Use core_apps group (not apps) - staging/production inventories use this group name
# DNS hostnames like 'busibox-portal' are resolved via /etc/hosts on each container
deploy_api_apps_container_ip: busibox-portal
deploy_api_apps_container_ip_staging: busibox-portal

# User apps container (for external/untrusted app deployments)
# Uses 'user-apps' DNS hostname on Proxmox, resolved via /etc/hosts (internal_dns role)
deploy_api_user_apps_container_ip: "{{ user_apps_ip | default('user-apps') }}"
deploy_api_user_apps_container_ip_staging: "{{ user_apps_ip | default('user-apps') }}"

# Custom services host (for appMode: "custom" multi-container deployments)
# deploy-api SSHes here to clone repos and run docker compose
# Targets dedicated custom-services LXC with Docker CE installed
deploy_api_custom_services_host: "{{ custom_services_ip | default('custom-services') }}"

# SSH key for remote operations
deploy_api_ssh_key_path: /root/.ssh/id_rsa

# Proxmox host (for running make install commands)
# deploy-api SSHes to the Proxmox host to run Ansible playbooks
# The Proxmox host has the vault and vault password files
# Uses the 'proxmox' hostname which is resolved via /etc/hosts (internal_dns role)
# The proxmox_host variable should be set in inventory group_vars
deploy_api_proxmox_host: proxmox

# Nginx configuration
# Note: Use 'proxy' group (not 'nginx') - inventories use 'proxy' as the group name
# Prefer DNS hostname 'nginx' (resolved via /etc/hosts from internal_dns role)
deploy_api_nginx_host: nginx
# Public domain for nginx health checks (e.g. staging.busibox.com)
# When set, deploy-api sends Host header so requests hit domain server block
# Uses domain/full_domain from inventory, or env-specific fallback
deploy_api_nginx_public_domain: "{{ domain | default(full_domain) | default('staging.busibox.com' if (deployment_environment | default('')) == 'staging' else 'localhost') }}"
# Location snippets are included inside the server block via:
# include /etc/nginx/app-locations/*.conf;
# This avoids the "location directive not allowed here" error that occurs
# when bare location blocks are placed in sites-enabled/ (http-level context)
deploy_api_nginx_config_dir: /etc/nginx/app-locations
deploy_api_nginx_enabled_dir: /etc/nginx/sites-enabled

# Ansible directory
deploy_api_ansible_dir: /root/busibox/provision/ansible

# Rate limiting
deploy_api_rate_limit_minutes: 5

# Debug mode
deploy_api_debug: false

# Container prefix required by deploy-api runtime modules.
# Even on Proxmox (where Docker executors are not used), these modules are imported
# and validate this variable at import time.
deploy_api_container_prefix: "{{ {'production': 'prod', 'staging': 'staging', 'development': 'dev', 'demo': 'demo'}.get((busibox_env | default(deployment_environment | default('staging'))), 'staging') }}"

# Bootstrap token for Ansible provisioning
# This allows initial app deployment without a real user JWT
# Derived from jwt_secret for determinism (same value each run)
deploy_api_bootstrap_token: "{{ secrets.deploy_api.bootstrap_token | default('bootstrap-' + (secrets.jwt_secret | hash('sha256'))[:56]) }}"

# LLM Backend: "vllm", "mlx", or "cloud"
# On Proxmox with GPUs, this is typically "vllm"
# On Mac/Apple Silicon, this would be "mlx"
# Default to "vllm" for Proxmox deployments
llm_backend: vllm

# LiteLLM Master Key (for LLM chain validation)
# Must match the master_key configured in LiteLLM service
litellm_master_key: "{{ busibox_secrets.LITELLM_MASTER_KEY }}"
