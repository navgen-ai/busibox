---
# Configuration tasks for Next.js app

- name: Debug - Show app_name
  debug:
    msg: "App name: {{ app_name }}"
  tags: [nextjs_configure, debug]

- name: Debug - Show app_secrets list
  debug:
    msg: "App secrets list: {{ app_secrets | default([]) }}"
  tags: [nextjs_configure, debug]

- name: Debug - Show if secrets var is defined
  debug:
    msg: "Secrets var is defined: {{ secrets is defined }}"
  tags: [nextjs_configure, debug]

- name: Debug - Show if app secrets exist in vault
  debug:
    msg: "Secrets for '{{ app_name }}' exist in vault: {{ secrets[app_name] is defined }}"
  when: secrets is defined
  tags: [nextjs_configure, debug]

- name: Debug - Show secret keys available (no values)
  debug:
    msg: "Available secret keys: {{ secrets[app_name].keys() | list }}"
  when: 
    - secrets is defined
    - secrets[app_name] is defined
  tags: [nextjs_configure, debug]
  no_log: false  # Just showing keys, not values

# Note: Service configuration is handled by app_deployer role via systemd
# This role only handles app-specific configuration

