---
# Deployment tasks for Next.js app

- name: Construct GitHub repository URL with authentication
  set_fact:
    git_repo_url: "{% if secrets.github_token is defined and secrets.github_token %}https://{{ secrets.github_token }}@github.com/{{ app_git_repo }}.git{% else %}https://github.com/{{ app_git_repo }}.git{% endif %}"
  no_log: true  # Don't log the token
  tags: [nextjs_deploy]

- name: Clone or update git repository
  git:
    repo: "{{ git_repo_url }}"
    dest: "{{ app_home }}/current"
    version: "{{ app_git_branch }}"
    force: yes
    accept_hostkey: yes
  become: yes
  become_user: "{{ app_user }}"
  register: git_clone
  tags: [nextjs_deploy]
  no_log: true  # Don't log the repo URL with token

- name: Deploy environment file to current directory
  template:
    src: app.env.j2
    dest: "{{ app_home }}/current/.env"
    owner: "{{ app_user }}"
    group: "{{ app_group }}"
    mode: '0600'
  tags: [nextjs_deploy]

- name: Install npm dependencies
  command: npm install
  args:
    chdir: "{{ app_home }}/current"
  become: yes
  become_user: "{{ app_user }}"
  tags: [nextjs_deploy]

- name: Build Next.js app
  command: "{{ app_build_command }}"
  args:
    chdir: "{{ app_home }}/current"
  become: yes
  become_user: "{{ app_user }}"
  environment:
    NODE_ENV: production
  register: build_result
  failed_when: build_result.rc != 0
  tags: [nextjs_deploy]

- name: Display build error only on failure
  debug:
    msg: |
      ❌ Build failed with exit code {{ build_result.rc }}
      
      Last 20 lines of error output:
      {{ (build_result.stderr_lines | default([]))[-20:] | join('\n') if build_result.stderr_lines | default([]) | length > 0 else 'No error output' }}
  when: build_result.failed | default(false)
  tags: [nextjs_deploy]

# Note: Service management is handled by app_deployer role via systemd
# This role only handles code deployment and building

- name: Wait for app to be ready
  uri:
    url: "http://localhost:{{ app_port }}{{ app_health_check_path }}"
    status_code: 200
    timeout: "{{ app_health_check_timeout }}"
  register: health_check
  until: health_check.status == 200
  retries: 10
  delay: 3
  failed_when: false
  tags: [nextjs_deploy]

- name: Get systemd service status
  systemd:
    name: "{{ app_name }}"
  register: service_status
  failed_when: false
  changed_when: false
  tags: [nextjs_deploy]

- name: Display service status
  debug:
    msg: "{{ app_name }} service is {{ service_status.status.ActiveState | default('unknown') }}"
  tags: [nextjs_deploy]

- name: Get service logs for troubleshooting
  command: journalctl -u {{ app_name }} -n 50 --no-pager
  register: service_logs
  failed_when: false
  changed_when: false
  when: health_check.status is defined and health_check.status != 200
  tags: [nextjs_deploy]

- name: Display service logs
  debug:
    var: service_logs.stdout_lines
  when: service_logs.stdout_lines is defined
  tags: [nextjs_deploy]

- name: Display app status
  debug:
    msg: "{{ app_name }} is {{ 'running' if health_check.status == 200 else 'not responding' }}"
  tags: [nextjs_deploy]

