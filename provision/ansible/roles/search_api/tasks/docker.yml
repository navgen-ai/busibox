---
# Search API Docker Deployment Tasks
#
# Deploys Search API via Docker Compose
# Used when deploy_target == 'docker'

- name: Build Search API container
  include_role:
    name: docker_common
    tasks_from: compose_build
  vars:
    docker_services_to_build:
      - search-api
    docker_build_no_cache: "{{ docker_force_rebuild | default(false) }}"

- name: Start Search API container
  include_role:
    name: docker_common
    tasks_from: compose_up
  vars:
    docker_services_to_start:
      - search-api
    docker_wait_for_health: true

- name: Wait for Search API to be ready
  include_role:
    name: docker_common
    tasks_from: wait_healthy
  vars:
    docker_wait_service: search-api
    docker_wait_timeout: 120

- name: Verify Search API health endpoint
  ansible.builtin.uri:
    url: "http://localhost:{{ search_port }}/health"
    method: GET
    status_code: [200]
  register: search_health
  retries: 10
  delay: 5
  until: search_health.status == 200

- name: Display Search API status
  ansible.builtin.debug:
    msg: |
      Search API is running and ready
      Health: http://localhost:{{ search_port }}/health
      API: http://localhost:{{ search_port }}
