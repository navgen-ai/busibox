---
# Standalone authz service (separate from ingest)

- name: Install rsync for synchronize module
  apt:
    name: rsync
    state: present
    update_cache: yes
  tags: [authz]

- name: Ensure authz group exists
  group:
    name: "{{ authz_group }}"
    state: present
  tags: [authz]

- name: Ensure authz user exists
  user:
    name: "{{ authz_user }}"
    group: "{{ authz_group }}"
    create_home: false
    shell: /usr/sbin/nologin
    state: present
  tags: [authz]

- name: Create authz directories
  file:
    path: "{{ item }}"
    state: directory
    owner: "{{ authz_user }}"
    group: "{{ authz_group }}"
    mode: "0755"
  loop:
    - "{{ authz_base_dir }}"
    - "{{ authz_app_dir }}"
  tags: [authz]

# =============================================================================
# Database Setup
# =============================================================================

- name: Create authz database
  postgresql_db:
    name: "{{ authz_postgres_db }}"
    owner: "{{ authz_postgres_user }}"
    encoding: UTF8
    lc_collate: en_US.UTF-8
    lc_ctype: en_US.UTF-8
    template: template0
    state: present
  become_user: postgres
  delegate_to: "{{ groups['pg'][0] }}"
  tags: [authz, authz_db]

- name: Create authz pytest database
  postgresql_db:
    name: "test_authz"
    owner: "{{ authz_postgres_user }}"
    encoding: UTF8
    lc_collate: en_US.UTF-8
    lc_ctype: en_US.UTF-8
    template: template0
    state: present
  become_user: postgres
  delegate_to: "{{ groups['pg'][0] }}"
  when: enable_pytest_databases | default(false)
  tags: [authz, authz_db, authz_pytest_db]

# =============================================================================
# Source Code Deployment
# =============================================================================

- name: Clean Python cache before source sync
  shell: find {{ authz_app_dir }}/src -type d -name '__pycache__' -exec rm -rf {} + 2>/dev/null || true
  changed_when: false
  tags: [authz]

- name: Sync authz source (removes stale files)
  synchronize:
    src: "{{ authz_src_dir }}/src/"
    dest: "{{ authz_app_dir }}/src/"
    delete: yes
    rsync_opts:
      - "--exclude=__pycache__"
      - "--exclude=*.pyc"
  register: authz_source_sync
  notify: Restart authz service
  tags: [authz]

- name: Set ownership on synced source
  file:
    path: "{{ authz_app_dir }}/src"
    owner: "{{ authz_user }}"
    group: "{{ authz_group }}"
    recurse: yes
  tags: [authz]

- name: Restart authz service after code deployment
  systemd:
    name: "{{ authz_service_name }}"
    state: restarted
  tags: [authz]

- name: Copy requirements.txt
  copy:
    src: "{{ authz_src_dir }}/requirements.txt"
    dest: "{{ authz_app_dir }}/requirements.txt"
    owner: "{{ authz_user }}"
    group: "{{ authz_group }}"
    mode: "0644"
  notify: Restart authz service
  tags: [authz]

- name: Copy test requirements
  copy:
    src: "{{ authz_src_dir }}/requirements.test.txt"
    dest: "{{ authz_app_dir }}/requirements.test.txt"
    owner: "{{ authz_user }}"
    group: "{{ authz_group }}"
    mode: "0644"
  tags: [authz]

- name: Copy pytest configuration
  copy:
    src: "{{ authz_src_dir }}/pytest.ini"
    dest: "{{ authz_app_dir }}/pytest.ini"
    owner: "{{ authz_user }}"
    group: "{{ authz_group }}"
    mode: "0644"
  tags: [authz]

- name: Clean Python cache before tests sync
  shell: find {{ authz_app_dir }}/tests -type d -name '__pycache__' -exec rm -rf {} + 2>/dev/null || true
  changed_when: false
  tags: [authz]

- name: Sync authz tests (removes stale files)
  synchronize:
    src: "{{ authz_src_dir }}/tests/"
    dest: "{{ authz_app_dir }}/tests/"
    delete: yes
    rsync_opts:
      - "--exclude=__pycache__"
      - "--exclude=*.pyc"
  tags: [authz]

- name: Copy shared testing library
  synchronize:
    src: "{{ playbook_dir }}/../../srv/test_utils/"
    dest: "{{ authz_app_dir }}/test_utils/"
    delete: yes
    rsync_opts:
      - "--exclude=__pycache__"
      - "--exclude=*.pyc"
  tags: [authz]

- name: Set ownership on synced tests
  file:
    path: "{{ authz_app_dir }}/tests"
    owner: "{{ authz_user }}"
    group: "{{ authz_group }}"
    recurse: yes
  tags: [authz]

- name: Ensure Python venv deps are installed
  apt:
    name:
      - python3-venv
      - python3-pip
    state: present
    update_cache: false
  tags: [authz]

- name: Create virtualenv
  command: python3 -m venv "{{ authz_venv_dir }}"
  args:
    creates: "{{ authz_venv_dir }}/bin/activate"
  tags: [authz]

- name: Install authz dependencies
  pip:
    requirements: "{{ authz_app_dir }}/requirements.txt"
    virtualenv: "{{ authz_venv_dir }}"
  register: authz_deps_install
  notify: Restart authz service
  tags: [authz]

- name: Restart authz service after dependency changes
  systemd:
    name: "{{ authz_service_name }}"
    state: restarted
  when: authz_deps_install.changed
  tags: [authz]

- name: Render env file
  template:
    src: authz.env.j2
    dest: "{{ authz_base_dir }}/.env"
    owner: "{{ authz_user }}"
    group: "{{ authz_group }}"
    mode: "0600"
  register: authz_env_file
  notify: Restart authz service
  tags: [authz]

- name: Restart authz service after env file changes
  systemd:
    name: "{{ authz_service_name }}"
    state: restarted
  when: authz_env_file.changed
  tags: [authz]

- name: Install systemd service
  template:
    src: authz.service.j2
    dest: /etc/systemd/system/{{ authz_service_name }}.service
    mode: "0644"
  notify: Restart authz service
  tags: [authz]

- name: Reload systemd
  systemd:
    daemon_reload: true
  tags: [authz]

- name: Enable authz service
  systemd:
    name: "{{ authz_service_name }}"
    enabled: true
  tags: [authz]

- name: Restart authz service (always restart on deploy)
  systemd:
    name: "{{ authz_service_name }}"
    state: restarted
  tags: [authz]

- name: Verify authz service is running
  systemd:
    name: "{{ authz_service_name }}"
  register: authz_service_status
  tags: [authz]

- name: Check authz service health
  uri:
    url: "http://localhost:{{ authz_service_port }}/health/live"
    method: GET
    status_code: 200
  delegate_to: "{{ inventory_hostname }}"
  register: authz_health_check
  failed_when: false
  tags: [authz]

- name: Warn if authz service is not healthy
  debug:
    msg: "Warning: Authz service may not be responding correctly. Check logs with: journalctl -u {{ authz_service_name }} -n 50"
  when: authz_health_check.status != 200
  tags: [authz]

- name: Wait for authz service to be ready before PVT tests
  uri:
    url: "http://localhost:{{ authz_service_port }}/health/live"
    method: GET
    status_code: 200
    timeout: 5
  delegate_to: "{{ inventory_hostname }}"
  register: authz_ready_check
  until: authz_ready_check.status == 200
  retries: 12
  delay: 2
  failed_when: false
  when: run_pvt_tests | default(true)
  tags: [authz, pvt]

- name: Fail if service not ready for PVT tests
  fail:
    msg: "Authz service did not become ready within 24 seconds. Check logs: journalctl -u {{ authz_service_name }} -n 50"
  when: run_pvt_tests | default(true) and authz_ready_check.status != 200
  tags: [authz, pvt]

# Post-Deployment Validation Tests (PVT)
- name: Run PVT tests
  shell: |
    set -a
    . {{ authz_base_dir }}/.env
    set +a
    export PYTHONPATH={{ authz_app_dir }}/src
    cd {{ authz_app_dir }}
    {{ authz_venv_dir }}/bin/python -m pytest tests/test_pvt.py -v --tb=short -x 2>&1
  args:
    executable: /bin/bash
  register: authz_pvt_result
  failed_when: false
  changed_when: false
  when: run_pvt_tests | default(true)
  tags: [authz, pvt]

- name: Display PVT test results
  debug:
    msg: "{{ authz_pvt_result.stdout_lines | default([]) }}"
  when: run_pvt_tests | default(true) and authz_pvt_result.stdout is defined
  tags: [authz, pvt]

- name: Fail if PVT tests failed
  fail:
    msg: "Post-deployment validation tests failed! Check logs above."
  when: run_pvt_tests | default(true) and authz_pvt_result.rc != 0
  tags: [authz, pvt]






