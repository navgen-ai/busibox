---
# Authz role defaults
authz_user: authz
authz_group: authz
authz_base_dir: /srv/authz
authz_src_dir: "{{ playbook_dir }}/../../srv/authz"
authz_service_name: authz
authz_service_port: 8010
authz_venv_dir: "{{ authz_base_dir }}/venv"
authz_app_dir: "{{ authz_base_dir }}/app"

# Postgres connection (dedicated authz database)
# The authz service has its own database to keep RBAC/OAuth data separate
authz_postgres_host: "{{ postgres_host }}"
authz_postgres_port: "{{ postgres_port | default(5432) }}"
authz_postgres_db: "authz"
authz_postgres_user: "{{ postgres_user }}"
authz_postgres_password: "{{ secrets.postgresql.password }}"

# Token settings
authz_issuer: "busibox-authz"
# Access token TTL in seconds (6 hours)
# This affects all app-scoped tokens (SSO tokens for agent-manager, etc.)
authz_access_token_ttl: 21600

# Signing configuration
authz_signing_alg: "RS256"
authz_rsa_key_size: 2048

# Encrypt private keys at rest (recommended)
authz_key_encryption_passphrase: "{{ secrets.jwt_secret | default(secrets.sso.jwt_secret | default('change-me')) }}"

# Bootstrap OAuth client for ai-portal
authz_bootstrap_allowed_audiences: "ingest-api,search-api,agent-api,authz-api,deploy-api"
authz_bootstrap_allowed_scopes: ""





