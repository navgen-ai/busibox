---
# Get Bootstrap Token for Deploy API
# 
# During initial bootstrap, we use a pre-shared bootstrap token to authenticate
# with Deploy API. This token is set in deploy-api's environment and allows
# Ansible to deploy apps without going through the normal user authentication flow.
#
# The bootstrap token is derived deterministically from jwt_secret so both
# deploy_api and app_deployer roles calculate the same value.

- name: Generate bootstrap token (derived from jwt_secret)
  set_fact:
    # Same formula as deploy_api/defaults/main.yml
    deploy_api_admin_token: "{{ secrets.deploy_api.bootstrap_token | default('bootstrap-' + (secrets.jwt_secret | default('default-jwt-secret') | hash('sha256'))[:56]) }}"
  no_log: true

- name: Verify bootstrap token is available
  debug:
    msg: "Bootstrap token configured: {{ 'yes' if deploy_api_admin_token | length > 0 else 'no' }} (length: {{ deploy_api_admin_token | length }})"

- name: Fail if no bootstrap token configured
  fail:
    msg: |
      No bootstrap token configured.
      Make sure secrets.jwt_secret is set in vault.yml.
  when: deploy_api_admin_token | length == 0
