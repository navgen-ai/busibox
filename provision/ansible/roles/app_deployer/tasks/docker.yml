---
# Core Apps Docker Deployment Tasks
#
# Deploys AI Portal and Agent Manager via Docker Compose
# Used when deploy_target == 'docker'

- name: Build core-apps container
  include_role:
    name: docker_common
    tasks_from: compose_build
  vars:
    docker_services_to_build:
      - core-apps
    docker_build_no_cache: "{{ docker_force_rebuild | default(false) }}"

- name: Start core-apps container
  include_role:
    name: docker_common
    tasks_from: compose_up
  vars:
    docker_services_to_start:
      - core-apps
    docker_wait_for_health: true

- name: Wait for core-apps to be ready
  include_role:
    name: docker_common
    tasks_from: wait_healthy
  vars:
    docker_wait_service: core-apps
    docker_wait_timeout: 120

- name: Run AI Portal database migrations
  include_role:
    name: docker_common
    tasks_from: compose_exec
  vars:
    docker_exec_service: core-apps
    docker_exec_command: "sh -c 'cd /srv/ai-portal && npx prisma db push --accept-data-loss'"
    docker_exec_fail_on_error: false

- name: Display migration result
  ansible.builtin.debug:
    msg: "{{ exec_result.stdout | default('Migration completed') }}"
  when: exec_result is defined

- name: Seed AI Portal database with built-in apps
  include_role:
    name: docker_common
    tasks_from: compose_exec
  vars:
    docker_exec_service: core-apps
    docker_exec_command: "sh -c 'cd /srv/ai-portal && npm run db:seed'"
    docker_exec_fail_on_error: false

- name: Display seed result
  ansible.builtin.debug:
    msg: "{{ exec_result.stdout | default('Seed completed') }}"
  when: exec_result is defined

- name: Verify AI Portal health endpoint
  ansible.builtin.uri:
    # Use basePath-aware endpoint since AI Portal runs with NEXT_PUBLIC_BASE_PATH=/portal
    url: "http://localhost:{{ ai_portal_port }}/portal/api/health"
    method: GET
    status_code: [200]
    timeout: 10
  register: portal_health
  retries: 30
  delay: 10
  until: portal_health.status == 200
  failed_when: false

- name: Display core-apps status
  ansible.builtin.debug:
    msg: |
      Core apps are running and ready
      AI Portal: http://localhost:{{ ai_portal_port }}
      Agent Manager: http://localhost:{{ agent_manager_port }}
