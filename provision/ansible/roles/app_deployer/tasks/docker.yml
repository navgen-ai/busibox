---
# Core Apps Docker Deployment Tasks
#
# Deploys Busibox Portal and Agent Manager via Docker Compose
# Used when deploy_target == 'docker'

- name: Build core-apps container
  include_role:
    name: docker_common
    tasks_from: compose_build
  vars:
    docker_services_to_build:
      - core-apps
    docker_build_no_cache: "{{ docker_force_rebuild | default(false) }}"

- name: Start proxy container before core-apps
  include_role:
    name: docker_common
    tasks_from: compose_up
  vars:
    docker_services_to_start:
      - proxy
    docker_wait_for_health: true

- name: Wait for proxy to be ready
  include_role:
    name: docker_common
    tasks_from: wait_healthy
  vars:
    docker_wait_service: proxy
    docker_wait_timeout: 60

- name: Start core-apps container
  include_role:
    name: docker_common
    tasks_from: compose_up
  vars:
    docker_services_to_start:
      - core-apps
    # core-apps may need time to (re)install/build apps before HTTP health turns green.
    # Do not fail early in compose_up; use explicit wait below with a longer timeout.
    docker_wait_for_health: false

- name: Wait for core-apps to be ready
  include_role:
    name: docker_common
    tasks_from: wait_healthy
  vars:
    docker_wait_service: core-apps
    # Allow enough time for first boot / Turbopack warmup / runtime app deployment.
    docker_wait_timeout: 300

- name: Run Busibox Portal database migrations
  include_role:
    name: docker_common
    tasks_from: compose_exec
  vars:
    docker_exec_service: core-apps
    docker_exec_command: "sh -c 'cd /srv/busibox-portal && npx prisma db push --accept-data-loss'"
    docker_exec_fail_on_error: false

- name: Display migration result
  ansible.builtin.debug:
    msg: "{{ exec_result.stdout | default('Migration completed') }}"
  when: exec_result is defined

- name: Seed Busibox Portal database with built-in apps
  include_role:
    name: docker_common
    tasks_from: compose_exec
  vars:
    docker_exec_service: core-apps
    docker_exec_command: "sh -c 'cd /srv/busibox-portal && npm run db:seed'"
    docker_exec_fail_on_error: false

- name: Display seed result
  ansible.builtin.debug:
    msg: "{{ exec_result.stdout | default('Seed completed') }}"
  when: exec_result is defined

- name: Verify Busibox Portal health endpoint
  ansible.builtin.uri:
    # Use basePath-aware endpoint since Busibox Portal runs with NEXT_PUBLIC_BASE_PATH=/portal
    # Use Docker service hostname (manager runs on Docker network)
    url: "http://core-apps:{{ ai_portal_port }}/portal/api/health"
    method: GET
    status_code: [200]
    timeout: 10
  register: portal_health
  retries: 30
  delay: 10
  until: portal_health.status == 200
  failed_when: false

- name: Verify Busibox Admin health endpoint
  ansible.builtin.uri:
    url: "http://core-apps:{{ admin_port | default(3002) }}/admin/api/health"
    method: GET
    status_code: [200]
    timeout: 10
  register: admin_health
  retries: 30
  delay: 10
  until: admin_health.status == 200
  failed_when: false

- name: Display core-apps status
  ansible.builtin.debug:
    msg: |
      Core apps are running and ready
      Busibox Portal: http://core-apps:{{ ai_portal_port }}
      Busibox Admin: http://core-apps:{{ admin_port | default(3002) }}
      Agent Manager: http://core-apps:{{ agent_manager_port }}
