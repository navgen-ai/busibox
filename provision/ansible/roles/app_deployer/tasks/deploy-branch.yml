---
# Deploy Application from Branch
# Purpose: Deploy an application directly from a GitHub branch without requiring a release
# This is useful for development/testing and continuous deployment workflows

- name: Load secrets for GitHub authentication
  include_vars:
    file: "{{ playbook_dir }}/roles/secrets/vars/vault.{{ deployment_environment | default('dev') }}.yml"
  no_log: true
  tags:
    - always

- name: Check if deploy_app is defined
  assert:
    that:
      - deploy_app is defined
      - deploy_app | length > 0
    fail_msg: "deploy_app variable is not defined or empty"
    success_msg: "Deploying app: {{ deploy_app }}"

- name: Set deployment variables
  set_fact:
    app_to_deploy: "{{ applications | selectattr('name', 'equalto', deploy_app) | first }}"
    # Default branch: use environment name for test/staging, 'main' for production
    branch_to_deploy: "{{ deploy_branch | default(busibox_env if busibox_env in ['test', 'staging'] else 'main') }}"

- name: Verify app exists in applications list
  assert:
    that:
      - app_to_deploy is defined
      - app_to_deploy.name is defined
    fail_msg: "App '{{ deploy_app }}' not found in applications list"
    success_msg: "Found app: {{ app_to_deploy.name }}"

- name: Display deployment information
  debug:
    msg: |
      Deploying {{ app_to_deploy.name }} from branch {{ branch_to_deploy }}
      Repository: {{ app_to_deploy.github_repo }}
      Deploy path: {{ app_to_deploy.deploy_path }}
      Container: {{ app_to_deploy.container_ip }}

- name: Create temporary download directory
  file:
    path: "/tmp/{{ app_to_deploy.name }}-{{ branch_to_deploy }}"
    state: directory
    mode: '0755'
  delegate_to: "{{ app_to_deploy.container_ip }}"

- name: Download branch archive from GitHub
  shell: |
    if [ -f ~/.github_token ]; then
      TOKEN=$(cat ~/.github_token)
      curl -L \
        -H "Authorization: Bearer $TOKEN" \
        -H "Accept: application/vnd.github+json" \
        -H "X-GitHub-Api-Version: 2022-11-28" \
        -o "/tmp/{{ app_to_deploy.name }}-{{ branch_to_deploy }}/archive.tar.gz" \
        "https://api.github.com/repos/{{ app_to_deploy.github_repo }}/tarball/{{ branch_to_deploy }}"
    else
      curl -L \
        -o "/tmp/{{ app_to_deploy.name }}-{{ branch_to_deploy }}/archive.tar.gz" \
        "https://github.com/{{ app_to_deploy.github_repo }}/archive/refs/heads/{{ branch_to_deploy }}.tar.gz"
    fi
  delegate_to: "{{ app_to_deploy.container_ip }}"
  register: download_result
  failed_when: download_result.rc != 0

- name: Backup current deployment
  shell: |
    if [ -d "{{ app_to_deploy.deploy_path }}" ]; then
      rm -rf {{ app_to_deploy.deploy_path }}.backup
      cp -r {{ app_to_deploy.deploy_path }} {{ app_to_deploy.deploy_path }}.backup
      echo "Backup created at {{ app_to_deploy.deploy_path }}.backup"
    else
      echo "No existing deployment to backup"
    fi
  delegate_to: "{{ app_to_deploy.container_ip }}"
  register: backup_result

- name: Extract archive and get commit info
  shell: |
    cd /tmp/{{ app_to_deploy.name }}-{{ branch_to_deploy }}
    tar -xzf archive.tar.gz --strip-components=1
    rm archive.tar.gz
    # Get the commit hash from the archive
    if [ -d .git ]; then
      COMMIT_HASH=$(git rev-parse HEAD)
    else
      # For GitHub archives, we need to fetch it separately
      if [ -f ~/.github_token ]; then
        TOKEN=$(cat ~/.github_token)
        COMMIT_HASH=$(curl -s -H "Authorization: Bearer $TOKEN" \
          "https://api.github.com/repos/{{ app_to_deploy.github_repo }}/commits/{{ branch_to_deploy }}" \
          | grep -o '"sha": "[^"]*"' | head -1 | cut -d'"' -f4)
      else
        COMMIT_HASH=$(curl -s \
          "https://api.github.com/repos/{{ app_to_deploy.github_repo }}/commits/{{ branch_to_deploy }}" \
          | grep -o '"sha": "[^"]*"' | head -1 | cut -d'"' -f4)
      fi
    fi
    echo "$COMMIT_HASH" > /tmp/{{ app_to_deploy.name }}-commit-hash
    echo "Commit hash: $COMMIT_HASH"
  delegate_to: "{{ app_to_deploy.container_ip }}"
  register: commit_info

- name: Create deploy directory if it doesn't exist
  file:
    path: "{{ app_to_deploy.deploy_path }}"
    state: directory
    mode: '0755'
  delegate_to: "{{ app_to_deploy.container_ip }}"

- name: Move extracted files to deploy path
  shell: |
    # Remove old files (except .env and node_modules to preserve state)
    find {{ app_to_deploy.deploy_path }} -mindepth 1 -maxdepth 1 \
      ! -name '.env' \
      ! -name 'node_modules' \
      ! -name '.deployed-version' \
      -exec rm -rf {} +
    
    # Copy new files
    cp -r /tmp/{{ app_to_deploy.name }}-{{ branch_to_deploy }}/* {{ app_to_deploy.deploy_path }}/
    cp -r /tmp/{{ app_to_deploy.name }}-{{ branch_to_deploy }}/.[^.]* {{ app_to_deploy.deploy_path }}/ 2>/dev/null || true
  delegate_to: "{{ app_to_deploy.container_ip }}"

- name: Clean up temporary directory
  file:
    path: "/tmp/{{ app_to_deploy.name }}-{{ branch_to_deploy }}"
    state: absent
  delegate_to: "{{ app_to_deploy.container_ip }}"

- name: Create .npmrc for GitHub Packages authentication
  copy:
    content: |
      @jazzmind:registry=https://npm.pkg.github.com
      //npm.pkg.github.com/:_authToken=${GITHUB_TOKEN}
    dest: "{{ app_to_deploy.deploy_path }}/.npmrc"
    mode: '0600'
  delegate_to: "{{ app_to_deploy.container_ip }}"

- name: Clean npm cache and node_modules
  shell: |
    cd {{ app_to_deploy.deploy_path }}
    echo "Cleaning node_modules and caches..."
    rm -rf node_modules
    rm -rf .next
    rm -rf .turbo
    # Check for and remove any symlinks or cached directories
    find . -maxdepth 1 -type l -ls -delete
    # Clean user-level npm and Next.js caches
    npm cache clean --force
    rm -rf ~/.npm/_cacache
    rm -rf ~/.cache
  delegate_to: "{{ app_to_deploy.container_ip }}"
  register: clean_result

- name: Install dependencies
  shell: |
    cd {{ app_to_deploy.deploy_path }}
    # Set GITHUB_TOKEN from file for npm authentication
    if [ -f ~/.github_token ]; then
      export GITHUB_TOKEN=$(cat ~/.github_token)
      echo "Running npm with GITHUB_TOKEN set"
    else
      echo "WARNING: No token file found"
    fi
    npm install --production=false
  delegate_to: "{{ app_to_deploy.container_ip }}"
  environment:
    NODE_ENV: "{{ app_to_deploy.env.NODE_ENV | default('production') }}"
  register: npm_install
  failed_when: npm_install.rc != 0

- name: Create database and run migrations (Prisma apps)
  shell: "{{ lookup('template', 'prisma-setup.sh.j2') }}"
  args:
    executable: /bin/bash
    chdir: "{{ app_to_deploy.deploy_path }}"
  delegate_to: "{{ app_to_deploy.container_ip }}"
  register: db_setup_result
  failed_when: db_setup_result.rc != 0

- name: Run Prisma generate after database setup (if Prisma is used)
  shell: |
    cd {{ app_to_deploy.deploy_path }}
    if [ -f "prisma/schema.prisma" ]; then
      echo "Running prisma generate..."
      npx prisma generate
      echo "Prisma client generated successfully"
    else
      echo "No Prisma schema found, skipping"
    fi
  delegate_to: "{{ app_to_deploy.container_ip }}"
  register: prisma_result
  # Only fail if schema exists but generate failed
  failed_when: prisma_result.rc != 0 and 'No Prisma schema found' not in prisma_result.stdout

- name: Display database setup output
  debug:
    var: db_setup_result.stdout_lines
  when: db_setup_result is defined

- name: Display database setup errors (if any)
  debug:
    var: db_setup_result.stderr_lines
  when: db_setup_result is defined and db_setup_result.stderr_lines is defined and db_setup_result.stderr_lines | length > 0

- name: Run database migrations (if migrate:up script exists)
  shell: |
    set -e
    cd {{ app_to_deploy.deploy_path }}
    
    echo "=== Migration Debug Info ==="
    echo "Current directory: $(pwd)"
    echo "Checking for package.json..."
    ls -la package.json || echo "package.json not found"
    
    # Load .env if it exists to get DATABASE_URL
    # Prisma can read .env files directly, but we also export for npm scripts
    if [ -f .env ]; then
      echo "Loading environment from .env..."
      # Use eval to properly parse KEY="VALUE" format (handles quotes correctly)
      set -a
      while IFS= read -r line || [ -n "$line" ]; do
        # Skip comments and empty lines
        [[ "$line" =~ ^[[:space:]]*# ]] && continue
        [[ -z "${line// }" ]] && continue
        # Use eval to properly handle quoted values
        eval "export $line" 2>/dev/null || true
      done < .env
      set +a
      echo "DATABASE_URL is set: ${DATABASE_URL:+yes}"
      if [ -n "$DATABASE_URL" ]; then
        echo "DATABASE_URL starts with: ${DATABASE_URL:0:12}"
      fi
    else
      echo "No .env file found"
    fi
    
    # Check if migrate:up script exists in package.json
    if [ -f "package.json" ] && grep -q '"migrate:up"' package.json; then
      echo "Found migrate:up script in package.json"
      echo "Running database migrations..."
      npm run migrate:up 2>&1 || {
        echo "Migration failed with exit code $?"
        exit 1
      }
      echo "Migrations completed successfully"
    else
      echo "No migrate:up script found in package.json, skipping migrations"
    fi
  args:
    executable: /bin/bash
  delegate_to: "{{ app_to_deploy.container_ip }}"
  environment: "{{ app_to_deploy.env | default({}) }}"
  register: migration_result
  failed_when: migration_result.rc != 0 and 'No migrate:up script found' not in migration_result.stdout

- name: Display migration output
  debug:
    msg: "{{ migration_result.stdout_lines + migration_result.stderr_lines }}"
  when: migration_result is defined

- name: Debug - Check deployed file content
  shell: |
    cd {{ app_to_deploy.deploy_path }}
    echo "=== Checking deployed file ==="
    echo "File: src/app/(authenticated)/admin/libraries/page.tsx"
    head -15 "src/app/(authenticated)/admin/libraries/page.tsx"
    echo ""
    echo "=== Checking git status ==="
    git log --oneline -1 || echo "Not a git repo"
  delegate_to: "{{ app_to_deploy.container_ip }}"
  register: file_check

- name: Display file check
  debug:
    var: file_check.stdout_lines

- name: Build application
  shell: |
    cd {{ app_to_deploy.deploy_path }}
    # Clean ALL build artifacts and caches
    rm -rf .next
    rm -rf .turbo
    rm -rf busibox-portal-deploy
    rm -rf node_modules/.cache
    # Clear environment variables that might affect build
    unset TURBOPACK_CACHE_DIR
    {% if app_to_deploy.build_command is defined %}
    {{ app_to_deploy.build_command }}
    {% else %}
    npm run build
    {% endif %}
  delegate_to: "{{ app_to_deploy.container_ip }}"
  environment: "{{ app_to_deploy.env | default({}) | combine({'NODE_ENV': 'production'}) }}"
  register: build_result
  failed_when: false  # Don't fail immediately, handle error below

- name: Strip ANSI codes and display build errors
  set_fact:
    build_stderr_clean: "{{ build_result.stderr | regex_replace('\\x1b\\[[0-9;]*[mGKHF]', '') }}"
    build_stdout_clean: "{{ build_result.stdout | regex_replace('\\x1b\\[[0-9;]*[mGKHF]', '') }}"
  when: build_result.rc != 0

- name: Display clean build error
  debug:
    msg: |
      ==================== BUILD FAILED ====================
      Exit Code: {{ build_result.rc }}
      
      STDOUT:
      {{ build_stdout_clean }}
      
      STDERR:
      {{ build_stderr_clean }}
      ======================================================
  when: build_result.rc != 0

- name: Fail if build failed
  fail:
    msg: "Build failed with exit code {{ build_result.rc }}. See error output above."
  when: build_result.rc != 0

- name: Copy static files for Next.js standalone mode
  shell: |
    cd {{ app_to_deploy.deploy_path }}
    # Next.js standalone mode requires static files to be copied manually
    # See: https://nextjs.org/docs/pages/api-reference/config/next-config-js/output#automatically-copying-traced-files
    if [ -d ".next/standalone" ] && [ -d ".next/static" ]; then
      echo "Copying static files for standalone mode..."
      mkdir -p .next/standalone/.next
      cp -r .next/static .next/standalone/.next/
      echo "Static files copied successfully"
      ls -la .next/standalone/.next/
    else
      echo "Not a standalone build or no static files - skipping"
    fi
    # Also copy public folder if it exists (for favicon, images, etc.)
    if [ -d ".next/standalone" ] && [ -d "public" ]; then
      echo "Copying public folder for standalone mode..."
      cp -r public .next/standalone/
      echo "Public folder copied successfully"
    fi
  delegate_to: "{{ app_to_deploy.container_ip }}"
  register: static_copy_result

- name: Display static copy result
  debug:
    var: static_copy_result.stdout_lines

- name: Write deployment version info
  shell: |
    cd {{ app_to_deploy.deploy_path }}
    COMMIT_HASH=$(cat /tmp/{{ app_to_deploy.name }}-commit-hash 2>/dev/null || echo "unknown")
    cat > .deployed-version << EOF
    {
      "type": "branch",
      "branch": "{{ branch_to_deploy }}",
      "commit": "$COMMIT_HASH",
      "deployed_at": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
      "deployed_by": "ansible"
    }
    EOF
    rm -f /tmp/{{ app_to_deploy.name }}-commit-hash
    echo "Version info written to .deployed-version"
    cat .deployed-version
  delegate_to: "{{ app_to_deploy.container_ip }}"
  register: version_info

- name: Stop any process using the target port
  shell: |
    # Find and kill any process using port {{ app_to_deploy.port }}
    PORT_PID=$(lsof -ti:{{ app_to_deploy.port }} 2>/dev/null || true)
    if [ -n "$PORT_PID" ]; then
      echo "Found process $PORT_PID using port {{ app_to_deploy.port }}, killing it..."
      kill -9 $PORT_PID || true
      sleep 2
    else
      echo "No process found using port {{ app_to_deploy.port }}"
    fi
  delegate_to: "{{ app_to_deploy.container_ip }}"
  register: port_cleanup
  failed_when: false

# Set process manager (systemd only)
- name: Set process manager
  set_fact:
    process_manager: "{{ app_to_deploy.process_manager | default('systemd') }}"

# ============================================================================
# Systemd Process Manager
# ============================================================================
- name: Deploy systemd service file
  template:
    src: app-systemd.service.j2
    dest: "/etc/systemd/system/{{ app_to_deploy.name }}.service"
    mode: '0644'
  delegate_to: "{{ app_to_deploy.container_ip }}"
  vars:
    app: "{{ app_to_deploy }}"
  when: process_manager == 'systemd'
  register: systemd_service

- name: Reload systemd daemon
  systemd:
    daemon_reload: yes
  delegate_to: "{{ app_to_deploy.container_ip }}"
  when: process_manager == 'systemd' and systemd_service.changed

- name: Stop application with systemd (if already running)
  systemd:
    name: "{{ app_to_deploy.name }}"
    state: stopped
  delegate_to: "{{ app_to_deploy.container_ip }}"
  failed_when: false
  when: process_manager == 'systemd'

- name: Start and enable application with systemd
  systemd:
    name: "{{ app_to_deploy.name }}"
    state: started
    enabled: yes
  delegate_to: "{{ app_to_deploy.container_ip }}"
  when: process_manager == 'systemd'

- name: Wait for application to start
  wait_for:
    host: "{{ app_to_deploy.container_ip }}"
    port: "{{ app_to_deploy.port }}"
    state: started
    delay: 2
    timeout: 30
  delegate_to: localhost

- name: Build health check URL with basePath support
  set_fact:
    health_check_path: "{{ app_to_deploy.env.NEXT_PUBLIC_BASE_PATH | default('') }}{{ app_to_deploy.health_endpoint | default('/api/health') }}"

- name: Check application health
  uri:
    url: "http://{{ app_to_deploy.container_ip }}:{{ app_to_deploy.port }}{{ health_check_path }}"
    status_code: 200
    timeout: 10
  register: health_check
  retries: 3
  delay: 5
  until: health_check.status == 200
  delegate_to: localhost
  when: app_to_deploy.health_endpoint is defined

- name: Display deployment summary
  debug:
    msg: |
      ✅ Deployment successful!
      
      Application: {{ app_to_deploy.name }}
      Branch: {{ branch_to_deploy }}
      Deploy path: {{ app_to_deploy.deploy_path }}
      Process Manager: {{ process_manager }}
      Status: Running on port {{ app_to_deploy.port }}
      
      View logs:
        ssh root@{{ app_to_deploy.container_ip }} "journalctl -u {{ app_to_deploy.name }} -f"
      
      Health check:
        curl http://{{ app_to_deploy.container_ip }}:{{ app_to_deploy.port }}{{ health_check_path }}
      
      ⚠️  IMPORTANT: Nginx routing may need to be updated manually
      Run: cd provision/ansible && make production (or make test)

