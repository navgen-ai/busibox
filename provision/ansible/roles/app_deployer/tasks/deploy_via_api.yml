---
# App Deployer - Deploy via Deploy API
# Purpose: Deploy applications using the Deploy API instead of deploywatch scripts
# This is the unified deployment approach for both Docker and Proxmox environments

- name: Verify deploy_api_admin_token is available
  fail:
    msg: "deploy_api_admin_token is not set - bootstrap token acquisition may have failed"
  when: deploy_api_admin_token is not defined or deploy_api_admin_token | length == 0

- name: Wait for Deploy API to be available
  uri:
    url: "http://{{ deploy_host }}:{{ deploy_port }}/api/v1/deployment/health"
    method: GET
    status_code: 200
  register: deploy_api_health
  retries: 30
  delay: 2
  until: deploy_api_health.status == 200
  tags:
    - deploy_via_api

# Build base manifest without database field
- name: Build base manifest
  set_fact:
    deploy_manifest:
      id: "{{ app.name }}"
      name: "{{ app.name }}"
      version: "{{ app.version | default('0.0.0') }}"
      description: "{{ app.description | default(app.name) }}"
      icon: "{{ app.icon | default('Box') }}"
      appMode: "{{ app.app_mode | default('frontend') }}"
      defaultPath: "{{ app.default_path | default('/' + app.name) }}"
      defaultPort: "{{ app.port }}"
      healthEndpoint: "{{ app.health_endpoint | default('/api/health') }}"
      startCommand: "{{ app.start_command | default('node .next/standalone/server.js') }}"
      buildCommand: "{{ app.build_command | default('npm run build') }}"
  tags:
    - deploy_via_api

# Add database config to manifest only if required
- name: Add database config to manifest (if required)
  set_fact:
    deploy_manifest: "{{ deploy_manifest | combine({'database': {'required': true, 'preferredName': app.database_name | default(app.name | replace('-', '_')), 'schemaManagement': app.schema_management | default('prisma'), 'seedCommand': app.seed_command | default(omit)}}) }}"
  when: app.database_required | default(false) | bool
  tags:
    - deploy_via_api

- name: Debug GitHub token availability
  debug:
    msg: "GitHub token configured: {{ 'yes' if (secrets.github is defined and secrets.github.personal_access_token is defined and secrets.github.personal_access_token | length > 0) else 'NO - MISSING!' }}"
  tags:
    - deploy_via_api

# Build environment variables for the app
# Start with the static env vars from app config
- name: Build app environment variables
  set_fact:
    app_env_vars: "{{ app.env | default({}) }}"
  tags:
    - deploy_via_api

# Resolve secrets and add to environment
# This replicates the compute_secret macro logic from app.env.j2
- name: Resolve secrets for app deployment
  set_fact:
    app_env_vars: >-
      {{
        app_env_vars | combine({
          item | upper:
            (secrets[app.name][item] if (secrets[app.name] is defined and secrets[app.name][item] is defined) else
            ('postgresql://' ~ postgres_user ~ ':' ~ secrets.postgresql.password ~ '@' ~ postgres_host ~ ':' ~ postgres_port ~ '/' ~ (app.name | replace('-', '_'))) if item == 'database_url' else
            secrets.jwt_secret if item == 'jwt_secret' else
            secrets.session_secret if item == 'session_secret' else
            secrets.jwt_secret if item == 'sso_jwt_secret' else
            secrets.litellm_api_key if item == 'litellm_api_key' else
            secrets.encryption_key if item == 'encryption_key' else
            (secrets.allowed_email_domains | default('')) if item == 'allowed_email_domains' else
            (secrets.smtp.from_email | default('')) if item == 'email_from' else
            (secrets.smtp.host | default('')) if item == 'smtp_host' else
            (secrets.smtp.port | default('')) if item == 'smtp_port' else
            (secrets.smtp.user | default('')) if item == 'smtp_user' else
            (secrets.smtp.password | default('')) if item == 'smtp_password' else
            (secrets.smtp.secure | default('true')) if item == 'smtp_secure' else
            (secrets.microsoft.client_id | default('')) if item == 'microsoft_client_id' else
            (secrets.microsoft.client_secret | default('')) if item == 'microsoft_client_secret' else
            (secrets.microsoft.tenant_id | default('')) if item == 'microsoft_tenant_id' else
            (secrets.github.client_id | default('')) if item == 'github_client_id' else
            (secrets.github.client_secret | default('')) if item == 'github_client_secret' else
            ('https://' ~ full_domain ~ '/portal/api/admin/github/callback') if item == 'github_redirect_uri' else
            (secrets.openai.api_key | default('')) if item == 'openai_api_key' else
            (secrets.resend_api_key | default('')) if item == 'resend_api_key' else
            core_apps_ip if item == 'current_container_ip' else
            core_apps_ip if item == 'apps_container_ip' else
            agent_ip if item == 'agent_container_ip' else
            postgres_host if item == 'postgres_container_ip' else
            (secrets.container_ssh_private_key | default('')) if item == 'container_ssh_private_key' else
            secrets.jwt_secret if item == 'agent_api_key' else
            secrets.minio.root_user if item == 'minio_access_key' else
            secrets.minio.root_password if item == 'minio_secret_key' else
            '')
        })
      }}
  loop: "{{ app.secrets | default([]) }}"
  no_log: true
  tags:
    - deploy_via_api

# Also resolve optional_secrets (same logic, but these may be empty)
- name: Resolve optional secrets for app deployment
  set_fact:
    app_env_vars: >-
      {{
        app_env_vars | combine({
          item | upper:
            (secrets[app.name][item] if (secrets[app.name] is defined and secrets[app.name][item] is defined) else
            ('postgresql://' ~ postgres_user ~ ':' ~ secrets.postgresql.password ~ '@' ~ postgres_host ~ ':' ~ postgres_port ~ '/' ~ (app.name | replace('-', '_'))) if item == 'database_url' else
            secrets.jwt_secret if item == 'jwt_secret' else
            secrets.session_secret if item == 'session_secret' else
            secrets.jwt_secret if item == 'sso_jwt_secret' else
            secrets.litellm_api_key if item == 'litellm_api_key' else
            secrets.encryption_key if item == 'encryption_key' else
            (secrets.allowed_email_domains | default('')) if item == 'allowed_email_domains' else
            (secrets.smtp.from_email | default('')) if item == 'email_from' else
            (secrets.smtp.host | default('')) if item == 'smtp_host' else
            (secrets.smtp.port | default('')) if item == 'smtp_port' else
            (secrets.smtp.user | default('')) if item == 'smtp_user' else
            (secrets.smtp.password | default('')) if item == 'smtp_password' else
            (secrets.smtp.secure | default('true')) if item == 'smtp_secure' else
            (secrets.microsoft.client_id | default('')) if item == 'microsoft_client_id' else
            (secrets.microsoft.client_secret | default('')) if item == 'microsoft_client_secret' else
            (secrets.microsoft.tenant_id | default('')) if item == 'microsoft_tenant_id' else
            (secrets.github.client_id | default('')) if item == 'github_client_id' else
            (secrets.github.client_secret | default('')) if item == 'github_client_secret' else
            ('https://' ~ full_domain ~ '/portal/api/admin/github/callback') if item == 'github_redirect_uri' else
            (secrets.openai.api_key | default('')) if item == 'openai_api_key' else
            (secrets.resend_api_key | default('')) if item == 'resend_api_key' else
            core_apps_ip if item == 'current_container_ip' else
            core_apps_ip if item == 'apps_container_ip' else
            agent_ip if item == 'agent_container_ip' else
            postgres_host if item == 'postgres_container_ip' else
            (secrets.container_ssh_private_key | default('')) if item == 'container_ssh_private_key' else
            secrets.jwt_secret if item == 'agent_api_key' else
            secrets.minio.root_user if item == 'minio_access_key' else
            secrets.minio.root_password if item == 'minio_secret_key' else
            '')
        })
      }}
  loop: "{{ app.optional_secrets | default([]) }}"
  no_log: true
  tags:
    - deploy_via_api

- name: Debug env vars count
  debug:
    msg: "Passing {{ app_env_vars | length }} environment variables to Deploy API for {{ app.name }}"
  tags:
    - deploy_via_api

- name: Deploy application via Deploy API
  uri:
    url: "http://{{ deploy_host }}:{{ deploy_port }}/api/v1/deployment/deploy"
    method: POST
    body_format: json
    body:
      manifest: "{{ deploy_manifest }}"
      config:
        environment: "{{ deploy_environment | default('production') }}"
        githubRepoOwner: "{{ app.github_repo.split('/')[0] }}"
        githubRepoName: "{{ app.github_repo.split('/')[1] }}"
        githubBranch: "{{ app.github_branch | default('main') }}"
        githubToken: "{{ (secrets.github.personal_access_token | default('')) if secrets.github is defined else '' }}"
        devMode: false
        envVars: "{{ app_env_vars }}"
    headers:
      Authorization: "Bearer {{ deploy_api_admin_token }}"
      Content-Type: application/json
    status_code: [200, 201, 202]
    timeout: 60
  register: deploy_result
  tags:
    - deploy_via_api

- name: Store deployment ID
  set_fact:
    deployment_id: "{{ deploy_result.json.deploymentId }}"
  when: deploy_result.json.deploymentId is defined
  tags:
    - deploy_via_api

- name: Wait for deployment to complete
  uri:
    url: "http://{{ deploy_host }}:{{ deploy_port }}/api/v1/deployment/deploy/{{ deployment_id }}/status"
    method: GET
    headers:
      Authorization: "Bearer {{ deploy_api_admin_token }}"
    status_code: 200
  register: status_result
  retries: 90  # 15 minutes max (90 * 10s)
  delay: 10
  until: status_result.json.status in ['completed', 'failed']
  when: deployment_id is defined
  tags:
    - deploy_via_api

- name: Display deployment result
  debug:
    msg: |
      ✅ Deployment {{ 'completed' if status_result.json.status == 'completed' else 'FAILED' }}
      App: {{ app.name }}
      Status: {{ status_result.json.status }}
      Progress: {{ status_result.json.progress }}%
      {% if status_result.json.error %}
      Error: {{ status_result.json.error }}
      {% endif %}
  when: status_result is defined
  tags:
    - deploy_via_api

- name: Fail if deployment failed
  fail:
    msg: "Deployment failed: {{ status_result.json.error | default('Unknown error') }}"
  when:
    - status_result is defined
    - status_result.json.status == 'failed'
  tags:
    - deploy_via_api

# =============================================================================
# SYSTEMD SERVICE SETUP (for Proxmox LXC deployments)
# The Deploy API clones/builds the app, but Ansible manages the systemd service
# =============================================================================

- name: Deploy systemd service file for application
  template:
    src: app-systemd.service.j2
    dest: "/etc/systemd/system/{{ app.name }}.service"
    mode: "0644"
    owner: root
    group: root
  register: systemd_service_file
  when:
    - app.process_manager | default('systemd') == 'systemd'
    - status_result.json.status == 'completed'
  tags:
    - deploy_via_api

- name: Reload systemd daemon
  systemd:
    daemon_reload: true
  when:
    - systemd_service_file is changed
  tags:
    - deploy_via_api

- name: Start and enable application service
  systemd:
    name: "{{ app.name }}"
    state: started
    enabled: true
  when:
    - app.process_manager | default('systemd') == 'systemd'
    - status_result.json.status == 'completed'
  tags:
    - deploy_via_api

- name: Wait for application to be healthy
  uri:
    url: "http://{{ app.container_ip | default('localhost') }}:{{ app.port }}{{ app.health_endpoint | default('/api/health') }}"
    method: GET
    status_code: 200
  register: health_result
  retries: 30
  delay: 5
  until: health_result.status == 200
  ignore_errors: true
  tags:
    - deploy_via_api

- name: Display health check result
  debug:
    msg: |
      {% if health_result.status == 200 %}
      ✅ {{ app.name }} is healthy and responding
      {% else %}
      ⚠️ {{ app.name }} health check did not pass - app may still be starting
      {% endif %}
  tags:
    - deploy_via_api
