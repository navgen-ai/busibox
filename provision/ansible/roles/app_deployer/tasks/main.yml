---
# App Deployer Role - Main Tasks
# Purpose: Deploy applications via Deploy API and generate .env files
# Requirements: FR-001, FR-005, FR-030 (GitHub deployment, secrets as env vars, extensibility)
#
# NOTE: This role now uses Deploy API for app deployments instead of deploywatch scripts.
# The deploywatch approach is deprecated - see provision/ansible/roles/_deprecated/deploywatch/
#
# Deployment modes:
#   - use_deploy_api: true (default) - Deploy via Deploy API (recommended)
#   - use_deploy_api: false - Use legacy deploywatch scripts (deprecated)

- name: Check if applications are defined
  debug:
    msg: "Applications defined: {{ applications is defined }}, Count: {{ (applications | default([])) | length }}"

- name: Skip app deployer if no applications defined
  meta: end_host
  when: applications is not defined or applications | length == 0

- name: Include validation tasks
  include_tasks: validate.yml

- name: Load secrets for environment file generation
  include_vars:
    file: "{{ playbook_dir }}/roles/secrets/vars/vault.yml"
  no_log: true
  tags:
    - app_deployer
    - secrets

# =============================================================================
# GET BOOTSTRAP TOKEN FOR DEPLOY API
# =============================================================================
# During initial bootstrap, get an admin JWT from AuthZ to authenticate with Deploy API.
# This is a Zero Trust flow: login → magic link → session JWT → token exchange

- name: Get bootstrap token for Deploy API
  include_tasks: get_bootstrap_token.yml
  when:
    - use_deploy_api | default(true)
    - deploy_api_admin_token is not defined or deploy_api_admin_token | length == 0
  tags:
    - app_deployer
    - deploy_via_api

# Legacy deploywatch directory (only needed for fallback mode)
- name: Create deploywatch apps directory (legacy)
  file:
    path: "{{ deploywatch_apps_dir }}"
    state: directory
    mode: "0755"
    owner: root
    group: root
  when: use_deploy_api is defined and not use_deploy_api
  tags:
    - always

# Legacy deploywatch script generation (deprecated)
- name: Generate deploywatch scripts for each application (legacy - deprecated)
  template:
    src: deploywatch-app.sh.j2
    dest: "{{ deploywatch_apps_dir }}/{{ item.name }}.sh"
    mode: "0755"
    owner: root
    group: root
  loop: "{{ applications }}"
  loop_control:
    label: "{{ item.name }}"
  vars:
    app: "{{ item }}"
  when: 
    - use_deploy_api is defined and not use_deploy_api
    - applications | length > 0
    - item.local_src is not defined
  tags:
    - always

# Legacy deploywatch orchestrator (deprecated)
- name: Deploy deploywatch orchestrator script (legacy - deprecated)
  template:
    src: deploywatch-orchestrator.sh.j2
    dest: /srv/deploywatch/deploywatch-orchestrator.sh
    mode: "0755"
    owner: root
    group: root
  when: use_deploy_api is defined and not use_deploy_api
  tags:
    - always

- name: Create application deploy directories
  file:
    path: "{{ item.deploy_path }}"
    state: directory
    mode: "0755"
    owner: root
    group: root
  loop: "{{ applications }}"
  loop_control:
    label: "{{ item.name }}: {{ item.deploy_path }}"
  when: applications | length > 0
  tags:
    - always  # Always run for any app deployment

- name: Deploy GitHub token for private repository access
  copy:
    content: "{{ secrets.github.personal_access_token }}"
    dest: "~/.github_token"
    mode: "0600"
    owner: root
    group: root
  no_log: true
  when: 
    - secrets.github.personal_access_token is defined
    - secrets.github.personal_access_token | length > 0
  tags:
    - always  # Always run for any app deployment

- name: Deploy log viewing scripts
  include_tasks: "{{ playbook_dir }}/roles/apps/tasks/log-scripts.yml"
  tags:
    - always  # Always run for any app deployment

- name: Setup SSH keys for container-to-container communication
  include_tasks: "{{ playbook_dir }}/roles/apps/tasks/ssh-keys.yml"
  tags:
    - always  # Always run for any app deployment

- name: Deploy application environment files (.env)
  template:
    src: "{{ playbook_dir }}/roles/secrets/templates/app.env.j2"
    dest: "{{ item.deploy_path }}/.env"
    mode: "0600"
    owner: root
    group: root
  loop: "{{ applications }}"
  loop_control:
    label: "{{ item.name }}"
  vars:
    app: "{{ item }}"
  no_log: true  # Don't log secrets
  when: 
    - applications | length > 0
    - deploy_app is not defined or deploy_app == item.name
  notify: Restart application
  tags:
    - always  # Always run for any app deployment

- name: Display configuration summary
  debug:
    msg: |
      ✅ App deployer configuration complete
      - Applications configured: {{ applications | length }}
      - Deployment mode: {{ 'Deploy API' if (use_deploy_api | default(true)) else 'Legacy deploywatch' }}
      - Environment files deployed: {{ applications | length }}
  when: applications | length > 0

# =============================================================================
# DEPLOY API MODE (Default - Recommended)
# =============================================================================
- name: Deploy applications via Deploy API
  include_tasks: deploy_via_api.yml
  loop: "{{ applications }}"
  loop_control:
    label: "{{ item.name }}"
  vars:
    app: "{{ item }}"
  when:
    - use_deploy_api | default(true)
    - applications is defined
    - applications | length > 0
    - deploy_apps is not defined or deploy_apps | bool
    - deploy_from_branch is not defined or not (deploy_from_branch | bool)
    - deploy_app is not defined or deploy_app == item.name
  tags:
    - always
    - deploy_via_api

# =============================================================================
# LEGACY DEPLOYWATCH MODE (Deprecated)
# =============================================================================
- name: Detect configuration changes (legacy)
  stat:
    path: "{{ deploywatch_apps_dir }}/{{ item.name }}.sh"
  register: deploywatch_scripts
  loop: "{{ applications }}"
  loop_control:
    label: "{{ item.name }}"
  when:
    - use_deploy_api is defined and not use_deploy_api
    - applications | length > 0

- name: Deploy application from branch (legacy - when requested)
  include_tasks: deploy-branch.yml
  when: 
    - use_deploy_api is defined and not use_deploy_api
    - deploy_from_branch is defined
    - deploy_from_branch | bool
    - deploy_app is defined
  tags:
    - always

- name: Deploy applications (legacy - deploywatch)
  include_tasks: deploy.yml
  when: 
    - use_deploy_api is defined and not use_deploy_api
    - applications is defined
    - applications | length > 0
    - deploy_apps is not defined or deploy_apps | bool
    - deploy_from_branch is not defined or not (deploy_from_branch | bool)
  tags:
    - always
