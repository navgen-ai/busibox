---
# Initial application deployment tasks
# Purpose: Actually deploy applications on first run or when forced
# This runs the generated deploywatch scripts or synchronizes local sources

- name: Deploy applications from local sources
  block:
    - name: Ensure deploy path exists (local src)
      file:
        path: "{{ item.deploy_path }}"
        state: directory
        mode: "0755"
        owner: root
        group: root
      when:
        - inventory_hostname is match('.*' + item.container + '.*')

    - name: Sync local source to target
      synchronize:
        src: "{{ item.local_src }}/"
        dest: "{{ item.deploy_path }}/"
        delete: yes
        rsync_opts:
          - "--exclude=.git"
          - "--exclude=.venv"
          - "--exclude=__pycache__"
          - "--exclude=*.pyc"
      when:
        - inventory_hostname is match('.*' + item.container + '.*')

    - name: Create virtualenv for application
      command: python3 -m venv {{ item.deploy_path }}/venv
      args:
        creates: "{{ item.deploy_path }}/venv/bin/activate"
      when:
        - inventory_hostname is match('.*' + item.container + '.*')

    - name: Upgrade pip inside venv
      command: "{{ item.deploy_path }}/venv/bin/pip install --upgrade pip"
      when:
        - inventory_hostname is match('.*' + item.container + '.*')

    - name: Install application (pyproject)
      command: "{{ item.deploy_path }}/venv/bin/pip install ."
      args:
        chdir: "{{ item.deploy_path }}"
      when:
        - inventory_hostname is match('.*' + item.container + '.*')

    - name: Write version marker
      copy:
        content: "{{ ansible_date_time.iso8601 }}"
        dest: "{{ item.deploy_path }}/.version"
        mode: "0644"
      when:
        - inventory_hostname is match('.*' + item.container + '.*')

    - name: Deploy systemd service for local app
      template:
        src: "{{ playbook_dir }}/roles/app_deployer/templates/app-systemd.service.j2"
        dest: "/etc/systemd/system/{{ item.name }}.service"
        mode: "0644"
      vars:
        app: "{{ item }}"
      when:
        - inventory_hostname is match('.*' + item.container + '.*')

    - name: Reload systemd and restart app
      block:
        - name: Reload systemd
          command: systemctl daemon-reload
        - name: Enable and restart service
          service:
            name: "{{ item.name }}"
            state: restarted
            enabled: yes
      when:
        - inventory_hostname is match('.*' + item.container + '.*')

    - name: Health check local app
      uri:
        url: "http://localhost:{{ item.port }}{{ item.health_endpoint }}"
        status_code: 200
        timeout: 30
      register: local_health
      until: local_health.status == 200
      retries: 10
      delay: 3
      when:
        - inventory_hostname is match('.*' + item.container + '.*')
        - item.health_endpoint is defined
  loop: "{{ applications }}"
  loop_control:
    label: "{{ item.name }}"
  when:
    - applications is defined
    - applications | length > 0
    - item.local_src is defined
    - deploy_app is not defined or deploy_app == item.name
  tags:
    - deploy

- name: Check if applications are already deployed
  stat:
    path: "{{ item.deploy_path }}/{{ item.marker_file | default('package.json') }}"
  register: app_deployed
  loop: "{{ applications }}"
  loop_control:
    label: "{{ item.name }}"
  when: 
    - applications is defined
    - applications | length > 0
    - inventory_hostname is match('.*' + item.container + '.*')
    - item.local_src is not defined

- name: Initial deployment of applications
  command: "bash {{ deploywatch_apps_dir }}/{{ item.item.name }}.sh"
  loop: "{{ app_deployed.results }}"
  loop_control:
    label: "{{ item.item.name }}"
  when:
    - item.stat is defined
    - not item.stat.exists
    - not item.skipped | default(false)
    - deploy_app is not defined or deploy_app == item.item.name
    - item.item.local_src is not defined
  register: initial_deployment
  failed_when: initial_deployment.rc is defined and initial_deployment.rc != 0
  async: 1800  # 30 minutes timeout for deployment
  poll: 10     # Check every 10 seconds
  tags:
    - deploy

- name: Display deployment results
  debug:
    msg: |
      Application: {{ item.item.item.name }}
      Status: {{ 'Success' if item.rc | default(1) == 0 else 'Failed' }}
      Return Code: {{ item.rc | default('N/A') }}
      {% if item.rc | default(1) != 0 %}
      Error: Check logs at {{ item.item.item.deploy_path }}/logs/
      Stdout: {{ item.stdout | default('N/A') }}
      Stderr: {{ item.stderr | default('N/A') }}
      {% endif %}
  loop: "{{ initial_deployment.results | default([]) }}"
  loop_control:
    label: "{{ item.item.item.name }}"
  when: 
    - item.item is defined
    - not item.skipped | default(false)
  tags:
    - deploy

- name: Debug force redeploy conditions
  debug:
    msg: |
      Force redeploy check for {{ item.name }}:
      - inventory_hostname: {{ inventory_hostname }}
      - item.container: {{ item.container }}
      - match result: {{ inventory_hostname is match('.*' + item.container + '.*') }}
      - force_redeploy defined: {{ force_redeploy is defined }}
      - force_redeploy value: {{ force_redeploy | default('not set') }}
      - deploy_app: {{ deploy_app | default('not set') }}
      - deploy_app matches: {{ deploy_app is not defined or deploy_app == item.name }}
  loop: "{{ applications }}"
  loop_control:
    label: "{{ item.name }}"
  when:
    - force_redeploy is defined
    - force_redeploy | bool
    - item.local_src is not defined
  tags:
    - deploy

- name: Force redeployment if requested
  command: "bash {{ deploywatch_apps_dir }}/{{ item.name }}.sh"
  loop: "{{ applications }}"
  loop_control:
    label: "{{ item.name }}"
  when:
    - applications is defined
    - applications | length > 0
    - inventory_hostname is match('.*' + item.container + '.*')
    - force_redeploy is defined
    - force_redeploy | bool
    - deploy_app is not defined or deploy_app == item.name
    - item.local_src is not defined
  register: forced_deployment
  failed_when: forced_deployment.rc is defined and forced_deployment.rc != 0
  async: 1800
  poll: 10
  tags:
    - deploy

- name: Display forced deployment results
  debug:
    msg: |
      Application: {{ item.item.name }}
      Status: {{ 'Success' if item.rc | default(1) == 0 else 'Failed' }}
      Return Code: {{ item.rc | default('N/A') }}
      {% if item.rc | default(1) != 0 %}
      Error: Check logs at {{ item.item.deploy_path }}/logs/
      Stdout: {{ item.stdout | default('N/A') }}
      Stderr: {{ item.stderr | default('N/A') }}
      {% endif %}
  loop: "{{ forced_deployment.results | default([]) }}"
  loop_control:
    label: "{{ item.item.name }}"
  when: 
    - item.item is defined
    - not item.skipped | default(false)
  tags:
    - deploy

- name: Wait for applications to be healthy
  uri:
    url: "http://localhost:{{ item.port }}{{ item.health_endpoint }}"
    status_code: 200
    timeout: 30
  register: health_check
  until: health_check.status == 200
  retries: 20
  delay: 5
  loop: "{{ applications }}"
  loop_control:
    label: "{{ item.name }}: {{ item.health_endpoint }}"
  when:
    - applications is defined
    - applications | length > 0
    - inventory_hostname is match('.*' + item.container + '.*')
    - (initial_deployment.changed | default(false)) or (forced_deployment is defined and forced_deployment.changed | default(false))
    - deploy_app is not defined or deploy_app == item.name
    - item.local_src is not defined
  failed_when: false

- name: Display final deployment status
  debug:
    msg: |
      ✅ Application Deployment Complete
      
      {% for app in applications %}
      {% if inventory_hostname is match('.*' ~ app.container ~ '.*') %}
      - {{ app.name }}: {% if health_check.results | default([]) | selectattr('item.name', 'equalto', app.name) | map(attribute='status') | first | default(0) == 200 %}✅ Healthy{% else %}⚠️  Check logs{% endif %}
      {% endif %}
      {% endfor %}
      
      Deploywatch scripts: {{ deploywatch_apps_dir }}
      Check logs: /var/log/deploywatch/

