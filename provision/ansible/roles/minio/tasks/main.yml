- name: Install docker
  apt:
    name: [ca-certificates, curl, gnupg]
    state: present
    update_cache: yes
  tags: [minio, minio_install]

- name: Install Docker repository and packages
  shell: |
    install -m 0755 -d /etc/apt/keyrings
    curl -fsSL https://download.docker.com/linux/debian/gpg | gpg --dearmor -o /etc/apt/keyrings/docker.gpg
    chmod a+r /etc/apt/keyrings/docker.gpg
    echo "deb [arch=$(dpkg --print-architecture) signed-by=/etc/apt/keyrings/docker.gpg] https://download.docker.com/linux/debian $(. /etc/os-release && echo $VERSION_CODENAME) stable" > /etc/apt/sources.list.d/docker.list
    apt update && apt install -y docker-ce docker-ce-cli containerd.io docker-compose-plugin
  args: { executable: /bin/bash }
  tags: [minio, minio_install]

- name: Create MinIO directories
  file:
    path: "{{ item }}"
    state: directory
    mode: "0755"
  loop:
    - /srv/minio
    - /srv/minio/data
  tags: [minio, minio_configure]

- name: Deploy MinIO compose
  copy:
    dest: /srv/minio/docker-compose.yml
    content: |
      services:
        minio:
          image: minio/minio:RELEASE.2024-10-02T17-50-41Z
          restart: unless-stopped
          environment:
            MINIO_ROOT_USER: ${MINIO_ROOT_USER}
            MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
          command: server /data --console-address ":9001"
          ports:
            - "9000:9000"
            - "9001:9001"
          volumes:
            - /srv/minio/data:/data
          # Use host network to avoid sysctl issues in LXC
          # The container still runs isolated, just shares the host's network stack
          network_mode: host
  notify: Up MinIO
  tags: [minio, minio_configure]

- name: MinIO env
  copy:
    dest: /srv/minio/.env
    content: |
      MINIO_ROOT_USER={{ minio_root_user | default('minioadmin') }}
      MINIO_ROOT_PASSWORD={{ minio_root_password | default('minioadminchange') }}
    mode: "0600"
  tags: [minio, minio_configure]

- name: Start MinIO
  shell: docker compose up -d
  args: { chdir: /srv/minio }
  tags: [minio, minio_start]

- name: Wait for MinIO to be ready
  wait_for:
    host: localhost
    port: 9000
    delay: 5
    timeout: 60
  tags: [minio, minio_start]

- name: Install MinIO client (mc)
  shell: |
    curl https://dl.min.io/client/mc/release/linux-amd64/mc -o /usr/local/bin/mc
    chmod +x /usr/local/bin/mc
  args:
    creates: /usr/local/bin/mc
  tags: [minio, minio_configure]

- name: Configure MinIO client alias
  shell: |
    mc alias set local http://localhost:9000 {{ minio_root_user | default('minioadmin') }} {{ minio_root_password | default('minioadminchange') }}
  environment:
    MC_HOST_local: "http://{{ minio_root_user | default('minioadmin') }}:{{ minio_root_password | default('minioadminchange') }}@localhost:9000"
  tags: [minio, minio_configure]

- name: Create documents bucket
  shell: |
    mc mb local/documents --ignore-existing
    mc anonymous set download local/documents  # Allow presigned URL downloads
  environment:
    MC_HOST_local: "http://{{ minio_root_user | default('minioadmin') }}:{{ minio_root_password | default('minioadminchange') }}@localhost:9000"
  tags: [minio, minio_configure]

- name: Check if agent API is accessible
  uri:
    url: "http://{{ agent_api_host | default('localhost') }}:{{ agent_api_port | default(4111) }}/auth/health"
    method: GET
    status_code: 200
    timeout: 5
  register: agent_health_check
  failed_when: false
  changed_when: false
  when: agent_api_host is defined
  tags: [minio, minio_webhook]

- name: Display agent API status
  debug:
    msg: |
      Agent API Status: {{ 'Available' if (agent_health_check.status is defined and agent_health_check.status == 200) else 'Not Available' }}
      {% if agent_health_check.status is not defined or agent_health_check.status != 200 %}
      Note: MinIO webhook will not be configured. To configure it later, re-run:
        ansible-playbook -i inventory/{{ busibox_env }}/hosts.yml site.yml --limit files --tags minio
      {% endif %}
  when: agent_api_host is defined
  tags: [minio, minio_webhook]

- name: Configure bucket event notification (webhook to agent API)
  shell: |
    set -e  # Exit on error
    
    echo "=== Configuring MinIO webhook endpoint ==="
    # First, configure the webhook endpoint in MinIO
    mc admin config set local notify_webhook:primary \
      endpoint="http://{{ agent_api_host }}:{{ agent_api_port }}/webhooks/minio" \
      queue_limit="100" \
      queue_dir="/tmp/minio-events"
    
    echo "=== Restarting MinIO to apply webhook config ==="
    # Restart MinIO to apply config using docker compose
    cd /srv/minio && docker compose restart minio
    
    echo "=== Waiting for MinIO to restart ==="
    # Wait for MinIO to come back
    sleep 10
    
    # Verify MinIO is accessible
    mc admin info local || { echo "ERROR: MinIO not responding after restart"; exit 1; }
    
    echo "=== Adding event notification for documents bucket ==="
    # Configure webhook for file upload events
    mc event add local/documents arn:minio:sqs::primary:webhook \
      --event put \
      --suffix .pdf --suffix .docx --suffix .txt
    
    echo "=== Webhook configuration complete ==="
  environment:
    MC_HOST_local: "http://{{ minio_root_user | default('minioadmin') }}:{{ minio_root_password | default('minioadminchange') }}@localhost:9000"
  when: 
    - agent_api_host is defined
    - agent_health_check.status is defined
    - agent_health_check.status == 200
  register: webhook_config
  failed_when: false
  tags: [minio, minio_webhook]

- name: Display webhook configuration result
  debug:
    msg: |
      {% if webhook_config.changed is defined and webhook_config.changed %}
      {% if webhook_config.rc == 0 %}
      ✅ MinIO webhook configured successfully
      {% else %}
      ⚠️  MinIO webhook configuration failed (exit code: {{ webhook_config.rc }})
      {% endif %}
      {% elif webhook_config.skipped is defined and webhook_config.skipped %}
      ⏭️  MinIO webhook skipped (agent API not available)
      {% else %}
      ℹ️  MinIO webhook not configured
      {% endif %}
  when: agent_api_host is defined
  tags: [minio, minio_webhook]

- name: Display webhook stdout (if any)
  debug:
    var: webhook_config.stdout_lines
  when: 
    - agent_api_host is defined
    - webhook_config.stdout_lines is defined
    - webhook_config.stdout_lines | length > 0
  tags: [minio, minio_webhook]

- name: Display webhook stderr (if any errors)
  debug:
    msg: |
      ⚠️  MinIO webhook error output:
      {{ webhook_config.stderr }}
  when: 
    - agent_api_host is defined
    - webhook_config.stderr is defined
    - webhook_config.stderr | length > 0
  tags: [minio, minio_webhook]

- name: Create MinIO health check script
  copy:
    dest: /usr/local/bin/minio-health-check
    content: |
      #!/bin/bash
      curl -f -s http://localhost:9000/minio/health/live > /dev/null
    mode: "0755"
  tags: [minio, minio_configure]
