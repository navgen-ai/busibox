---
# Milvus 2.5 to 2.6 Migration Playbook
# This playbook safely upgrades Milvus while preserving data
#
# Usage:
#   # Auto-detect data version:
#   ansible-playbook -i inventory/production/hosts.yml migrate-milvus.yml
#   
#   # Manually specify data version (if auto-detection fails):
#   ansible-playbook -i inventory/production/hosts.yml migrate-milvus.yml -e force_data_version=v2.5.4
#   
#   # Force migration even if versions appear the same:
#   ansible-playbook -i inventory/production/hosts.yml migrate-milvus.yml -e force_migration=true -e force_data_version=v2.5.4
#
# What it does:
#   1. Detects data version (or uses force_data_version)
#   2. Rolls back to data version (if needed to read existing data)
#   3. Starts Milvus at data version and waits for it to be healthy
#   4. Backs up current Milvus data using milvus-backup
#   5. Stops Milvus at data version
#   6. Upgrades to target version
#   7. Starts Milvus at target version and waits for it to be healthy
#   8. Restores data from backup
#
# Recovery:
#   If migration fails, backup is at /srv/milvus/backup-{timestamp}

- name: Migrate Milvus from 2.5 to 2.6
  hosts: milvus
  become: yes
  vars:
    backup_dir: "/srv/milvus/backup-{{ ansible_date_time.iso8601_basic_short }}"
    milvus_host: "localhost"
    milvus_port: "19530"
    force_migration: "{{ force_migration | default(false) }}"
    force_data_version: "{{ force_data_version | default('') }}"
    
  tasks:
    # Determine target version from milvus role
    - name: Extract target version from milvus role
      shell: |
        grep "milvusdb/milvus:" "{{ playbook_dir }}/roles/milvus/tasks/main.yml" | head -1 | sed -E 's/.*milvusdb\/milvus:([v0-9.]+).*/\1/'
      register: target_version_extract
      delegate_to: localhost
      run_once: true
      changed_when: false
      failed_when: target_version_extract.stdout == ""
      
    - name: Set target version
      set_fact:
        target_version: "{{ target_version_extract.stdout | trim }}"
        
    - name: Display target version
      debug:
        msg: "Target Milvus version from role: {{ target_version }}"
    
    - name: Check if Milvus data directory exists
      stat:
        path: /srv/milvus/data
      register: milvus_data_dir
      
    - name: Skip migration if no data exists
      block:
        - name: No data to migrate
          debug:
            msg: |
              No Milvus data directory found. Skipping migration.
              You can deploy Milvus directly using: make milvus
        - meta: end_play
      when: not milvus_data_dir.stat.exists or milvus_data_dir.stat.size == 0
    
    - name: Check current running Milvus version
      shell: |
        if docker ps | grep -q milvus-standalone; then
          docker exec milvus-standalone milvus version 2>/dev/null | grep -i "milvus version" | awk '{print $3}' || echo "unknown"
        else
          echo "not_running"
        fi
      register: running_version
      changed_when: false
      failed_when: false
      
    - name: Check for Milvus version metadata in data directory
      shell: |
        # Try to find version info in etcd data
        if [ -d /srv/milvus/data/etcd ]; then
          # Check if there's version info we can extract
          # Milvus 2.5 has different etcd structure than 2.6
          if [ -f /srv/milvus/data/etcd/member/snap/db ]; then
            strings /srv/milvus/data/etcd/member/snap/db 2>/dev/null | grep -o "2\.[0-9]\.[0-9]" | head -1 || echo "unknown"
          else
            echo "unknown"
          fi
        elif [ -d /srv/milvus/data ]; then
          # If data exists but we can't determine version, it's likely from previous deployment
          echo "unknown"
        else
          echo "none"
        fi
      register: data_version_check
      changed_when: false
      failed_when: false
      
    - name: Get last known version from docker-compose.yml as fallback
      shell: |
        if [ -f /srv/milvus/docker-compose.yml ]; then
          grep "image: milvusdb/milvus:" /srv/milvus/docker-compose.yml | head -1 | sed 's/.*milvusdb\/milvus://' | tr -d ' '
        else
          echo "none"
        fi
      register: compose_version
      changed_when: false
      
    - name: Determine data version (version that created the data)
      set_fact:
        data_version: >-
          {% if force_data_version != '' %}{{ force_data_version }}
          {% elif data_version_check.stdout not in ['unknown', 'none', ''] %}v{{ data_version_check.stdout }}
          {% elif compose_version.stdout not in ['none', ''] %}{{ compose_version.stdout }}
          {% else %}v2.5.4{% endif %}
        data_version_method: >-
          {% if force_data_version != '' %}manually_specified
          {% elif data_version_check.stdout not in ['unknown', 'none', ''] %}detected_from_data
          {% elif compose_version.stdout not in ['none', ''] %}from_docker_compose
          {% else %}assumed_default{% endif %}
        
    - name: Display detected versions
      debug:
        msg: |
          ╔══════════════════════════════════════════════════════════╗
          ║            VERSION DETECTION                             ║
          ╚══════════════════════════════════════════════════════════╝
          
          Running version:     {{ running_version.stdout | default('not_running') }}
          Data version:        {{ data_version }} ({{ data_version_method }})
          Target version:      {{ target_version }}
          Force migration:     {{ force_migration }}
          
          {% if data_version_method == 'from_docker_compose' %}
          ⚠️  WARNING: Could not detect data version from data directory.
          Using docker-compose.yml version as fallback ({{ data_version }}).
          
          If Milvus is failing to start, run with:
            -e force_data_version=v2.5.4 -e force_migration=true
          {% elif data_version_method == 'assumed_default' %}
          ⚠️  WARNING: Could not detect data version, assuming v2.5.4.
          
          If this is incorrect, run with:
            -e force_data_version=vX.Y.Z
          {% endif %}
        
    - name: Parse version numbers for comparison
      set_fact:
        data_version_major: "{{ data_version | regex_replace('^v?([0-9]+)\\..*', '\\1') }}"
        data_version_minor: "{{ data_version | regex_replace('^v?[0-9]+\\.([0-9]+).*', '\\1') }}"
        target_version_major: "{{ target_version | regex_replace('^v?([0-9]+)\\..*', '\\1') }}"
        target_version_minor: "{{ target_version | regex_replace('^v?[0-9]+\\.([0-9]+).*', '\\1') }}"
        
    - name: Check if upgrade is needed
      set_fact:
        needs_migration: "{{ 
          force_migration | bool or
          (data_version_major|int < target_version_major|int) or
          (data_version_major|int == target_version_major|int and data_version_minor|int < target_version_minor|int)
        }}"
        has_data_but_not_running: "{{
          milvus_data_dir.stat.exists and
          running_version.stdout in ['not_running', 'unknown', '']
        }}"
        
    - name: Skip migration if already on target version
      block:
        - name: Already on target version
          debug:
            msg: |
              Milvus data is already at {{ data_version }}, target is {{ target_version }}.
              No migration needed.
              
              If you believe the data is from an older version, run with:
                -e force_data_version=v2.5.4 -e force_migration=true
        - meta: end_play
      when: not needs_migration
      
    - name: Perform migration with rollback-backup-upgrade-restore
      when: needs_migration or has_data_but_not_running
      block:
        - name: Display migration plan
          debug:
            msg: |
              ╔══════════════════════════════════════════════════════════╗
              ║              MILVUS MIGRATION PLAN                       ║
              ╚══════════════════════════════════════════════════════════╝
              
              📊 Version Information:
                 Data version:    {{ data_version }}
                 Target version:  {{ target_version }}
                 Migration:       {{ data_version }} → {{ target_version }}
              
              📋 Steps:
              Step 1: Roll back to {{ data_version }} (to read existing data)
              Step 2: Start Milvus {{ data_version }} and verify healthy
              Step 3: Backup all collections using milvus-backup
              Step 4: Stop Milvus {{ data_version }}
              Step 5: Deploy Milvus {{ target_version }}
              Step 6: Start Milvus {{ target_version }} and verify healthy
              Step 7: Restore collections from backup
              
              🔒 Your data is safe - backup will be at: {{ backup_dir }}
              
        - name: Create backup directory
          file:
            path: "{{ backup_dir }}"
            state: directory
            mode: "0755"
            
        # STEP 1: Roll back to data version
        - name: Stop any running Milvus container
          shell: docker compose down
          args:
            chdir: /srv/milvus
          ignore_errors: yes
          
        - name: Deploy Milvus {{ data_version }} docker-compose.yml
          copy:
            dest: /srv/milvus/docker-compose.yml
            content: |
              services:
                milvus:
                  container_name: milvus-standalone
                  image: milvusdb/milvus:{{ data_version }}
                  restart: unless-stopped
                  stop_grace_period: 60s
                  ports:
                    - "19530:19530"
                    - "9091:9091"
                  environment:
                    ETCD_USE_EMBED: "true"
                    MINIO_USE_EMBED: "true"
                    ROCKSMQ_USE_EMBED: "true"
                    COMMON_STORAGETYPE: local
                  volumes:
                    - /srv/milvus/data:/var/lib/milvus
                  command: ["milvus", "run", "standalone"]
                  sysctls:
                    - net.ipv4.ip_unprivileged_port_start=0
                  healthcheck:
                    test: ["CMD", "curl", "-f", "http://localhost:9091/healthz"]
                    interval: 30s
                    timeout: 10s
                    retries: 3
                    start_period: 90s
                    
        # STEP 2: Start data version and verify
        - name: Start Milvus {{ data_version }}
          shell: docker compose up -d
          args:
            chdir: /srv/milvus
            
        - name: Wait for Milvus {{ data_version }} to be healthy
          uri:
            url: http://localhost:9091/healthz
            status_code: 200
          register: health_check_data_version
          retries: 30
          delay: 6
          until: health_check_data_version.status == 200
          
        - name: Verify Milvus {{ data_version }} is running
          shell: docker exec milvus-standalone milvus version
          register: data_version_running
          
        - name: Display Milvus {{ data_version }} status
          debug:
            msg: "Milvus {{ data_version }} is running: {{ data_version_running.stdout }}"
            
        # STEP 3: Backup
        - name: Install milvus-backup tool
          block:
            - name: Download milvus-backup
              get_url:
                url: https://github.com/zilliztech/milvus-backup/releases/latest/download/milvus-backup_Linux_x86_64.tar.gz
                dest: /tmp/milvus-backup.tar.gz
                mode: "0644"
                
            - name: Extract milvus-backup
              unarchive:
                src: /tmp/milvus-backup.tar.gz
                dest: /usr/local/bin/
                remote_src: yes
                
            - name: Make milvus-backup executable
              file:
                path: /usr/local/bin/milvus-backup
                mode: "0755"
                
        - name: Create milvus-backup configuration
          copy:
            dest: /tmp/backup.yaml
            content: |
              # Milvus Backup Configuration
              milvus:
                address: {{ milvus_host }}
                port: {{ milvus_port }}
                authorizationEnabled: false
                
              minio:
                # Use embedded MinIO (same as Milvus standalone)
                address: {{ milvus_host }}
                port: 9000
                accessKeyID: minioadmin
                secretAccessKey: minioadmin
                useSSL: false
                bucketName: milvus-bucket
                
              backup:
                maxSegmentGroupSize: 2G
                parallelism:
                  backupCollection: 4
                  copyData: 128
                  
        - name: Create backup of all collections
          shell: |
            /usr/local/bin/milvus-backup create \
              --config /tmp/backup.yaml \
              --backup-name migration-{{ ansible_date_time.iso8601_basic_short }} \
              --backup-dir {{ backup_dir }}
          register: backup_result
          failed_when: backup_result.rc != 0
          
        - name: Display backup result
          debug:
            var: backup_result.stdout_lines
            
        # STEP 4: Stop data version
        - name: Stop Milvus {{ data_version }}
          shell: docker compose down
          args:
            chdir: /srv/milvus
            
        - name: Archive old data directory
          shell: |
            mv /srv/milvus/data /srv/milvus/data.{{ data_version }}-{{ ansible_date_time.iso8601_basic_short }}
          args:
            removes: /srv/milvus/data
            
        - name: Create fresh data directory for Milvus {{ target_version }}
          file:
            path: /srv/milvus/data
            state: directory
            mode: "0755"
            
        # STEP 5: Deploy target version
        - name: Update docker-compose.yml to Milvus {{ target_version }}
          copy:
            dest: /srv/milvus/docker-compose.yml
            content: |
              services:
                milvus:
                  container_name: milvus-standalone
                  image: milvusdb/milvus:{{ target_version }}
                  restart: unless-stopped
                  stop_grace_period: 60s
                  ports:
                    - "19530:19530"
                    - "9091:9091"
                  environment:
                    ETCD_USE_EMBED: "true"
                    MINIO_USE_EMBED: "true"
                    ROCKSMQ_USE_EMBED: "true"
                    COMMON_STORAGETYPE: local
                  volumes:
                    - /srv/milvus/data:/var/lib/milvus
                  command: ["milvus", "run", "standalone"]
                  sysctls:
                    - net.ipv4.ip_unprivileged_port_start=0
                  healthcheck:
                    test: ["CMD", "curl", "-f", "http://localhost:9091/healthz"]
                    interval: 30s
                    timeout: 10s
                    retries: 3
                    start_period: 90s
                    
        # STEP 6: Start target version and verify
        - name: Start Milvus {{ target_version }}
          shell: docker compose up -d
          args:
            chdir: /srv/milvus
            
        - name: Wait for Milvus {{ target_version }} to be healthy
          uri:
            url: http://localhost:9091/healthz
            status_code: 200
          register: health_check_target
          retries: 30
          delay: 6
          until: health_check_target.status == 200
          
        - name: Verify Milvus {{ target_version }} is running
          shell: docker exec milvus-standalone milvus version
          register: target_version_running
          
        - name: Display Milvus {{ target_version }} status
          debug:
            msg: "Milvus {{ target_version }} is running: {{ target_version_running.stdout }}"
            
        # STEP 7: Restore data
        - name: Restore data from backup
          shell: |
            /usr/local/bin/milvus-backup restore \
              --config /tmp/backup.yaml \
              --backup-name migration-{{ ansible_date_time.iso8601_basic_short }} \
              --backup-dir {{ backup_dir }}
          register: restore_result
          failed_when: restore_result.rc != 0
          
        - name: Display restore result
          debug:
            var: restore_result.stdout_lines
            
        - name: Final verification
          shell: docker exec milvus-standalone milvus version
          register: final_version
          
        - name: Migration complete
          debug:
            msg: |
              ╔══════════════════════════════════════════════════════════╗
              ║         MILVUS MIGRATION COMPLETE!                       ║
              ╚══════════════════════════════════════════════════════════╝
              
              ✅ Successfully upgraded from {{ data_version }} to {{ final_version.stdout }}
              
              📦 Backup location: {{ backup_dir }}
              📁 Old data archived: /srv/milvus/data.{{ data_version }}-{{ ansible_date_time.iso8601_basic_short }}
              
              🔄 To rollback if needed:
                1. cd /srv/milvus && docker compose down
                2. rm -rf /srv/milvus/data
                3. mv /srv/milvus/data.{{ data_version }}-* /srv/milvus/data
                4. Edit docker-compose.yml to use milvusdb/milvus:{{ data_version }}
                5. docker compose up -d
              
              💡 Next steps:
                 - Run: make search-api (to deploy search API with updated pymilvus)
                 - Verify your collections are intact
                 - Test search functionality
                
      rescue:
        - name: Check Docker logs on failure
          shell: docker logs --tail 50 milvus-standalone
          register: failure_logs
          ignore_errors: yes
          
        - name: Migration failed
          debug:
            msg: |
              ╔══════════════════════════════════════════════════════════╗
              ║         MILVUS MIGRATION FAILED!                         ║
              ╚══════════════════════════════════════════════════════════╝
              
              ❌ Migration failed but your data is SAFE.
              
              📊 Migration attempted: {{ data_version }} → {{ target_version }}
              📦 Backup: {{ backup_dir }}
              📁 Old data: /srv/milvus/data.{{ data_version }}-{{ ansible_date_time.iso8601_basic_short }}
              
              🔍 Troubleshooting:
                1. Check logs: docker logs milvus-standalone
                2. Check if Milvus is running: docker ps -a | grep milvus
                3. Verify data directory: ls -la /srv/milvus/data
                
              🔄 To rollback:
                1. cd /srv/milvus && docker compose down
                2. rm -rf /srv/milvus/data
                3. mv /srv/milvus/data.{{ data_version }}-* /srv/milvus/data
                4. Edit docker-compose.yml to use milvusdb/milvus:{{ data_version }}
                5. docker compose up -d
                
              📋 Last 50 log lines:
              {{ failure_logs.stdout_lines | default(['No logs available']) | join('\n') }}
                
        - name: Fail playbook
          fail:
            msg: "Milvus migration failed. See above for recovery instructions."

