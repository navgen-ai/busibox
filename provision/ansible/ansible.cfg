[defaults]
host_key_checking = False
inventory = inventory/production
timeout = 30
forks = 10
gathering = smart
fact_caching = jsonfile
fact_caching_connection = /tmp/ansible_facts
fact_caching_timeout = 3600
# Load vault variables at inventory parse time (before hosts.yml is evaluated)
vars_plugins_enabled = host_group_vars,ansible.builtin.host_group_vars

# Reduce output noise
display_skipped_hosts = no
display_ok_hosts = yes
# Show task diffs only when changes occur
diff_always = no
# Shorter retry output
retry_files_enabled = no

[ssh_connection]
ssh_args = -o ControlMaster=auto -o ControlPersist=60s -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null
pipelining = True

