---
# Application Definitions - Centralized Configuration
# Updated: 2026-02-22
# Purpose: Single source of truth for all application configurations
#
# All core frontend apps live in the busibox-frontend monorepo (jazzmind/busibox-frontend).
# The Deploy API clones the monorepo once and builds individual apps using pnpm.
#
# Environment-specific values (IPs, domains, NODE_ENV) are referenced via variables
# that are defined in inventory/{env}/group_vars/all/00-main.yml
#
# Port Allocation:
#   3000 - portal   (main entry point, auth, SSO)
#   3001 - agents   (AI agent chat interface)
#   3002 - admin    (system admin, settings, deployment management)
#   3003 - chat     (direct LLM chat, model comparison)
#   3004 - appbuilder (app development IDE)
#   3005 - media    (video/media management)
#   3006 - documents (document viewer, RAG interface)
#
# Deployment Strategy:
#   auto_deploy: true  = Deployed during initial provisioning (portal + admin)
#   auto_deploy: false = Deployed post-install via setup wizard or make update

# Shared monorepo config (referenced by each app below)
_monorepo_defaults: &monorepo_defaults
  github_repo: jazzmind/busibox-frontend
  container: core-apps-lxc
  container_ip: "{{ core_apps_ip }}"
  build_command: "pnpm run build"
  process_manager: systemd

# Common environment variables shared by all apps
_common_env: &common_env
  NODE_ENV: "{{ node_env }}"
  DEPLOYMENT_MODE: "busibox"
  AUTHZ_BASE_URL: "http://{{ authz_ip }}:8010"
  AGENT_API_URL: "http://{{ agent_ip }}:{{ agent_api_port }}"
  AGENT_API_HOST: "{{ agent_ip }}"
  AGENT_API_PORT: "{{ agent_api_port }}"
  NEXT_PUBLIC_AGENT_API_URL: "http://{{ agent_ip }}:{{ agent_api_port }}"
  NEXT_PUBLIC_BUSIBOX_PORTAL_URL: "https://{{ full_domain }}/portal"
  WEBAUTHN_RP_ID: "{{ full_domain }}"
  LITELLM_BASE_URL: "http://{{ litellm_ip }}:{{ litellm_port }}/v1"
  SSO_TOKEN_EXPIRY: "900"
  DATA_API_HOST: "{{ data_ip }}"
  DATA_API_PORT: "8002"
  CONFIG_API_URL: "http://{{ authz_ip }}:{{ config_api_port | default(8012) }}"

# Common secrets shared by most apps
_common_secrets: &common_secrets
  - sso_jwt_secret

applications:
  # ============================================================================
  # Install-time apps (auto_deploy: true)
  # These are deployed during initial provisioning.
  # ============================================================================

  - name: busibox-portal
    <<: *monorepo_defaults
    monorepo_app_dir: apps/portal
    port: 3000
    deploy_path: /srv/apps/busibox-portal
    health_endpoint: /portal/api/health
    auto_deploy: true
    routes:
      - type: path
        domain: "{{ full_domain }}"
        path: /portal
        strip_path: false
        sse: true
    secrets:
      - database_url
      - sso_jwt_secret
      - litellm_api_key
      - openai_api_key
      - allowed_email_domains
      - email_from
      - smtp_host
      - smtp_port
      - smtp_user
      - smtp_password
      - smtp_secure
      - github_client_id
      - github_client_secret
      - github_redirect_uri
      - current_container_ip
      - apps_container_ip
      - agent_container_ip
      - postgres_container_ip
    optional_secrets:
      - resend_api_key
      - microsoft_client_id
      - microsoft_client_secret
      - microsoft_tenant_id
      - container_ssh_private_key
    env:
      <<: *common_env
      APP_URL: "https://{{ full_domain }}/portal"
      NEXT_PUBLIC_APP_URL: "https://{{ full_domain }}/portal"
      BASE_URL: "https://{{ full_domain }}/portal"
      PORT: "3000"
      NEXT_PUBLIC_BASE_PATH: "/portal"
      MILVUS_HOST: "{{ milvus_ip }}"
      AGENT_HOST: "{{ agent_ip }}"
      NEXT_PUBLIC_DATA_API_URL: "http://{{ data_ip }}:8002"
      SEARCH_API_HOST: "{{ search_api_ip }}"
      SEARCH_API_PORT: "8003"
      DOCS_API_URL: "http://{{ agent_ip }}:8004"
      DEPLOYMENT_SERVICE_URL: "http://{{ authz_ip }}:8011/api/v1/deployment"
      DEPLOY_API_URL: "http://{{ authz_ip }}:8011"
      BRIDGE_API_URL: "http://{{ bridge_ip }}:8081"

  - name: busibox-admin
    <<: *monorepo_defaults
    monorepo_app_dir: apps/admin
    port: 3002
    deploy_path: /srv/apps/busibox-admin
    health_endpoint: /admin/api/health
    auto_deploy: true
    routes:
      - type: path
        domain: "{{ full_domain }}"
        path: /admin
        strip_path: false
        sse: true
    secrets:
      - database_url
      - sso_jwt_secret
      - litellm_api_key
      - openai_api_key
      - allowed_email_domains
      - email_from
      - smtp_host
      - smtp_port
      - smtp_user
      - smtp_password
      - smtp_secure
      - github_client_id
      - github_client_secret
      - github_redirect_uri
      - current_container_ip
      - apps_container_ip
      - agent_container_ip
      - postgres_container_ip
    optional_secrets:
      - resend_api_key
      - microsoft_client_id
      - microsoft_client_secret
      - microsoft_tenant_id
      - container_ssh_private_key
    env:
      <<: *common_env
      APP_URL: "https://{{ full_domain }}/admin"
      NEXT_PUBLIC_APP_URL: "https://{{ full_domain }}/admin"
      PORT: "3002"
      NEXT_PUBLIC_BASE_PATH: "/admin"
      MILVUS_HOST: "{{ milvus_ip }}"
      AGENT_HOST: "{{ agent_ip }}"
      NEXT_PUBLIC_DATA_API_URL: "http://{{ data_ip }}:8002"
      SEARCH_API_HOST: "{{ search_api_ip }}"
      SEARCH_API_PORT: "8003"
      DOCS_API_URL: "http://{{ agent_ip }}:8004"
      DEPLOYMENT_SERVICE_URL: "http://{{ authz_ip }}:8011/api/v1/deployment"
      DEPLOY_API_URL: "http://{{ authz_ip }}:8011"
      BRIDGE_API_URL: "http://{{ bridge_ip }}:8081"

  # ============================================================================
  # Post-install apps (auto_deploy: false)
  # Deployed after initial setup via the setup wizard or make update.
  # ============================================================================

  - name: busibox-agents
    <<: *monorepo_defaults
    monorepo_app_dir: apps/agents
    port: 3001
    deploy_path: /srv/apps/busibox-agents
    health_endpoint: /agents/api/health
    auto_deploy: false
    routes:
      - type: subdomain
        subdomain: "agents{{ env_subdomain_suffix | default('') }}"
        websocket: true
        sse: true
      - type: path
        domain: "{{ full_domain }}"
        path: /agents
        strip_path: false
        sse: true
    secrets:
      - database_url
      - agent_api_key
      - jwt_secret
      - session_secret
      - sso_jwt_secret
      - litellm_api_key
    optional_secrets:
      - resend_api_key
      - email_from
    env:
      <<: *common_env
      MASTRA_API_URL: "http://{{ agent_api_host }}:{{ agent_api_port }}"
      TOKEN_SERVICE_URL: "http://{{ agent_api_host }}:{{ agent_api_port }}"
      BUSIBOX_PORTAL_URL: "https://{{ full_domain }}"
      NEXT_PUBLIC_APP_URL: "https://{{ full_domain }}/agents"
      NEXT_PUBLIC_BASE_PATH: "/agents"
      PORT: "3001"
      DEFAULT_API_AUDIENCE: "agent-api"
      AGENT_API_AUD: "https://busibox.local/agent"
      SEARCH_API_AUD: "https://busibox.local/search"
      DOCUMENTS_API_AUD: "https://busibox.local/documents"
      VERBOSE_AUTHZ_LOGGING: "true"

  - name: busibox-chat
    <<: *monorepo_defaults
    monorepo_app_dir: apps/chat
    port: 3003
    deploy_path: /srv/apps/busibox-chat
    health_endpoint: /chat/api/health
    auto_deploy: false
    routes:
      - type: path
        domain: "{{ full_domain }}"
        path: /chat
        strip_path: false
        sse: true
    secrets:
      - sso_jwt_secret
      - litellm_api_key
    optional_secrets: []
    env:
      <<: *common_env
      NEXT_PUBLIC_APP_URL: "https://{{ full_domain }}/chat"
      NEXT_PUBLIC_BASE_PATH: "/chat"
      PORT: "3003"

  - name: busibox-appbuilder
    <<: *monorepo_defaults
    monorepo_app_dir: apps/appbuilder
    port: 3004
    deploy_path: /srv/apps/busibox-appbuilder
    health_endpoint: /builder/api/health
    auto_deploy: false
    routes:
      - type: path
        domain: "{{ full_domain }}"
        path: /builder
        strip_path: false
        sse: true
    secrets:
      - sso_jwt_secret
      - current_container_ip
      - apps_container_ip
      - agent_container_ip
      - data_container_ip
      - authz_container_ip
    optional_secrets:
      - github_auth_token
    env:
      <<: *common_env
      APP_NAME: "busibox-appbuilder"
      PORT: "3004"
      NEXT_PUBLIC_BASE_PATH: "/builder"
      NEXT_PUBLIC_APP_URL: "https://{{ full_domain }}/builder"
      DATA_API_URL: "http://{{ data_ip }}:8002"
      DEPLOY_API_URL: "http://{{ authz_ip }}:8011"
      CONTAINER_PREFIX: "{{ container_prefix | default(busibox_env | default('prod')) }}"
      BUILDER_PROJECT_ROOT: "/srv/projects"
      BUILDER_TEMPLATE_SOURCE: "/srv/projects/templates/busibox-template"
      BUILDER_LIBRARY_OWNER: "jazzmind"
      BUILDER_LIBRARY_REPO: "busibox-app-library"

  - name: busibox-media
    <<: *monorepo_defaults
    monorepo_app_dir: apps/media
    port: 3005
    deploy_path: /srv/apps/busibox-media
    health_endpoint: /media/api/health
    auto_deploy: false
    routes:
      - type: path
        domain: "{{ full_domain }}"
        path: /media
        strip_path: false
        sse: true
    secrets:
      - sso_jwt_secret
      - litellm_api_key
    optional_secrets: []
    env:
      <<: *common_env
      NEXT_PUBLIC_APP_URL: "https://{{ full_domain }}/media"
      NEXT_PUBLIC_BASE_PATH: "/media"
      PORT: "3005"

  - name: busibox-documents
    <<: *monorepo_defaults
    monorepo_app_dir: apps/documents
    port: 3006
    deploy_path: /srv/apps/busibox-documents
    health_endpoint: /documents/api/health
    auto_deploy: false
    routes:
      - type: path
        domain: "{{ full_domain }}"
        path: /documents
        strip_path: false
        sse: true
    secrets:
      - sso_jwt_secret
    optional_secrets: []
    env:
      <<: *common_env
      NEXT_PUBLIC_APP_URL: "https://{{ full_domain }}/documents"
      NEXT_PUBLIC_BASE_PATH: "/documents"
      PORT: "3006"
      SEARCH_API_HOST: "{{ search_api_ip }}"
      SEARCH_API_PORT: "8003"
