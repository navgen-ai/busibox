---
# Application Definitions - Centralized Configuration
# Created: 2025-11-22
# Purpose: Single source of truth for all application configurations
#
# This file defines ALL applications deployed in Busibox environments.
# Environment-specific values (IPs, domains, NODE_ENV) are referenced via variables
# that are defined in inventory/{env}/group_vars/all/00-main.yml
#
# Schema Reference: specs/002-deploy-app-servers/data-model.md
#
# Port Allocation Strategy:
# - 3000-3099: Public web applications
# - 4000-4099: Internal API services
# - 8000-8099: LLM/AI services

applications:
  # ============================================================================
  # Internal API Services
  # ============================================================================
  
  - name: agent-server
    local_src: srv/agent  # Deploy from local source (Python project)
    marker_file: pyproject.toml
    container: agent-lxc
    container_ip: "{{ agent_ip }}"
    port: 8000
    deploy_path: /srv/agent
    health_endpoint: /health
    start_command: ".venv/bin/uvicorn app.main:app --host 0.0.0.0 --port 8000"
    process_manager: systemd
    routes: []  # Internal only - no NGINX routing
    secrets:
      - database_url
      - redis_url
      - litellm_api_key
      - management_client_id      # OAuth client ID for token exchange
      - management_client_secret  # OAuth client secret for token exchange
    env:
      APP_NAME: "agent-server"
      ENVIRONMENT: "{{ environment }}"
      DEBUG: "false"
      LOG_LEVEL: "{{ log_level }}"
      # Model configuration
      DEFAULT_MODEL: "anthropic:claude-3-5-sonnet"
      # Busibox service endpoints
      SEARCH_API_URL: "http://{{ search_api_ip }}:8003"
      INGEST_API_URL: "http://{{ ingest_ip }}:8001"
      RAG_API_URL: "http://{{ milvus_ip }}:8004"
      # Auth configuration
      AUTH_TOKEN_URL: "http://{{ agent_ip }}:8080/oauth/token"
      AUTH_CLIENT_ID: "{{ management_client_id }}"
      AUTH_CLIENT_SECRET: "{{ management_client_secret }}"
      # Database
      DATABASE_URL: "{{ database_url }}"
      # Redis
      REDIS_URL: "{{ redis_url }}"
      # CORS
      CORS_ORIGINS: "*"
      # LiteLLM
      LITELLM_BASE_URL: "http://{{ litellm_ip }}:{{ litellm_port }}/v1"
 
  # ============================================================================
  # Public Web Applications
  # ============================================================================
  
  - name: ai-portal
    github_repo: jazzmind/ai-portal
    container: apps-lxc
    container_ip: "{{ apps_ip }}"
    port: 3000
    deploy_path: /srv/apps/ai-portal
    health_endpoint: /api/health
    build_command: "npm run build"
    process_manager: systemd  # Use systemd for consistent logging via journalctl
    routes:
      - type: path
        domain: "{{ full_domain }}"
        path: /portal
        strip_path: false  # Keep /portal path - ai-portal will use basePath
    secrets:
      - database_url
      - better_auth_secret
      - sso_jwt_secret
      - litellm_api_key
      - openai_api_key
      - admin_email
      - allowed_email_domains
      - email_from
      - smtp_host
      - smtp_port
      - smtp_user
      - smtp_password
      - smtp_secure
      - github_client_id
      - github_client_secret
      - github_redirect_uri
      - encryption_key
      - current_container_ip
      - apps_container_ip
      - agent_container_ip
      - postgres_container_ip
    optional_secrets:
      - resend_api_key
      - microsoft_client_id
      - microsoft_client_secret
      - microsoft_tenant_id
      - container_ssh_private_key
    env:
      NODE_ENV: "{{ node_env }}"
      LITELLM_BASE_URL: "http://{{ litellm_ip }}:{{ litellm_port }}/v1"
      BETTER_AUTH_URL: "https://{{ full_domain }}/portal"
      NEXT_PUBLIC_APP_URL: "https://{{ full_domain }}/portal"
      BASE_URL: "https://{{ full_domain }}/portal"
      SSO_TOKEN_EXPIRY: "900"
      PORT: "3000"
      # Log viewing - hosts for remote journalctl access
      INGEST_API_HOST: "{{ ingest_ip }}"
      MILVUS_HOST: "{{ milvus_ip }}"
      AGENT_HOST: "{{ agent_ip }}"
      # Other service URLs
      NEXT_PUBLIC_INGEST_API_URL: "http://{{ ingest_ip }}:8002"
      DEPLOYMENT_MODE: "busibox"
      NEXT_PUBLIC_BASE_PATH: "/portal"
      # Search API (deployed to milvus-lxc, colocated with Milvus for low-latency)
      SEARCH_API_HOST: "{{ search_api_ip }}"
      SEARCH_API_PORT: "8003"
  
  - name: agent-client
    github_repo: jazzmind/agent-client
    container: apps-lxc
    container_ip: "{{ apps_ip }}"
    port: 3001
    deploy_path: /srv/apps/agent-client
    health_endpoint: /api/health
    build_command: "npm run build"
    process_manager: systemd  # Use systemd for consistent logging via journalctl
    routes:
      - type: subdomain
        subdomain: "agents{{ env_subdomain_suffix | default('') }}"
        websocket: true
      - type: path
        domain: "{{ full_domain }}"
        path: /agents
        strip_path: false  # Don't strip - Next.js handles basePath via NEXT_PUBLIC_BASE_PATH
    secrets:
      - database_url
      - agent_api_key
      - jwt_secret
      - session_secret
      - sso_jwt_secret
      - oauth_client_secret
      - admin_client_id       # OAuth client credentials
      - admin_client_secret   # OAuth client credentials
    env:
      NODE_ENV: "{{ node_env }}"
      MASTRA_API_URL: "http://{{ agent_api_host }}:{{ agent_api_port }}"
      TOKEN_SERVICE_URL: "http://{{ agent_api_host }}:{{ agent_api_port }}"
      AGENT_API_URL: "http://{{ agent_api_host }}:{{ agent_api_port }}"
      AI_PORTAL_URL: "https://{{ full_domain }}"
      NEXT_PUBLIC_APP_URL: "https://{{ full_domain }}/agents"
      NEXT_PUBLIC_BASE_PATH: "/agents"
      PORT: "3001"
      DEPLOYMENT_MODE: "busibox"
      # OAuth service audiences for multi-service auth
      AGENT_API_AUD: "https://busibox.local/agent"
      SEARCH_API_AUD: "https://busibox.local/search"
      DOCUMENTS_API_AUD: "https://busibox.local/documents"
  
  - name: doc-intel
    github_repo: jazzmind/docintel
    container: apps-lxc
    container_ip: "{{ apps_ip }}"
    port: 3002
    deploy_path: /srv/apps/doc-intel
    health_endpoint: /api/health
    build_command: "npm run build"
    process_manager: systemd  # Use systemd for consistent logging via journalctl
    routes:
      - type: subdomain
        subdomain: "docs{{ env_subdomain_suffix | default('') }}"
      - type: path
        domain: "{{ full_domain }}"
        path: /docs
        strip_path: true  # Strip /docs prefix so Next.js receives requests at root
    secrets:
      - database_url
      - litellm_api_key
      - better_auth_secret
      - jwt_secret
      - sso_jwt_secret
      - oauth_client_secret
    env:
      NODE_ENV: "{{ node_env }}"
      MILVUS_HOST: "{{ milvus_ip }}"
      MILVUS_PORT: "{{ milvus_port }}"
      AI_PORTAL_URL: "https://{{ full_domain }}"
      PORT: "3002"
      LITELLM_BASE_URL: "http://{{ litellm_ip }}:{{ litellm_port }}/v1"
      DEPLOYMENT_MODE: "busibox"
  
  - name: foundation
    github_repo: jazzmind/foundation
    container: apps-lxc
    container_ip: "{{ apps_ip }}"
    port: 3003
    deploy_path: /srv/apps/foundation
    health_endpoint: /api/health
    build_command: "npm run build"
    process_manager: systemd  # Use systemd for consistent logging via journalctl
    routes:
      - type: subdomain
        subdomain: "foundation{{ env_subdomain_suffix | default('') }}"
      - type: path
        domain: "{{ full_domain }}"
        path: /foundation
        strip_path: false  # Keep path so Next.js basePath works
    secrets:
      - database_url
      - litellm_api_key
      - sso_jwt_secret  # For JWT authentication from ai-portal
    optional_secrets:
      # Email secrets are optional - only needed if not using JWT auth from ai-portal
      - allowed_email_domains
      - email_from
      - smtp_host
      - smtp_port
      - smtp_user
      - smtp_password
      - smtp_secure
      - resend_api_key
    env:
      NODE_ENV: "{{ node_env }}"
      LITELLM_BASE_URL: "http://{{ litellm_ip }}:{{ litellm_port }}/v1"
      NEXT_PUBLIC_APP_URL: "https://{{ full_domain }}/foundation"
      BASE_URL: "https://{{ full_domain }}/foundation"
      AI_PORTAL_URL: "https://{{ full_domain }}"
      PORT: "3003"
      DEPLOYMENT_MODE: "busibox"
      # Set basePath only for path-based routing (not for subdomain)
      # This is used in next.config.ts: basePath: process.env.NEXT_PUBLIC_BASE_PATH || ''
      NEXT_PUBLIC_BASE_PATH: "/foundation"
  
  - name: project-analysis
    github_repo: jazzmind/tabular-bells
    container: apps-lxc
    container_ip: "{{ apps_ip }}"
    port: 3004
    deploy_path: /srv/apps/project-analysis
    health_endpoint: /api/health
    build_command: "npm run build"
    process_manager: systemd  # Use systemd for consistent logging via journalctl
    routes:
      - type: subdomain
        subdomain: "projects{{ env_subdomain_suffix | default('') }}"
      - type: path
        domain: "{{ full_domain }}"
        path: /projects
        strip_path: false  # Keep path so Next.js basePath works
    secrets:
      - database_url
      - litellm_api_key
      - sso_jwt_secret  # For JWT authentication from ai-portal
    optional_secrets:
      # Email secrets are optional - only needed if not using JWT auth from ai-portal
      - allowed_email_domains
      - email_from
      - smtp_host
      - smtp_port
      - smtp_user
      - smtp_password
      - smtp_secure
      - resend_api_key
    env:
      NODE_ENV: "{{ node_env }}"
      LITELLM_BASE_URL: "http://{{ litellm_ip }}:{{ litellm_port }}/v1"
      NEXT_PUBLIC_APP_URL: "https://{{ full_domain }}/projects"
      BASE_URL: "https://{{ full_domain }}/projects"
      AI_PORTAL_URL: "https://{{ full_domain }}"
      PORT: "3004"
      DEPLOYMENT_MODE: "busibox"
      # Set basePath only for path-based routing (not for subdomain)
      # This is used in next.config.js: basePath: process.env.NEXT_PUBLIC_BASE_PATH || ''
      NEXT_PUBLIC_BASE_PATH: "/projects"

  - name: innovation
    github_repo: jazzmind/innovation
    container: apps-lxc
    container_ip: "{{ apps_ip }}"
    port: 3005
    deploy_path: /srv/apps/innovation
    health_endpoint: /api/health
    build_command: "npm run build"
    process_manager: systemd
    routes:
      - type: subdomain
        subdomain: "innovation{{ env_subdomain_suffix | default('') }}"
      - type: path
        domain: "{{ full_domain }}"
        path: /innovation
        strip_path: false  # Keep path so Next.js basePath works
    secrets:
      - database_url
      - litellm_api_key
      - sso_jwt_secret  # For JWT authentication from ai-portal
    optional_secrets:
      - allowed_email_domains
      - email_from
      - smtp_host
      - smtp_port
      - smtp_user
      - smtp_password
      - smtp_secure
      - resend_api_key
    env:
      NODE_ENV: "{{ node_env }}"
      LITELLM_BASE_URL: "http://{{ litellm_ip }}:{{ litellm_port }}/v1"
      NEXT_PUBLIC_APP_URL: "https://{{ full_domain }}/innovation"
      BASE_URL: "https://{{ full_domain }}/innovation"
      AI_PORTAL_URL: "https://{{ full_domain }}"
      NEXT_PUBLIC_AI_PORTAL_URL: "https://{{ full_domain }}"
      PORT: "3005"
      DEPLOYMENT_MODE: "busibox"
      NEXT_PUBLIC_DEPLOYMENT_MODE: "busibox"
      NEXT_PUBLIC_BASE_PATH: "/innovation"
