---
# Application Definitions - Centralized Configuration
# Created: 2025-11-22
# Purpose: Single source of truth for all application configurations
#
# This file defines ALL applications deployed in Busibox environments.
# Environment-specific values (IPs, domains, NODE_ENV) are referenced via variables
# that are defined in inventory/{env}/group_vars/all/00-main.yml
#
# Schema Reference: specs/002-deploy-app-servers/data-model.md
#
# Port Allocation Strategy:
# - 3000-3099: Public web applications
# - 4000-4099: Internal API services
# - 8000-8099: LLM/AI services
#
# Auto-Deployment:
# - auto_deploy: true  - Deploy automatically during initial provisioning (default for core apps)
# - auto_deploy: false - Deploy only via web UI or explicit targeting (default for add-on apps)

applications:
  # ============================================================================
  # Internal API Services
  # ============================================================================
  # Note: Agent API has its own dedicated role (agent_api) like search_api and ingest_api
 
  # ============================================================================
  # Public Web Applications
  # ============================================================================
  
  - name: ai-portal
    github_repo: jazzmind/ai-portal
    container: apps-lxc
    container_ip: "{{ apps_ip }}"
    port: 3000
    deploy_path: /srv/apps/ai-portal
    health_endpoint: /api/health
    build_command: "npm run build"
    process_manager: systemd  # Use systemd for consistent logging via journalctl
    auto_deploy: true  # Deploy by default
    routes:
      - type: path
        domain: "{{ full_domain }}"
        path: /portal
        strip_path: false  # Keep /portal path - ai-portal will use basePath
    secrets:
      - database_url
      - better_auth_secret
      - sso_jwt_secret
      - litellm_api_key
      - openai_api_key
      - admin_email
      - allowed_email_domains
      - email_from
      - smtp_host
      - smtp_port
      - smtp_user
      - smtp_password
      - smtp_secure
      - github_client_id
      - github_client_secret
      - github_redirect_uri
      - encryption_key
      - current_container_ip
      - apps_container_ip
      - agent_container_ip
      - postgres_container_ip
      - authz_admin_token
    optional_secrets:
      - resend_api_key
      - microsoft_client_id
      - microsoft_client_secret
      - microsoft_tenant_id
      - container_ssh_private_key
    env:
      NODE_ENV: "{{ node_env }}"
      LITELLM_BASE_URL: "http://{{ litellm_ip }}:{{ litellm_port }}/v1"
      BETTER_AUTH_URL: "https://{{ full_domain }}/portal"
      NEXT_PUBLIC_APP_URL: "https://{{ full_domain }}/portal"
      BASE_URL: "https://{{ full_domain }}/portal"
      SSO_TOKEN_EXPIRY: "900"
      PORT: "3000"
      # AuthZ Service (for downstream token exchange)
      AUTHZ_BASE_URL: "http://{{ authz_ip }}:8010"
      AUTHZ_CLIENT_ID: "ai-portal"
      # Log viewing - hosts for remote journalctl access
      INGEST_API_HOST: "{{ ingest_ip }}"
      MILVUS_HOST: "{{ milvus_ip }}"
      AGENT_HOST: "{{ agent_ip }}"
      # Other service URLs
      NEXT_PUBLIC_INGEST_API_URL: "http://{{ ingest_ip }}:8002"
      DEPLOYMENT_MODE: "busibox"
      NEXT_PUBLIC_BASE_PATH: "/portal"
      # Search API (deployed to milvus-lxc, colocated with Milvus for low-latency)
      SEARCH_API_HOST: "{{ search_api_ip }}"
      SEARCH_API_PORT: "8003"
  
  - name: agent-manager
    github_repo: jazzmind/agent-manager
    container: apps-lxc
    container_ip: "{{ apps_ip }}"
    port: 3001
    deploy_path: /srv/apps/agent-manager
    health_endpoint: /api/health
    build_command: "npm run build"
    process_manager: systemd  # Use systemd for consistent logging via journalctl
    auto_deploy: true  # Deploy by default
    routes:
      - type: subdomain
        subdomain: "agents{{ env_subdomain_suffix | default('') }}"
        websocket: true
      - type: path
        domain: "{{ full_domain }}"
        path: /agents
        strip_path: false  # Don't strip - Next.js handles basePath via NEXT_PUBLIC_BASE_PATH
    secrets:
      - database_url
      - agent_api_key
      - jwt_secret
      - session_secret
      - sso_jwt_secret
      - oauth_client_secret
      - admin_client_id       # OAuth client credentials (maps to AUTHZ_CLIENT_ID)
      - admin_client_secret   # OAuth client credentials (maps to AUTHZ_CLIENT_SECRET)
      - litellm_api_key       # LiteLLM API key
    optional_secrets:
      - resend_api_key        # Email service (optional)
      - email_from            # Email sender address (optional)
      - authz_admin_token     # AuthZ admin token (optional, for admin operations)
    env:
      NODE_ENV: "{{ node_env }}"
      # Agent API Configuration
      MASTRA_API_URL: "http://{{ agent_api_host }}:{{ agent_api_port }}"
      TOKEN_SERVICE_URL: "http://{{ agent_api_host }}:{{ agent_api_port }}"
      AGENT_API_URL: "http://{{ agent_api_host }}:{{ agent_api_port }}"
      NEXT_PUBLIC_AGENT_API_URL: "http://{{ agent_api_host }}:{{ agent_api_port }}"
      # AI Portal URL
      AI_PORTAL_URL: "https://{{ full_domain }}"
      NEXT_PUBLIC_AI_PORTAL_URL: "https://{{ full_domain }}"
      NEXT_PUBLIC_APP_URL: "https://{{ full_domain }}/agents"
      NEXT_PUBLIC_BASE_PATH: "/agents"
      # LiteLLM Configuration
      LITELLM_BASE_URL: "http://{{ litellm_ip }}:{{ litellm_port }}/v1"
      # AuthZ Service Configuration
      AUTHZ_BASE_URL: "http://{{ authz_ip }}:8010"
      AUTHZ_CLIENT_ID: "agent-manager"
      # SSO Configuration
      SSO_TOKEN_EXPIRY: "900"
      # Application Configuration
      PORT: "3001"
      DEPLOYMENT_MODE: "busibox"
      # OAuth service audiences for multi-service auth
      AGENT_API_AUD: "https://busibox.local/agent"
      SEARCH_API_AUD: "https://busibox.local/search"
      DOCUMENTS_API_AUD: "https://busibox.local/documents"
  
