---
# Model Purpose Registry
#
# Central configuration for model purposes across all services.
# Maps abstract purposes (embedding, cleanup, chat) to actual model names.
#
# Usage:
#   - Services reference purposes, not model names
#   - Change models here without touching code
#   - Environment-specific overrides in inventory/*/group_vars/

model_purposes:
  # Text embedding generation
  # Actual model: Qwen/Qwen3-Embedding-8B (8B parameters, 4096 dims, GPU 1)
  embedding:
    model: "qwen3-embedding"
    description: "Text embedding generation"
    max_tokens: 8192
    provider: "litellm"
    endpoint: "/embeddings"
    
  # Visual document embedding
  # Actual model: vidore/colpali-v1.3 (LoRA adapters on PaliGemma-3B, GPU 2)
  visual:
    model: "colpali-v1.3"
    description: "Visual document embedding"
    max_tokens: 4096
    provider: "colpali"
    endpoint: "/v1/embeddings"
    
  # Vision-language model for image understanding
  # Actual model: Qwen/Qwen3-VL-8B-Instruct (8B parameters, GPU 1)
  vision:
    model: "qwen3-vl-8b"
    description: "Vision-language model for image understanding"
    max_tokens: 4096
    temperature: 0.7
    provider: "litellm"
    endpoint: "/chat/completions"
    
  # Fast model for quick operations
  # Actual model: microsoft/Phi-4-multimodal-instruct (6B parameters, GPU 0)
  fast:
    model: "phi-4"
    description: "Fast model for quick operations"
    max_tokens: 4096
    temperature: 0.7
    provider: "litellm"
    endpoint: "/chat/completions"
    
  # General purpose agent model (default for most tasks)
  # Actual model: Qwen/Qwen3-30B-A3B-Instruct-2507 (30B parameters, GPU 1)
  default:
    model: "qwen3-30b-instruct"
    description: "General purpose agent model"
    max_tokens: 32768
    temperature: 0.7
    provider: "litellm"
    endpoint: "/chat/completions"
    
  # Text cleanup and formatting
  cleanup:
    model: "qwen3-30b-instruct"
    description: "Text cleanup and formatting"
    max_tokens: 32768
    temperature: 0.1
    provider: "litellm"
    endpoint: "/chat/completions"
    
  # General chat and Q&A
  chat:
    model: "qwen3-30b-instruct"
    description: "General chat and Q&A"
    max_tokens: 32768
    temperature: 0.7
    provider: "litellm"
    endpoint: "/chat/completions"
    
  # Document classification
  classify:
    model: "phi-4"
    description: "Document classification"
    max_tokens: 4096
    temperature: 0.1
    provider: "litellm"
    endpoint: "/chat/completions"
    
  # Research and analysis
  research:
    model: "qwen3-30b-instruct"
    description: "Research and analysis"
    max_tokens: 32768
    temperature: 0.7
    provider: "litellm"
    endpoint: "/chat/completions"
    
  # Data analysis
  analysis:
    model: "qwen3-30b-instruct"
    description: "Data analysis"
    max_tokens: 32768
    temperature: 0.5
    provider: "litellm"
    endpoint: "/chat/completions"
    
  # Document parsing and structure extraction
  parsing:
    model: "phi-4"
    description: "Document parsing and structure extraction"
    max_tokens: 8192
    temperature: 0.1
    provider: "litellm"
    endpoint: "/chat/completions"

# Model registry file path (deployed to containers)
model_registry_path: "/etc/ingest/model_registry.json"

# LLM cleanup configuration
llm_cleanup_enabled: false  # Disabled by default (memory intensive)

