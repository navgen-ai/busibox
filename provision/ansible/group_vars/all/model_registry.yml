---
# Model Purpose Registry
#
# Central configuration for model purposes across all services.
# Maps abstract purposes (embedding, cleanup, chat) to actual model names.
#
# Usage:
#   - Services reference purposes, not model names
#   - Change models here without touching code
#   - Environment-specific overrides via model_purposes_dev / model_purposes (staging/prod)
#
# Note: GPU/port assignments and technical details are in model_config.yml
# (machine-generated, not version-controlled)
available_models:
  # AWS Bedrock Models (Verified Working)
  # Models with 'us.' prefix are cross-region inference profiles
  # These provide better availability and are required for Claude 3.5
  
  "claude-sonnet-4-5":
    provider: "bedrock"
    model: "us.anthropic.claude-sonnet-4-5-20250929-v1:0"
    model_name: "us.anthropic.claude-sonnet-4-5-20250929-v1:0"
    description: "Claude 4.5 Sonnet - Most capable, frontier model (Sept 2025)"
    multimodal: true
    tool_calling: true

  "claude-haiku-4-5":
    provider: "bedrock"
    model: "us.anthropic.claude-haiku-4-5-20251001-v1:0"
    model_name: "us.anthropic.claude-haiku-4-5-20251001-v1:0"
    description: "Claude 4.5 Haiku - Fast, efficient, excellent for most tasks"
    multimodal: true
    tool_calling: true
  

  # =========================================================================
  # Qwen3.6 vLLM Models (Production/Staging - 3x RTX 3090)
  # =========================================================================
  # Qwen3.6-35B-A3B (released Apr 15 2026): MoE with 35B total / 3B active,
  # native multimodal (image/video/text), 262K ctx (extensible to 1M via YaRN),
  # qwen3_5_moe architecture (same family as 3.5), Apache-2.0.
  # FP8 is the official Qwen quant; AWQ for Qwen3.6 has not shipped yet so we
  # keep the Qwen3.5-AWQ entry below as a single-GPU fallback.

  "qwen3.6-35b-a3b-vllm-fp8":
    provider: "vllm"
    model: "qwen3.6-35b-a3b-fp8"
    model_name: "Qwen/Qwen3.6-35B-A3B-FP8"
    description: "Qwen3.6 MoE 35B/A3B, official FP8 (~37GB) — primary agent, chat, vision, tool calling. TP=2 across two RTX 3090s."
    # FP8 weights ~37GB don't fit in a single 24GB 3090 — must be tensor-parallel.
    # Set GPU_ASSIGN_qwen3_6_35b_a3b_vllm_fp8=1,2 to deploy on GPUs 1+2.
    tensor_parallel_size: 2
    gpu_memory_utilization: 0.9
    max_model_len: 65536          # Generous ctx for agentic coding; fits with KV-cache headroom on TP=2 / 48GB
    max_num_seqs: 16              # MoE (3B active) handles concurrency well
    max_num_batched_tokens: 8192  # Balanced latency for chat
    enable_chunked_prefill: true
    enable_prefix_caching: true   # Shared system prompts across users
    cpu_offload_gb: 0
    kv_cache_dtype: "fp8"         # Per Qwen3.6 vLLM recipe
    reasoning_parser: "qwen3"     # Required so <think> blocks are split out
    tool_calling: true
    tool_call_parser: "qwen3_coder"
    multimodal: true
    limit_mm_per_prompt:
      image: 4

  # Single-GPU fallback: Qwen3.5-AWQ fits one 24GB RTX 3090 while we wait for
  # an official Qwen3.6 AWQ release. Same architecture (qwen3_5_moe).
  "qwen3.5-35b-a3b-vllm-awq":
    provider: "vllm"
    model: "qwen3.5-35b-a3b-awq"
    model_name: "QuantTrio/Qwen3.5-35B-A3B-AWQ"
    description: "Qwen3.5 MoE 35B/A3B AWQ-4bit (~22GB) — fits a single 24GB GPU. Fallback until Qwen3.6 AWQ ships."
    gpu_memory_utilization: 0.9
    max_model_len: 32768
    max_num_seqs: 16
    max_num_batched_tokens: 8192
    enable_chunked_prefill: true
    enable_prefix_caching: true
    enable_expert_parallel: true  # Required for MoE with TP>1; harmless on TP=1
    cpu_offload_gb: 0
    reasoning_parser: "qwen3"
    tool_calling: true
    tool_call_parser: "qwen3_coder"
    multimodal: true
    limit_mm_per_prompt:
      image: 4

  "qwen3.5-0.8b-vllm":
    provider: "vllm"
    model: "qwen3.5-0.8b"
    model_name: "Qwen/Qwen3.5-0.8B"
    description: "Tiny dispatch/classification model (GPU 0, multimodal, 262K ctx)"
    gpu_memory_utilization: 0.15  # ~0.8B params, very small footprint
    max_model_len: 4096  # Routing/classification prompts are short
    max_num_seqs: 32  # High concurrency for dispatch traffic
    cpu_offload_gb: 0
    tool_calling: true
    tool_call_parser: "qwen3_coder"
    multimodal: true

  "qwen3.5-4b-vllm":
    provider: "vllm"
    model: "qwen3.5-4b"
    model_name: "Qwen/Qwen3.5-4B"
    description: "Compact agent model (4B, multimodal, 262K ctx, vision+tools)"
    gpu_memory_utilization: 0.4
    max_model_len: 16384
    max_num_seqs: 16
    cpu_offload_gb: 0
    tool_calling: true
    tool_call_parser: "qwen3_coder"
    multimodal: true
    memory_estimate_gb: 3.0

  "qwen3-reranker-vllm":
    provider: "vllm"
    model: "qwen3-reranker-0.6b"
    model_name: "Qwen/Qwen3-Reranker-0.6B"
    description: "Search result reranking (GPU 0, fast)"
    gpu_memory_utilization: 0.1  # Tiny model, share GPU 0 with qwen3.5-0.8b + on-demand media
    max_model_len: 4096
    max_num_seqs: 32
    cpu_offload_gb: 0
    hf_overrides: '{"architectures": ["Qwen3ForSequenceClassification"], "classifier_from_token": ["no", "yes"], "is_original_qwen3_reranker": true}'

  "bge-reranker-v2-m3-vllm":
    provider: "vllm"
    model: "bge-reranker-v2-m3"
    model_name: "BAAI/bge-reranker-v2-m3"
    description: "BAAI reranker (GPU, high accuracy)"
    # vLLM tuning parameters
    gpu_memory_utilization: 0.3  # Larger model needs more GPU
    max_model_len: 8192  # Longer sequences
    max_num_seqs: 16  # Fewer concurrent requests
    cpu_offload_gb: 0

  "bge-reranker-v2-m3-cpu":
    provider: "local"
    model: "bge-reranker-v2-m3"
    model_name: "BAAI/bge-reranker-v2-m3"
    description: "BAAI reranker (CPU, slower but always available)"
    device: "cpu"

  "bge-large":
    provider: "fastembed"
    model: "bge-large-en-v1.5"
    model_name: "BAAI/bge-large-en-v1.5"
    description: "Text embedding generation (1024-d, production)"
    dimension: 1024
    device: "cpu"
    
  "bge-base":
    provider: "fastembed"
    model: "bge-base-en-v1.5"
    model_name: "BAAI/bge-base-en-v1.5"
    description: "Text embedding generation (768-d, balanced)"
    dimension: 768
    device: "cpu"
    
  "bge-small":
    provider: "fastembed"
    model: "bge-small-en-v1.5"
    model_name: "BAAI/bge-small-en-v1.5"
    description: "Text embedding generation (384-d, fast/dev)"
    dimension: 384
    device: "cpu"
    
  "nomic-embed-cpu":
    provider: "fastembed"
    model: "nomic-embed-text-v1.5"
    model_name: "nomic-ai/nomic-embed-text-v1.5"
    description: "Matryoshka embedding (768-d native, truncatable to 256/512)"
    dimension: 768
    matryoshka: true
    matryoshka_dimensions: [64, 128, 256, 512, 768]
    device: "cpu"


  # =========================================================================
  # MLX Models (Apple Silicon - Development/Demo)
  # =========================================================================
  # These models run on Apple Silicon Macs via mlx-lm.
  # Tiered by unified memory:
  #   micro  (<16GB)   — 0.8B model only
  #   entry  (24-47GB) — 4B agent (35B-A3B is too tight here)
  #   standard (48-95GB) — 35B-A3B at 4-bit dynamic (UD)
  #   enhanced (96GB+) — 35B-A3B at 8-bit dynamic (UD), near-lossless
  #
  # Qwen3.x dense and MoE models are natively multimodal (text+image+video),
  # support tool calling, 262K context, and thinking mode. No separate VL.

  "qwen3.5-0.8b-mlx":
    provider: "mlx"
    model: "qwen3.5-0.8b"
    model_name: "mlx-community/Qwen3.5-0.8B-4bit"
    description: "Tiny multimodal model (0.8B, 262K ctx, vision+tools+thinking) — dispatch/classify"
    tool_calling: true
    tool_call_parser: "qwen3_coder"
    multimodal: true
    tier: "micro"
    memory_estimate_gb: 0.6

  "qwen3.5-4b-mlx":
    provider: "mlx"
    model: "qwen3.5-4b"
    model_name: "mlx-community/Qwen3.5-4B-4bit"
    description: "Compact dev agent — 262K ctx, vision+tools. Default for entry tier (24GB MacBooks)."
    tool_calling: true
    tool_call_parser: "qwen3_coder"
    multimodal: true
    tier: "standard"
    memory_estimate_gb: 3.0

  "qwen3.6-35b-a3b-mlx-4bit":
    provider: "mlx"
    model: "qwen3.6-35b-a3b"
    model_name: "unsloth/Qwen3.6-35B-A3B-UD-MLX-4bit"
    description: "Qwen3.6 MoE 35B/A3B at MLX dynamic 4-bit (~23GB) — best 4-bit quality, fits 48GB+ Macs."
    tool_calling: true
    tool_call_parser: "qwen3_coder"
    reasoning_parser: "qwen3"
    multimodal: true
    tier: "standard"
    memory_estimate_gb: 23.0

  "qwen3.6-35b-a3b-mlx-8bit":
    provider: "mlx"
    model: "qwen3.6-35b-a3b"
    model_name: "unsloth/Qwen3.6-35B-A3B-UD-MLX-8bit"
    description: "Qwen3.6 MoE 35B/A3B at MLX dynamic 8-bit (~38GB) — near-lossless. Default for Mac Studio / 96GB+."
    tool_calling: true
    tool_call_parser: "qwen3_coder"
    reasoning_parser: "qwen3"
    multimodal: true
    tier: "enhanced"
    memory_estimate_gb: 38.0

  "whisper-tiny-mlx":
    provider: "mlx"
    model: "whisper-tiny"
    model_name: "mlx-community/whisper-tiny-mlx"
    description: "Speech-to-text transcription (Whisper Tiny, 39M params — dev/lightweight)"
    mode: "audio_transcription"
    tier: "micro"
    memory_estimate_gb: 0.15  # ~150 MB RAM (tiny 39M param model)

  "whisper-large-v3-mlx":
    provider: "mlx"
    model: "whisper-large-v3"
    model_name: "mlx-community/whisper-large-v3-mlx"
    description: "Speech-to-text transcription (Whisper Large v3 — production)"
    mode: "audio_transcription"
    tier: "standard"
    memory_estimate_gb: 3.0   # ~3 GB RAM when loaded (fp16 weights + buffers)

  "kokoro-82m-mlx":
    provider: "mlx"
    model: "kokoro-82m"
    model_name: "mlx-community/Kokoro-82M-bf16"
    description: "Text-to-speech voice generation (Kokoro 82M)"
    mode: "audio_speech"
    tier: "micro"
    memory_estimate_gb: 0.2   # ~200 MB RAM (tiny 82M param model)

  "flux2-klein-4b-mlx":
    provider: "mlx"
    model: "flux2-klein-4b"
    model_name: "black-forest-labs/FLUX.2-klein-4B"
    description: "Lightweight image generation (FLUX.2 Klein 4B, Q4 for dev)"
    mode: "image_generation"
    tier: "standard"
    memory_estimate_gb: 3.5   # ~3.5 GB RAM (4B params Q4 quantized + VAE/encoder overhead)

  # GPU-accelerated media models for Proxmox (on-demand, GPU 0)
  "whisper-tiny-gpu":
    provider: "gpu"
    model: "whisper-tiny-gpu"
    model_name: "whisper-tiny"
    description: "GPU-accelerated Whisper STT (faster-whisper, float16, GPU 0)"
    mode: "audio_transcription"
    tier: "micro"
    port: 8004
    gpu: "0"
    on_demand: true
    memory_estimate_gb: 0.15   # ~150 MB VRAM (tiny float16)
    service_name: "whisper-tiny-gpu"

  "whisper-large-v3-gpu":
    provider: "gpu"
    model: "whisper-large-v3-gpu"
    model_name: "whisper-large-v3"
    description: "GPU-accelerated Whisper STT (faster-whisper, float16, GPU 0)"
    mode: "audio_transcription"
    tier: "standard"
    port: 8006
    gpu: "0"
    on_demand: true
    memory_estimate_gb: 3.1   # ~3.1 GB VRAM (large-v3 float16)
    service_name: "whisper-gpu"

  "kokoro-82m-gpu":
    provider: "gpu"
    model: "kokoro-82m-gpu"
    model_name: "hexgrad/Kokoro-82M"
    description: "GPU-accelerated Kokoro TTS (kokoro-fastapi, GPU 0)"
    mode: "audio_speech"
    tier: "micro"
    port: 8007
    gpu: "0"
    on_demand: true
    memory_estimate_gb: 0.5   # ~500 MB VRAM (82M params on GPU)
    service_name: "kokoro-gpu"

  "flux2-klein-4b-gpu":
    provider: "gpu"
    model: "flux2-klein-4b-gpu"
    model_name: "black-forest-labs/FLUX.2-klein-4B"
    description: "GPU-accelerated image generation (FLUX.2 Klein 4B, Q8, GPU 0)"
    mode: "image_generation"
    tier: "standard"
    port: 8008
    gpu: "0"
    on_demand: true
    memory_estimate_gb: 5.0   # ~5 GB VRAM (4B params Q8 + VAE/encoder)
    service_name: "flux-gpu"

  # Cloud video generation. Auto-registered in LiteLLM by the agent API
  # (srv/agent/app/api/llm.py) when an OpenAI API key is saved; LiteLLM
  # routes calls to the OpenAI Sora-2 endpoint as `openai/<model_name>`.
  "sora-2":
    provider: "openai"
    model: "sora-2"
    model_name: "sora-2"
    description: "OpenAI Sora-2 cloud video generation"
    mode: "video_generation"
    tier: "frontier"
    requires_api_key: true

# =============================================================================
# Default Model Purposes — base assignments shared by all environments
# =============================================================================
# Values are either model keys (from available_models above) or alias strings
# pointing to another purpose in this same map.
#
# Alias resolution: if the value matches another key in this map, the resolver
# follows the chain until it reaches a concrete model key. Cycles are detected.
#
# Environment-specific overrides (model_purposes, model_purposes_dev) only need
# to list entries that differ from these defaults.
default_purposes:
  # --- LLM roles (aliases reduce duplication) ---
  fast: "qwen3.5-0.8b-mlx"
  test: "fast"
  classify: "fast"

  default: "qwen3.5-4b-mlx"
  agent: "qwen3.5-4b-mlx"
  chat: "agent"
  research: "agent"
  tool_calling: "agent"
  vision: "agent"
  parsing: "agent"
  cleanup: "agent"

  # --- Frontier (cloud) ---
  frontier: "claude-sonnet-4-5"
  frontier-fast: "claude-haiku-4-5"

  # --- Fallback (cloud, used when local model is at capacity) ---
  fallback: "claude-haiku-4-5"

  # --- Media ---
  image: "flux2-klein-4b-mlx"
  video: "sora-2"
  transcribe: "whisper-tiny-mlx"
  voice: "kokoro-82m-mlx"

  # --- Embeddings & reranking ---
  embedding: "nomic-embed-cpu"
  reranking: "bge-reranker-v2-m3-cpu"

# =============================================================================
# Model Purposes - Staging/Production (vLLM + Bedrock)
# =============================================================================
# Only overrides that differ from default_purposes.
#
# Production GPU strategy (3x RTX 3090, 24GB each):
# - GPU 0:    qwen3.5-0.8b-vllm (classify/fast) + qwen3-reranker + on-demand
#             media (whisper / kokoro / flux)
# - GPU 1+2:  qwen3.6-35b-a3b-vllm-fp8 (TP=2) — agents, chat, vision, parsing,
#             cleanup, research. MoE 35B/A3B in FP8 needs ~37GB so it spans
#             both GPUs via tensor parallelism. Set
#             GPU_ASSIGN_qwen3_6_35b_a3b_vllm_fp8=1,2 (auto-derived if you let
#             generate-model-config.sh allocate from gpu_inventory.yml).
#
# Production overrides: default_purposes points to MLX keys, but production
# runs vLLM. Override LLM roles here so generate_model_config.py resolves to
# vLLM provider models that appear in model_config.yml.
model_purposes:
  fast: "qwen3.5-0.8b-vllm"
  test: "fast"
  classify: "fast"
  default: "qwen3.6-35b-a3b-vllm-fp8"
  agent: "qwen3.6-35b-a3b-vllm-fp8"
  chat: "qwen3.6-35b-a3b-vllm-fp8"
  research: "qwen3.6-35b-a3b-vllm-fp8"
  tool_calling: "agent"
  vision: "agent"
  parsing: "chat"
  cleanup: "chat"
  fallback: "claude-haiku-4-5"
  reranking: "bge-reranker-v2-m3-cpu"
  image: "flux2-klein-4b-gpu"
  transcribe: "whisper-large-v3-gpu"
  voice: "kokoro-82m-gpu"

# =============================================================================
# Model Purposes - Development (MLX on Apple Silicon)
# =============================================================================
# Only entries that differ from default_purposes.
# Qwen3.x dense and MoE models are all natively multimodal — no separate VL.
# Default dev assignments target a 24GB MacBook (entry tier). Larger Macs
# should select an Ansible inventory whose group_vars override `agent` etc.
# to the Qwen3.6 MoE entries (mlx-4bit on 48GB+, mlx-8bit on 96GB+).
model_purposes_dev:
  fast: "qwen3.5-0.8b-mlx"          # MLX micro model — dispatch / classify
  test: "qwen3.5-0.8b-mlx"          # Same as fast
  default: "qwen3.5-4b-mlx"         # Same as agent
  agent: "qwen3.5-4b-mlx"           # 24GB MacBook default (35B-A3B is too tight at 4-bit here)
  chat: "qwen3.5-4b-mlx"            # Same model as agent, thinking disabled at app level
  research: "qwen3.5-4b-mlx"        # Same model as agent, longer thinking budget at app level
  image: "flux2-klein-4b-mlx"       # MLX local FLUX
  transcribe: "whisper-tiny-mlx"    # Whisper Tiny ~150 MB for dev
  voice: "kokoro-82m-mlx"           # Kokoro MLX
  embedding: "nomic-embed-cpu"      # CPU-based embedding
  reranking: "bge-reranker-v2-m3-cpu"

# =============================================================================
# Memory Tiers - Hardware-based model selection for install/download
# =============================================================================
# Maps RAM/VRAM tiers to model keys from available_models above.
# The download script resolves these keys to HuggingFace repo IDs via model_name.
#
# Roles:
#   fast    - Quick dispatch/classification model (always loaded)
#   agent   - Primary reasoning/chat model
#   embed   - Text embedding model
#   transcribe - Speech-to-text transcription
#   voice  - Text-to-speech voice generation
#   image    - Image generation
#
tiers:
  # 16GB - MacBook Air, base MacBook Pro
  # ~6GB reserved for system + Docker, ~10GB for models
  minimal:
    min_ram_gb: 16
    max_ram_gb: 23
    description: "Lightweight models for basic use"
    mlx:
      fast: "qwen3.5-0.8b-mlx"
      agent: "qwen3.5-0.8b-mlx"
    vllm:
      fast: "qwen3.5-0.8b-vllm"
      agent: "qwen3.5-0.8b-vllm"
  # 24GB - MacBook Pro 14"
  # ~8GB reserved, ~16GB for models
  entry:
    min_ram_gb: 24
    max_ram_gb: 47
    description: "Entry-level performance for most workloads"
    mlx:
      fast: "qwen3.5-0.8b-mlx"
      agent: "qwen3.5-4b-mlx"
    vllm:
      fast: "qwen3.5-0.8b-vllm"
      agent: "qwen3.5-4b-vllm"
  # 48GB - MacBook Pro 16", Mac Mini Pro
  # ~10GB reserved, ~38GB for models
  standard:
    min_ram_gb: 48
    max_ram_gb: 95
    description: "Balanced performance for production workloads"
    mlx:
      test: "qwen3.5-0.8b-mlx"
      fast: "qwen3.5-4b-mlx"
      agent: "qwen3.6-35b-a3b-mlx-4bit"   # ~23GB, leaves room for KV cache + apps
      transcribe: "whisper-large-v3-mlx"
    # vLLM "standard" tier targets a single 24GB GPU (or LXC with ≤1 GPU).
    # The Qwen3.6 FP8 MoE doesn't fit one GPU, so we fall back to the AWQ
    # build of Qwen3.5-35B-A3B (same arch family) which fits in ~22GB.
    vllm:
      test: "qwen3.5-0.8b-vllm"
      fast: "qwen3.5-0.8b-vllm"
      agent: "qwen3.5-35b-a3b-vllm-awq"
      embed: "nomic-embed-cpu"
      transcribe: "whisper-large-v3-gpu"
      voice: "kokoro-82m-gpu"
      image: "flux2-klein-4b-gpu"

  # 96GB+ - Mac Studio, Mac Pro, multi-GPU servers
  # ~12GB reserved, ~84GB+ for models
  enhanced:
    min_ram_gb: 96
    max_ram_gb: 9999
    description: "High-performance with large reasoning models"
    mlx:
      test: "qwen3.5-0.8b-mlx"
      fast: "qwen3.5-4b-mlx"               # Keep fast small; reserve big model for agent role
      agent: "qwen3.6-35b-a3b-mlx-8bit"    # ~38GB UD-8bit, near-lossless on 96GB+ Macs
      research: "qwen3.6-35b-a3b-mlx-8bit" # Same weights, longer thinking budget at app level
      embed: "nomic-embed-cpu"
      transcribe: "whisper-large-v3-mlx"
      voice: "kokoro-82m-mlx"
      image: "flux2-klein-4b-mlx"
    # vLLM "enhanced" tier = multi-GPU host (e.g. Proxmox 3x RTX 3090).
    # Qwen3.6-35B-A3B-FP8 spans 2 GPUs via tensor parallelism (TP=2 from
    # the model entry). The small qwen3.5-0.8b-vllm fits on the third GPU
    # alongside the reranker and on-demand media servers.
    vllm:
      test: "qwen3.5-0.8b-vllm"
      fast: "qwen3.5-0.8b-vllm"
      chat: "qwen3.6-35b-a3b-vllm-fp8"
      agent: "qwen3.6-35b-a3b-vllm-fp8"
      research: "qwen3.6-35b-a3b-vllm-fp8"
      embed: "nomic-embed-cpu"
      transcribe: "whisper-large-v3-gpu"
      voice: "kokoro-82m-gpu"
      image: "flux2-klein-4b-gpu"
