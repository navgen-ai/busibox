---
# Model Purpose Registry
#
# Central configuration for model purposes across all services.
# Maps abstract purposes (embedding, cleanup, chat) to actual model names.
#
# Usage:
#   - Services reference purposes, not model names
#   - Change models here without touching code
#   - Environment-specific overrides in inventory/*/group_vars/
#
# Note: GPU/port assignments and technical details are in model_config.yml
# (machine-generated, not version-controlled)
available_models:
  "claude-sonnet-4-5":
    provider: "bedrock"
    model: "anthropic.claude-sonnet-4-5"
    model_name: "anthropic.claude-sonnet-4-5"
    description: "Frontier model"

  "qwen3-embedding":
    provider: "vllm"
    model: "qwen3-embedding"
    model_name: "Qwen/Qwen3-Embedding-8B" 
    description: "Text embedding generation"

  "phi-4":
    provider: "vllm"
    model: "phi-4"
    model_name: "microsoft/Phi-4-multimodal-instruct"
    description: "Fast model for quick operations"

  "qwen3-30b-instruct":
    provider: "vllm"
    model: "qwen3-30b-instruct"
    model_name: "Qwen/Qwen3-30B-A3B-Instruct-2507"
    description: "General purpose agent model"

model_purposes:
  default: "qwen3-30b-instruct"   # General purpose agent model (default for most tasks)
  frontier: "claude-sonnet-4-5"   # Frontier model
  vision: "qwen3-30b-instruct"   # Vision-language model for image understanding
  research: "qwen3-30b-instruct"   # Research and analysis
  analysis: "qwen3-30b-instruct"   # Data analysis
  fast: "phi-4"   # Fast model for quick operations
  cleanup: "phi-4"   # Text cleanup and formatting  
  chat: "phi-4"   # General chat and Q&A
  classify: "phi-4"   # Document classification
  parsing: "phi-4"   # Document parsing and structure extraction
  embedding: "qwen3-embedding"   # Text embedding generation
  # Note: visual-embedding (colpali) is managed by separate colpali service, not vLLM

