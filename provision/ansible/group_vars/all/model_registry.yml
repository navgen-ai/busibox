---
# Model Purpose Registry
#
# Central configuration for model purposes across all services.
# Maps abstract purposes (embedding, cleanup, chat) to actual model names.
#
# Usage:
#   - Services reference purposes, not model names
#   - Change models here without touching code
#   - Environment-specific overrides via model_purposes_dev / model_purposes (staging/prod)
#
# Note: GPU/port assignments and technical details are in model_config.yml
# (machine-generated, not version-controlled)
available_models:
  # AWS Bedrock Models (Verified Working)
  # Models with 'us.' prefix are cross-region inference profiles
  # These provide better availability and are required for Claude 3.5
  
  "claude-sonnet-4-5":
    provider: "bedrock"
    model: "us.anthropic.claude-sonnet-4-5-20250929-v1:0"
    model_name: "us.anthropic.claude-sonnet-4-5-20250929-v1:0"
    description: "Claude 4.5 Sonnet - Most capable, frontier model (Sept 2025)"
    multimodal: true
    tool_calling: true

  "claude-haiku-4-5":
    provider: "bedrock"
    model: "us.anthropic.claude-haiku-4-5-20251001-v1:0"
    model_name: "us.anthropic.claude-haiku-4-5-20251001-v1:0"
    description: "Claude 4.5 Haiku - Fast, efficient, excellent for most tasks"
    multimodal: true
    tool_calling: true
  
  "phi-4":
    provider: "vllm"
    model: "phi-4"
    model_name: "microsoft/Phi-4-multimodal-instruct"
    description: "Fast model for quick operations"
    # vLLM tuning parameters
    gpu_memory_utilization: 0.65  # Small model - only needs 60% GPU
    max_model_len: 16384  # Supports longer context
    max_num_seqs: 10  # Can handle more concurrent requests
    cpu_offload_gb: 0  # Moderate CPU offload
    # Tool calling support
    tool_calling: false
    # Multimodal support
    multimodal: true
    limit_mm_per_prompt: 
      image: 4  # Allow up to 4 images per prompt
    
  "qwen3-30b":
    provider: "vllm"
    model: "qwen3-30b-a3b-instruct-awq-4bit"
    model_name: "cpatonn/Qwen3-30B-A3B-Instruct-2507-AWQ-4bit"
    description: "General purpose agent model"
    # vLLM tuning parameters
    gpu_memory_utilization: 0.9  # Large model - needs 80% GPU
    max_model_len: 32000  # Supports very long context (AWQ quantized)
    max_num_seqs: 3  # Standard concurrent requests
    cpu_offload_gb: 0  # Heavy CPU offload for KV cache
    # Tool calling support
    tool_calling: true
    tool_call_parser: "hermes"  # Qwen3 models use Hermes-style tool calling (Qwen2.5 compatible)
    multimodal: false

  "qwen3-reranker":
    provider: "vllm"
    model: "qwen3-reranker-0.6b"
    model_name: "Qwen/Qwen3-Reranker-0.6B"
    description: "Search result reranking (GPU, fast)"
    # vLLM tuning parameters
    gpu_memory_utilization: 0.2  # Tiny model - only 20% GPU (leave room for overhead)
    max_model_len: 4096  # Reranker uses short sequences
    max_num_seqs: 32  # Fewer concurrent requests needed
    cpu_offload_gb: 0  # Minimal CPU offload
    # Reranker-specific configuration
    hf_overrides: '{"architectures": ["Qwen3ForSequenceClassification"], "classifier_from_token": ["no", "yes"], "is_original_qwen3_reranker": true}'

  "qwen3-0.6b-vllm":
    provider: "vllm"
    model: "qwen3-0.6b"
    model_name: "Qwen/Qwen3-0.6B"
    description: "Tiny dispatch/classification model on GPU (vLLM)"
    # vLLM tuning parameters
    gpu_memory_utilization: 0.3  # ~7GB - plenty for 0.6B weights + KV cache + CUDA overhead
    max_model_len: 4096  # Routing/classification prompts are short
    max_num_seqs: 32  # High concurrency for dispatch traffic
    cpu_offload_gb: 0
    tool_calling: false
    multimodal: false

  "bge-reranker-v2-m3-gpu":
    provider: "vllm"
    model: "bge-reranker-v2-m3"
    model_name: "BAAI/bge-reranker-v2-m3"
    description: "BAAI reranker (GPU, high accuracy)"
    # vLLM tuning parameters
    gpu_memory_utilization: 0.3  # Larger model needs more GPU
    max_model_len: 8192  # Longer sequences
    max_num_seqs: 16  # Fewer concurrent requests
    cpu_offload_gb: 0

  "bge-reranker-v2-m3-cpu":
    provider: "local"
    model: "bge-reranker-v2-m3"
    model_name: "BAAI/bge-reranker-v2-m3"
    description: "BAAI reranker (CPU, slower but always available)"
    device: "cpu"

  "bge-large":
    provider: "fastembed"
    model: "bge-large-en-v1.5"
    model_name: "BAAI/bge-large-en-v1.5"
    description: "Text embedding generation (1024-d, production)"
    dimension: 1024
    
  "bge-base":
    provider: "fastembed"
    model: "bge-base-en-v1.5"
    model_name: "BAAI/bge-base-en-v1.5"
    description: "Text embedding generation (768-d, balanced)"
    dimension: 768
    
  "bge-small":
    provider: "fastembed"
    model: "bge-small-en-v1.5"
    model_name: "BAAI/bge-small-en-v1.5"
    description: "Text embedding generation (384-d, fast/dev)"
    dimension: 384
    
  "nomic-embed":
    provider: "fastembed"
    model: "nomic-embed-text-v1.5"
    model_name: "nomic-ai/nomic-embed-text-v1.5"
    description: "Matryoshka embedding (768-d native, truncatable to 256/512)"
    dimension: 768
    matryoshka: true
    matryoshka_dimensions: [64, 128, 256, 512, 768]

  "colpali":
    provider: "colpali"  # Dedicated ColPali service (not vLLM - LoRA not supported)
    model: "colpali-v1.3"
    model_name: "vidore/colpali-v1.3"
    description: "Visual document embedding (dedicated service)"
    gpu: "0"  # Reserved for visual embeddings
    port: 9006  # Dedicated ColPali service port
    # Note: vLLM 0.11.0 does not support LoRA for PaliGemmaForConditionalGeneration
    # ColPali uses its own service with custom inference code

  # =========================================================================
  # MLX Models (Apple Silicon - Development/Demo)
  # =========================================================================
  # These models run on Apple Silicon Macs via mlx-lm
  # Tiered by RAM: micro (<16GB), standard (16-32GB), pro (>32GB)
  
  "qwen3-0.6b":
    provider: "mlx"
    model: "qwen3-0.6b"
    model_name: "mlx-community/Qwen3-0.6B-4bit"
    description: "Tiny test model with reasoning (0.6B params, has <think> mode)"
    tool_calling: true
    tier: "micro"


  "qwen3-4b-instruct-2507":
    provider: "mlx"
    model: "qwen3-4b-instruct-2507"
    model_name: "mlx-community/Qwen3-4B-Instruct-2507-4bit"
    description: "Primary agent/chat/tool-calling model (4B params, 128K ctx, Hermes tools)"
    tool_calling: true
    tool_call_parser: "hermes"
    tier: "standard"


  "qwen3-vl-4b":
    provider: "mlx"
    model: "qwen3-vl-4b"
    model_name: "mlx-community/Qwen3-VL-4B-Instruct-4bit"
    description: "Vision-language model for image understanding (4B params)"
    tool_calling: false
    multimodal: true
    tier: "standard"

  "qwen3-30b-mlx":
    provider: "mlx"
    model: "qwen3-30b-mlx"
    model_name: "mlx-community/Qwen3-30B-A3B-Instruct-2507-4bit"
    description: "Large agent/reasoning model for MLX (30B MoE, ~18GB)"
    tool_calling: true
    tool_call_parser: "hermes"
    tier: "standard"
    memory_estimate_gb: 18.0

  "qwen3-80b-mlx":
    provider: "mlx"
    model: "qwen3-80b-mlx"
    model_name: "mlx-community/Qwen3-Next-80B-A3B-Instruct-4bit"
    description: "High-performance reasoning model for MLX (80B MoE, ~45GB)"
    tool_calling: true
    tier: "enhanced"
    memory_estimate_gb: 45.0

  "whisper-tiny":
    provider: "mlx"
    model: "whisper-tiny"
    model_name: "mlx-community/whisper-tiny-mlx"
    description: "Speech-to-text transcription (Whisper Tiny, 39M params — dev/lightweight)"
    mode: "audio_transcription"
    tier: "micro"
    memory_estimate_gb: 0.15  # ~150 MB RAM (tiny 39M param model)

  "whisper-large-v3":
    provider: "mlx"
    model: "whisper-large-v3"
    model_name: "mlx-community/whisper-large-v3-mlx"
    description: "Speech-to-text transcription (Whisper Large v3 — production)"
    mode: "audio_transcription"
    tier: "standard"
    memory_estimate_gb: 3.0   # ~3 GB RAM when loaded (fp16 weights + buffers)

  "kokoro-82m":
    provider: "mlx"
    model: "kokoro-82m"
    model_name: "mlx-community/Kokoro-82M-bf16"
    description: "Text-to-speech voice generation (Kokoro 82M)"
    mode: "audio_speech"
    tier: "micro"
    memory_estimate_gb: 0.2   # ~200 MB RAM (tiny 82M param model)

  "flux2-klein-4b":
    provider: "mlx"
    model: "flux2-klein-4b"
    model_name: "black-forest-labs/FLUX.2-klein-4B"
    description: "Lightweight image generation (FLUX.2 Klein 4B, Q4 for dev)"
    mode: "image_generation"
    tier: "standard"
    memory_estimate_gb: 3.5   # ~3.5 GB RAM (4B params Q4 quantized + VAE/encoder overhead)

  # GPU-accelerated media models for Proxmox (on-demand, GPU 0)
  "whisper-large-v3-gpu":
    provider: "gpu"
    model: "whisper-large-v3-gpu"
    model_name: "whisper-large-v3"
    description: "GPU-accelerated Whisper STT (faster-whisper, float16, GPU 0)"
    mode: "audio_transcription"
    tier: "standard"
    port: 8006
    gpu: "0"
    on_demand: true
    memory_estimate_gb: 3.1   # ~3.1 GB VRAM (large-v3 float16)
    service_name: "whisper-gpu"

  "kokoro-82m-gpu":
    provider: "gpu"
    model: "kokoro-82m-gpu"
    model_name: "hexgrad/Kokoro-82M"
    description: "GPU-accelerated Kokoro TTS (kokoro-fastapi, GPU 0)"
    mode: "audio_speech"
    tier: "micro"
    port: 8007
    gpu: "0"
    on_demand: true
    memory_estimate_gb: 0.5   # ~500 MB VRAM (82M params on GPU)
    service_name: "kokoro-gpu"

  "flux2-klein-4b-gpu":
    provider: "gpu"
    model: "flux2-klein-4b-gpu"
    model_name: "black-forest-labs/FLUX.2-klein-4B"
    description: "GPU-accelerated image generation (FLUX.2 Klein 4B, Q8, GPU 0)"
    mode: "image_generation"
    tier: "standard"
    port: 8008
    gpu: "0"
    on_demand: true
    memory_estimate_gb: 5.0   # ~5 GB VRAM (4B params Q8 + VAE/encoder)
    service_name: "flux-gpu"

# =============================================================================
# Model Purposes - Staging/Production (vLLM + Bedrock)
# =============================================================================
# Production GPU strategy (3x RTX 3090, 24GB each):
# - GPU 0: ingestion stack (Marker/ColPali/embeddings)
# - GPU 1: qwen3-30b alone for heavy agent/chat/tool-calling workloads
# - GPU 2: phi-4 + qwen3-0.6b-vllm + qwen3-reranker
model_purposes:
  # Primary models
  default: "qwen3-30b"   # Primary text workhorse
  frontier: "claude-sonnet-4-5"   # Most capable model (Claude 4.5 Sonnet)
  frontier-fast: "claude-haiku-4-5"   # Fast frontier model (Claude 4.5 Haiku)
  
  # Task-specific
  research: "qwen3-30b"   # Research and analysis
  agent: "qwen3-30b"   # Agent model for agentic tasks
  chat: "qwen3-30b"   # Main chat model
  vision: "phi-4"   # Vision-language model for image understanding
  classify: "qwen3-0.6b-vllm"   # Tiny dispatch/classification model on GPU
  parsing: "phi-4"   # Document parsing and structure extraction
  cleanup: "phi-4"   # Text cleanup and formatting  
  fast: "qwen3-0.6b-vllm"   # Tiny always-hot routing model
  tool_calling: "qwen3-30b"   # Tool calling model for tool calling tasks
  test: "qwen3-0.6b-vllm"   # Tiny model for validation tests (GPU)

  # Video generation (cloud API)
  video: "sora-2"   # Video generation model (OpenAI Sora-2)
  image: "flux2-klein-4b-gpu"   # Image generation model (GPU FLUX.2 Klein, on-demand GPU 0)
  # GPU media services (on-demand, GPU 0). Override to "whisper-large-v3" / "kokoro-82m" for MLX fallback.
  transcribe: "whisper-large-v3-gpu"   # GPU STT (faster-whisper, port 8006)
  voice: "kokoro-82m-gpu"   # GPU TTS (kokoro-fastapi, port 8007)

  # Embeddings (dedicated services)
  embedding: "nomic-embed"   # Matryoshka embedding (768-d native, truncatable)
  visual-embedding: "colpali"   # Visual document embedding (dedicated service)
  reranking: "qwen3-reranker"   # Search result reranking
  # Note: ColPali uses dedicated service (port 9006, GPU 0) - vLLM doesn't support LoRA for PaliGemma

# =============================================================================
# Model Purposes - Development (MLX on Apple Silicon)
# =============================================================================
# Uses smaller, locally-cached models for faster iteration and offline dev
# Maps to models cached by `make warmup` - bge-small and qwen3-0.6b
model_purposes_dev:
  # Primary models (port 8080 - Qwen3-4B)
  default: "qwen3-4b-instruct-2507"   # ~70% MMLU, 128K ctx, Hermes tools
  frontier: "qwen3-4b-instruct-2507"   # 8B: swap into port 8080 on demand
  frontier-fast: "qwen3-4b-instruct-2507"   # Same as default

  # Task-specific
  research: "qwen3-4b-instruct-2507"   # 4B handles research with 128K context
  agent: "qwen3-4b-instruct-2507"   # Primary agent model with tool calling
  chat: "qwen3-4b-instruct-2507"   # Chat quality is strong at 4B
  vision: "qwen3-vl-4b"   # Qwen3-VL (swap into port 8080 on demand)
  classify: "qwen3-0.6b"   # Port 18081 - always loaded, instant
  parsing: "qwen3-4b-instruct-2507"   # 4B for document structure extraction
  cleanup: "qwen3-4b-instruct-2507"   # 1.7B (swap into port 18081 on demand)
  fast: "qwen3-0.6b"   # Port 18081 - always loaded, instant
  tool_calling: "qwen3-4b-instruct-2507"   # 4B with Hermes-style tool calling
  test: "qwen3-0.6b"   # Tiny model for validation tests (cached by warmup)

  # Video generation (requires OpenAI API key even in dev)
  video: "sora-2"   # Video generation model (OpenAI Sora-2)
  image: "flux2-klein-4b"   # Image generation model (local MLX FLUX.2 Klein 4B Q4)
  transcribe: "whisper-tiny"   # Speech-to-text (Whisper Tiny ~150 MB for dev)
  voice: "kokoro-82m"   # Text-to-speech (Kokoro)

  # Embeddings (Matryoshka: nomic-embed at 256-d for dev, 768-d for prod)
  embedding: "nomic-embed"   # Matryoshka embedding (768-d native, truncated to 256-d for dev)
  visual-embedding: "colpali"   # Visual document embedding (same as prod)
  reranking: "bge-reranker-v2-m3-cpu"   # CPU reranking for dev (no GPU needed)

# =============================================================================
# Memory Tiers - Hardware-based model selection for install/download
# =============================================================================
# Maps RAM/VRAM tiers to model keys from available_models above.
# The download script resolves these keys to HuggingFace repo IDs via model_name.
#
# Roles:
#   fast    - Quick dispatch/classification model (always loaded)
#   agent   - Primary reasoning/chat model
#   embed   - Text embedding model
#   transcribe - Speech-to-text transcription
#   voice  - Text-to-speech voice generation
#   image    - Image generation
#   visual-embedding - Visual document embedding (standard+ only)
#
tiers:
  # 16GB - MacBook Air, base MacBook Pro
  # ~6GB reserved for system + Docker, ~10GB for models
  minimal:
    min_ram_gb: 16
    max_ram_gb: 23
    description: "Lightweight models for basic use"
    mlx:
      test: "qwen3-0.6b"
      fast: "qwen3-0.6b"
      agent: "qwen3-0.6b"
      embed: "nomic-embed"
      transcribe: "whisper-tiny"
      voice: "kokoro-82m"
    vllm:
      test: "qwen3-0.6b-vllm"
      fast: "qwen3-0.6b-vllm"
      agent: "qwen3-0.6b-vllm"
      embed: "nomic-embed"
      transcribe: "whisper-tiny"
      voice: "kokoro-82m"
  # 24GB - MacBook Pro 14"
  # ~8GB reserved, ~16GB for models
  entry:
    min_ram_gb: 24
    max_ram_gb: 47
    description: "Entry-level performance for most workloads"
    mlx:
      test: "qwen3-0.6b"
      fast: "qwen3-0.6b"
      agent: "qwen3-4b-instruct-2507"
      embed: "nomic-embed"
      transcribe: "whisper-tiny"
      voice: "kokoro-82m"
      image: "flux2-klein-4b"
    vllm:
      test: "qwen3-0.6b-vllm"
      fast: "qwen3-0.6b-vllm"
      agent: "phi-4"
      embed: "nomic-embed"
      transcribe: "whisper-tiny"
      voice: "kokoro-82m"
      image: "flux2-klein-4b"
  # 48GB - MacBook Pro 16", Mac Mini Pro
  # ~10GB reserved, ~38GB for models
  standard:
    min_ram_gb: 48
    max_ram_gb: 95
    description: "Balanced performance for production workloads"
    mlx:
      test: "qwen3-0.6b"
      fast: "qwen3-4b-instruct-2507"
      agent: "qwen3-30b-mlx"
      embed: "nomic-embed"
      transcribe: "whisper-large-v3"
      voice: "kokoro-82m"
      image: "flux2-klein-4b"
      visual-embedding: "colpali"
    vllm:
      test: "qwen3-0.6b-vllm"
      fast: "phi-4"
      agent: "qwen3-30b"
      embed: "nomic-embed"
      transcribe: "whisper-large-v3"
      voice: "kokoro-82m"
      image: "flux2-klein-4b"
      visual-embedding: "colpali"

  # 96GB+ - Mac Studio, Mac Pro, multi-GPU servers
  # ~12GB reserved, ~84GB+ for models
  enhanced:
    min_ram_gb: 96
    max_ram_gb: 9999
    description: "High-performance with large reasoning models"
    mlx:
      test: "qwen3-0.6b"
      fast: "qwen3-4b-instruct-2507"
      agent: "qwen3-80b-mlx"
      embed: "nomic-embed"
      transcribe: "whisper-large-v3"
      voice: "kokoro-82m"
      image: "flux2-klein-4b"
      visual-embedding: "colpali"
    vllm:
      test: "qwen3-0.6b-vllm"
      fast: "phi-4"
      agent: "qwen3-30b"
      embed: "nomic-embed"
      visual-embedding: "colpali"

