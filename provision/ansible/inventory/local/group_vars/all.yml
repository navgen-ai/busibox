---
# Local development environment variables
# Inherits from base configuration but overrides for local Docker setup

# ============================================================================
# Environment
# ============================================================================
environment: local
deployment_mode: local

# ============================================================================
# Domain Configuration - Local
# ============================================================================
subdomain: local
domain: "ai.localhost"
full_domain: "{{ subdomain }}.{{ domain }}"

# ============================================================================
# Network Configuration
# ============================================================================
# Docker network IPs
postgres_host: "172.20.0.10"
minio_host: "172.20.0.11"
milvus_host: "172.20.0.12"
agent_api_host: "172.20.0.13"
ingest_worker_host: "172.20.0.14"
apps_host: "172.20.0.15"
proxy_host: "172.20.0.16"

# ============================================================================
# Service Ports (same as test/prod for consistency)
# ============================================================================
agent_api_port: 3001
minio_api_port: 9000
minio_console_port: 9001
milvus_port: 19530
postgres_port: 5432

# ============================================================================
# Database Configuration
# ============================================================================
postgres_user: postgres
postgres_password: devpassword
postgres_db: cashman

# ============================================================================
# MinIO Configuration
# ============================================================================
minio_root_user: minioadmin
minio_root_password: minioadmin
minio_use_ssl: false

# ============================================================================
# Application Definitions
# ============================================================================
applications:
  - name: ai-portal
    github_repo: sonnenreich/ai-portal
    port: 3000
    deploy_path: /srv/apps/ai-portal
    build_command: npm run build
    health_endpoint: /api/health
    env:
      NODE_ENV: production
      DATABASE_URL: "postgresql://{{ postgres_user }}:{{ postgres_password }}@{{ postgres_host }}:{{ postgres_port }}/{{ postgres_db }}"
      LITELLM_BASE_URL: "http://{{ proxy_host }}/litellm"
      AGENT_API_URL: "http://{{ agent_api_host }}:{{ agent_api_port }}"
      MINIO_ENDPOINT: "{{ minio_host }}"
      MINIO_PORT: "{{ minio_api_port }}"
      MINIO_USE_SSL: "{{ minio_use_ssl }}"
    secrets:
      - database_url
      - better_auth_secret
      - better_auth_url
      - resend_api_key
      - email_from
      - openai_api_key
      - sso_jwt_secret
      - litellm_api_key
      - admin_email
      - allowed_email_domains
    routes:
      - type: domain
        domains:
          - "{{ full_domain }}"
        backend: "http://{{ apps_host }}:3000"

# ============================================================================
# LiteLLM Configuration
# ============================================================================
litellm_enable_database: false  # Simplified for local dev
litellm_master_key: sk-local-dev-key

# ============================================================================
# Development Settings
# ============================================================================
# Disable SSL verification for local development
ansible_python_interpreter: /usr/bin/python3










