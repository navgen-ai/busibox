---
# Local development inventory using Docker containers
# Containers must be running: docker compose -f docker-compose.local.yml up -d

all:
  vars:
    ansible_connection: docker
    ansible_user: root
    # Docker doesn't need SSH
    ansible_ssh_common_args: ""

  children:
    # Database
    pg:
      hosts:
        local-postgres:
          ansible_host: local-postgres

    # Object Storage
    files:
      hosts:
        local-minio:
          ansible_host: local-minio

    # Vector Database
    milvus:
      hosts:
        local-milvus:
          ansible_host: local-milvus

    # Agent API
    agent:
      hosts:
        local-agent-api:
          ansible_host: local-agent-api

    # Ingest Worker
    ingest:
      hosts:
        local-ingest:
          ansible_host: local-ingest

    # Next.js Applications
    apps:
      hosts:
        local-apps:
          ansible_host: local-apps

    # Nginx Proxy
    proxy:
      hosts:
        local-proxy:
          ansible_host: local-proxy

