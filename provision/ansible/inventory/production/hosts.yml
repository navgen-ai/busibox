---
# Busibox Production Environment Inventory
# Created: 2025-10-15
# Updated: 2025-10-23
# 
# IP addresses are calculated from network_base_octets in group_vars/all.yml
# Production: 10.96.200.x

all:
  vars:
    ansible_user: root
    ansible_ssh_private_key_file: ~/.ssh/id_rsa
    ansible_python_interpreter: /usr/bin/python3
  
  children:
    proxy:
      hosts:
        proxy-lxc:
          ansible_host: "{{ proxy_ip }}"
          container_id: 200
    
    core_apps:
      hosts:
        core-apps-lxc:
          ansible_host: "{{ core_apps_ip }}"
          container_id: 201
    
    user_apps:
      hosts:
        user-apps-lxc:
          ansible_host: "{{ user_apps_ip }}"
          container_id: 212
    
    # Combined apps group for site.yml (includes core_apps for app deployment)
    apps:
      children:
        core_apps:
    
    agent:
      hosts:
        agent-lxc:
          ansible_host: "{{ agent_ip }}"
          container_id: 202
    
    pg:
      hosts:
        pg-lxc:
          ansible_host: "{{ postgres_ip }}"
          container_id: 203
    
    milvus:
      hosts:
        milvus-lxc:
          ansible_host: "{{ milvus_ip }}"
          container_id: 204
    
    files:
      hosts:
        files-lxc:
          ansible_host: "{{ minio_ip }}"
          container_id: 205
    
    data:
      hosts:
        data-lxc:
          ansible_host: "{{ data_ip }}"
          container_id: 206
    
    authz:
      hosts:
        authz-lxc:
          ansible_host: "{{ authz_ip }}"
          container_id: 210
    
    # LLM Services
    llm_services:
      hosts:
        litellm-lxc:
          ansible_host: "{{ litellm_ip }}"
          container_id: 207
          service_name: litellm
        vllm-lxc:
          ansible_host: "{{ vllm_ip }}"
          container_id: 208
          service_name: vllm
          gpu_device: all  # vLLM uses all GPUs
    
    litellm:
      hosts:
        litellm-lxc:
          ansible_host: "{{ litellm_ip }}"
          container_id: 207
    
    vllm:
      hosts:
        vllm-lxc:
          ansible_host: "{{ vllm_ip }}"
          container_id: 208
          gpu_device: all  # vLLM uses all GPUs
    
    # NOTE: Ollama is DEPRECATED - use vLLM instead for local LLM inference
    # The ollama group has been removed from inventory
    
    # Bridge Service (optional - multi-channel communication)
    # Uncomment and configure when ready to deploy
    # bridge:
    #   hosts:
    #     bridge-lxc:
    #       ansible_host: "{{ bridge_ip }}"
    #       container_id: 211