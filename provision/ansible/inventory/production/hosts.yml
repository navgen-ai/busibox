---
# Busibox Production Environment Inventory
# Created: 2025-10-15
# Updated: 2025-10-23
# 
# IP addresses are calculated from network_base_octets in group_vars/all.yml
# Production: 10.96.200.x

all:
  vars:
    ansible_user: root
    ansible_ssh_private_key_file: ~/.ssh/id_rsa
    ansible_python_interpreter: /usr/bin/python3
  
  children:
    proxy:
      hosts:
        proxy-lxc:
          ansible_host: "{{ proxy_ip }}"
          container_id: 200
    
    apps:
      hosts:
        apps-lxc:
          ansible_host: "{{ apps_ip }}"
          container_id: 201
    
    agent:
      hosts:
        agent-lxc:
          ansible_host: "{{ agent_ip }}"
          container_id: 202
    
    pg:
      hosts:
        pg-lxc:
          ansible_host: "{{ postgres_ip }}"
          container_id: 203
    
    milvus:
      hosts:
        milvus-lxc:
          ansible_host: "{{ milvus_ip }}"
          container_id: 204
    
    files:
      hosts:
        files-lxc:
          ansible_host: "{{ minio_ip }}"
          container_id: 205
    
    ingest:
      hosts:
        ingest-lxc:
          ansible_host: "{{ ingest_ip }}"
          container_id: 206
    
    authz:
      hosts:
        authz-lxc:
          ansible_host: "{{ authz_ip }}"
          container_id: 210
    
    # LLM Services
    llm_services:
      hosts:
        litellm-lxc:
          ansible_host: "{{ litellm_ip }}"
          container_id: 207
          service_name: litellm
        vllm-lxc:
          ansible_host: "{{ vllm_ip }}"
          container_id: 208
          service_name: vllm
          gpu_device: all  # vLLM uses all GPUs
        ollama-lxc:
          ansible_host: "{{ ollama_ip }}"
          container_id: 209
          service_name: ollama
          gpu_device: 0
    
    litellm:
      hosts:
        litellm-lxc:
          ansible_host: "{{ litellm_ip }}"
          container_id: 207
    
    vllm:
      hosts:
        vllm-lxc:
          ansible_host: "{{ vllm_ip }}"
          container_id: 208
          gpu_device: all  # vLLM uses all GPUs
    
    ollama:
      hosts:
        ollama-lxc:
          ansible_host: "{{ ollama_ip }}"
          container_id: 209
          gpu_device: 0