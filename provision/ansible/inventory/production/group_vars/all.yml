---
# Global Variables for Busibox Application Deployment
# Created: 2025-10-15
# Purpose: Centralized configuration for all application deployments

# Domain Configuration
domain: ai.jaycashman.com
www_domain: www.ai.jaycashman.com

# SSL Certificate Mode
# Options: "letsencrypt", "provisioned", "selfsigned"
# - letsencrypt: Automatic certificate acquisition and renewal via certbot
# - provisioned: Use pre-existing certificates (manual management)
# - selfsigned: Generate self-signed certificates (development only)
ssl_mode: letsencrypt

# SSL Email for Let's Encrypt
# Used for expiration notifications and certificate management
ssl_email: admin@jaycashman.com

# Network Configuration
internal_network: 10.96.200.0/21
internal_gateway: 10.96.200.1

# Container IP Addresses (from vars.env)
openwebui_ip: 10.96.200.24
apps_ip: 10.96.200.25
postgres_ip: 10.96.200.26
milvus_ip: 10.96.200.27
minio_ip: 10.96.200.28
ingest_ip: 10.96.200.29
agent_ip: 10.96.200.30

# Service Endpoints
postgres_host: "{{ postgres_ip }}"
postgres_port: 5432
postgres_db: busibox
postgres_user: busibox_user

milvus_host: "{{ milvus_ip }}"
milvus_port: 19530

minio_host: "{{ minio_ip }}"
minio_port: 9000
minio_console_port: 9001

redis_host: "{{ ingest_ip }}"
redis_port: 6379

agent_api_host: "{{ agent_ip }}"
agent_api_port: 8000

# Deployment Configuration
deploywatch_check_interval: 3600  # Check for new releases every hour (seconds)
deploywatch_apps_dir: /srv/deploywatch/apps

# Application Defaults
default_process_manager: pm2
default_node_version: "20"

# NGINX Configuration
nginx_worker_processes: auto
nginx_worker_connections: 1024
nginx_client_max_body_size: 100M
nginx_proxy_timeout: 60s

# Logging
log_level: info
structured_logging: true

# Security
hsts_max_age: 63072000  # 2 years in seconds

# Application Definitions
# Moved from apps.yml to make available to all host groups
# See apps.yml for schema documentation and examples
applications:
  - name: agent-server
    github_repo: jazzmind/agent-server
    container: agent-lxc
    container_ip: "{{ agent_ip }}"
    port: 8000
    deploy_path: /srv/agent
    health_endpoint: /health
    routes: []  # Internal only - no NGINX routing
    secrets:
      - database_url
      - minio_access_key
      - minio_secret_key
      - redis_url
    # Note: env vars reference inventory variables which are resolved at runtime
    # This ensures test environments get test values, production gets production values
    env:
      LOG_LEVEL: "{{ log_level }}"
      MILVUS_HOST: "{{ milvus_ip }}"  # Changed from milvus_host to milvus_ip for direct reference
      MILVUS_PORT: "{{ milvus_port }}"
      MINIO_ENDPOINT: "{{ minio_ip }}:{{ minio_port }}"  # Added for completeness
      POSTGRES_HOST: "{{ postgres_ip }}"  # Added for visibility
      REDIS_HOST: "{{ ingest_ip }}"  # Added for visibility

