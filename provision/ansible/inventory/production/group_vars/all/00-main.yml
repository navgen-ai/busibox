---
# Global Variables for Busibox Application Deployment - PRODUCTION
# Created: 2025-10-15
# Updated: 2025-10-23
# Purpose: Centralized configuration for PRODUCTION environment
#
# This file contains ONLY production-specific configuration.
# Secrets are stored in roles/secrets/vars/vault.yml (encrypted)

# ============================================================================
# Environment Configuration
# ============================================================================
busibox_env: production
node_env: production  # For Node.js applications

# ============================================================================
# Network Configuration - Production
# ============================================================================
# Base IP from vault (deployment-specific)
network_base_octets: "{{ network_base_octets_production }}"
internal_network: "{{ network_base_octets }}.0/21"
internal_gateway: "{{ network_base_octets }}.1"

# Container IP Addresses (calculated from base)
# Infrastructure containers: .200-.209
proxy_ip: "{{ network_base_octets }}.200"
apps_ip: "{{ network_base_octets }}.201"
agent_ip: "{{ network_base_octets }}.202"
postgres_ip: "{{ network_base_octets }}.203"
milvus_ip: "{{ network_base_octets }}.204"
search_api_ip: "{{ milvus_ip }}"  # Search API runs on milvus container
minio_ip: "{{ network_base_octets }}.205"
ingest_ip: "{{ network_base_octets }}.206"

# LLM Service IPs: .207-.210 (to allow room for more infrastructure)
litellm_ip: "{{ network_base_octets }}.207"
vllm_ip: "{{ network_base_octets }}.208"
ollama_ip: "{{ network_base_octets }}.210"

# ============================================================================
# Domain Configuration - Production
# ============================================================================
# Base domain from vault (deployment-specific)
# domain and www_domain are calculated from base_domain
domain: "ai.{{ base_domain }}"
full_domain: "{{ domain }}"  # For compatibility with templates that use full_domain
www_domain: "www.{{ domain }}"
env_subdomain_suffix: ""  # No suffix for production (e.g., "agents" not "agents-prod")

# SSL Certificate Mode
# Options: "letsencrypt", "provisioned", "selfsigned"
ssl_mode: provisioned
# ssl_email comes from vault

# Nginx Placeholder Mode
# Set to true to deploy placeholder pages before apps are ready
# Set to false to deploy application routing
placeholder_mode: false

# ============================================================================
# Service Endpoints
# ============================================================================
postgres_host: "{{ postgres_ip }}"
postgres_port: 5432
postgres_db: busibox
postgres_user: busibox_user
postgres_password: "{{ secrets.postgresql.password }}"

# Files/Ingestion database
files_db: files
files_user: "{{ postgres_user }}"
files_password: "{{ secrets.postgresql.password }}"

milvus_host: "{{ milvus_ip }}"
milvus_port: 19530

minio_host: "{{ minio_ip }}"
minio_port: 9000
minio_console_port: 9001
minio_bucket: documents
minio_root_user: "{{ secrets.minio.root_user }}"
minio_root_password: "{{ secrets.minio.root_password }}"

redis_host: "{{ ingest_ip }}"
redis_port: 6379

agent_api_host: "{{ agent_ip }}"
agent_api_port: 4111

# LLM Service Endpoints
litellm_host: "{{ litellm_ip }}"
litellm_port: 4000

# LiteLLM Settings - Enable tool/function calling support
litellm_drop_params: false  # CRITICAL: Must be false to pass tools to vLLM
litellm_add_function_to_prompt: true  # Add function definitions to prompt for models that need it

# Embedding Configuration (for ingest service)
# Reference model registry for embedding model configuration
# New structure: model_purposes.embedding -> model key, lookup in available_models
embedding_model: "{{ available_models[model_purposes.embedding].model }}"
embedding_dimension: 4096  # Qwen3-Embedding-8B output dimension

ollama_host: "{{ ollama_ip }}"
ollama_port: 11434

vllm_host: "{{ vllm_ip }}"
# Note: vLLM ports are now configured via model_config.yml
# Port-based roles (vllm_8000, vllm_8001, etc.) read assignments from model_config.yml
# Production environment always uses its own vLLM service (no override)
# Test environment may optionally use production vLLM via use_production_vllm flag

# ============================================================================
# LLM Model Configuration
# ============================================================================
# HuggingFace Authentication (for gated models like PaliGemma)
# Token stored in vault at secrets.huggingface.token
huggingface_token: "{{ secrets.huggingface.token }}"

# vLLM Model Configuration
# Note: vLLM configuration is now managed via model_config.yml
# Port-based roles (vllm_8000, vllm_8001, etc.) read model assignments from model_config.yml
# GPU assignments, ports, and tensor parallelism are configured via configure-vllm-model-routing.sh

# ============================================================================
# Deployment Configuration
# ============================================================================
deploywatch_check_interval: 3600  # Check for new releases every hour (seconds)
deploywatch_apps_dir: /srv/deploywatch/apps

# Application Defaults
default_process_manager: pm2
default_node_version: "20"

# ============================================================================
# NGINX Configuration
# ============================================================================
nginx_worker_processes: auto
nginx_worker_connections: 1024
nginx_client_max_body_size: 100M
nginx_proxy_timeout: 60s

# ============================================================================
# Logging & Security
# ============================================================================
log_level: info
structured_logging: true
hsts_max_age: 63072000  # 2 years in seconds

# ============================================================================
# Application Definitions
# ============================================================================
# Applications are now defined in group_vars/apps.yml (centralized)
# This allows sharing app definitions between test and production environments
# while keeping environment-specific values (IPs, domains, NODE_ENV) here.
#
# See: provision/ansible/group_vars/apps.yml

