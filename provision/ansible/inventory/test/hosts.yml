---
# Busibox Test Environment Inventory
# Created: 2025-10-15
# Updated: 2025-10-23
# 
# Container IDs: 300-309 (Production + 100)
# IP addresses are calculated from network_base_octets in group_vars/all.yml
# Test: 10.96.201.x (Production + 1 in 3rd octet)

all:
  vars:
    ansible_user: root
    ansible_ssh_private_key_file: ~/.ssh/id_rsa
    ansible_python_interpreter: /usr/bin/python3
  
  children:
    proxy:
      hosts:
        TEST-proxy-lxc:
          ansible_host: "{{ proxy_ip }}"
          container_id: 300
    
    apps:
      hosts:
        TEST-apps-lxc:
          ansible_host: "{{ apps_ip }}"
          container_id: 301
    
    agent:
      hosts:
        TEST-agent-lxc:
          ansible_host: "{{ agent_ip }}"
          container_id: 302
    
    pg:
      hosts:
        TEST-pg-lxc:
          ansible_host: "{{ postgres_ip }}"
          container_id: 303
    
    milvus:
      hosts:
        TEST-milvus-lxc:
          ansible_host: "{{ milvus_ip }}"
          container_id: 304
    
    files:
      hosts:
        TEST-files-lxc:
          ansible_host: "{{ minio_ip }}"
          container_id: 305
    
    ingest:
      hosts:
        TEST-ingest-lxc:
          ansible_host: "{{ ingest_ip }}"
          container_id: 306

    authz:
      hosts:
        TEST-authz-lxc:
          ansible_host: "{{ authz_ip }}"
          container_id: 310
    
    # LLM Services
    llm_services:
      hosts:
        TEST-litellm-lxc:
          ansible_host: "{{ litellm_ip }}"
          container_id: 307
          service_name: litellm
        # TEST-vllm-lxc removed from default deployment
        # Test environment uses production vLLM by default (use_production_vllm: true)
        # Container ID 308 is reserved for manual vLLM testing when needed
        # To deploy test vLLM: Set use_production_vllm: false and manually add TEST-vllm-lxc to vllm group
        TEST-ollama-lxc:
          ansible_host: "{{ ollama_ip }}"
          container_id: 309
          service_name: ollama
          gpu_device: 0
    
    litellm:
      hosts:
        TEST-litellm-lxc:
          ansible_host: "{{ litellm_ip }}"
          container_id: 307
    
    # vLLM group removed from default test deployment
    # Test environment connects to production vLLM by default (see use_production_vllm in group_vars)
    # To enable test vLLM container, set use_production_vllm: false and add TEST-vllm-lxc here:
    # vllm:
    #   hosts:
    #     TEST-vllm-lxc:
    #       ansible_host: "{{ vllm_ip }}"
    #       container_id: 308
    #       gpu_device: all  # vLLM uses all GPUs
    
    ollama:
      hosts:
        TEST-ollama-lxc:
          ansible_host: "{{ ollama_ip }}"
          container_id: 309
          gpu_device: 0

