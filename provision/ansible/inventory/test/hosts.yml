---
# Busibox Test Environment Inventory
# Created: 2025-10-15
# Updated: 2025-10-23
# 
# Container IDs: 300-309 (Production + 100)
# IP addresses are calculated from network_base_octets in group_vars/all.yml
# Test: 10.96.201.x (Production + 1 in 3rd octet)

all:
  vars:
    ansible_user: root
    ansible_ssh_private_key_file: ~/.ssh/id_rsa
    ansible_python_interpreter: /usr/bin/python3
  
  children:
    proxy:
      hosts:
        TEST-proxy-lxc:
          ansible_host: "{{ proxy_ip }}"
          container_id: 300
    
    apps:
      hosts:
        TEST-apps-lxc:
          ansible_host: "{{ apps_ip }}"
          container_id: 301
    
    agent:
      hosts:
        TEST-agent-lxc:
          ansible_host: "{{ agent_ip }}"
          container_id: 302
    
    pg:
      hosts:
        TEST-pg-lxc:
          ansible_host: "{{ postgres_ip }}"
          container_id: 303
    
    milvus:
      hosts:
        TEST-milvus-lxc:
          ansible_host: "{{ milvus_ip }}"
          container_id: 304
    
    files:
      hosts:
        TEST-files-lxc:
          ansible_host: "{{ minio_ip }}"
          container_id: 305
    
    ingest:
      hosts:
        TEST-ingest-lxc:
          ansible_host: "{{ ingest_ip }}"
          container_id: 306
    
    # LLM Services
    llm_services:
      hosts:
        TEST-litellm-lxc:
          ansible_host: "{{ litellm_ip }}"
          container_id: 307
          service_name: litellm
        TEST-ollama-lxc:
          ansible_host: "{{ ollama_ip }}"
          container_id: 308
          service_name: ollama
          gpu_device: 0
        TEST-vllm-lxc:
          ansible_host: "{{ vllm_ip }}"
          container_id: 309
          service_name: vllm
          gpu_device: 1
    
    litellm:
      hosts:
        TEST-litellm-lxc:
          ansible_host: "{{ litellm_ip }}"
          container_id: 307
    
    ollama:
      hosts:
        TEST-ollama-lxc:
          ansible_host: "{{ ollama_ip }}"
          container_id: 308
          gpu_device: 0
    
    vllm:
      hosts:
        TEST-vllm-lxc:
          ansible_host: "{{ vllm_ip }}"
          container_id: 309
          gpu_device: 1

