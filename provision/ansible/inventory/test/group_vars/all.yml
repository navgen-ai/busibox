# Test Environment - Global Variables
# Created: 2025-10-15
# Purpose: Override production defaults with test-specific values
#
# This file is loaded when using inventory/test-hosts.yml
# It completely overrides group_vars/all.yml for the test environment

# Domain Configuration (same as production for now)
domain: ai.jaycashman.com
www_domain: www.ai.jaycashman.com

# SSL Certificate Mode
ssl_mode: selfsigned  # Use self-signed for testing

# SSL Email for Let's Encrypt
ssl_email: admin@jaycashman.com

# Network Configuration
internal_network: 10.96.200.0/21  # Same network range
internal_gateway: 10.96.200.1

# Container IP Addresses (TEST - offset by +1.0 from production)
proxy_ip: 10.96.201.200
apps_ip: 10.96.201.201
agent_ip: 10.96.201.202
postgres_ip: 10.96.201.203
milvus_ip: 10.96.201.204
minio_ip: 10.96.201.205
ingest_ip: 10.96.201.206
litellm_ip: 10.96.201.207
ollama_ip: 10.96.201.208
vllm_ip: 10.96.201.209  

# Service Endpoints
postgres_host: "{{ postgres_ip }}"
postgres_port: 5432
postgres_db: busibox_test
postgres_user: busibox_test_user
postgres_password: busibox_password_change_me

milvus_host: "{{ milvus_ip }}"
milvus_port: 19530

minio_host: "{{ minio_ip }}"
minio_port: 9000
minio_console_port: 9001

redis_host: "{{ ingest_ip }}"
redis_port: 6379

agent_api_host: "{{ agent_ip }}"
agent_api_port: 8000

# LLM Service Endpoints
litellm_host: "{{ litellm_ip }}"
litellm_port: 4000

ollama_host: "{{ ollama_ip }}"
ollama_port: 11434

vllm_host: "{{ vllm_ip }}"
vllm_port: 8000

# Ollama Model Configuration (TEST - use smallest models for fast testing)
ollama_initial_models:
  - name: "qwen2.5:0.5b"
    description: "Tiny test model (397MB)"

# vLLM Model Configuration (TEST - use smaller model)
vllm_default_model: "Qwen/Qwen2.5-0.5B-Instruct"  # Small test model

# LiteLLM Configuration
# Disable database for now - Prisma setup is complex, will add later
litellm_enable_database: false
# litellm_database_url: "postgresql://{{ postgres_user }}:{{ postgres_password }}@{{ postgres_host }}:{{ postgres_port }}/{{ postgres_db }}"

# LiteLLM Model Configuration (TEST - matches Ollama test models)
litellm_models:
  - model_name: "qwen-0.5b"
    litellm_params:
      model: "ollama/qwen2.5:0.5b"
      api_base: "http://{{ ollama_ip }}:{{ ollama_port }}"
  - model_name: "qwen-0.5b-vllm"
    litellm_params:
      model: "openai/Qwen/Qwen2.5-0.5B-Instruct"
      api_base: "http://{{ vllm_ip }}:{{ vllm_port }}/v1"

# Deployment Configuration
deploywatch_check_interval: 3600
deploywatch_apps_dir: /srv/deploywatch/apps

# Application Defaults
default_process_manager: pm2
default_node_version: "20"

# NGINX Configuration
nginx_worker_processes: auto
nginx_worker_connections: 1024
nginx_client_max_body_size: 100M
nginx_proxy_timeout: 60s

# Logging
log_level: debug  # More verbose for testing
structured_logging: true

# Security
hsts_max_age: 63072000

# Application Definitions (TEST)
# These use test-specific IPs and database names
applications:
  - name: agent-server
    github_repo: jazzmind/agent-server
    container: agent-lxc
    container_ip: "{{ agent_ip }}"
    port: 4111
    deploy_path: /srv/agent
    health_endpoint: /auth/health
    routes: []  # Internal only - no NGINX routing
    secrets:
      - database_url
      - minio_access_key
      - minio_secret_key
      - redis_url
    env:
      LOG_LEVEL: debug
      MILVUS_HOST: "{{ milvus_ip }}"
      MILVUS_PORT: "19530"
      MINIO_ENDPOINT: "{{ minio_ip }}:{{ minio_port }}"
      POSTGRES_HOST: "{{ postgres_ip }}"
      REDIS_HOST: "{{ ingest_ip }}"
      TOKEN_SERVICE_URL: http://{{ agent_ip }}:4111
      MASTRA_API_URL: http://{{ agent_ip }}:4111

