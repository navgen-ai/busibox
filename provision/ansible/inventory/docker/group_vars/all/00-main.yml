---
# Global Variables for Busibox Application Deployment - DOCKER
# Created: 2026-01-28
# Purpose: Centralized configuration for Docker development environment
#
# This file contains Docker-specific configuration.
# Secrets are stored in roles/secrets/vars/vault.yml (encrypted)
#
# Docker deployment differs from LXC in that all services run on localhost
# and communicate via Docker networking (busibox-net).

# ============================================================================
# Environment Configuration
# ============================================================================
busibox_env: "{{ lookup('env', 'BUSIBOX_ENV') | default('development', true) }}"
deployment_environment: dev  # Used to load vault.dev.yml
deploy_target: docker
node_env: "{{ 'production' if busibox_env == 'demo' else 'development' }}"

# ============================================================================
# Docker Configuration
# ============================================================================
# Container prefix for naming (dev-, staging-, prod-)
container_prefix: "{{ lookup('env', 'CONTAINER_PREFIX') | default('dev', true) }}"
compose_project_name: "{{ container_prefix }}"

# Docker Compose files to use
docker_compose_dir: "{{ playbook_dir }}/../.."

# Development mode: local-dev (volume mounts) or github (clone at build)
# - local-dev: Mounts local directories for hot-reload development
# - github: Clones from GitHub at build time (staging/production)
# Priority: environment variable > default
# Note: Can be overridden via --extra-vars "docker_dev_mode=github"
docker_dev_mode: "{{ lookup('env', 'DOCKER_DEV_MODE') | default('local-dev', true) }}"

# List of compose files to use (required by docker_common role)
# Dynamically selected based on docker_dev_mode
docker_compose_files_list: >-
  {{
    [docker_compose_dir ~ '/docker-compose.yml'] +
    ([docker_compose_dir ~ '/docker-compose.local-dev.yml'] if docker_dev_mode == 'local-dev' else [docker_compose_dir ~ '/docker-compose.github.yml'])
  }}

# Environment file path
docker_env_file: "{{ docker_compose_dir }}/.env.{{ container_prefix }}"

# ============================================================================
# Network Configuration - Docker
# ============================================================================
# Docker services communicate via Docker network names, not IPs
docker_network: busibox-net

# Service hostnames (used within Docker network)
postgres_host: postgres
redis_host: redis
minio_host: minio
milvus_host: milvus
authz_host: authz-api
data_host: data-api
search_host: search-api
agent_host: agent-api
embedding_host: embedding-api
litellm_host: litellm
docs_host: docs-api
deploy_host: deploy-api

# For external access, use localhost with exposed ports
external_host: localhost

# ============================================================================
# Service Ports
# ============================================================================
postgres_port: 5432
redis_port: 6379
minio_port: 9000
minio_console_port: 9001
milvus_port: 19530
authz_port: 8010
data_port: 8002
search_port: 8003
agent_port: 8000
embedding_port: 8005
litellm_port: 4000
docs_port: 8004
deploy_port: 8011

# Frontend ports
ai_portal_port: 3000
agent_manager_port: 3001

# ============================================================================
# Domain Configuration - Docker
# ============================================================================
# Use localhost for local development
base_domain: "{{ lookup('env', 'BASE_DOMAIN') | default('localhost', true) }}"
domain: "{{ base_domain }}"
full_domain: "{{ base_domain }}"
env_subdomain_suffix: ""

# SSL Mode - use self-signed for local development
ssl_mode: selfsigned

# ============================================================================
# Database Configuration
# ============================================================================
postgres_user: busibox_user
# Password from vault - install.sh syncs generated secrets to vault
postgres_password: "{{ secrets.postgresql.password | default('devpassword') }}"

# Data API database (files/documents/chunks)
files_db: data
files_user: "{{ postgres_user }}"
files_password: "{{ postgres_password }}"

# Enable test databases for running pytest
enable_pytest_databases: true

# ============================================================================
# MinIO Configuration
# ============================================================================
minio_bucket: documents
minio_root_user: "{{ secrets.minio.root_user | default('minioadmin') }}"
minio_root_password: "{{ secrets.minio.root_password | default('minioadmin') }}"

# ============================================================================
# LLM Configuration
# ============================================================================
# LLM Cleanup - can be enabled/disabled
llm_cleanup_enabled: false

# LiteLLM Settings
litellm_enable_database: true
litellm_drop_params: false
litellm_add_function_to_prompt: true

# HuggingFace Authentication
huggingface_token: "{{ secrets.huggingface.token | default('') }}"

# ============================================================================
# Feature Flags - Docker Development
# ============================================================================
# GPU-heavy features disabled by default for Docker dev
marker_enabled: false
colpali_enabled: false

# ============================================================================
# Logging & Security
# ============================================================================
log_level: debug
structured_logging: true

# ============================================================================
# GitHub Configuration
# ============================================================================
github_token: "{{ secrets.github.personal_access_token | default(lookup('env', 'GITHUB_AUTH_TOKEN')) | default('') }}"

# Application repository URLs
ai_portal_repo: "https://github.com/jazzmind/ai-portal.git"
agent_manager_repo: "https://github.com/jazzmind/agent-manager.git"
busibox_app_repo: "https://github.com/jazzmind/busibox-app.git"

# Local paths for development mode
ai_portal_dir: "{{ lookup('env', 'AI_PORTAL_DIR') | default('') }}"
agent_manager_dir: "{{ lookup('env', 'AGENT_MANAGER_DIR') | default('') }}"
busibox_app_dir: "{{ lookup('env', 'BUSIBOX_APP_DIR') | default('') }}"

# ============================================================================
# Docker Service Definitions
# ============================================================================
# Maps service groups to Docker Compose service names
docker_services:
  infrastructure:
    - postgres
    - redis
    - minio
    - etcd
    - milvus-minio
    - milvus
  apis:
    - authz-api
    - embedding-api
    - data-api
    - data-worker
    - search-api
    - agent-api
    - docs-api
    - deploy-api
  llm:
    - litellm
  frontend:
    - core-apps
    - nginx
  user:
    - user-apps

# Service health check endpoints
docker_health_endpoints:
  postgres: "pg_isready -U postgres"
  authz-api: "http://localhost:{{ authz_port }}/health"
  data-api: "http://localhost:{{ data_port }}/health"
  search-api: "http://localhost:{{ search_port }}/health"
  agent-api: "http://localhost:{{ agent_port }}/health"
  ai-portal: "http://localhost:{{ ai_portal_port }}/api/health"
