---
# Busibox Docker Development Inventory
# Created: 2026-01-28
#
# This inventory targets the local Docker host for container deployment.
# Unlike LXC deployments, all services run on localhost via Docker Compose.
#
# Usage:
#   ansible-playbook -i inventory/docker docker.yml
#   make docker-deploy  # Simplified via Makefile

all:
  hosts:
    localhost:
      ansible_connection: local
      ansible_python_interpreter: "{{ ansible_playbook_python }}"
  
  vars:
    # Deployment target identifier
    deploy_target: docker
    
    # Docker-specific settings
    docker_compose_project: "{{ container_prefix | default('dev') }}"
    
  children:
    # Docker host group - contains localhost for all services
    docker:
      hosts:
        localhost:
    
    # Service groups - all map to localhost for Docker
    # These allow reusing existing roles that target specific groups
    proxy:
      hosts:
        localhost:
          service_name: nginx
    
    core_apps:
      hosts:
        localhost:
          service_name: core-apps
    
    user_apps:
      hosts:
        localhost:
          service_name: user-apps
    
    agent:
      hosts:
        localhost:
          service_name: agent-api
    
    pg:
      hosts:
        localhost:
          service_name: postgres
    
    milvus:
      hosts:
        localhost:
          service_name: milvus
    
    files:
      hosts:
        localhost:
          service_name: minio
    
    ingest:
      hosts:
        localhost:
          service_name: ingest-api
    
    authz:
      hosts:
        localhost:
          service_name: authz-api
    
    litellm:
      hosts:
        localhost:
          service_name: litellm
    
    # Redis service (part of ingest infrastructure)
    redis:
      hosts:
        localhost:
          service_name: redis
    
    # Embedding service
    embedding:
      hosts:
        localhost:
          service_name: embedding-api
    
    # Search service (runs on milvus in LXC, separate in Docker)
    search:
      hosts:
        localhost:
          service_name: search-api
    
    # Deploy API service
    deploy:
      hosts:
        localhost:
          service_name: deploy-api
    
    # Docs API service
    docs:
      hosts:
        localhost:
          service_name: docs-api
