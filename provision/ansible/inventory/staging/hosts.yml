---
# Busibox Staging Environment Inventory
# Created: 2025-10-15
# Updated: 2026-01-28
# 
# Container IDs: 300-312 (Production + 100)
# IP addresses are calculated from network_base_octets in group_vars/all.yml
# Staging: 10.96.201.x (Production + 1 in 3rd octet)

all:
  vars:
    ansible_user: root
    ansible_ssh_private_key_file: ~/.ssh/id_rsa
    ansible_python_interpreter: /usr/bin/python3
  
  children:
    proxy:
      hosts:
        STAGE-proxy-lxc:
          ansible_host: "{{ proxy_ip }}"
          container_id: 300
    
    core_apps:
      hosts:
        STAGE-core-apps-lxc:
          ansible_host: "{{ core_apps_ip }}"
          container_id: 301
    
    user_apps:
      hosts:
        STAGE-user-apps-lxc:
          ansible_host: "{{ user_apps_ip }}"
          container_id: 312
    
    # Combined apps group for site.yml (includes core_apps for app deployment)
    apps:
      children:
        core_apps:
    
    agent:
      hosts:
        STAGE-agent-lxc:
          ansible_host: "{{ agent_ip }}"
          container_id: 302
    
    pg:
      hosts:
        STAGE-pg-lxc:
          ansible_host: "{{ postgres_ip }}"
          container_id: 303
    
    milvus:
      hosts:
        STAGE-milvus-lxc:
          ansible_host: "{{ milvus_ip }}"
          container_id: 304
    
    files:
      hosts:
        STAGE-files-lxc:
          ansible_host: "{{ minio_ip }}"
          container_id: 305
    
    data:
      hosts:
        STAGE-data-lxc:
          ansible_host: "{{ data_ip }}"
          container_id: 306

    authz:
      hosts:
        STAGE-authz-lxc:
          ansible_host: "{{ authz_ip }}"
          container_id: 310
    
    # LLM Services
    llm_services:
      hosts:
        STAGE-litellm-lxc:
          ansible_host: "{{ litellm_ip }}"
          container_id: 307
          service_name: litellm
        # STAGE-vllm-lxc removed from default deployment
        # Staging environment uses production vLLM by default (use_production_vllm: true)
        # Container ID 308 is reserved for manual vLLM testing when needed
        # To deploy staging vLLM: Set use_production_vllm: false and manually add STAGE-vllm-lxc to vllm group
    
    litellm:
      hosts:
        STAGE-litellm-lxc:
          ansible_host: "{{ litellm_ip }}"
          container_id: 307
    
    # vLLM group removed from default staging deployment
    # Staging environment connects to production vLLM by default (see use_production_vllm in group_vars)
    # To enable staging vLLM container, set use_production_vllm: false and add STAGE-vllm-lxc here:
    # vllm:
    #   hosts:
    #     STAGE-vllm-lxc:
    #       ansible_host: "{{ vllm_ip }}"
    #       container_id: 308
    #       gpu_device: all  # vLLM uses all GPUs
    
    # NOTE: Ollama is DEPRECATED - use vLLM instead for local LLM inference
    # The ollama group has been removed from inventory
    
    # Bridge Service (optional - multi-channel communication)
    # Uncomment and configure when ready to deploy
    # bridge:
    #   hosts:
    #     STAGE-bridge-lxc:
    #       ansible_host: "{{ bridge_ip }}"
    #       container_id: 311

