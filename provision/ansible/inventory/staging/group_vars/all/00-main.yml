---
# Global Variables for Busibox Application Deployment - STAGING
# Created: 2025-10-15
# Updated: 2025-10-23
# Purpose: Centralized configuration for STAGING environment
#
# This file contains ONLY staging-specific configuration.
# Secrets are stored in roles/secrets/vars/vault.yml (encrypted)
#
# NOTE: "Staging" is the pre-production environment for testing deployments.
#       "Test databases" (*_test suffix) are for running automated tests (pytest).
#       These are separate concepts - staging has its own databases AND test databases.

# ============================================================================
# Environment Configuration
# ============================================================================
busibox_env: staging
deployment_environment: staging  # Used to load vault.staging.yml
enable_pytest_databases: true  # Create *_test databases for running automated tests
node_env: development  # For Node.js applications

# ============================================================================
# Network Configuration - Staging
# ============================================================================
# Network base octets from environment variable or extra-vars
# Set NETWORK_BASE_OCTETS_STAGING env var or pass -e network_base_octets_staging=...
network_base_octets_staging: "{{ lookup('env', 'NETWORK_BASE_OCTETS_STAGING') | default('10.96.201', true) }}"
network_base_octets_production: "{{ lookup('env', 'NETWORK_BASE_OCTETS_PRODUCTION') | default('10.96.200', true) }}"
network_base_octets: "{{ network_base_octets_staging }}"
internal_network: "{{ network_base_octets }}.0/21"
internal_gateway: "{{ network_base_octets }}.1"

# Proxmox host IP - the management IP of the Proxmox host
# deploy-api needs SSH access to the Proxmox host to run make install commands
# This is auto-detected from the Ansible controller's default IP
# Override with PROXMOX_HOST env var or -e proxmox_host=... if needed
# This gets added to /etc/hosts as 'proxmox' by the internal_dns role
proxmox_host: "{{ lookup('env', 'PROXMOX_HOST') | default(lookup('pipe', 'hostname -I | cut -d\" \" -f1'), true) }}"

# Container IP Addresses (calculated from base)
# Infrastructure containers: .200-.212
proxy_ip: "{{ network_base_octets }}.200"
core_apps_ip: "{{ network_base_octets }}.201"  # Core apps: busibox-portal, busibox-agents
agent_ip: "{{ network_base_octets }}.202"
postgres_ip: "{{ network_base_octets }}.203"
milvus_ip: "{{ network_base_octets }}.204"
search_api_ip: "{{ milvus_ip }}"  # Search API runs on milvus-lxc container (port 8003)
minio_ip: "{{ network_base_octets }}.205"
data_ip: "{{ network_base_octets }}.206"
user_apps_ip: "{{ network_base_octets }}.212"  # User/external apps

# LLM Service IPs: .207-.208 (to allow room for more infrastructure)
# NOTE: .209 was previously ollama (now deprecated)
litellm_ip: "{{ network_base_octets }}.207"
# vLLM IP Configuration - Test environment can use production vLLM by default
# Set use_production_vllm: true to use production vLLM (default, saves GPU memory)
# Set use_production_vllm: false to use test vLLM container (requires manual deployment)
use_production_vllm: true
# Note: network_base_octets_production comes from local.yml (if using prod vLLM, else uses staging base)
vllm_ip: "{{ (use_production_vllm | default(true)) | ternary(network_base_octets_production | default(network_base_octets) + '.208', network_base_octets + '.208') }}"

# Authz Service IP
authz_ip: "{{ network_base_octets }}.210"

# Bridge Service IP (multi-channel communication: Signal, Email, WhatsApp)
bridge_ip: "{{ network_base_octets }}.211"

# ============================================================================
# Domain Configuration - Staging
# ============================================================================
# full_domain is the complete domain for this environment (e.g., staging.ai.jaycashman.com)
# It comes from the SITE_DOMAIN value set during installation
# For backwards compatibility, we also check base_domain and build up if full_domain not set
full_domain: "{{ site_domain | default(base_domain) }}"
domain: "{{ full_domain }}"  # Alias for templates that use 'domain'
www_domain: "www.{{ full_domain }}"
env_subdomain_suffix: "-staging"  # Suffix for staging subdomains (e.g., "agents-staging")

# SSL Certificate Mode
# Options: "letsencrypt", "provisioned", "selfsigned"
ssl_mode: provisioned  # Use self-signed for testing
# ssl_email comes from vault

# ============================================================================
# Service Endpoints
# ============================================================================
postgres_host: "{{ postgres_ip }}"
postgres_port: 5432
postgres_user: busibox_user

# Data database (data/documents/chunks)
data_db: data
data_user: "{{ postgres_user }}"
data_password: "{{ secrets.postgresql.password }}"

# Legacy Data API database (files/documents/chunks)
files_db: data
files_user: "{{ postgres_user }}"
files_password: "{{ secrets.postgresql.password }}"

milvus_host: "{{ milvus_ip }}"
milvus_port: 19530

# Neo4j Graph Database (runs as Docker container on milvus-lxc)
neo4j_host: "{{ milvus_ip }}"  # Shares milvus container
neo4j_bolt_port: 7687
neo4j_http_port: 7474
neo4j_user: neo4j
neo4j_password: "{{ secrets.neo4j.password | default('changeme') }}"

minio_host: "{{ minio_ip }}"
minio_port: 9000
minio_console_port: 9001
minio_bucket: documents
minio_root_user: "{{ secrets.minio.root_user }}"
minio_root_password: "{{ secrets.minio.root_password }}"

redis_host: "{{ data_ip }}"
redis_port: 6379

agent_api_host: "{{ agent_ip }}"
agent_api_port: 8000

# LLM Service Endpoints
litellm_host: "{{ litellm_ip }}"
litellm_port: 4000

# LiteLLM Settings - Enable tool/function calling support
litellm_drop_params: false  # CRITICAL: Must be false to pass tools to vLLM
litellm_add_function_to_prompt: true  # Add function definitions to prompt for models that need it

# LLM Cleanup - DISABLED for test (causes timeouts, not needed for RAG/role testing)
# Test environment focuses on search and permissions, not text quality
# Production has LLM cleanup enabled for better extraction quality
llm_cleanup_enabled: false

# NOTE: Ollama is DEPRECATED - use vLLM instead for local LLM inference
# ollama_host and ollama_port have been removed

vllm_host: "0.0.0.0"  # Listen on all interfaces for IP aliasing support
# Note: vLLM ports are now configured via model_config.yml
# Port-based roles (vllm_8000, vllm_8001, etc.) read assignments from model_config.yml
# When use_production_vllm is true, test services connect to production vLLM (10.96.200.208)
# When use_production_vllm is false, test services connect to test vLLM (10.96.201.208)

# ============================================================================
# GPU-Heavy Features - Staging Environment
# ============================================================================
# Staging does not run its own GPU services. Instead, it uses production's
# GPU services (ColPali) via network. Marker is disabled (no remote service).

# Marker PDF extraction - DISABLED for staging
# Marker is embedded in data-worker, not a network service. Staging uses
# pdfplumber fallback for PDF extraction (simpler, CPU-based).
marker_enabled: false
marker_use_gpu: false
marker_gpu_device: cpu
marker_service_url: ""  # No remote Marker service available

# ColPali - ENABLED, pointing to PRODUCTION vLLM service
# Staging uses production's ColPali endpoint for visual embeddings
# This avoids running GPU-heavy models on staging while still supporting
# visual document embeddings
colpali_enabled: true
colpali_base_url: "http://{{ network_base_octets_production }}.208:9006/v1"  # Production vLLM ColPali

# ============================================================================
# LLM Model Configuration
# ============================================================================
# HuggingFace Authentication (for gated models like PaliGemma)
# Token stored in vault at secrets.huggingface.token
huggingface_token: "{{ secrets.huggingface.token }}"

# NOTE: Ollama is DEPRECATED - ollama_initial_models has been removed
# Use vLLM for all local LLM inference

# vLLM Model Configuration (TEST)
# Note: vLLM configuration is now managed via model_config.yml
# Port-based roles (vllm_8000, vllm_8001, etc.) read model assignments from model_config.yml
# GPU assignments, ports, and tensor parallelism are configured via configure-vllm-model-routing.sh

# LiteLLM Database Configuration
litellm_enable_database: true

# ============================================================================
# Deployment Configuration
# ============================================================================
# Deploy API is the unified deployment system for both Docker and Proxmox.
# Set use_deploy_api: false to use legacy deploywatch scripts (deprecated).
use_deploy_api: true

# Deploy API connection settings
deploy_host: "{{ authz_ip }}"  # Deploy API runs on authz container
deploy_port: 8011
# Bootstrap token for Deploy API - uses same formula as deploy_api role
# This is auto-generated if not defined, so we comment this out to let get_bootstrap_token.yml handle it
# deploy_api_admin_token: "{{ secrets.deploy_api.bootstrap_token | default('') }}"
deploy_environment: staging

# Legacy deploywatch settings (deprecated - only used when use_deploy_api: false)
deploywatch_check_interval: 300  # Check more frequently in staging (5 minutes)
deploywatch_apps_dir: /srv/deploywatch/apps

# Application Defaults
default_process_manager: systemd
default_node_version: "20"

# ============================================================================
# NGINX Configuration
# ============================================================================
nginx_worker_processes: auto
nginx_worker_connections: 512  # Lower for test
nginx_client_max_body_size: 50M  # Lower for test
nginx_proxy_timeout: 60s

# ============================================================================
# Logging & Security
# ============================================================================
log_level: debug  # More verbose logging for test
structured_logging: true
hsts_max_age: 31536000  # 1 year (shorter for test)

# ============================================================================
# Application Definitions
# ============================================================================
# Applications are now defined in group_vars/apps.yml (centralized)
# This allows sharing app definitions between test and production environments
# while keeping environment-specific values (IPs, domains, NODE_ENV) here.
#
# See: provision/ansible/group_vars/apps.yml