# =============================================================================
# Busibox Ansible Deployment Playbook
# =============================================================================
#
# Deployment order organized into 4 groups:
#   1. CORE: nginx, minio, postgres, milvus, neo4j (infrastructure)
#   2. LLM: vllm, litellm, colpali, embedding (AI/ML services)
#   3. APIs: authz, data, search, agent, docs (application services)
#   4. APPS: busibox-portal, busibox-agents (frontend applications)
#
# Web installs start with nginx first so the install UI can drive the rest.
#
# Tag hierarchy:
#   - Group level: core, llm, apis, apps
#   - Subgroup level: core_nginx, llm_vllm, apis_authz, etc.
#   - Service level: nginx, postgres, authz, etc.
#
# Usage:
#   make all                    # Full deploy (all groups in order)
#   make core                   # Deploy core infrastructure only
#   make llm                    # Deploy LLM services only
#   make apis                   # Deploy API services only
#   make apps                   # Deploy frontend apps only
#
# Sequential deploy (equivalent to make all):
#   make core && make llm && make apis && make apps
#
# =============================================================================

# =============================================================================
# INFRASTRUCTURE: Internal DNS Configuration
# =============================================================================
# Configure /etc/hosts on all containers for service discovery via canonical hostnames
# Runs with: postgres (first infrastructure service), core, or internal_dns tags
# Also runs with deploy/deploy_api since deploy-api needs DNS to SSH to other containers
# NOTE: Removed 'always' tag - was causing DNS tasks to run on ALL hosts for every deploy
# Instead, runs once when deploying infrastructure (postgres is typically first)

- hosts: all
  tags: [core, internal_dns, postgres, deploy, deploy_api]
  roles:
    - role: internal_dns
      tags: [core, internal_dns, postgres, deploy, deploy_api]

# =============================================================================
# GROUP 1: CORE SERVICES (tag: core)
# Deploy first - nginx enables web-driven install recovery
# =============================================================================

# 1.1 Nginx (web proxy) - FIRST so install UI can drive rest of install
- hosts: proxy
  tags: [core, core_nginx]
  roles:
    - role: secrets
      tags: [core, core_nginx, proxy, nginx, secrets]
    - role: nginx
      tags: [core, core_nginx, proxy, nginx]

# 1.2 MinIO (object storage)
- hosts: files
  tags: [core, core_storage]
  roles:
    - role: minio
      tags: [core, core_storage, files, minio]

# 1.3 PostgreSQL (database)
- hosts: pg
  tags: [core, core_database]
  roles:
    - role: postgres
      tags: [core, core_database, postgres]

# 1.4 Milvus (vector database)
- hosts: milvus
  tags: [core, core_vectorstore]
  roles:
    - role: milvus
      tags: [core, core_vectorstore, milvus]

# 1.5 Neo4j (graph database - runs natively on neo4j-lxc)
- hosts: neo4j
  tags: [core, core_graph]
  roles:
    - role: neo4j
      tags: [core, core_graph, neo4j]

# =============================================================================
# GROUP 2: LLM SERVICES (tag: llm)
# GPU inference, embedding, and LLM gateway
# =============================================================================

# 2.1 vLLM (GPU inference backends)
- name: Deploy LLM Inference Backends
  hosts: vllm
  tags: [llm, llm_vllm]
  pre_tasks:
    - name: Install required cleanup tools
      apt:
        name:
          - psmisc  # Provides fuser
          - lsof    # For debugging
        state: present
        update_cache: false
      failed_when: false
      tags: [llm, llm_vllm, vllm]
    
    - name: Determine which vLLM services to stop
      set_fact:
        vllm_services_to_stop: "{{ ['8000'] if 'vllm_8000' in ansible_run_tags else ['8001'] if 'vllm_8001' in ansible_run_tags else ['8002'] if 'vllm_8002' in ansible_run_tags else ['8003'] if 'vllm_8003' in ansible_run_tags else ['8004'] if 'vllm_8004' in ansible_run_tags else ['8005'] if 'vllm_8005' in ansible_run_tags else ['8000', '8001', '8002', '8003', '8004', '8005'] }}"
      tags: [llm, llm_vllm, vllm, vllm_8000, vllm_8001, vllm_8002, vllm_8003, vllm_8004, vllm_8005]
    
    - name: Display which vLLM services will be redeployed
      debug:
        msg: "Redeploying vLLM services: {{ vllm_services_to_stop }}"
      tags: [llm, llm_vllm, vllm, vllm_8000, vllm_8001, vllm_8002, vllm_8003, vllm_8004, vllm_8005]
    
    - name: Stop selected vLLM services to ensure proper GPU memory release
      systemd:
        name: "vllm-{{ item }}"
        state: stopped
      loop: "{{ vllm_services_to_stop }}"
      failed_when: false
      tags: [llm, llm_vllm, vllm, vllm_8000, vllm_8001, vllm_8002, vllm_8003, vllm_8004, vllm_8005]
    
    - name: Wait for systemd to process stop requests
      pause:
        seconds: 5
      tags: [llm, llm_vllm, vllm, vllm_8000, vllm_8001, vllm_8002, vllm_8003, vllm_8004, vllm_8005]
    
    - name: Force kill any remaining vLLM processes for specific ports
      vars:
        ports_to_kill: "{{ vllm_services_to_stop | join(' ') }}"
      shell: >
        echo "Targeting vLLM processes on ports: {{ ports_to_kill }}" &&
        killed_any=0 &&
        for port in {{ ports_to_kill }}; do
          for pid in $(pgrep -f "vllm.entrypoints.openai.api_server.*--port $port" 2>/dev/null); do
            echo "Killing vLLM process on port $port (PID $pid)";
            kill -9 "$pid" 2>/dev/null && killed_any=1 || true;
          done;
          for pid in $(pgrep -f "vllm.*$port" 2>/dev/null); do
            echo "Killing vLLM-related process for port $port (PID $pid)";
            kill -9 "$pid" 2>/dev/null && killed_any=1 || true;
          done;
        done &&
        if [ "$killed_any" -eq 0 ]; then
          echo "No vLLM processes found for ports: {{ ports_to_kill }}";
        else
          echo "Killed vLLM processes for ports: {{ ports_to_kill }}";
        fi
      args:
        executable: /bin/bash
      register: kill_result
      changed_when: false
      failed_when: false
      tags: [llm, llm_vllm, vllm, vllm_8000, vllm_8001, vllm_8002, vllm_8003, vllm_8004, vllm_8005]
    
    - name: Force release GPU memory (vLLM on GPU 1+ only - preserves GPU 0)
      vars:
        ports_to_clean: "{{ vllm_services_to_stop | join(' ') }}"
      shell: >
        echo "Cleaning GPU memory for vLLM on ports: {{ ports_to_clean }}" &&
        killed_pids="" &&
        for port in {{ ports_to_clean }}; do
          for pid in $(pgrep -f "vllm.entrypoints.openai.api_server.*--port $port" 2>/dev/null); do
            if [ -f "/proc/$pid/environ" ]; then
              cuda_devices=$(tr '\0' '\n' < /proc/$pid/environ 2>/dev/null | grep "^CUDA_VISIBLE_DEVICES=" | cut -d= -f2);
              case "$cuda_devices" in
                *0*) echo "Preserved PID $pid on port $port (uses GPU 0)" ;;
                *) kill -9 "$pid" 2>/dev/null && killed_pids="$killed_pids $pid" || true ;;
              esac;
            fi;
          done;
          for pid in $(pgrep -f "ray::.*$port" 2>/dev/null); do
            cuda_devices=$(tr '\0' '\n' < /proc/$pid/environ 2>/dev/null | grep "^CUDA_VISIBLE_DEVICES=" | cut -d= -f2);
            case "$cuda_devices" in
              *0*) : ;;
              *) kill -9 "$pid" 2>/dev/null && killed_pids="$killed_pids $pid" || true ;;
            esac;
          done;
        done &&
        if [ -n "$killed_pids" ]; then
          echo "Killed vLLM processes on ports {{ ports_to_clean }} (GPU 1+ only):$killed_pids";
        else
          echo "No vLLM processes found for ports: {{ ports_to_clean }}";
        fi &&
        echo "GPU 0 preserved (ColPali + Marker continue running)"
      args:
        executable: /bin/bash
      register: gpu_cleanup
      changed_when: false
      failed_when: false
      tags: [llm, llm_vllm, vllm, vllm_8000, vllm_8001, vllm_8002, vllm_8003, vllm_8004, vllm_8005]
    
    - name: Clean shared memory and temp files
      shell: |
        # Clean shared memory (PyTorch/Ray use this heavily)
        find /dev/shm -type f -name "*torch*" -delete 2>/dev/null || true
        find /dev/shm -type f -name "*ray*" -delete 2>/dev/null || true
        
        # Clean /tmp for vLLM temp files
        find /tmp -type f -name "*vllm*" -mmin +5 -delete 2>/dev/null || true
        
        echo "Cleaned shared memory and temp files"
      register: shm_cleanup
      changed_when: false
      failed_when: false
      tags: [llm, llm_vllm, vllm, vllm_8000, vllm_8001, vllm_8002, vllm_8003, vllm_8004, vllm_8005]
    
    - name: Wait for GPU memory to be fully released
      pause:
        seconds: 10
      tags: [llm, llm_vllm, vllm]
    
    - name: Verify GPU memory is free
      shell: nvidia-smi --query-gpu=memory.used --format=csv,noheader,nounits
      register: gpu_memory_check
      changed_when: false
      failed_when: false
      tags: [llm, llm_vllm, vllm]
    
    - name: Display GPU memory status
      debug:
        msg: "GPU memory usage (MB): {{ gpu_memory_check.stdout_lines }}"
      when: gpu_memory_check.stdout_lines is defined
      tags: [llm, llm_vllm, vllm]
  roles:
    # Shared vLLM installation (venv, drivers, packages) - runs once
    - role: vllm_common
      when: "'vllm' in group_names"
      tags: [llm, llm_vllm, vllm, vllm_install]
    # Port-based vLLM roles - each checks model_config.yml for assigned models
    - role: vllm_8000
      when: "'vllm' in group_names"
      tags: [llm, llm_vllm, vllm, vllm_8000]
    - role: vllm_8001
      when: "'vllm' in group_names"
      tags: [llm, llm_vllm, vllm, vllm_8001]
    - role: vllm_8002
      when: "'vllm' in group_names"
      tags: [llm, llm_vllm, vllm, vllm_8002]
    - role: vllm_8003
      when: "'vllm' in group_names"
      tags: [llm, llm_vllm, vllm, vllm_8003]
    - role: vllm_8004
      when: "'vllm' in group_names"
      tags: [llm, llm_vllm, vllm, vllm_8004]
    - role: vllm_8005
      when: "'vllm' in group_names"
      tags: [llm, llm_vllm, vllm, vllm_8005]
    # ColPali has its own service (not vLLM-based)
    - role: colpali
      when: "'vllm' in group_names"
      tags: [llm, llm_colpali, colpali]
    # On-demand GPU media services (STT + TTS + image gen, share GPU 0 with ingestion stack)
    - role: whisper_gpu
      when: "'vllm' in group_names"
      tags: [llm, llm_media, gpu_media, whisper_gpu]
    - role: kokoro_gpu
      when: "'vllm' in group_names"
      tags: [llm, llm_media, gpu_media, kokoro_gpu]
    - role: flux_gpu
      when: "'vllm' in group_names"
      tags: [llm, llm_media, gpu_media, flux_gpu]

# 2.2 LiteLLM (LLM gateway/proxy)
- name: Deploy LiteLLM Proxy
  hosts: litellm
  tags: [llm, llm_litellm]
  roles:
    - role: litellm
      tags: [llm, llm_litellm, litellm]

# =============================================================================
# GROUP 3: APIs (tag: apis)
# Application services that depend on core + llm
# =============================================================================

# 3.1a AuthZ (authentication/authorization) - needed by all other APIs
- hosts: authz
  tags: [apis, apis_authz, authz]
  roles:
    - role: authz
      tags: [apis, apis_authz, authz]

# 3.1b Deploy API - runs in authz container for secure deployment operations
# Note: Separate play from authz to prevent authz tasks running when only deploy_api is targeted
# deploy_api_ssh tag allows refreshing SSH keys without a full deploy-api redeploy
- hosts: authz
  tags: [apis, deploy, deploy_api, deploy_api_ssh]
  roles:
    - role: deploy_api
      tags: [apis, deploy, deploy_api]

# 3.1c Config API - runs in authz container for centralised configuration management
# Auto-creates its own database on startup; no postgres role dependency
- hosts: authz
  tags: [apis, config, config_api]
  roles:
    - role: config_api
      tags: [apis, config, config_api]

# 3.2a Redis (runs on data-lxc but as a separate lightweight play)
# Separated from main data play so --tags redis doesn't trigger the entire data role
- hosts: data
  tags: [redis]
  tasks:
    - name: Load secrets
      include_vars:
        file: "{{ playbook_dir }}/roles/secrets/vars/vault.{{ deployment_environment | default('dev') }}.yml"
      no_log: true
      tags: [redis]
    - name: Install Redis (standalone)
      apt:
        name: [redis-server, redis-tools]
        state: present
        update_cache: yes
      tags: [redis]
    - name: Configure Redis to listen on all interfaces
      lineinfile:
        path: /etc/redis/redis.conf
        regexp: '^bind '
        line: 'bind 0.0.0.0 ::1'
      tags: [redis]
    - name: Disable Redis protected mode (internal network)
      lineinfile:
        path: /etc/redis/redis.conf
        regexp: '^protected-mode '
        line: 'protected-mode no'
      tags: [redis]
    - name: Start and enable Redis
      systemd:
        name: redis-server
        state: restarted
        enabled: yes
      tags: [redis]

# 3.2b Data (file ingestion, worker)
# Tag structure:
#   - apis_data: runs entire data role
#   - data: runs entire data role
#   - data_api: runs only data API tasks (shared deploy + API service)
#   - data_worker: runs only worker tasks (shared deploy + worker service)
# NOTE: data_api/data_worker are on play tags to allow the play to run,
# but task-level tags filter which specific tasks execute
# NOTE: Redis is NOT included here — use the dedicated redis play above
- hosts: data
  tags: [apis, apis_data, data, data_api, data_worker]
  roles:
    - role: data
      tags: [apis, apis_data, data, data_api, data_worker]

# 3.2.1 Embedding API (separate play to avoid running data role GPU tasks)
# Uses FastEmbed for CPU-based embeddings - does NOT need GPU
# NOTE: Separated from data play because play-level tags cause both roles to run
- hosts: data
  tags: [apis, apis_embedding, embedding_api, embedding]
  roles:
    - role: embedding_api
      tags: [apis, apis_embedding, embedding_api, embedding]

# 3.3 Search API
# Note: Removed 'search' from role tags to avoid confusion with milvus core service
- hosts: milvus
  tags: [apis, apis_search, search_api]
  roles:
    - role: search_api
      tags: [apis, apis_search, search_api, search-api]

# 3.4 Agent API + Docs API (both on agent-lxc)
#
# Tag structure:
#   - apis_agent: runs all services on this host (agent_api + docs_api)
#   - agent_api: runs only agent_api role
#   - docs_api: runs only docs_api role
# Note: Removed 'agent' and 'docs' broad tags from role level to prevent confusion
- hosts: agent
  tags: [apis, apis_agent, agent_api, docs_api]
  roles:
    - role: agent_api
      tags: [apis, apis_agent, agent_api]
    - role: docs_api
      tags: [apis, apis_agent, docs_api]

# 3.6 Bridge Service (optional - multi-channel communication)
- hosts: bridge
  tags: [apis, apis_bridge, bridge]
  roles:
    - role: bridge
      tags: [apis, apis_bridge, bridge]
      # Bridge service is optional and non-blocking
      # Handles multi-channel communication: Signal, Email, WhatsApp, Webhooks
  ignore_errors: true  # Don't fail deployment if bridge host doesn't exist

# =============================================================================
# GROUP 4: APPS (tag: apps)
# Frontend applications
# =============================================================================

# 4.1 Next.js Applications (busibox-portal, busibox-agents)
- hosts: apps
  tags: [apps, apps_frontend]
  roles:
    - role: node_common
      tags: [apps, apps_frontend, node_common]
    - role: secrets
      tags: [apps, apps_frontend, secrets]
    - role: app_deployer
      tags: [apps, apps_frontend, app_deployer]

# 4.1.1 User Apps Container (external/untrusted app deployments)
# Provisions user-apps-lxc with Node.js, git, and other prerequisites
# so the deploy-api can SSH in and deploy user apps at runtime
# NOTE: Only runs with explicit user_apps tag, NOT during normal 'apps' install
- hosts: user_apps
  tags: [user_apps]
  roles:
    - role: node_common
      tags: [user_apps, node_common]

# 4.1.2 Custom Services Container (custom Docker Compose stacks)
# Provisions custom-services-lxc with Docker CE so deploy-api can SSH in
# and deploy multi-container services (appMode: "custom") at runtime
# NOTE: Only runs with explicit custom_services tag
- hosts: custom_services
  tags: [custom_services]
  roles:
    - role: custom_services
      tags: [custom_services]

# 4.1.3 Reconfigure nginx after app deployment
# This ensures nginx routes are updated after apps are deployed
- hosts: proxy
  tags: [apps, apps_frontend, nginx_post_apps]
  roles:
    - role: secrets
      tags: [apps, apps_frontend, nginx_post_apps, secrets]
    - role: nginx
      tags: [apps, apps_frontend, nginx_post_apps, nginx]

# 4.2 OpenWebUI (optional)
- hosts: openwebui
  tags: [apps, apps_openwebui]
  roles:
    - role: nginx
      tags: [apps, apps_openwebui, openwebui, nginx]

# =============================================================================
# CONFIGURATION: Tailscale VPN (optional - secure remote access)
# =============================================================================
# This is a configuration step, not part of core deployment.
# Run separately: make tailscale
#
# Tailscale provides secure remote access to the proxy container.
# Should be configured after initial deployment, not during core setup.

- hosts: proxy
  tags: [configure, tailscale]
  roles:
    - role: tailscale
      tags: [configure, tailscale]
