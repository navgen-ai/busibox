- hosts: files
  roles: [minio]

- hosts: pg
  roles: [postgres]

- hosts: milvus
  roles: [milvus]

- hosts: agent
  roles:
    - node_common
    - agent_api
    - deploywatch
    - role: secrets
      tags: [secrets]
    - role: app_deployer
      tags: [app_deployer]

- hosts: ingest
  roles: [node_common, ingest_worker]

- hosts: apps
  roles:
    - node_common
    - role: secrets
      tags: [secrets]
    - role: nextjs_app
      tags: [apps, nextjs]
    - role: app_deployer
      tags: [app_deployer]

- hosts: proxy
  roles:
    - role: nginx
      tags: [proxy, nginx]

- hosts: openwebui
  roles: [nginx]

# LLM Services - Deploy backends first, then proxy
- name: Deploy LLM Inference Backends (can run in parallel)
  hosts: ollama:vllm
  roles:
    - role: ollama
      when: "'ollama' in group_names"
      tags: [llm, ollama]
    - role: vllm
      when: "'vllm' in group_names"
      tags: [llm, vllm]

- name: Deploy LiteLLM Proxy (depends on backends)
  hosts: litellm
  roles:
    - role: litellm
      tags: [llm, litellm]
