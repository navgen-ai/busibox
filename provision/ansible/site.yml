- hosts: files
  roles: [minio]

- hosts: pg
  roles: [postgres]

- hosts: milvus
  roles: [milvus]

- hosts: agent
  roles:
    - node_common
    - agent_api
    - deploywatch
    - role: secrets
      tags: [secrets]
    - role: app_deployer
      tags: [app_deployer]

- hosts: ingest
  roles: [node_common, ingest_worker]

- hosts: apps
  roles:
    - node_common
    - role: secrets
      tags: [secrets]
    - role: app_deployer
      tags: [app_deployer]

- hosts: openwebui
  roles: [nginx]

# LLM Services
- hosts: ollama
  roles:
    - role: ollama
      tags: [llm, ollama]

- hosts: vllm
  roles:
    - role: vllm
      tags: [llm, vllm]

- hosts: litellm
  roles:
    - role: litellm
      tags: [llm, litellm]
