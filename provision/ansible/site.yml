# Deployment order optimized for dependencies:
# 1. PostgreSQL (database - required by many services)
# 2. Milvus (vector database - standalone, no dependencies)
# 3. Agent API (provides webhooks for MinIO, uses PostgreSQL)
# 4. MinIO (file storage - can configure webhook to agent API)
# 5. Ingest Worker (needs agent API + MinIO + Milvus + PostgreSQL)
# 6. Proxy (nginx reverse proxy - must be deployed before apps)
# 7. Apps (Next.js applications - depend on proxy for routing)

- hosts: pg
  roles:
    - role: postgres
      tags: [postgres]

- hosts: milvus
  roles:
    - role: milvus
      tags: [milvus]
    - role: search_api
      tags: [search, search_api, search-api]

- hosts: agent
  roles:
    - role: node_common
      tags: [agent, node_common]
    - role: secrets
      tags: [agent, secrets]
    - role: app_deployer
      tags: [agent, app_deployer]

- hosts: files
  roles:
    - role: minio
      tags: [files, minio]

- hosts: ingest
  roles:
    - role: node_common
      tags: [ingest, node_common]
    - role: ingest
      tags: [ingest, ingest_api, ingest_worker]

- hosts: proxy
  roles:
    - role: nginx
      tags: [proxy, nginx]

- hosts: apps
  roles:
    - role: node_common
      tags: [apps, node_common]
    - role: secrets
      tags: [apps, secrets]
    - role: app_deployer
      tags: [apps, app_deployer]

- hosts: openwebui
  roles:
    - role: nginx
      tags: [openwebui, nginx]

# LLM Services - Deploy backends first, then proxy
- name: Deploy LLM Inference Backends (can run in parallel)
  hosts: vllm  # Ollama temporarily disabled
  pre_tasks:
    - name: Install required cleanup tools
      apt:
        name:
          - psmisc  # Provides fuser
          - lsof    # For debugging
        state: present
        update_cache: false
      failed_when: false
      tags: [vllm]  # Only run for vLLM deployments
    
    - name: Stop vLLM services one by one to ensure proper GPU memory release
      systemd:
        name: "vllm-{{ item }}"
        state: stopped
      loop: [8000, 8001, 8002, 8003, 8004, 8005]
      failed_when: false
      tags: [vllm]  # Only run for vLLM deployments
    
    - name: Wait for systemd to process stop requests
      pause:
        seconds: 5
      tags: [vllm]  # Only run for vLLM deployments
    
    - name: Force kill any remaining vLLM processes
      shell: |
        # Find and kill vLLM API server processes
        pgrep -f "vllm.entrypoints.openai.api_server" | xargs -r kill -9 2>/dev/null || true
        
        # Find and kill any Python processes running vLLM
        pgrep -f "python.*vllm" | xargs -r kill -9 2>/dev/null || true
        
        # Kill Ray processes (vLLM uses Ray for distributed inference)
        pgrep -f "ray::" | xargs -r kill -9 2>/dev/null || true
        
        echo "Killed remaining vLLM processes"
      register: kill_result
      changed_when: false
      failed_when: false
      tags: [vllm]  # Only run for vLLM deployments
    
    - name: Force release GPU memory (vLLM on GPU 1+ only - preserves GPU 0)
      shell: |
        # CRITICAL: GPU 0 is RESERVED for visual processing (ColPali + Marker)
        # This cleanup ONLY targets vLLM processes on GPU 1+
        # DO NOT touch GPU 0 under any circumstances
        
        # Kill vLLM-specific processes ONLY
        # vLLM processes identifiable by:
        # - Process name contains "vllm.entrypoints"
        # - Process name contains "ray::" (vLLM distributed engine)
        # - CUDA_VISIBLE_DEVICES does NOT include 0 (vLLM uses GPU 1+)
        
        killed_pids=""
        
        # Method 1: Kill vLLM API server processes
        for pid in $(pgrep -f "vllm.entrypoints.openai.api_server" 2>/dev/null); do
          if [ -f "/proc/$pid/environ" ]; then
            # Check CUDA_VISIBLE_DEVICES - skip if it contains GPU 0
            cuda_devices=$(tr '\0' '\n' < /proc/$pid/environ 2>/dev/null | grep "^CUDA_VISIBLE_DEVICES=" | cut -d= -f2)
            if [[ "$cuda_devices" != *"0"* ]] || [[ -z "$cuda_devices" ]]; then
              # Safe to kill - not using GPU 0
              kill -9 "$pid" 2>/dev/null && killed_pids="$killed_pids $pid" || true
            else
              echo "Preserved PID $pid (uses GPU 0)"
            fi
          fi
        done
        
        # Method 2: Kill Ray processes (vLLM distributed engine)
        for pid in $(pgrep -f "ray::" 2>/dev/null); do
          # Ray processes for vLLM should not be on GPU 0
          cuda_devices=$(tr '\0' '\n' < /proc/$pid/environ 2>/dev/null | grep "^CUDA_VISIBLE_DEVICES=" | cut -d= -f2)
          if [[ "$cuda_devices" != *"0"* ]] || [[ -z "$cuda_devices" ]]; then
            kill -9 "$pid" 2>/dev/null && killed_pids="$killed_pids $pid" || true
          fi
        done
        
        # Method 3: Kill vLLM worker processes
        for pid in $(pgrep -f "python.*vllm.*worker" 2>/dev/null); do
          cuda_devices=$(tr '\0' '\n' < /proc/$pid/environ 2>/dev/null | grep "^CUDA_VISIBLE_DEVICES=" | cut -d= -f2)
          if [[ "$cuda_devices" != *"0"* ]] || [[ -z "$cuda_devices" ]]; then
            kill -9 "$pid" 2>/dev/null && killed_pids="$killed_pids $pid" || true
          fi
        done
        
        if [ -n "$killed_pids" ]; then
          echo "Killed vLLM processes (GPU 1+ only):$killed_pids"
        else
          echo "No vLLM processes found to kill"
        fi
        echo "GPU 0 preserved (ColPali + Marker continue running)"
      register: gpu_cleanup
      changed_when: false
      failed_when: false
      tags: [vllm]  # Only run for vLLM deployments
    
    - name: Clean shared memory and temp files
      shell: |
        # Clean shared memory (PyTorch/Ray use this heavily)
        find /dev/shm -type f -name "*torch*" -delete 2>/dev/null || true
        find /dev/shm -type f -name "*ray*" -delete 2>/dev/null || true
        
        # Clean /tmp for vLLM temp files
        find /tmp -type f -name "*vllm*" -mmin +5 -delete 2>/dev/null || true
        
        echo "Cleaned shared memory and temp files"
      register: shm_cleanup
      changed_when: false
      failed_when: false
      tags: [vllm]  # Only run for vLLM deployments
    
    - name: Wait for GPU memory to be fully released
      pause:
        seconds: 10
      tags: [vllm]  # Only run for vLLM deployments
    
    - name: Verify GPU memory is free
      shell: nvidia-smi --query-gpu=memory.used --format=csv,noheader,nounits
      register: gpu_memory_check
      changed_when: false
      failed_when: false
      tags: [vllm]  # Only run for vLLM deployments
    
    - name: Display GPU memory status
      debug:
        msg: "GPU memory usage (MB): {{ gpu_memory_check.stdout_lines }}"
      when: gpu_memory_check.stdout_lines is defined
      tags: [vllm]  # Only run for vLLM deployments
  roles:
    # - role: ollama  # Temporarily disabled - using vLLM only
    #   when: "'ollama' in group_names"
    #   tags: [llm, ollama]
    # Port-based vLLM roles - each checks model_config.yml for assigned models
    - role: vllm_8000
      when: "'vllm' in group_names"
      tags: [llm, vllm, vllm_8000]
    - role: vllm_8001
      when: "'vllm' in group_names"
      tags: [llm, vllm, vllm_8001]
    - role: vllm_8002
      when: "'vllm' in group_names"
      tags: [llm, vllm, vllm_8002]
    - role: vllm_8003
      when: "'vllm' in group_names"
      tags: [llm, vllm, vllm_8003]
    - role: vllm_8004
      when: "'vllm' in group_names"
      tags: [llm, vllm, vllm_8004]
    - role: vllm_8005
      when: "'vllm' in group_names"
      tags: [llm, vllm, vllm_8005]
    # ColPali has its own service (not vLLM-based)
    - role: colpali
      when: "'vllm' in group_names"
      tags: [llm, colpali]

- name: Deploy LiteLLM Proxy (depends on backends)
  hosts: litellm
  roles:
    - role: litellm
      tags: [llm, litellm]
