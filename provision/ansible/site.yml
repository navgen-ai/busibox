# Deployment order optimized for dependencies:
# 1. PostgreSQL (database - required by many services)
# 2. Milvus (vector database - standalone, no dependencies)
# 3. Agent API (provides webhooks for MinIO, uses PostgreSQL)
# 4. MinIO (file storage - can configure webhook to agent API)
# 5. Ingest Worker (needs agent API + MinIO + Milvus + PostgreSQL)

- hosts: pg
  roles: [postgres]

- hosts: milvus
  roles: [milvus]

- hosts: agent
  roles:
    - node_common
    - agent_api
    - deploywatch
    - role: secrets
      tags: [secrets]
    - role: app_deployer
      tags: [app_deployer]

- hosts: files
  roles: [minio]

- hosts: ingest
  roles: [node_common, ingest_worker]

- hosts: apps
  pre_tasks:
    - name: Set nextjs_app variables from applications array
      set_fact:
        app_git_repo: "{{ (applications | selectattr('name', 'equalto', 'ai-portal') | first).github_repo }}"
        app_name: "{{ (applications | selectattr('name', 'equalto', 'ai-portal') | first).name }}"
        app_port: "{{ (applications | selectattr('name', 'equalto', 'ai-portal') | first).port }}"
        app_home: "{{ (applications | selectattr('name', 'equalto', 'ai-portal') | first).deploy_path | default('/opt/ai-portal') }}"
        app_build_command: "{{ (applications | selectattr('name', 'equalto', 'ai-portal') | first).build_command | default('npm run build') }}"
        app_health_check_path: "{{ (applications | selectattr('name', 'equalto', 'ai-portal') | first).health_endpoint }}"
        app_env_vars: "{{ (applications | selectattr('name', 'equalto', 'ai-portal') | first).env }}"
        app_secrets: "{{ (applications | selectattr('name', 'equalto', 'ai-portal') | first).secrets | default([]) }}"
        app_git_branch: "main"
      when: applications is defined
      tags: [apps, nextjs]

  roles:
    - node_common
    - role: secrets
      tags: [secrets]
    - role: nextjs_app
      tags: [apps, nextjs]
    - role: app_deployer
      tags: [app_deployer]

- hosts: proxy
  roles:
    - role: nginx
      tags: [proxy, nginx]

- hosts: openwebui
  roles: [nginx]

# LLM Services - Deploy backends first, then proxy
- name: Deploy LLM Inference Backends (can run in parallel)
  hosts: ollama:vllm
  roles:
    - role: ollama
      when: "'ollama' in group_names"
      tags: [llm, ollama]
    - role: vllm
      when: "'vllm' in group_names"
      tags: [llm, vllm]

- name: Deploy LiteLLM Proxy (depends on backends)
  hosts: litellm
  roles:
    - role: litellm
      tags: [llm, litellm]
