---
# Busibox Docker Deployment Playbook
#
# This playbook deploys Busibox infrastructure and services via Docker Compose.
# It mirrors the functionality of site.yml but targets Docker instead of LXC containers.
#
# Usage:
#   # Full deployment
#   ansible-playbook -i inventory/docker docker.yml
#
#   # Deploy specific service groups
#   ansible-playbook -i inventory/docker docker.yml --tags infrastructure
#   ansible-playbook -i inventory/docker docker.yml --tags apis
#   ansible-playbook -i inventory/docker docker.yml --tags frontend
#
#   # Deploy specific services
#   ansible-playbook -i inventory/docker docker.yml --tags postgres
#   ansible-playbook -i inventory/docker docker.yml --tags authz
#
# Environment Variables:
#   CONTAINER_PREFIX - Container naming prefix (default: dev)
#   GITHUB_AUTH_TOKEN - GitHub token for private repos
#   BUSIBOX_ENV - Environment name (development, demo)
#
# Tags:
#   - all: Everything
#   - infrastructure: postgres, redis, minio, milvus, neo4j
#   - apis: authz, embedding, data, search, agent, docs, deploy, bridge
#   - llm: vllm (when LLM_BACKEND=vllm), litellm
#   - frontend: proxy, core-apps
#   - user-apps: user-apps container
#
#   Each service has its own tag for targeted deployment:
#     postgres, redis, minio, milvus, neo4j (infrastructure)
#     authz, embedding, data, search, agent, docs, deploy, bridge (apis)
#     vllm, litellm (llm), proxy, core-apps (frontend)

- name: Busibox Docker Deployment
  hosts: localhost
  connection: local
  gather_facts: true
  
  vars:
    deploy_target: docker
  
  pre_tasks:
    - name: Display deployment information
      ansible.builtin.debug:
        msg: |
          ═══════════════════════════════════════════════════════════════════
          BUSIBOX DOCKER DEPLOYMENT
          ═══════════════════════════════════════════════════════════════════
          Environment: {{ busibox_env | default('development') }}
          Container Prefix: {{ container_prefix | default('dev') }}
          Vault Prefix: {{ vault_prefix | default(container_prefix) | default('dev') }}
          Compose Project: {{ compose_project_name | default(container_prefix) }}
          Docker Mode: {{ docker_dev_mode | default('local-dev') }}
          ═══════════════════════════════════════════════════════════════════
      tags: always

    # Vault file: vault.{vault_prefix}.yml (no legacy fallbacks)
    - name: Check for vault file
      ansible.builtin.stat:
        path: "{{ playbook_dir }}/roles/secrets/vars/vault.{{ vault_prefix | default(container_prefix) | default('dev') }}.yml"
      register: env_vault_file
      tags: always

    - name: Fail if vault file missing
      ansible.builtin.fail:
        msg: |
          ❌ VAULT FILE NOT FOUND

          Expected: roles/secrets/vars/vault.{{ vault_prefix | default(container_prefix) | default('dev') }}.yml
          Full path: {{ playbook_dir }}/roles/secrets/vars/vault.{{ vault_prefix | default(container_prefix) | default('dev') }}.yml

          The vault file must exist. Run 'busibox install' to generate it,
          or ensure VAULT_PREFIX matches an existing vault file.
      when: not env_vault_file.stat.exists
      tags: always

    - name: Load secrets from vault
      ansible.builtin.include_vars:
        file: "roles/secrets/vars/vault.{{ vault_prefix | default(container_prefix) | default('dev') }}.yml"
      no_log: false
      tags: always

    - name: Assert vault secrets loaded successfully
      ansible.builtin.assert:
        that:
          - secrets is defined
          - secrets is mapping
        fail_msg: |
          ❌ VAULT SECRETS NOT AVAILABLE

          The vault file was loaded but 'secrets' is not available as a mapping.
          The vault should have been validated and upgraded at profile unlock time.
          Run 'busibox' and re-select your profile to trigger vault auto-upgrade.
        success_msg: "✓ Vault secrets loaded ({{ secrets.keys() | list | length }} top-level keys)"
      tags: always

    - name: Load shared secrets mapping
      ansible.builtin.include_vars:
        file: "{{ playbook_dir }}/roles/secrets/vars/shared_secrets.yml"
      tags: always

    - name: Validate required secrets are available
      ansible.builtin.assert:
        that:
          - busibox_secrets.POSTGRES_PASSWORD | default('') | length > 0
          - busibox_secrets.MINIO_ROOT_USER | default('') | length > 0
          - busibox_secrets.MINIO_ROOT_PASSWORD | default('') | length > 0
          - busibox_secrets.AUTHZ_MASTER_KEY | default('') | length > 0
          - busibox_secrets.SSO_JWT_SECRET | default('') | length > 0
          - busibox_secrets.LITELLM_MASTER_KEY | default('') | length > 0
        fail_msg: |
          ❌ REQUIRED SECRETS MISSING

          One or more required secrets are empty or not loaded from the vault.
          This usually means the vault file could not be decrypted or has placeholder values.

          Vault prefix: {{ vault_prefix | default(container_prefix) | default('dev') }}
          Expected file: roles/secrets/vars/vault.{{ vault_prefix | default(container_prefix) | default('dev') }}.yml

          Values found:
            POSTGRES_PASSWORD:  {{ '✓' if (busibox_secrets.POSTGRES_PASSWORD | default('') | length > 0) else '✗ MISSING' }}
            MINIO_ROOT_USER:    {{ '✓' if (busibox_secrets.MINIO_ROOT_USER | default('') | length > 0) else '✗ MISSING' }}
            MINIO_ROOT_PASSWORD:{{ '✓' if (busibox_secrets.MINIO_ROOT_PASSWORD | default('') | length > 0) else '✗ MISSING' }}
            AUTHZ_MASTER_KEY:   {{ '✓' if (busibox_secrets.AUTHZ_MASTER_KEY | default('') | length > 0) else '✗ MISSING' }}
            SSO_JWT_SECRET:     {{ '✓' if (busibox_secrets.SSO_JWT_SECRET | default('') | length > 0) else '✗ MISSING' }}
            LITELLM_MASTER_KEY: {{ '✓' if (busibox_secrets.LITELLM_MASTER_KEY | default('') | length > 0) else '✗ MISSING' }}

          Check that:
            1. The vault file exists and can be decrypted with the current vault password
            2. Secret values are not CHANGE_ME placeholders
            3. ANSIBLE_VAULT_PASSWORD is set correctly
        success_msg: "✓ All required secrets validated"
      tags: always

    - name: Warn about placeholder secrets
      ansible.builtin.debug:
        msg: |
          ⚠️  WARNING: Some secrets appear to be placeholder values (CHANGE_ME).
          These should be replaced with real values before production use.

          Placeholder values found in:
          {% if 'CHANGE_ME' in (busibox_secrets.POSTGRES_PASSWORD | default('')) %}  - POSTGRES_PASSWORD{% endif %}
          {% if 'CHANGE_ME' in (busibox_secrets.MINIO_ROOT_USER | default('')) %}  - MINIO_ROOT_USER{% endif %}
          {% if 'CHANGE_ME' in (busibox_secrets.MINIO_ROOT_PASSWORD | default('')) %}  - MINIO_ROOT_PASSWORD{% endif %}
          {% if 'CHANGE_ME' in (busibox_secrets.AUTHZ_MASTER_KEY | default('')) %}  - AUTHZ_MASTER_KEY{% endif %}
          {% if 'CHANGE_ME' in (busibox_secrets.SSO_JWT_SECRET | default('')) %}  - SSO_JWT_SECRET{% endif %}
      when: >
        'CHANGE_ME' in (busibox_secrets.POSTGRES_PASSWORD | default(''))
        or 'CHANGE_ME' in (busibox_secrets.MINIO_ROOT_USER | default(''))
        or 'CHANGE_ME' in (busibox_secrets.MINIO_ROOT_PASSWORD | default(''))
        or 'CHANGE_ME' in (busibox_secrets.AUTHZ_MASTER_KEY | default(''))
        or 'CHANGE_ME' in (busibox_secrets.SSO_JWT_SECRET | default(''))
      tags: always

    - name: Initialize Docker common
      ansible.builtin.include_role:
        name: docker_common
      tags: always

    - name: Generate environment file
      ansible.builtin.include_role:
        name: docker_common
        tasks_from: generate_env
      vars:
        docker_env_template: docker.env.j2
      tags: always

  tasks:
    # =========================================================================
    # INFRASTRUCTURE - Data stores and supporting services
    # =========================================================================
    
    - name: Deploy PostgreSQL
      ansible.builtin.include_role:
        name: postgres
        tasks_from: docker
        apply:
          tags:
            - infrastructure
            - postgres
      tags:
        - infrastructure
        - postgres

    - name: Deploy MinIO
      ansible.builtin.include_role:
        name: minio
        tasks_from: docker
        apply:
          tags:
            - infrastructure
            - minio
      tags:
        - infrastructure
        - minio

    - name: Deploy Milvus
      ansible.builtin.include_role:
        name: milvus
        tasks_from: docker
        apply:
          tags:
            - infrastructure
            - milvus
      tags:
        - infrastructure
        - milvus

    - name: Deploy Redis
      ansible.builtin.include_role:
        name: docker_common
        tasks_from: compose_up
        apply:
          tags:
            - infrastructure
            - redis
      vars:
        docker_services_to_start:
          - redis
        docker_wait_for_health: true
      tags:
        - infrastructure
        - redis

    - name: Wait for Redis to be ready
      ansible.builtin.include_role:
        name: docker_common
        tasks_from: wait_healthy
        apply:
          tags:
            - infrastructure
            - redis
      vars:
        docker_wait_service: redis
        docker_wait_timeout: 30
      tags:
        - infrastructure
        - redis

    - name: Deploy Neo4j
      ansible.builtin.include_role:
        name: neo4j
        tasks_from: docker
        apply:
          tags:
            - infrastructure
            - neo4j
      tags:
        - infrastructure
        - neo4j

    # =========================================================================
    # API SERVICES - Backend services
    # =========================================================================
    
    - name: Deploy AuthZ API
      ansible.builtin.include_role:
        name: authz
        tasks_from: docker
        apply:
          tags:
            - apis
            - authz
      tags:
        - apis
        - authz

    - name: Deploy Embedding API
      ansible.builtin.include_role:
        name: embedding_api
        tasks_from: docker
        apply:
          tags:
            - apis
            - embedding
      tags:
        - apis
        - embedding

    - name: Deploy Data Services
      ansible.builtin.include_role:
        name: data
        tasks_from: docker
        apply:
          tags:
            - apis
            - data
      tags:
        - apis
        - data

    - name: Deploy Search API
      ansible.builtin.include_role:
        name: search_api
        tasks_from: docker
        apply:
          tags:
            - apis
            - search
      tags:
        - apis
        - search

    - name: Deploy Agent API
      ansible.builtin.include_role:
        name: agent_api
        tasks_from: docker
        apply:
          tags:
            - apis
            - agent
      tags:
        - apis
        - agent

    - name: Deploy Docs API
      ansible.builtin.include_role:
        name: docs_api
        tasks_from: docker
        apply:
          tags:
            - apis
            - docs
      tags:
        - apis
        - docs

    - name: Deploy Deploy API
      ansible.builtin.include_role:
        name: deploy_api
        tasks_from: docker
        apply:
          tags:
            - apis
            - deploy
      tags:
        - apis
        - deploy

    - name: Deploy Config API
      ansible.builtin.include_role:
        name: config_api
        tasks_from: docker
        apply:
          tags:
            - apis
            - config
            - config_api
      tags:
        - apis
        - config
        - config_api

    - name: Deploy Bridge API
      ansible.builtin.include_role:
        name: bridge
        tasks_from: docker
        apply:
          tags:
            - apis
            - bridge
            - apis_bridge
      tags:
        - apis
        - bridge
        - apis_bridge

    # =========================================================================
    # LLM SERVICES
    # =========================================================================

    - name: Deploy vLLM (local GPU inference)
      ansible.builtin.include_role:
        name: vllm_docker
        tasks_from: docker
        apply:
          tags:
            - llm
            - vllm
      when: lookup('env', 'LLM_BACKEND') == 'vllm'
      tags:
        - llm
        - vllm

    - name: Deploy LiteLLM
      ansible.builtin.include_role:
        name: litellm
        tasks_from: docker
        apply:
          tags:
            - llm
            - litellm
      tags:
        - llm
        - litellm

    # =========================================================================
    # FRONTEND - User-facing applications
    # =========================================================================
    
    # Dedicated proxy/nginx container (matches Proxmox architecture)
    - name: Deploy Proxy (Nginx)
      ansible.builtin.include_role:
        name: nginx
        tasks_from: docker
        apply:
          tags:
            - nginx-standalone
            - proxy
      tags:
        - frontend
        - nginx
        - nginx-standalone
        - proxy

    # Core Apps container includes Busibox Portal and Agent Manager
    # This mirrors the Proxmox apps-lxc architecture
    - name: Deploy Core Apps (Busibox Portal + Agent Manager)
      ansible.builtin.include_role:
        name: app_deployer
        tasks_from: docker
        apply:
          tags:
            - frontend
            - core-apps
            - apps
      tags:
        - frontend
        - core-apps
        - apps

    # =========================================================================
    # USER APPS - External application container
    # =========================================================================
    
    - name: Deploy User Apps Container
      ansible.builtin.include_role:
        name: user_apps
        tasks_from: docker
        apply:
          tags:
            - user-apps
            - apps
      tags:
        - user-apps
        - apps

    # =========================================================================
    # VALIDATION - Verify container env vars match vault secrets
    # =========================================================================

    - name: Validate Environment Secrets
      ansible.builtin.include_role:
        name: validate_env
        tasks_from: docker
        apply:
          tags:
            - validate_env
      tags:
        - validate_env

  post_tasks:
    - name: Display deployment summary
      ansible.builtin.debug:
        msg: |
          ═══════════════════════════════════════════════════════════════════
          ANSIBLE PLAYBOOK COMPLETE
          ═══════════════════════════════════════════════════════════════════
          
          Tags requested: {{ ansible_run_tags | default('all') }}
          Environment: {{ busibox_env | default('development') }}
          Container prefix: {{ container_prefix | default('dev') }}
          
          Note: Service health is verified separately after Ansible completes.
          
          ═══════════════════════════════════════════════════════════════════
      tags: always
