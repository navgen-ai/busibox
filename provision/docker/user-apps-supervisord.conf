# =============================================================================
# Supervisord Configuration for User Apps Container
# =============================================================================
#
# Base configuration - app-specific program configs are added dynamically
# by deploy-api into /etc/supervisor/conf.d/<app_id>.conf
#
# Unlike core-apps (which has static programs), user-apps programs are
# created/removed at runtime as apps are deployed/undeployed.
#
# Commands:
#   supervisorctl status              - Show all app status
#   supervisorctl start <app_id>      - Start an app
#   supervisorctl stop <app_id>       - Stop an app
#   supervisorctl restart <app_id>    - Restart an app
#   supervisorctl tail -f <app_id>    - Follow app logs
#   supervisorctl update              - Reload config after adding/removing apps
#   supervisorctl reread              - Re-read config files without restarting
#
# =============================================================================

[supervisord]
nodaemon=true
logfile=/var/log/supervisor/supervisord.log
logfile_maxbytes=10MB
logfile_backups=3
pidfile=/run/supervisord.pid
childlogdir=/var/log/supervisor
user=root
loglevel=info

# =============================================================================
# Include directory for dynamically added app configs
# =============================================================================
[include]
files = /etc/supervisor/conf.d/*.conf

# =============================================================================
# Unix Socket for supervisorctl
# =============================================================================
[unix_http_server]
file=/run/supervisord.sock
chmod=0700

[supervisorctl]
serverurl=unix:///run/supervisord.sock

[rpcinterface:supervisor]
supervisor.rpcinterface_factory = supervisor.rpcinterface:make_main_rpcinterface
