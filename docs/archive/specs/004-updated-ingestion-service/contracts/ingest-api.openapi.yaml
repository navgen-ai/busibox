openapi: 3.0.3
info:
  title: Busibox Data Service API
  description: |
    Internal API for document upload, processing, and status tracking.
    This API is deployed to data-lxc and accessible only within the container network.
    
    ## Features
    - File upload with presigned MinIO URLs
    - Real-time processing status via Server-Sent Events (SSE)
    - Multi-stage pipeline tracking (parsing, chunking, embedding, indexing)
    - File metadata retrieval and deletion
  version: 1.0.0
  contact:
    name: Busibox Development
    
servers:
  - url: http://data-lxc:8002
    description: Data service (internal only)

tags:
  - name: Upload
    description: File upload operations
  - name: Status
    description: Processing status tracking
  - name: Files
    description: File metadata and management
  - name: Health
    description: Service health checks

paths:
  /upload:
    post:
      tags: [Upload]
      summary: Upload a document for processing
      description: |
        Upload a file to MinIO storage and queue it for ingestion processing.
        Returns a file ID for tracking status.
        
        The API will:
        1. Validate file type and size
        2. Upload to MinIO (s3://documents/{user_id}/{file_id}/)
        3. Create database record
        4. Queue job in Redis Streams
        5. Return file ID immediately
      operationId: uploadFile
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required:
                - file
              properties:
                file:
                  type: string
                  format: binary
                  description: Document file (PDF, DOCX, TXT, etc.)
                metadata:
                  type: object
                  description: Optional metadata (tags, custom fields)
                  additionalProperties: true
      parameters:
        - name: X-User-Id
          in: header
          required: true
          schema:
            type: string
            format: uuid
          description: User ID from authentication context
      responses:
        '200':
          description: File uploaded successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UploadResponse'
        '400':
          description: Invalid file or request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '413':
          description: File too large (>100MB)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /status/{fileId}:
    get:
      tags: [Status]
      summary: Stream processing status updates (SSE)
      description: |
        Server-Sent Events endpoint that streams real-time processing status.
        
        The stream will emit:
        - Current status immediately upon connection
        - Updates whenever processing stage changes
        - Final status when processing completes or fails
        - Automatic close when processing is terminal (completed/failed)
        
        Event types:
        - `status`: Processing status update
        - `close`: Stream ending (processing complete)
      operationId: streamStatus
      parameters:
        - name: fileId
          in: path
          required: true
          schema:
            type: string
            format: uuid
          description: File ID from upload response
        - name: X-User-Id
          in: header
          required: true
          schema:
            type: string
            format: uuid
          description: User ID (must match file owner)
      responses:
        '200':
          description: SSE stream of status updates
          content:
            text/event-stream:
              schema:
                type: object
                properties:
                  event:
                    type: string
                    enum: [status, close]
                  data:
                    oneOf:
                      - $ref: '#/components/schemas/StatusUpdate'
                      - type: object
                        properties:
                          message:
                            type: string
              example: |
                event: status
                data: {"fileId":"file-123","stage":"parsing","progress":10,"chunksProcessed":0,"totalChunks":0}
                
                event: status
                data: {"fileId":"file-123","stage":"chunking","progress":40,"chunksProcessed":0,"totalChunks":42}
                
                event: status
                data: {"fileId":"file-123","stage":"completed","progress":100,"chunksProcessed":42,"totalChunks":42}
                
                event: close
                data: {"message":"Processing complete"}
        '404':
          description: File not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Unauthorized (user does not own file)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /files/{fileId}:
    get:
      tags: [Files]
      summary: Get file metadata
      description: Retrieve metadata for a processed file
      operationId: getFileMetadata
      parameters:
        - name: fileId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: X-User-Id
          in: header
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: File metadata
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FileMetadata'
        '404':
          description: File not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    
    delete:
      tags: [Files]
      summary: Delete a file and its vectors
      description: |
        Delete file from MinIO, remove vectors from Milvus, and delete metadata from PostgreSQL.
        This is a cascading delete operation.
      operationId: deleteFile
      parameters:
        - name: fileId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: X-User-Id
          in: header
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '204':
          description: File deleted successfully
        '404':
          description: File not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /health:
    get:
      tags: [Health]
      summary: Health check
      description: Check if service and dependencies are healthy
      operationId: healthCheck
      responses:
        '200':
          description: Service is healthy
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'
        '503':
          description: Service or dependencies unhealthy
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'

components:
  schemas:
    UploadResponse:
      type: object
      required:
        - fileId
        - filename
        - sizeBytes
        - status
      properties:
        fileId:
          type: string
          format: uuid
          description: Unique identifier for the uploaded file
          example: "file-123e4567-e89b-12d3-a456-426614174000"
        filename:
          type: string
          description: Original filename
          example: "Q4_Financial_Report.pdf"
        sizeBytes:
          type: integer
          format: int64
          description: File size in bytes
          example: 2048000
        mimeType:
          type: string
          description: MIME type of the file
          example: "application/pdf"
        status:
          type: string
          enum: [queued]
          description: Initial processing status
          example: "queued"
        createdAt:
          type: string
          format: date-time
          description: Upload timestamp
          example: "2025-11-05T10:00:00Z"

    StatusUpdate:
      type: object
      required:
        - fileId
        - stage
        - progress
      properties:
        fileId:
          type: string
          format: uuid
          example: "file-123e4567-e89b-12d3-a456-426614174000"
        stage:
          type: string
          enum:
            - queued
            - parsing
            - classifying
            - extracting_metadata
            - chunking
            - embedding
            - indexing
            - completed
            - failed
          description: Current processing stage
          example: "chunking"
        progress:
          type: integer
          minimum: 0
          maximum: 100
          description: Overall progress percentage
          example: 45
        chunksProcessed:
          type: integer
          description: Number of chunks processed so far
          example: 15
          nullable: true
        totalChunks:
          type: integer
          description: Total number of chunks to process
          example: 42
          nullable: true
        pagesProcessed:
          type: integer
          description: PDF pages processed (for PDFs only)
          nullable: true
        totalPages:
          type: integer
          description: Total PDF pages (for PDFs only)
          nullable: true
        errorMessage:
          type: string
          description: Error message if stage is 'failed'
          nullable: true
        updatedAt:
          type: string
          format: date-time
          description: Last update timestamp
          example: "2025-11-05T10:00:30Z"

    FileMetadata:
      type: object
      required:
        - fileId
        - userId
        - filename
        - mimeType
        - sizeBytes
        - createdAt
      properties:
        fileId:
          type: string
          format: uuid
        userId:
          type: string
          format: uuid
        filename:
          type: string
          example: "Q4_Financial_Report.pdf"
        originalFilename:
          type: string
          example: "Q4 Financial Report.pdf"
        mimeType:
          type: string
          example: "application/pdf"
        sizeBytes:
          type: integer
          format: int64
          example: 2048000
        storagePath:
          type: string
          description: S3 path in MinIO
          example: "s3://documents/user-456/file-123/Q4_Financial_Report.pdf"
        documentType:
          type: string
          description: Classified document type
          example: "report"
          nullable: true
        language:
          type: string
          description: ISO 639-1 language code
          example: "en"
          nullable: true
        classificationConfidence:
          type: number
          format: float
          minimum: 0
          maximum: 1
          description: Classification confidence score
          example: 0.95
          nullable: true
        chunkCount:
          type: integer
          description: Number of text chunks generated
          example: 42
        vectorCount:
          type: integer
          description: Number of vectors stored in Milvus
          example: 42
        processingDurationSeconds:
          type: integer
          description: Total processing time
          example: 67
          nullable: true
        extractedTitle:
          type: string
          description: Extracted document title
          example: "Q4 Financial Report"
          nullable: true
        extractedAuthor:
          type: string
          description: Extracted document author
          example: "Finance Team"
          nullable: true
        extractedDate:
          type: string
          format: date
          description: Extracted document date
          nullable: true
        extractedKeywords:
          type: array
          items:
            type: string
          description: Extracted keywords
          example: ["revenue", "growth", "Q4"]
          nullable: true
        metadata:
          type: object
          description: Additional extracted metadata
          additionalProperties: true
        permissions:
          type: object
          description: File permissions
          properties:
            owner:
              type: string
              format: uuid
            readers:
              type: array
              items:
                type: string
            visibility:
              type: string
              enum: [private, shared, public]
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        currentStatus:
          $ref: '#/components/schemas/StatusUpdate'

    HealthResponse:
      type: object
      required:
        - status
        - dependencies
      properties:
        status:
          type: string
          enum: [healthy, degraded, unhealthy]
          example: "healthy"
        version:
          type: string
          example: "1.0.0"
        dependencies:
          type: object
          properties:
            postgres:
              $ref: '#/components/schemas/DependencyStatus'
            minio:
              $ref: '#/components/schemas/DependencyStatus'
            redis:
              $ref: '#/components/schemas/DependencyStatus'
            milvus:
              $ref: '#/components/schemas/DependencyStatus'
            litellm:
              $ref: '#/components/schemas/DependencyStatus'

    DependencyStatus:
      type: object
      required:
        - status
      properties:
        status:
          type: string
          enum: [up, down, degraded]
          example: "up"
        responseTime:
          type: integer
          description: Response time in milliseconds
          example: 15
        lastChecked:
          type: string
          format: date-time
        error:
          type: string
          nullable: true

    ErrorResponse:
      type: object
      required:
        - error
        - message
      properties:
        error:
          type: string
          description: Error code
          example: "FILE_TOO_LARGE"
        message:
          type: string
          description: Human-readable error message
          example: "File size exceeds maximum allowed size of 100MB"
        details:
          type: object
          description: Additional error details
          additionalProperties: true
          nullable: true

  securitySchemes:
    UserContext:
      type: apiKey
      in: header
      name: X-User-Id
      description: |
        User ID passed from apps-lxc after authentication.
        This is an internal API, so authentication happens at the gateway level.

security:
  - UserContext: []

