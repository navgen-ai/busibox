        agent_id:
          type: string
          format: uuid
        workflow_id:
          type: string
          format: uuid
          nullable: true
        input:
          type: object
          description: Input payload (typically includes "prompt" key)
          example:
            prompt: Search for recent documents about AI
      required:
        - agent_id
        - input

    RunRead:
      type: object
      properties:
        id:
          type: string
          format: uuid
        agent_id:
          type: string
          format: uuid
        workflow_id:
          type: string
          format: uuid
          nullable: true
        status:
          type: string
          enum: [pending, running, succeeded, failed, timeout]
        input:
          type: object
        output:
          type: object
          nullable: true
        events:
          type: array
          items:
            type: object
            properties:
              timestamp:
                type: string
                format: date-time
              type:
                type: string
                example: tool_call
              data:
                type: object
        created_by:
          type: string
          nullable: true
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
      required:
        - id
