    WorkflowDefinitionCreate:
      type: object
      properties:
        name:
          type: string
          pattern: '^[a-zA-Z0-9_-]+$'
          maxLength: 120
        description:
          type: string
          maxLength: 1000
        steps:
          type: array
          items:
            type: object
            properties:
              agent_id:
                type: string
                format: uuid
              input_mapping:
                type: object
              output_key:
                type: string
        is_active:
          type: boolean
          default: true
      required:
        - name
        - steps

    WorkflowDefinitionRead:
      allOf:
        - $ref: '#/components/schemas/WorkflowDefinitionCreate'
        - type: object
          properties:
            id:
              type: string
              format: uuid
            version:
              type: integer
            created_by:
              type: string
              nullable: true
            created_at:
              type: string
              format: date-time
            updated_at:
              type: string
              format: date-time
          required:
            - id
            - version
            - created_at
            - updated_at

    WorkflowDefinitionUpdate:
      type: object
      properties:
        description:
          type: string
          maxLength: 1000
        steps:
          type: array
          items:
            type: object
        is_active:
          type: boolean

    EvalDefinitionCreate:
      type: object
      properties:
        name:
          type: string
          pattern: '^[a-zA-Z0-9_-]+$'
          maxLength: 120
        description:
          type: string
          maxLength: 1000
        scorer_type:
          type: string
          enum: [llm_judge, exact_match, semantic_similarity, custom]
        config:
          type: object
          description: Scorer-specific configuration
        is_active:
          type: boolean
          default: true
      required:
        - name
        - scorer_type

    EvalDefinitionRead:
      allOf:
        - $ref: '#/components/schemas/EvalDefinitionCreate'
        - type: object
          properties:
            id:
              type: string
              format: uuid
            version:
              type: integer
            created_by:
              type: string
              nullable: true
