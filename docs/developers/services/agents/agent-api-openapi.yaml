        - updated_at

    ScheduleCreate:
      type: object
      properties:
        agent_id:
          type: string
          format: uuid
        cron:
          type: string
          description: Cron expression (5 fields)
          example: "0 9 * * *"
        input:
          type: object
          description: Input payload for agent
        scopes:
          type: array
          items:
            type: string
          example: ["search.read", "data.write"]
        purpose:
          type: string
          example: scheduled-ingestion
      required:
        - agent_id
        - cron
        - input
        - scopes
        - purpose

    ScheduleRead:
      allOf:
        - $ref: '#/components/schemas/ScheduleCreate'
        - type: object
          properties:
            schedule_id:
              type: string
            created_at:
              type: string
              format: date-time
            next_run:
              type: string
              format: date-time
          required:
            - schedule_id
            - created_at

    DispatcherRequest:
      type: object
      properties:
        query:
          type: string
          description: Natural language query
          example: Search for documents about machine learning
        available_tools:
          type: array
          items:
            type: object
            properties:
              name:
                type: string
              description:
                type: string
        available_agents:
          type: array
          items:
            type: object
            properties:
              id:
                type: string
                format: uuid
              name:
                type: string
              description:
                type: string
        attachments:
          type: array
          items:
            type: object
          default: []
      required:
        - query
        - available_tools
        - available_agents

    DispatcherResponse:
      type: object
      properties:
        selected_tools:
          type: array
          items:
            type: string
          description: Names of selected tools
        selected_agents:
          type: array
          items:
            type: string
            format: uuid
          description: IDs of selected agents
        confidence:
          type: number
          format: float
          minimum: 0
          maximum: 1
          description: Confidence score for routing decision
        reasoning:
          type: string
          description: Explanation for the routing decision
        alternatives:
          type: array
          items:
            type: object
            properties:
              tools:
                type: array
                items:
                  type: string
              agents:
                type: array
                items:
                  type: string
                  format: uuid
              confidence:
                type: number
                format: float
      required:
        - selected_tools
        - selected_agents
        - confidence
        - reasoning

    Error:
      type: object
      properties:
        detail:
          type: string
          description: Error message
      required:
        - detail

  responses:
    BadRequest:
      description: Invalid request
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    
    Unauthorized:
      description: Authentication required or invalid token
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    
    Forbidden:
      description: Insufficient permissions
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    
    InternalError:
      description: Internal server error
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'









