# =============================================================================
# Busibox Development Mode - Next.js Applications
# =============================================================================
#
# Development overlay for Next.js apps with:
#   - Volume-mounted source code for live editing
#   - busibox-app mounted at /srv/busibox-app for both apps
#   - Turbopack hot-reload with full busibox-app support
#
# Prerequisites:
#   - Build busibox-app on host: cd ../busibox-app && npm run build
#   - Set GITHUB_AUTH_TOKEN in .env.local
#
# Usage:
#   docker compose -f docker-compose.yml -f docker-compose.local-dev.yml up
#   Or: make docker-up
#
# Core Apps Architecture:
#   - Single container runs both ai-portal (port 3000) and agent-manager (port 3001)
#   - Mirrors Proxmox pattern where core-apps-lxc hosts multiple Next.js apps
#   - Uses concurrently to manage both processes
#
# See docs/development/docker-dev-mode.md for full documentation.
#
# =============================================================================

services:
  # Core Apps - AI Portal + Agent Manager (Development Mode)
  # Single container running both apps, matching Proxmox architecture
  core-apps:
    build:
      context: .
      dockerfile: provision/docker/core-apps.Dockerfile.dev
      args:
        GITHUB_AUTH_TOKEN: ${GITHUB_AUTH_TOKEN:-}
    container_name: ${CONTAINER_PREFIX:-local}-core-apps
    hostname: core-apps
    restart: unless-stopped
    environment:
      NODE_ENV: development
      # Allow self-signed SSL certificates in local dev
      NODE_TLS_REJECT_UNAUTHORIZED: "0"
      # GitHub token for npm authentication (required for @jazzmind packages)
      GITHUB_AUTH_TOKEN: ${GITHUB_AUTH_TOKEN:-}
      # =========================================================================
      # AI Portal Environment (PORT 3000)
      # =========================================================================
      # Database
      DATABASE_URL: postgresql://${POSTGRES_USER:-busibox_user}:${POSTGRES_PASSWORD:-devpassword}@postgres:5432/ai_portal
     # Email (optional - uses console logging in dev)
      RESEND_API_KEY: ${RESEND_API_KEY:-}
      EMAIL_FROM: ${EMAIL_FROM:-noreply@localhost}
      # Admin
      ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@localhost}
      ALLOWED_EMAIL_DOMAINS: ${ALLOWED_EMAIL_DOMAINS:-*}
      # AuthZ - use internal container URLs
      AUTHZ_BASE_URL: http://authz-api:8010
      # LiteLLM
      LITELLM_BASE_URL: http://litellm:4000/v1
      LITELLM_API_KEY: ${LITELLM_API_KEY:-sk-local-dev-key}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      # SSO
      SSO_JWT_SECRET: ${SSO_JWT_SECRET:-dev-sso-secret}
      # Service URLs (for SSO redirect via nginx proxy)
      NEXT_PUBLIC_AGENT_MANAGER_URL: https://localhost/agents
      NEXT_PUBLIC_APP_URL: https://localhost/portal
      # Base paths for nginx subpath routing
      NEXT_PUBLIC_BASE_PATH: /portal
      AI_PORTAL_BASE_PATH: /portal
      AGENT_MANAGER_BASE_PATH: /agents
      # Backend service URLs (for server-side API calls)
      INGEST_API_URL: http://ingest-api:8002
      SEARCH_API_URL: http://search-api:8003
      AGENT_API_URL: http://agent-api:8000
      # Docs API - internal container URL for server-side fetching
      DOCS_API_URL: http://docs-api:8004
      # Deployment Service - internal container URL for server-side deployment
      DEPLOYMENT_SERVICE_URL: http://deploy-api:8011/api/v1/deployment
      # =========================================================================
      # Agent Manager Environment (PORT 3001)
      # =========================================================================
      # API URLs - use nginx proxy paths for CORS compliance
      NEXT_PUBLIC_AGENT_API_URL: https://localhost/api/agent
      NEXT_PUBLIC_INGEST_API_URL: https://localhost/api/ingest
      NEXT_PUBLIC_SEARCH_API_URL: https://localhost/api/search
      # AI Portal (SSO) via nginx
      NEXT_PUBLIC_AI_PORTAL_URL: https://localhost/portal
    ports:
      - "3000:3000"
      - "3001:3001"
    volumes:
      # Mount source code for both apps
      # Use AI_PORTAL_DIR and AGENT_MANAGER_DIR env vars if set, fall back to relative paths
      - ${AI_PORTAL_DIR:-../ai-portal}:/srv/ai-portal
      - ${AGENT_MANAGER_DIR:-../agent-manager}:/srv/agent-manager
      # Preserve node_modules from container (installed during build)
      - ai-portal-node-modules:/srv/ai-portal/node_modules
      - agent-manager-node-modules:/srv/agent-manager/node_modules
      # Note: .next cache volumes removed - Turbopack rebuilds quickly in dev mode
      # and the volume overlay caused cache inconsistency issues with host .next dirs
      # Mount busibox-app at /srv/busibox-app for entrypoint to link into node_modules
      - ${BUSIBOX_APP_DIR:-../busibox-app}:/srv/busibox-app:ro
    # Core apps only need postgres and authz for bootstrap
    # docs-api can come online later
    depends_on:
      postgres:
        condition: service_healthy
      authz-api:
        condition: service_healthy
    healthcheck:
      # Check both apps are responding
      test: ["CMD", "sh", "-c", "curl -f http://localhost:3000/portal/api/health && curl -f http://localhost:3001/agents"]
      interval: 30s
      timeout: 10s
      start_period: 180s
      retries: 5
    networks:
      busibox-net:
        aliases:
          - core-apps
          - ai-portal      # Backward compatibility alias
          - agent-manager  # Backward compatibility alias

  # User Apps - Development Mode
  # Mount dev-apps directory for local app development with hot-reload
  user-apps:
    environment:
      NODE_ENV: development
      # Tell deploy-api where to look for dev apps
      DEV_APPS_DIR: /srv/dev-apps
    volumes:
      # Mount DEV_APPS_DIR from env (set in .env.local)
      # If not set, falls back to local ./dev-apps directory
      - ${DEV_APPS_DIR:-./dev-apps}:/srv/dev-apps
      # Mount busibox-app for shared utilities
      - ${BUSIBOX_APP_DIR:-../busibox-app}:/srv/busibox-app:ro

# Named volumes for node_modules and .next cache
# These preserve installed dependencies across container restarts
volumes:
  ai-portal-node-modules:
  agent-manager-node-modules:

# Use the same network as the base compose
# Note: Don't use external:true - let docker compose manage the network lifecycle
networks:
  busibox-net:
    driver: bridge
    name: ${CONTAINER_PREFIX:-local}-busibox-net
