# =============================================================================
# Busibox Development Mode - Next.js Applications
# =============================================================================
#
# Development overlay for Next.js apps with:
#   - Volume-mounted source code for live editing
#   - busibox-app installed from GitHub Packages
#   - Turbopack hot-reload (dev mode) or built production server (prod mode)
#
# Prerequisites:
#   - Set GITHUB_AUTH_TOKEN in .env.local for @jazzmind/busibox-app
#
# Core Apps Mode (CORE_APPS_MODE env var):
#   dev  - (default) Turbopack hot-reload. Code changes apply instantly.
#          Higher CPU usage due to on-demand compilation.
#   prod - Builds apps from volume-mounted source, then serves with `next start`.
#          Much lower CPU. Restart container to pick up code changes.
#
# Usage:
#   make docker-up                          # Default (dev mode)
#   CORE_APPS_MODE=prod make docker-up      # Production mode (built, no hot-reload)
#   Or: docker compose -f docker-compose.yml -f docker-compose.local-dev.yml up
#
# Architecture:
#   - Both ai-portal and agent-manager run in single core-apps container
#   - Uses concurrently to manage both Next.js processes
#   - Mirrors production Proxmox pattern (core-apps-lxc hosts both)
#
# See docs/development/docker-dev-mode.md for full documentation.
#
# =============================================================================

services:
  # Core Apps - AI Portal + Agent Manager (Development Mode)
  # Runs both Next.js apps in single container using concurrently
  core-apps:
    build:
      context: ${BUSIBOX_DIR:-.}
      dockerfile: provision/docker/core-apps.Dockerfile.dev
      args:
        GITHUB_AUTH_TOKEN: ${GITHUB_AUTH_TOKEN:-}
    container_name: ${CONTAINER_PREFIX:-local}-core-apps
    hostname: core-apps
    restart: unless-stopped
    # Pass the mode to the entrypoint: "dev" (Turbopack) or "prod" (build + serve)
    # Set CORE_APPS_MODE=prod for pre-built production mode (much lower CPU, no hot-reload)
    command: ["${CORE_APPS_MODE:-dev}"]
    environment:
      # NODE_ENV is set by the entrypoint based on the mode
      NODE_ENV: development
      # GitHub token for busibox-app access (REQUIRED)
      # Set via: export GITHUB_AUTH_TOKEN=ghp_your_token_here
      # Or set directly here (not recommended): GITHUB_AUTH_TOKEN: ghp_your_token_here
      GITHUB_AUTH_TOKEN: ${GITHUB_AUTH_TOKEN:?GITHUB_AUTH_TOKEN must be set - get token from https://github.com/settings/tokens/new with repo and read:packages scopes}
      # Allow self-signed SSL certificates in local dev
      NODE_TLS_REJECT_UNAUTHORIZED: "0"
      
      # =======================================================================
      # AI Portal Environment (PORT 3000, /portal path)
      # =======================================================================
      # Database
      DATABASE_URL: postgresql://${POSTGRES_USER:-busibox_user}:${POSTGRES_PASSWORD:-devpassword}@postgres:5432/ai_portal
      # Email (optional - uses console logging in dev)
      RESEND_API_KEY: ${RESEND_API_KEY:-}
      EMAIL_FROM: ${EMAIL_FROM:-noreply@localhost}
      # Admin
      ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@localhost}
      ALLOWED_EMAIL_DOMAINS: ${ALLOWED_EMAIL_DOMAINS:-*}
      # AuthZ - use internal container URLs
      AUTHZ_BASE_URL: http://authz-api:8010
      # LiteLLM
      LITELLM_BASE_URL: http://litellm:4000/v1
      LITELLM_API_KEY: ${LITELLM_API_KEY:-sk-local-dev-key}
      # SSO
      SSO_JWT_SECRET: ${SSO_JWT_SECRET:-dev-sso-secret}
      # Service URLs (for SSO redirect via nginx proxy)
      NEXT_PUBLIC_AGENT_MANAGER_URL: https://localhost/agents
      NEXT_PUBLIC_APP_URL: https://localhost/portal
      # NOTE: NEXT_PUBLIC_BASE_PATH is set per-app in core-apps-entrypoint.sh
      # because both apps run in the same container but need different values
      # Backend service URLs (for server-side API calls)
      AGENT_API_URL: http://agent-api:8000
      DATA_API_HOST: data-api
      DATA_API_PORT: "8002"
      SEARCH_API_HOST: search-api
      SEARCH_API_PORT: "8003"
      AGENT_API_HOST: agent-api
      AGENT_API_PORT: "8000"
      # Docs API - internal container URL for server-side fetching
      DOCS_API_URL: http://docs-api:8004
      # Deployment Service - internal container URL for server-side deployment
      DEPLOYMENT_SERVICE_URL: http://deploy-api:8011/api/v1/deployment
      DEPLOY_API_URL: http://deploy-api:8011
      # Bridge API - email sending and multi-channel communication
      BRIDGE_API_URL: http://bridge-api:8081
      # Host Agent (for MLX control on Apple Silicon)
      HOST_AGENT_URL: http://host.docker.internal:8089
      HOST_AGENT_TOKEN: ${HOST_AGENT_TOKEN:-}
      # LLM Backend - passed from install.sh to tell AI Portal what hardware is available
      LLM_BACKEND: ${LLM_BACKEND:-}
      
      # =======================================================================
      # Agent Manager Environment (PORT 3001, /agents path)
      # =======================================================================
      # API URLs - use nginx proxy paths for CORS compliance
      NEXT_PUBLIC_AGENT_API_URL: https://localhost/api/agent
      NEXT_PUBLIC_DATA_API_URL: https://localhost/api/data
      NEXT_PUBLIC_SEARCH_API_URL: https://localhost/api/search
      # AI Portal (SSO) via nginx
      NEXT_PUBLIC_AI_PORTAL_URL: https://localhost/portal
      # NOTE: NEXT_PUBLIC_BASE_PATH is set per-app in core-apps-entrypoint.sh
      # because both apps run in the same container but need different values
      # (/portal for ai-portal, /agents for agent-manager)
      
      # =======================================================================
      # Testing: Silent SSO Refresh (REMOVE AFTER TESTING)
      # =======================================================================
      # SSO_COOKIE_MAX_AGE: "60"
      # NEXT_PUBLIC_AUTH_CHECK_INTERVAL_MS: "10000"
      # NEXT_PUBLIC_AUTH_REFRESH_BUFFER_MS: "30000"
      # NEXT_PUBLIC_TOKEN_EXPIRES_OVERRIDE_MS: "60000"
      # VERBOSE_AUTH_LOGGING: "true"
    extra_hosts:
      - "host.docker.internal:host-gateway"  # Access host's localhost from container
    ports:
      # Nginx ports (main entry points)
      - "80:80"
      - "443:443"
      # Direct app ports (for debugging)
      - "3000:3000"  # AI Portal
      - "3001:3001"  # Agent Manager
    volumes:
      # Mount both app directories
      - ${AI_PORTAL_DIR:-../ai-portal}:/srv/ai-portal
      - ${AGENT_MANAGER_DIR:-../agent-manager}:/srv/agent-manager
      # Preserve node_modules from container (installed during build)
      - ai-portal-node-modules:/srv/ai-portal/node_modules
      - agent-manager-node-modules:/srv/agent-manager/node_modules
      # Preserve .next build caches
      - ai-portal-next-cache:/srv/ai-portal/.next
      - agent-manager-next-cache:/srv/agent-manager/.next
      # Mount nginx config (allows live editing of nginx config)
      - ${BUSIBOX_DIR:-.}/config/nginx-local.conf:/etc/nginx/nginx.conf:ro
      - ${BUSIBOX_DIR:-.}/config/nginx-sites:/etc/nginx/conf.d:ro
      - ${BUSIBOX_DIR:-.}/config/nginx-sites/apps:/etc/nginx/conf.d/apps:rw
      - ${BUSIBOX_DIR:-.}/ssl:/etc/nginx/ssl:ro
    depends_on:
      postgres:
        condition: service_healthy
      authz-api:
        condition: service_healthy
    healthcheck:
      # Check nginx is responding (instant — returns "healthy" without hitting Next.js)
      # Do NOT check /portal/api/health or /agents/api/health here — those trigger
      # Turbopack compilation in dev mode and cause CPU spikes every 30s
      test: ["CMD", "curl", "-f", "http://localhost:80/health"]
      interval: 30s
      timeout: 5s
      start_period: 60s
      retries: 3
    networks:
      busibox-net:
        aliases:
          - core-apps
          - nginx          # nginx is now inside core-apps
          - ai-portal      # For backward compatibility
          - agent-manager  # For backward compatibility

  # User Apps - Development Mode
  # Mount dev-apps directory for local app development with hot-reload
  user-apps:
    environment:
      NODE_ENV: development
      # Tell deploy-api where to look for dev apps inside container
      DEV_APPS_DIR: /srv/dev-apps
      # Pass the host path for display in UI
      DEV_APPS_DIR_HOST: ${DEV_APPS_DIR:-./dev-apps}
    volumes:
      # Mount DEV_APPS_DIR from env (set in .env.local)
      # If not set, falls back to local ./dev-apps directory
      - ${DEV_APPS_DIR:-./dev-apps}:/srv/dev-apps
      # Mount busibox-app for shared utilities
      - ${BUSIBOX_APP_DIR:-../busibox-app}:/srv/busibox-app:ro

# Named volumes for node_modules and .next cache
# These preserve installed dependencies across container restarts
volumes:
  ai-portal-node-modules:
  ai-portal-next-cache:
  agent-manager-node-modules:
  agent-manager-next-cache:

# Use the same network as the base compose
# Note: Don't use external:true - let docker compose manage the network lifecycle
networks:
  busibox-net:
    driver: bridge
    name: ${CONTAINER_PREFIX:-local}-busibox-net
